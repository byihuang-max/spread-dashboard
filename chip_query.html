<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个股筹码查询 | GAMT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1724;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header .title{font-size:20px;font-weight:700;color:#e2e8f0}
.header .back{color:#5daeff;text-decoration:none;font-size:14px;opacity:0.8}
.header .back:hover{opacity:1}
.search-bar{display:flex;gap:10px;padding:20px 24px;max-width:600px;margin:0 auto}
.search-bar input{flex:1;padding:12px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:#1a2332;color:#e2e8f0;font-size:16px;outline:none}
.search-bar input:focus{border-color:#5daeff}
.search-bar input::placeholder{color:#4a5568}
.search-bar button{padding:12px 28px;border-radius:8px;border:none;background:#5daeff;color:#fff;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-bar button:hover{background:#4a9bef}
.search-bar button:disabled{background:#3a4a5a;cursor:not-allowed}
.container{max-width:900px;margin:0 auto;padding:0 24px 40px}
.loading{text-align:center;padding:60px 20px;display:none}
.loading .spinner{font-size:32px;animation:pulse 1.2s infinite ease-in-out}
.loading .text{font-size:16px;color:#cbd5e1;margin-top:10px}
.loading .sub{font-size:13px;color:#64748b;margin-top:6px}
@keyframes pulse{0%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:.6}}
.error{display:none;text-align:center;padding:40px;color:#f87171;font-size:15px}
.result{display:none}
.stock-header{text-align:center;margin:24px 0 20px}
.stock-header .name{font-size:24px;font-weight:700;color:#e2e8f0}
.stock-header .code{font-size:14px;color:#64748b;margin-left:8px}
.stock-header .date{font-size:13px;color:#64748b;display:block;margin-top:6px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.card{background:#1a2332;border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
.metric-card{text-align:center;padding:18px 12px}
.metric-card .label{font-size:11px;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.metric-card .value{font-size:22px;font-weight:700}
.section{padding:18px}
.section .title{font-size:15px;font-weight:600;color:#e2e8f0;margin-bottom:14px}
.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.row:last-child{border-bottom:none}
.row .k{font-size:13px;color:#64748b}
.row .v{font-size:14px;font-weight:600;color:#e2e8f0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.note{margin-top:20px;padding:16px;font-size:13px;color:#64748b;line-height:1.8}
.fundamentals-text{margin-top:12px;font-size:13px;color:#94a3b8;line-height:1.8;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}
.info-banner{background:linear-gradient(135deg,rgba(93,174,255,.12),rgba(89,224,197,.08));border:1px solid rgba(93,174,255,.18);border-radius:12px;padding:14px 16px;margin-bottom:16px;color:#cbd5e1;line-height:1.7;font-size:13px}
.fancy-fund-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-top:8px}
.fancy-stack{display:grid;gap:16px}
.hero-card{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px}
.hero-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.hero-title{font-size:18px;font-weight:700;color:#f8fafc}
.hero-sub{font-size:12px;color:#94a3b8;margin-top:4px}
.hero-tag{padding:6px 10px;border-radius:999px;background:rgba(93,174,255,.12);color:#8ec5ff;font-size:12px;border:1px solid rgba(93,174,255,.2);white-space:nowrap}
.snapshot-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.snapshot-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px}
.snapshot-item .k{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.snapshot-item .v{font-size:16px;font-weight:700;color:#e2e8f0}
.narrative{font-size:13px;color:#cbd5e1;line-height:1.85;white-space:pre-wrap}
.bullet-card{background:#16202d;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px}
.bullet-card .t{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:12px}
.clean-list{display:grid;gap:10px}
.clean-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.clean-item .k{font-size:12px;color:#94a3b8;margin-bottom:4px}
.clean-item .v{font-size:13px;color:#e2e8f0;line-height:1.7}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chip{padding:6px 10px;border-radius:999px;background:rgba(159,139,255,.12);border:1px solid rgba(159,139,255,.18);color:#cbbcff;font-size:12px}
@media(max-width:900px){.fancy-fund-grid{grid-template-columns:1fr}.snapshot-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .search-bar{flex-direction:column}
  .snapshot-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="header">
  <span class="title">📊 个股筹码查询</span>
  <a href="index.html" class="back">← 返回看板</a>
</div>
<div class="search-bar">
  <input id="codeInput" type="text" placeholder="输入股票代码，如 600519 或 002180.SZ" autofocus>
  <button id="searchBtn" onclick="doSearch()">查询</button>
</div>
<div class="container">
  <div class="card section" style="margin-bottom:16px" id="historyCard">
    <div class="title">最近查询</div>
    <div id="historyList" class="fundamentals-text">暂无查询记录</div>
  </div>
  <div class="loading" id="loading">
    <div class="spinner">⏳</div>
    <div class="text">正在查询个股筹码…</div>
    <div class="sub">预计 10-30 秒，请稍等</div>
  </div>
  <div class="error" id="error"></div>
  <div class="result" id="result"></div>
</div>
<script>
document.getElementById('codeInput').addEventListener('keypress',function(e){if(e.key==='Enter')doSearch()});
const CHIP_HISTORY_KEY = 'gamt_chip_query_history';
function loadHistory(){
  try{
    var arr = JSON.parse(localStorage.getItem(CHIP_HISTORY_KEY) || '[]');
    var box = document.getElementById('historyList');
    if(!arr.length){ box.innerHTML='暂无查询记录'; return; }
    box.innerHTML = arr.map(function(x){
      return '<div style="display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)"><span><a href="javascript:void(0)" onclick="quickSearch(\''+x.code+'\')" style="color:#5daeff;text-decoration:none">'+x.code+'</a>'+(x.name?(' <span style=\"color:#94a3b8\">'+x.name+'</span>'):'')+'</span><span style="color:#64748b;font-size:12px">'+x.time+'</span></div>';
    }).join('');
  }catch(e){ document.getElementById('historyList').innerHTML='暂无查询记录'; }
}
function saveHistory(code,name){
  try{
    var arr = JSON.parse(localStorage.getItem(CHIP_HISTORY_KEY) || '[]');
    var now = new Date();
    var time = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    arr = arr.filter(function(x){ return x.code !== code; });
    arr.unshift({code:code,name:name||'',time:time});
    arr = arr.slice(0,10);
    localStorage.setItem(CHIP_HISTORY_KEY, JSON.stringify(arr));
    loadHistory();
  }catch(e){}
}
function quickSearch(code){ document.getElementById('codeInput').value=code; doSearch(); }
loadHistory();
</script>
</body>
</html>
<script>
function doSearch(){
  var code=document.getElementById('codeInput').value.trim().toUpperCase();
  if(!code)return;
  if(/^\d{6}$/.test(code)){
    if(code[0]==='6')code+='.SH';
    else if(code[0]==='0'||code[0]==='3')code+='.SZ';
    else if(code[0]==='8'||code[0]==='4')code+='.BJ';
    document.getElementById('codeInput').value=code;
  }
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('searchBtn').disabled=true;
  document.getElementById('searchBtn').textContent='查询中…';
  fetch('/api/chip_query?code='+encodeURIComponent(code))
    .then(function(r){return r.json()})
    .then(function(d){
      document.getElementById('loading').style.display='none';
      document.getElementById('searchBtn').disabled=false;
      document.getElementById('searchBtn').textContent='查询';
      if(!d.success){showErr(d.error||'查询失败');return}
      showResult(d);
    })
    .catch(function(e){
      document.getElementById('loading').style.display='none';
      document.getElementById('searchBtn').disabled=false;
      document.getElementById('searchBtn').textContent='查询';
      showErr('网络错误: '+e.message);
    });
}
function showErr(msg){
  document.getElementById('error').textContent=msg;
  document.getElementById('error').style.display='block';
}
function fmtPct(v){return v!=null?(v*100).toFixed(1)+'%':'N/A'}
function fmtMoney(v){
  if(v==null)return 'N/A';
  var abs=Math.abs(v);
  if(abs>=1e8)return (v/1e8).toFixed(2)+'亿';
  if(abs>=1e4)return (v/1e4).toFixed(2)+'万';
  return v.toFixed(2);
}
function row(k,v,color){
  return '<div class="row"><span class="k">'+k+'</span><span class="v" style="color:'+(color||'#e2e8f0')+'">'+v+'</span></div>';
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}
function extractMetrics(text){
  if(!text)return [];
  var lines=String(text).split(/\n+/).map(function(x){return x.trim()}).filter(Boolean);
  // 检测竖线分隔表格格式
  if(lines.length>=2 && lines[0].indexOf('|')>0 && lines[1].indexOf('|')>0){
    var headers=lines[0].split('|').map(function(x){return x.trim()}).filter(Boolean);
    var values=lines[lines.length-1].split('|').map(function(x){return x.trim()}).filter(Boolean);
    var result=[];
    for(var i=0;i<Math.min(headers.length,values.length);i++){
      if(headers[i] && values[i] && headers[i]!=='---')result.push({k:headers[i],v:values[i]});
    }
    return result.slice(0,6);
  }
  // 冒号分隔格式
  return lines.slice(0,6).map(function(line){
    var m=line.match(/^([^：:]{2,20})[：: ]+(.+)$/);
    if(m)return {k:m[1].trim(),v:m[2].trim()};
    return {k:'要点',v:line};
  });
}
function splitIndustryTags(text){
  if(!text)return [];
  return String(text).split(/[、,，/｜|]/).map(function(x){return x.trim()}).filter(Boolean).slice(0,6);
}
function trendText(v){
  if(v==null)return 'N/A';
  if(v>5)return '明显跑赢';
  if(v>0)return '小幅走强';
  if(v>-5)return '偏弱震荡';
  return '明显走弱';
}
function renderOverviewCard(d){
  var c=d.chip||{}, mf=d.moneyflow||{}, p=d.profile||{}, ls=d.limit_stats||{}, bo=d.big_order_stats||{}, ic=d.industry_compare||{};
  var w30=(bo.by_window||{})['30']||{}, w60=(bo.by_window||{})['60']||{};
  var peakState='当前价在主筹码峰附近';
  if(c.peak_distance!=null){
    if(c.peak_distance>8)peakState='当前价明显高于主筹码峰';
    else if(c.peak_distance<-8)peakState='当前价明显低于主筹码峰';
  }
  var h='';
  h+='<div class="card section" style="margin-bottom:16px">';
  h+='<div class="title">先看结论：筹码峰 + 大单 + 行业</div>';
  h+='<div class="info-banner">看一只股票，先看 <b>筹码峰有没有被突破、近30/60日有没有异常大单、公司属于什么行业、最近是否出现涨停等特殊表现</b>。这一屏先把最关键的观察顺序排好。</div>';
  h+='<div class="fancy-fund-grid">';
  h+='<div class="hero-card">';
  h+='<div class="hero-head"><div><div class="hero-title">筹码峰观察</div><div class="hero-sub">最近60日筹码重建结果</div></div><div class="hero-tag">最先看</div></div>';
  h+='<div class="snapshot-grid">';
  h+='<div class="snapshot-item"><div class="k">主筹码峰</div><div class="v">'+(c.peak_price!=null?esc(c.peak_price):'N/A')+'</div></div>';
  h+='<div class="snapshot-item"><div class="k">偏离主峰</div><div class="v">'+(c.peak_distance!=null?esc(c.peak_distance)+'%':'N/A')+'</div></div>';
  h+='<div class="snapshot-item"><div class="k">近30日大单日</div><div class="v">'+(w30.big_days!=null?esc(w30.big_days)+' 天':'N/A')+'</div></div>';
  h+='<div class="snapshot-item"><div class="k">近60日大单日</div><div class="v">'+(w60.big_days!=null?esc(w60.big_days)+' 天':'N/A')+'</div></div>';
  h+='</div>';
  h+='<div style="margin-top:16px" class="narrative">'+peakState+'。';
  if(w30.latest_is_big)h+=' 最近一个交易日的大单成交占比高于近30日历史80%分位，属于异常大单日。';
  else h+=' 最近一个交易日没有触发异常大单日。';
  h+=' 近5日主力净流入'+fmtMoney(mf.main_net_5d)+'，近10日主力净流入'+fmtMoney(mf.main_net_10d)+'。</div>';
  // 一句话投资者视角结论
  var signals=[];
  if(c.peak_distance!=null){
    if(c.peak_distance>8)signals.push({t:'筹码峰已被突破',c:'#59e0c5'});
    else if(c.peak_distance<-8)signals.push({t:'跌破筹码峰',c:'#f87171'});
    else signals.push({t:'筹码峰附近震荡',c:'#fbbf24'});
  }
  if(w30.latest_is_big||w60.big_days>3)signals.push({t:'近期有异常大单',c:'#5daeff'});
  else signals.push({t:'大单平淡',c:'#64748b'});
  if(ls.limit_up_count>0)signals.push({t:'近60日有涨停',c:'#59e0c5'});
  if(ic.stock_return_20d!=null){
    if(ic.stock_return_20d>5)signals.push({t:'近20日走强',c:'#59e0c5'});
    else if(ic.stock_return_20d<-5)signals.push({t:'近20日走弱',c:'#f87171'});
    else signals.push({t:'近20日震荡',c:'#fbbf24'});
  }
  if(mf.main_net_5d!=null){
    if(mf.main_net_5d>0)signals.push({t:'近5日主力净流入',c:'#59e0c5'});
    else signals.push({t:'近5日主力净流出',c:'#f87171'});
  }
  if(signals.length){
    h+='<div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center"><span style="font-size:12px;color:#64748b;margin-right:4px">投资者视角：</span>';
    signals.forEach(function(s){h+='<span style="padding:5px 10px;border-radius:999px;font-size:12px;font-weight:600;background:rgba(255,255,255,.04);border:1px solid '+s.c+'33;color:'+s.c+'">'+esc(s.t)+'</span>'});
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="fancy-stack">';
  h+='<div class="bullet-card"><div class="t">行业属性</div><div class="clean-list">';
  h+='<div class="clean-item"><div class="k">所属行业</div><div class="v">'+esc(p.industry||'N/A')+'</div></div>';
  h+='<div class="clean-item"><div class="k">市场 / 地域</div><div class="v">'+esc((p.market||'N/A')+' / '+(p.area||'N/A'))+'</div></div>';
  h+='<div class="clean-item"><div class="k">上市日期</div><div class="v">'+esc(p.list_date||'N/A')+'</div></div>';
  h+='</div></div>';
  h+='<div class="bullet-card"><div class="t">特殊表现</div><div class="clean-list">';
  h+='<div class="clean-item"><div class="k">近60日涨停/特殊日</div><div class="v">'+esc(ls.limit_up_count!=null?ls.limit_up_count:'0')+' 次</div></div>';
  h+='<div class="clean-item"><div class="k">最近一次特殊日</div><div class="v">'+esc(ls.latest_limit_date||'暂无')+(ls.latest_limit_type?(' · '+esc(ls.latest_limit_type)):'')+'</div></div>';
  h+='<div class="clean-item"><div class="k">大单定义</div><div class="v">'+esc(bo.definition||'N/A')+'</div></div>';
  h+='</div></div>';
  h+='<div class="bullet-card"><div class="t">行业对比</div><div class="clean-list">';
  h+='<div class="clean-item"><div class="k">公司所属行业</div><div class="v">'+esc(ic.industry||p.industry||'N/A')+'</div></div>';
  h+='<div class="clean-item"><div class="k">个股近20日涨幅</div><div class="v">'+(ic.stock_return_20d!=null?esc(ic.stock_return_20d)+'% · '+trendText(ic.stock_return_20d):'N/A')+'</div></div>';
  h+='<div class="clean-item"><div class="k">行业平均涨幅</div><div class="v">'+(ic.industry_avg_20d!=null?esc(ic.industry_avg_20d)+'%':'待补')+'</div></div>';
  h+='</div></div>';
  h+='</div></div></div>';
  return h;
}
function metricVal(metrics, keys){
  for(var i=0;i<metrics.length;i++){
    for(var j=0;j<keys.length;j++){
      if(String(metrics[i].k).indexOf(keys[j])>=0)return metrics[i].v;
    }
  }
  return null;
}
function toNum(v){
  if(v==null)return null;
  var s=String(v).replace(/[,%亿元万股 ]/g,'');
  var n=parseFloat(s);
  return isNaN(n)?null:n;
}
function valuationLabel(pe,pb){
  if(pe==null&&pb==null)return '估值信息不足';
  if((pe!=null&&pe>40)||(pb!=null&&pb>6))return '估值偏高';
  if((pe!=null&&pe<20)&&(pb!=null&&pb<3))return '估值相对克制';
  return '估值大致中性';
}
function growthLabel(rev,profit){
  if(rev==null&&profit==null)return '增长信息不足';
  if((rev!=null&&rev>20)||(profit!=null&&profit>20))return '业绩处于扩张段';
  if((rev!=null&&rev<0)||(profit!=null&&profit<0))return '业绩有压力';
  return '业绩整体平稳';
}
function roeLabel(roe){
  if(roe==null)return '盈利能力待补';
  if(roe>15)return '盈利能力较强';
  if(roe>8)return '盈利能力中等';
  return '盈利能力偏弱';
}
function buildClientSummary(stockName, summary, pe, pb, mv, roe, rev, profit, industry){
  var parts=[];
  if(summary)parts.push(summary.replace(/\s+/g,' ').slice(0,80));
  else if(industry)parts.push(stockName+' 属于'+industry+'方向');
  if(mv)parts.push('当前总市值约'+mv);
  parts.push(valuationLabel(pe,pb));
  parts.push(growthLabel(rev,profit));
  parts.push(roeLabel(roe));
  return parts.join('，')+'。';
}
function renderFundamentalsCard(f, basics, stockName, code){
  var summary=f.summary_text||'';
  var financials=f.financials_text||'';
  var info=f.info_text||'';
  var infoMetrics=extractMetrics(info);
  var finMetrics=extractMetrics(financials);
  var topPE=basics&&basics.pe_ttm!=null?basics.pe_ttm:null;
  var topPB=basics&&basics.pb!=null?basics.pb:null;
  var topMV=basics&&basics.total_mv!=null?fmtMoney(basics.total_mv*10000):'N/A';
  var industry=metricVal(infoMetrics,['所属申万行业','所属行业','行业']);
  var roe=toNum(metricVal(finMetrics,['ROE']));
  var rev=toNum(metricVal(finMetrics,['营收同比','营业收入同比']));
  var profit=toNum(metricVal(finMetrics,['净利润同比']));
  
  var h='';
  h+='<div class="card section" style="margin-top:18px"><div class="title">公司基本面</div>';
  h+='<div class="info-banner">估值、财务、行业定位 — 表格化展示，一目了然。</div>';
  
  // 公司画像
  if(summary){
    var summaryLines=summary.split('\n').filter(Boolean);
    if(summaryLines.length>0){
      h+='<div style="margin-bottom:16px;padding:14px;background:rgba(93,174,255,.06);border-radius:10px;border:1px solid rgba(93,174,255,.12)">';
      h+='<div style="font-size:13px;font-weight:600;color:#5daeff;margin-bottom:8px">公司定位</div>';
      h+='<div style="font-size:13px;color:#cbd5e1;line-height:1.7">'+esc(summaryLines[0])+'</div>';
      h+='</div>';
    }
  }
  
  h+='<div class="fancy-fund-grid">';
  
  // 估值指标表格
  h+='<div class="bullet-card">';
  h+='<div class="t">估值指标</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:13px">';
  h+='<tr style="border-bottom:1px solid rgba(255,255,255,.06)"><td style="padding:10px 0;color:#94a3b8">市盈率 PE(TTM)</td><td style="padding:10px 0;text-align:right;color:#e2e8f0;font-weight:600">'+(topPE!=null?esc(topPE):'—')+'</td></tr>';
  h+='<tr style="border-bottom:1px solid rgba(255,255,255,.06)"><td style="padding:10px 0;color:#94a3b8">市净率 PB</td><td style="padding:10px 0;text-align:right;color:#e2e8f0;font-weight:600">'+(topPB!=null?esc(topPB):'—')+'</td></tr>';
  h+='<tr><td style="padding:10px 0;color:#94a3b8">总市值</td><td style="padding:10px 0;text-align:right;color:#e2e8f0;font-weight:600">'+esc(topMV)+'</td></tr>';
  h+='</table>';
  h+='</div>';
  
  // 财务表现表格
  h+='<div class="bullet-card">';
  h+='<div class="t">财务表现</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:13px">';
  h+='<tr style="border-bottom:1px solid rgba(255,255,255,.06)"><td style="padding:10px 0;color:#94a3b8">ROE(TTM)</td><td style="padding:10px 0;text-align:right;color:#e2e8f0;font-weight:600">'+(roe!=null?esc(roe)+'%':'—')+'</td></tr>';
  h+='<tr style="border-bottom:1px solid rgba(255,255,255,.06)"><td style="padding:10px 0;color:#94a3b8">营收增速</td><td style="padding:10px 0;text-align:right;color:'+(rev!=null&&rev>0?'#59e0c5':rev!=null&&rev<0?'#f87171':'#e2e8f0')+';font-weight:600">'+(rev!=null?esc(rev)+'%':'—')+'</td></tr>';
  h+='<tr><td style="padding:10px 0;color:#94a3b8">利润增速</td><td style="padding:10px 0;text-align:right;color:'+(profit!=null&&profit>0?'#59e0c5':profit!=null&&profit<0?'#f87171':'#e2e8f0')+';font-weight:600">'+(profit!=null?esc(profit)+'%':'—')+'</td></tr>';
  h+='</table>';
  h+='</div>';
  
  h+='</div></div>';
  return h;
}
function showResult(d){
  var c=d.chip,mf=d.moneyflow||{},b=d.basics||{},f=d.fundamentals||{};
  var h='';
  h+='<div class="stock-header"><span class="name">'+d.stock_name+'</span><span class="code">'+d.ts_code+'</span><span class="date">数据截止：'+d.end_date+'（最近交易日）｜向前回看 '+d.lookback_days+' 个交易日，实际使用 '+d.actual_trade_days+' 个交易日｜区间：'+d.date_range+'</span></div>';
  saveHistory(d.ts_code, d.stock_name);
  h += renderOverviewCard(d);
  h+='<div class="cards">';
  h+='<div class="card metric-card"><div class="label">当前价</div><div class="value" style="color:#5daeff">'+c.current_price+'</div></div>';
  h+='<div class="card metric-card"><div class="label">平均成本</div><div class="value" style="color:#59e0c5">'+c.avg_cost+'</div></div>';
  h+='<div class="card metric-card"><div class="label">50%成本位</div><div class="value" style="color:#9f8bff">'+c.median_cost+'</div></div>';
  h+='<div class="card metric-card"><div class="label">主筹码峰</div><div class="value" style="color:#fbbf24">'+c.peak_price+'</div></div>';
  h+='</div>';
  h+='<div class="grid2">';
  h+='<div class="card section"><div class="title">筹码结构</div>';
  h+=row('70%筹码区间',c.range_70?c.range_70[0]+' ~ '+c.range_70[1]:'N/A');
  h+=row('90%筹码区间',c.range_90?c.range_90[0]+' ~ '+c.range_90[1]:'N/A');
  h+=row('获利盘',fmtPct(c.profit_ratio),'#59e0c5');
  h+=row('套牢盘',fmtPct(c.locked_ratio),'#f87171');
  h+=row('偏离主峰',c.peak_distance+'%');
  h+='</div>';
  h+='<div>';
  h+='<div class="card section" style="margin-bottom:16px"><div class="title">资金异动</div>';
  h+=row('近5日主力净流入',fmtMoney(mf.main_net_5d),mf.main_net_5d>0?'#59e0c5':'#f87171');
  h+=row('近10日主力净流入',fmtMoney(mf.main_net_10d),mf.main_net_10d>0?'#59e0c5':'#f87171');
  h+='</div>';
  h+='<div class="card section"><div class="title">基本面</div>';
  h+=row('PE(TTM)',b.pe_ttm||'N/A');
  h+=row('PB',b.pb||'N/A');
  h+=row('总市值',fmtMoney(b.total_mv?b.total_mv*10000:null));
  h+='</div>';
  h+='</div></div>';
  if(f.summary_text||f.financials_text||f.info_text){
    h += renderFundamentalsCard(f, b, d.stock_name, d.ts_code);
  }
  var explain='';
  explain += '<div class="card section" style="margin-top:20px"><div class="title">这页到底在看什么？</div>';
  explain += '<div class="fundamentals-text">这页不是在猜明天涨跌，而是在回答一个更基础的问题：<b>近3个月买这只股票的人，大概都买在什么成本上？</b> 我们把这些历史买入成本重新堆成一座"筹码山"，再看当前股价落在山的什么位置。</div>';
  explain += '</div>';
  explain += '<div class="card section" style="margin-top:20px"><div class="title">为什么用这个算法？</div>';
  explain += '<div class="fundamentals-text">因为市场上拿不到"每个投资者真实持仓成本"的逐笔数据，所以只能用一个<b>近似重建</b>的方法。最常见、也最容易讲清楚的思路就是：<br>1）旧筹码不会一天全消失，而是随着每天换手率逐步衰减；<br>2）当天新成交的筹码，会沉淀在当天价格区间里；<br>3）连续递推60个交易日，就能得到一张近3个月的筹码分布图。<br><br>所以它不是神秘黑箱，而是一个很朴素的问题：<b>昨天留下多少，今天又新进来多少。</b></div>';
  explain += '</div>';
  explain += '<div class="card section" style="margin-top:20px"><div class="title">核心计算逻辑</div>';
  explain += '<div class="fundamentals-text">每天都做一次更新：<br><b>新筹码分布 = 旧筹码分布 × (1 - 当日换手率) + 当日新增筹码分布 × 当日换手率</b><br><br>其中：<br>- 当日换手率越高，说明老筹码被换掉得越多；<br>- 当天新增筹码按当日最低价到最高价之间分布；<br>- 我们默认成交更容易集中在当日的中间区域，所以用的是一个简化的"三角分布"去近似，而不是均匀撒开。<br><br>为什么这么做？因为只有日线，没有逐笔成交。用这个方法，既保留了解释性，也保留了足够实用的近似精度。</div>';
  explain += '</div>';
  explain += '<div class="card section" style="margin-top:20px"><div class="title">每个指标是什么意思？</div>';
  explain += '<div class="fundamentals-text"><b>1. 平均成本</b>：把所有价格按筹码权重加权平均，得到近3个月筹码的整体成本中枢。<br><b>2. 50%成本位</b>：累计筹码达到50%时对应的价格，也就是"中位成本"。<br><b>3. 主筹码峰</b>：筹码最密集、权重最高的那个价格。<br><b>4. 70%筹码区间</b>：把最中间的70%筹码圈出来，对应15%到85%的累计分布区间。<br><b>5. 90%筹码区间</b>：把最中间的90%筹码圈出来，对应5%到95%的累计分布区间。<br><b>6. 获利盘比例</b>：所有成本价低于当前价的筹码，占全部筹码的比例。也就是"如果今天卖，大概有多少近3个月筹码是赚钱的"。<br><b>7. 套牢盘比例</b>：所有成本价高于当前价的筹码，占全部筹码的比例。<br><b>8. 偏离主峰</b>：当前价相对主筹码峰高了多少或低了多少，计算公式是：当前价 ÷ 主筹码峰 - 1。</div>';
  explain += '</div>';
  var reason='';
  if(c.profit_ratio!==null){
    reason = '当前价 '+c.current_price+'，而90%筹码区间是 '+(c.range_90?c.range_90[0]+' ~ '+c.range_90[1]:'N/A')+'。';
    if(c.range_90 && c.current_price < c.range_90[0]){
      reason += ' 当前价已经低于近3个月90%筹码区间下沿，说明绝大多数近3个月筹码成本都在现价上方，所以获利盘会很低。';
    } else if(c.range_90 && c.current_price > c.range_90[1]){
      reason += ' 当前价已经高于近3个月90%筹码区间上沿，说明大部分近3个月筹码都已处于盈利状态。';
    } else {
      reason += ' 当前价仍落在近3个月主要筹码区间内部，所以获利盘和套牢盘会同时存在。';
    }
    reason += ' 目前系统算出的获利盘约为 '+fmtPct(c.profit_ratio)+'，意思是近3个月里大约只有这么多筹码的成本低于现价。';
  }
  explain += '<div class="card section" style="margin-top:20px"><div class="title">为什么这只票会是这个结果？</div><div class="fundamentals-text">'+reason+'</div></div>';
  h+= explain;
  h+='<div class="card note"><b>一句话总结：</b>这套模型不是为了装高深，而是为了把"最近3个月市场大部分人买在什么位置"这件事讲清楚。它的价值在于可解释、可复核、能快速辅助判断当前价是在筹码山上方、中心还是下方。</div>';
  document.getElementById('result').innerHTML=h;
  document.getElementById('result').style.display='block';
}
</script>
