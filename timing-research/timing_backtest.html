});
tbl += '</table>';
document.getElementById('compare-table').innerHTML = tbl;

// === 净值图 ===
const navChart = echarts.init(document.getElementById('chart-nav'),'dark');
const navSeries = [
  {name:'满仓',type:'line',data:NAV.full_nav,lineStyle:{width:2,type:'dashed'},itemStyle:{color:'#8b949e'},symbol:'none'},
  {name:'60%固定',type:'line',data:NAV.fixed60_nav,lineStyle:{width:1,type:'dotted'},itemStyle:{color:'#484f58'},symbol:'none'}
];
NAMES.forEach((n,i) => {
  navSeries.push({name:n,type:'line',data:NAV[`s${i}_nav`],lineStyle:{width:2},itemStyle:{color:COLORS[i]},symbol:'none'});
});
navChart.setOption({
  backgroundColor:'transparent',
  tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
  legend:{top:10,textStyle:{color:'#8b949e'}},
  grid:{left:60,right:20,top:50,bottom:30},
  xAxis:{type:'category',data:NAV.dates,axisLabel:{formatter:v=>v.slice(4)}},
  yAxis:{type:'value',axisLabel:{formatter:v=>v.toFixed(2)}},
  series:navSeries
});

// === 仓位图 ===
const posChart = echarts.init(document.getElementById('chart-pos'),'dark');
const posSeries = [];
NAMES.forEach((n,i) => {
  posSeries.push({name:n,type:'line',data:NAV[`s${i}_pos`].map(v=>(v*100).toFixed(0)),lineStyle:{width:1.5},itemStyle:{color:COLORS[i]},symbol:'none',areaStyle:{opacity:0.1}});
});
posChart.setOption({
  backgroundColor:'transparent',
  tooltip:{trigger:'axis'},
  legend:{top:5,textStyle:{color:'#8b949e',fontSize:11}},
  grid:{left:50,right:20,top:35,bottom:25},
  xAxis:{type:'category',data:NAV.dates,axisLabel:{formatter:v=>v.slice(4)}},
  yAxis:{type:'value',name:'仓位%',max:100,axisLabel:{formatter:v=>v+'%'}},
  series:posSeries
});

// === 最优方案 ===
const best = STATS[bestKey];
let bestHTML = '<div class="stats-grid">';
bestHTML += `<div class="stat-card green"><div class="label">年化收益</div><div class="value">${best.timing.annual_return}%</div></div>`;
bestHTML += `<div class="stat-card blue"><div class="label">超额(vs满仓)</div><div class="value">${best.excess_return}%</div></div>`;
bestHTML += `<div class="stat-card purple"><div class="label">夏普</div><div class="value">${best.timing.sharpe}</div></div>`;
bestHTML += `<div class="stat-card red"><div class="label">最大回撤</div><div class="value">${best.timing.max_drawdown}%</div></div>`;
bestHTML += `<div class="stat-card orange"><div class="label">回撤改善</div><div class="value">${best.dd_improvement}%</div></div>`;
bestHTML += '</div>';
document.getElementById('best-detail').innerHTML = bestHTML;

// === 洞察 ===
let ins = '';
const allReverse = Object.values(STATS).every(v => v.excess_return < 0);
const anyBetter = Object.values(STATS).some(v => v.dd_improvement > 0);

if (allReverse) {
  ins += '<div class="insight orange"><strong>⚠️ 所有择时方案都跑输满仓</strong><br>这段时间市场总体上涨，择时减仓反而踏空了。但注意看回撤改善——择时的价值在熊市才能体现。数据只有131天且覆盖了924行情，需要更长数据验证。</div>';
} else {
  ins += `<div class="insight green"><strong>✅ 最优方案: ${best.name}</strong><br>超额 ${best.excess_return}%，回撤改善 ${best.dd_improvement}%</div>`;
}

if (anyBetter) {
  ins += '<div class="insight green"><strong>回撤控制有效</strong><br>部分方案的最大回撤明显小于满仓，说明情绪择时在规避风险方面有价值。</div>';
}

ins += '<div class="insight"><strong>数据局限性</strong><br>⚠️ 只有131天数据，覆盖了2025年8月-2026年3月的单边牛市。择时策略天然在牛市跑输满仓（因为减了仓位）。需要补齐2024年数据（包含下跌期）才能公正评价。</div>';

ins += '<div class="insight"><strong>下一步</strong><br>1. 补齐2024年数据（含熊市），重新回测<br>2. 叠加非市场化资金（耐心资本）作为修正信号<br>3. 优化仓位映射曲线参数<br>4. 加入更多因子（成交额CV、拥挤度等）</div>';

document.getElementById('insights').innerHTML = ins;

window.addEventListener('resize',()=>{navChart.resize();posChart.resize()});
</script>
</body>
</html>
