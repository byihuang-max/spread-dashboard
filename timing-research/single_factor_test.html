document.getElementById('subtitle').textContent = 
  `数据: ${D.data_range} (${D.n_days}天) | 因子: ${D.factors.length}个 | 前瞻窗口: ${D.windows.join('/')}天`;

// IC 表格
let icHTML = '<table><tr><th>因子</th>';
D.windows.forEach(w => { icHTML += `<th>IC(${w}d)</th><th>ICIR(${w}d)</th>`; });
icHTML += '<th>评级</th></tr>';

D.ic_table.forEach(row => {
  icHTML += `<tr><td style="color:#79c0ff;font-weight:bold">${row.factor}</td>`;
  let maxIC = 0;
  D.windows.forEach(w => {
    const ic = row[`ic_${w}d`];
    const icir = row[`icir_${w}d`];
    const cls = Math.abs(ic) > 0.03 ? (ic > 0 ? 'positive strong' : 'negative strong') : '';
    icHTML += `<td class="${cls}">${ic > 0 ? '+' : ''}${ic.toFixed(4)}</td>`;
    icHTML += `<td>${icir.toFixed(2)}</td>`;
    if (Math.abs(ic) > maxIC) maxIC = Math.abs(ic);
  });
  
  let tag = '';
  if (maxIC > 0.05) tag = '<span class="tag tag-green">强</span>';
  else if (maxIC > 0.03) tag = '<span class="tag tag-yellow">中</span>';
  else tag = '<span class="tag tag-gray">弱</span>';
  icHTML += `<td>${tag}</td></tr>`;
});
icHTML += '</table>';
document.getElementById('ic-table-box').innerHTML = icHTML;

// 分档收益柱状图
let binHTML = '';
D.factors.forEach(f => {
  const bins = D.bin_data[f];
  if (!bins || !bins[20]) return;
  const b = bins[20];
  binHTML += `<div class="box"><div id="chart-bin-${f}" class="chart" style="height:280px"></div></div>`;
});
document.getElementById('bin-charts').innerHTML = binHTML;

// 渲染分档图表
D.factors.forEach(f => {
  const bins = D.bin_data[f];
  if (!bins || !bins[20]) return;
  const b = bins[20];
  const el = document.getElementById(`chart-bin-${f}`);
  if (!el) return;
  
  const chart = echarts.init(el, 'dark');
  const labels = b.bin_means.map((_,i) => `第${i+1}档`);
  chart.setOption({
    backgroundColor: 'transparent',
    title: { text: `${f} — 20日前瞻收益 (${b.direction})`, left:'center', top:5, textStyle:{color:'#8b949e',fontSize:13} },
    tooltip: { trigger:'axis' },
    grid: { left:50, right:30, top:40, bottom:30 },
    xAxis: { type:'category', data: labels },
    yAxis: { type:'value', axisLabel:{formatter:v=>v+'%'} },
    series: [{
      type:'bar',
      data: b.bin_means.map(v => ({
        value: v,
        itemStyle: { color: v >= 0 ? '#7ee787' : '#ff7b72' }
      }))
    }]
  });
  window.addEventListener('resize', () => chart.resize());
});

// 周期标签图
if (D.label_data[20]) {
  const lb = D.label_data[20];
  const labelChart = echarts.init(document.getElementById('chart-labels'), 'dark');
  const order = ['冰点','回暖','加速','分歧','退潮','震荡','—'];
  const sorted_labels = lb.labels.sort((a,b) => order.indexOf(a) - order.indexOf(b));
  const sorted_means = sorted_labels.map(l => {
    const idx = lb.labels.indexOf(l);
    return lb.means[idx];
  });
  const sorted_counts = sorted_labels.map(l => {
    const idx = lb.labels.indexOf(l);
    return lb.counts[idx];
  });
  const colors = {
    '冰点':'#58a6ff','回暖':'#7ee787','加速':'#ffa657',
    '分歧':'#d2a8ff','退潮':'#ff7b72','震荡':'#8b949e','—':'#484f58'
  };
  
  labelChart.setOption({
    backgroundColor:'transparent',
    title:{ text:'周期标签 → 未来20天沪深300平均涨跌(%)', left:'center', top:5, textStyle:{color:'#8b949e',fontSize:13} },
    tooltip:{ trigger:'axis', formatter:p => `${p[0].name}: ${p[0].value}% (${sorted_counts[p[0].dataIndex]}天)` },
    grid:{ left:60, right:30, top:40, bottom:30 },
    xAxis:{ type:'category', data:sorted_labels },
    yAxis:{ type:'value', axisLabel:{formatter:v=>v+'%'} },
    series:[{
      type:'bar',
      data:sorted_means.map((v,i) => ({ value:v, itemStyle:{ color: colors[sorted_labels[i]] || '#8b949e' } }))
    }]
  });
  window.addEventListener('resize', () => labelChart.resize());
}

// 总结
const strong = D.ic_table.filter(r => {
  return D.windows.some(w => Math.abs(r[`ic_${w}d`]) > 0.03);
});
let sumHTML = '<div class="insight">';
sumHTML += `<strong>数据覆盖：</strong>${D.n_days} 天`;
if (D.n_days < 200) sumHTML += ' ⚠️ 数据不足200天，结论仅供参考';
sumHTML += '<br><br>';
sumHTML += `<strong>有效因子（|IC|>0.03）：</strong>${strong.length} / ${D.factors.length} 个<br>`;
strong.forEach(r => {
  const ic20 = r.ic_20d;
  const dir = ic20 > 0 ? '趋势型↗' : '反转型↘';
  sumHTML += `&nbsp;&nbsp;• ${r.factor}: IC=${ic20>0?'+':''}${ic20.toFixed(4)} (${dir})<br>`;
});
sumHTML += '</div>';
document.getElementById('summary').innerHTML = sumHTML;

</script>
