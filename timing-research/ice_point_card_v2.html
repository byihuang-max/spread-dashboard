                    lineStyle: { width: 1, type: 'dashed', color: '#bbb' },
                    itemStyle: { color: '#bbb' },
                    symbol: 'none'
                },
                {
                    name: 'CSI500',
                    type: 'line',
                    data: navData.indices_nav.csi500 || [],
                    lineStyle: { width: 1, type: 'dashed', color: '#888' },
                    itemStyle: { color: '#888' },
                    symbol: 'none'
                },
                {
                    name: 'CSI1000',
                    type: 'line',
                    data: navData.indices_nav.csi1000 || [],
                    lineStyle: { width: 1, type: 'dashed', color: '#666' },
                    itemStyle: { color: '#666' },
                    symbol: 'none'
                },
                {
                    name: 'CSI2000',
                    type: 'line',
                    data: navData.indices_nav.csi2000 || [],
                    lineStyle: { width: 1, type: 'dashed', color: '#444' },
                    itemStyle: { color: '#444' },
                    symbol: 'none'
                }
            ]
        };
        navChart.setOption(navOption);
        
        // 交易收益柱状图
        const tradeChart = echarts.init(document.getElementById('tradeChart'));
        const tradeOption = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: navData.trade_returns.map(t => t.name)
            },
            yAxis: {
                type: 'value',
                axisLabel: {
                    formatter: '{value}%'
                }
            },
            series: [{
                type: 'bar',
                data: navData.trade_returns.map(t => ({
                    value: t.return,
                    itemStyle: { color: t.return > 0 ? '#52c41a' : '#f5222d' }
                })),
                barWidth: '60%'
            }]
        };
        tradeChart.setOption(tradeOption);
        
        // 响应式
        window.addEventListener('resize', () => {
            navChart.resize();
            tradeChart.resize();
        });
    </script>
</body>
</html>
