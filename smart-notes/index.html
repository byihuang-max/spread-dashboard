司价格\n\n### 跟踪产品\n| 产品名 | 代码 | 基准 | 策略标签 |\n|--------|------|------|---------|\n| 超量子中证1000增强9号A类 | XZ916A | 000852 | quant-stock |\n| 简文致盛尊享一号 | SAVV99 | 000001 | momentum-stock |\n| 铭跃行远均衡专享九号 | SAJX53 | NHCI | cta |\n| 赢仕安盈二号 | SLQ349 | 000832 | convertible |\n| 量客长阳一号 | SLL241 | 000001 | arbitrage |\n\n---\n\n## ⚡ 行动项\n\n- [ ] **紧急：iFind refresh token 明天过期，需要续期**\n- [x] Tushare 全模块配置完成\n- [x] 火富牛配置完成\n"}, {"name": "涨停指数信号框架 v3 — 三重交叉验证", "path": "notes/concepts/涨停指数信号框架v3.md", "category": "concepts", "content": "# 涨停指数信号框架 v3 — 三重交叉验证\n\n> 2026-03-08 Roni × Eva 共同设计\n\n## 核心问题\n\n涨停指数（昨日涨停/首板等权买入，次日卖出的净值曲线）是**长期正期望**的策略。用固定 BIAS 阈值（如 ±3%）做拥挤判断，会导致信号在趋势行情中**一直报拥挤**，完全失去预警价值。\n\n## Roni 的洞察\n\n> \"真正的降温是净值有回撤，且乖离率有变化，两者共同下降才是市场降温的过程。\"\n\n关键认知：\n- **BIAS 高 ≠ 拥挤**。正期望曲线长期跑在均线上方是正常的\n- **BIAS 变化方向**才有意义，而不是绝对值\n- **净值回撤 + BIAS 同步下行** = 真实降温信号\n- **净值上行 + BIAS 同步上行** = 真实升温信号\n\n## 三重交叉验证框架\n\n### 因子1：净值回撤\n\n```\nnav_drawdown = (当前净值 - 近20日峰值) / 近20日峰值 × 100\n```\n\n- 回撤 < -3% → 明显降温\n- 回撤 < -1.5% → 边际降温\n- 回撤 > -0.5% → 高位运行\n\n### 因子2：BIAS 变化方向\n\n```\nbias_delta = 近3日BIAS均值 - 前3日BIAS均值\n```\n\n- Δ < -1.0 → BIAS 快速下行\n- Δ < -0.5 → BIAS 边际下行\n- Δ > +0.5 → BIAS 上行\n- Δ > +1.0 → BIAS 加速上行\n\n用3日均值平滑，避免单日噪声。\n\n### 因子3：情绪周期标签\n\n来自强势股情绪诊断系统（`momentum_sentiment`），综合涨停数、晋级率、炸板率、涨跌停比、封板质量五维指标：\n\n- **退潮 / 冰点** → 情绪降温方向\n- **加速 / 回暖** → 情绪升温方向\n- **震荡 / 分歧** → 中性\n\n## 共振信号判定\n\n| 净值 | BIAS方向 | 情绪周期 | 信号 | 置信度 |\n|------|----------|----------|------|--------|\n| 回撤 | 下行 | 退潮/冰点 | 🔵 降温 | ★★★ |\n| 回撤 | 下行 | 中性 | ⬇️ 边际降温 | ★★ |\n| 高位 | 掉头下行 | 退潮 | 🟡 见顶退潮 | ★★★ |\n| 高位 | 掉头下行 | 中性 | 🟡 见顶分歧 | ★★ |\n| 止跌 | 回升 | 回暖/加速 | 🟢 筑底回暖 | ★★★ |\n| 创新高 | 加速上行 | 加速 | 🔴 加速升温 | ★★★ |\n| 上行 | 上行 | 回暖 | 🟠 持续升温 | ★★★ |\n| 矛盾 | 矛盾 | — | 🟡 多空分歧 | — |\n| 无方向 | 无方向 | 震荡 | ⚪ 中性 | — |\n\n**置信度规则：**\n- ★★★ = 三个因子方向一致\n- ★★ = 两个因子一致，第三个中性\n- 无星 = 信号矛盾或无方向\n\n## 回测验证（120个交易日）\n\n| 情绪周期 | 天数 | 平均BIASΔ | BIASΔ<0占比 | 涨停指数日收益<0占比 |\n|----------|------|----------|------------|-------------------|\n| **加速** | 30 | **+1.51** | 10% | 0% |\n| 回暖 | 24 | +0.37 | 29% | 8% |\n| 震荡 | 10 | -0.09 | 60% | 10% |\n| 分歧 | 16 | +0.53 | 31% | 12% |\n| **退潮** | 36 | **-1.60** | **75%** | **39%** |\n\n结论：情绪周期与涨停指数BIAS方向**高度共振**，退潮日75%概率BIAS下行，加速日90%概率BIAS上行，交叉验证有效。\n\n## 连续退潮才是真风险\n\n单日退潮后，下一日大概率反弹（正期望曲线的均值回归）。但**连续退潮**（退潮→退潮）时风险才真正放大，例如：\n\n- 20260302 退潮 → 20260304 退潮：涨停指数日收益 **-3.71%**，BIASΔ = **-6.05**\n\n## 与旧逻辑对比\n\n| | 旧逻辑 v1 | 新逻辑 v3 |\n|--|-----------|-----------|\n| 判据 | BIAS 绝对值 ±3% | 净值回撤 × BIAS方向 × 情绪周期 |\n| 问题 | 正期望曲线下永远报拥挤 | 看变化方向和共振 |\n| 信号类型 | 6种（固定阈值） | 8种（动态共振） |\n| 置信度 | 无 | ★★★ / ★★ |\n| 展示信息 | BIAS + 高低开 | BIAS + BIASΔ + 回撤% + 情绪周期 + 首板BIASΔ |\n\n## 代码位置\n\n- 信号判定：`env_fit/momentum_stock/inject_momentum.py`（v3 三重交叉验证块）\n- 涨停指数数据：`env_fit/momentum_stock/limit_index/limit_index_data.py`\n- 情绪周期数据：`env_fit/momentum_stock/momentum_data.py`\n\n## 后续可优化\n\n- [ ] 加入成交额萎缩确认（量价配合）\n- [ ] 连续退潮天数计数，作为风险加权因子\n- [ ] 首板 vs 全板信号分离（首板更灵敏，可做领先指标）\n"}, {"name": "封单额轧差 — A股抄底指标", "path": "notes/concepts/封单额轧差_抄底指标.md", "category": "concepts", "content": "# 涨跌停封单额轧差 (Seal Spread) — A股抄底指标\n\n> 2026-03-08 Roni × Musk 设计\n\n## 核心逻辑\n\n**封单额轧差** = 当日全市场涨停封单额合计 − 跌停封单额合计（亿元）\n\n- **正值大** → 涨停封单远超跌停，多头封锁力量强，市场亢奋\n- **负值大** → 跌停封单远超涨停，空头封锁力量强，恐慌蔓延\n- **接近零** → 多空均衡\n\n## 抄底信号\n\n轧差在近 250 个交易日（约1年）做滚动分位排名：\n\n| 分位数 | 信号 | 含义 |\n|--------|------|------|\n| <5% | 🟢 极度恐慌 | 跌停封单远超涨停，恐慌见底 → **抄底信号** |\n| 5%~20% | 🔵 偏空 | 空头占优但未到极端 |\n| 20%~80% | ⚪ 均衡 | 正常波动 |\n| 80%~95% | 🟡 偏多 | 多头占优 |\n| >95% | 🔴 极度亢奋 | 过热警告 |\n\n## 历史验证\n\n- 20260115: 轧差 **-320亿**，跌停封单 440亿 vs 涨停 120亿 → 🟢 极度恐慌\n- 20260202: 轧差 **-651亿**，跌停封单 692亿 vs 涨停 41亿 → 🟢 极度恐慌\n- 20250904: 轧差 **-36亿**，罕见反转日 → 🟢 极度恐慌\n\n这些极端恐慌日后，市场大概率出现反弹。\n\n## 辅助指标\n\n- `seal_ratio`：涨停封单额占比（0~1），<0.3 极度恐慌，>0.9 极度亢奋\n- `spread_ma5 / ma20`：均线平滑，连续走低 + 分位底部 = 高置信底部\n- 可与涨停指数 BIAS、情绪周期交叉验证\n\n## 数据源\n\n直接读 `_cache/{date}.json` 中的 `fd_amount`（封单额），无需额外 API。\n\n## 代码位置\n\n- 计算脚本：`env_fit/momentum_stock/limit_index/seal_spread/seal_spread_data.py`\n- 输出：`seal_spread.csv` + `seal_spread.json`\n- 增量模式，每次只算新交易日\n"}, {"name": "Alpha158 量价因子库", "path": "notes/concepts/Alpha158_量价因子库.md", "category": "concepts", "content": "# Alpha158 量价因子库\n\n**定义：** 微软 Qlib 内置的 158 个量价因子集，是量化选股的标准化因子库基线。\n\n**因子构成：** 9个K线形态 + 4个原始价格 + 29类×5时间窗口(5/10/20/30/60天) = 158个因子\n\n## 13大类因子\n\n| 类别 | 数量 | 回答的问题 |\n|------|------|-----------|\n| K线形态 | 9 | 今天多空谁赢了？赢得干脆吗？ |\n| 原始价格 | 4 | OHLV基础关系 |\n| 动量 ROC | 5 | 过去N天涨了还是跌了？ |\n| 均线偏离 MA | 5 | 当前价格偏贵还是偏便宜？ |\n| 波动率 STD | 5 | 价格波动大不大？ |\n| 趋势 BETA/RSQR/RESI | 15 | 趋势方向、确定性、偏离度 |\n| 价格区间 MAX/MIN/RSV | 25 | 当前价格在历史区间什么位置？ |\n| Aroon IMAX/IMIN/IMXD | 15 | 距创新高/新低多久了？ |\n| 量价关系 CORR/CORD | 10 | 涨的时候有真实买盘吗？ |\n| 涨跌统计 CNTP/CNTN/CNTD | 15 | 赢的次数多还是输的多？ |\n| RSI类 SUMP/SUMN/SUMD | 15 | 赢的力度大还是输的力度大？ |\n| 成交量 VMA/VSTD/WVMA | 15 | 市场关注度高不高？稳不稳？ |\n| 量RSI VSUMP/VSUMN/VSUMD | 15 | 关注度在增加还是减少？ |\n\n## 关键区分\n\n- **CNTP vs SUMP：** CNTP数\"涨了几天\"（频率），SUMP数\"涨了多大幅度\"（力度）。10笔赢8笔每次赚一点 vs 10笔赢3笔每次赚很多。\n- **CORR vs CORD：** CORR看价格绝对值和成交量的关系，CORD看变化率。CORD更能捕捉\"涨的那天放量、跌的那天缩量\"这种结构。\n- **STD vs ResVol（Barra）：** STD是总波动，ResVol去掉了市场涨跌的影响后的特质波动。\n\n## 局限\n\n只有量价因子（K线+成交量），完全没有：基本面（PE/ROE）、资金流（北向/两融）、分析师预期、另类数据。\n\n**FOF视角：** 纯量价Alpha158相当于只看基金的净值曲线选基金，不看持仓、不看经理、不看策略。能做到基线，但一定不是天花板。\n\n**相关讨论：**\n- [[Barra_CNE6风格因子]] — 风险控制层面的因子体系\n- [[300指增回测框架]] — Alpha158作为选股模型的输入\n\n**数据来源：** Qlib cn_data（6061只A股，2000-2026）\n\n**详细图鉴：** ~/Desktop/quant-backtest/alpha158_factors.html\n\n**标签：** #量化 #因子 #Qlib #核心概念\n"}, {"name": "Barra CNE6 风格因子", "path": "notes/concepts/Barra_CNE6风格因子.md", "category": "concepts", "content": "# Barra CNE6 风格因子\n\n**定义：** Barra CNE6 是 A 股指增的行业标准风险模型，把股票收益拆解为：行业因子 + 风格因子 + 残差alpha。指增的核心就是控制前两者，只赚残差alpha。\n\n**核心公式：** `股票收益 = 行业暴露×行业因子收益 + 风格暴露×风格因子收益 + alpha`\n\n## 十大风格因子\n\n| 因子 | 英文 | 含义 | 不控的后果 | 需要的数据 |\n|------|------|------|-----------|-----------|\n| 市值 | Size | ln(总市值) | 大小盘轮动吃掉超额 | 总市值 |\n| Beta | Beta | 对市场的敏感度 | 牛市虚胖、熊市裸泳 | 日收益率回归 |\n| 动量 | Momentum | 过去252天收益(去近21天) | 风格反转时超额巨亏 | 日收益率 |\n| 残差波动率 | Residual Vol | 特质波动(去市场后) | 组合波动大、不稳定 | 回归残差 |\n| 非线性市值 | NL-Size | 中盘效应(Size³的残差) | 中盘暴露不可控 | 总市值 |\n| 估值 | Book-to-Price | 1/PB | 价值/成长轮动吃超额 | 每股净资产 |\n| 流动性 | Liquidity | 月均换手率 | 回测好看实盘跑不出 | 换手率 |\n| 盈利 | Earnings Yield | 1/PE (EP) | 赌错盈利风格 | 净利润/市值 |\n| 成长 | Growth | 营收/利润增长率 | 加息周期杀成长 | 财报数据 |\n| 杠杆 | Leverage | 资产负债率 | 信用风险暴露 | 资产负债表 |\n\n## 行业因子\n\n30个申万一级行业，每只股票归属一个行业。指增要求行业偏离≤±3%，不做行业赌注。\n\n## 关键洞察\n\n- **Alpha158 vs Barra：** Alpha158是\"进攻\"（选股赚alpha），Barra是\"防守\"（控制风格暴露不被风格反转吃掉超额）\n- **风格因子的本质：** 都是系统性风险。你可以赚，但也可以亏，而且不可控。指增只要确定能赚的alpha，不要不确定的风格beta\n- **Size 是 A 股最大的坑：** 很多量化指增2021年超额爆表（小盘行情），2024年遇到小微盘暴跌超额回撤20%+——就是Size没控好\n- **BP（价值/成长）在 GAMT 看板里有对应：** 风格轧差模块就是监控这个\n\n## FOF经理评价量化指增时的核心问题\n\n1. **风格暴露控制得怎么样？** → 看持仓的Barra因子暴露\n2. **超额回撤时在赌什么风格？** → 归因到10个风格因子\n3. **纯alpha有多少？** → 去掉风格贡献后的残差收益\n4. **跟踪误差多大？** → 过高说明偏离基准太多\n\n**相关讨论：**\n- [[Alpha158_量价因子库]] — 选股alpha的因子来源\n- [[300指增回测框架]] — 完整回测框架\n- [[离散度]] — alpha环境判断\n- [[风格集中度]] — 风格轮动风险\n\n**数据来源：** 行业分类(Tushare)、日线行情(Qlib)、财报数据(Tushare income/balancesheet)\n\n**标签：** #量化 #Barra #风险模型 #核心概念\n"}, {"name": "300指增回测框架", "path": "notes/concepts/300指增回测框架.md", "category": "concepts", "content": "# 300指增回测框架\n\n**定义：** 沪深300指数增强策略的量化回测体系，目标是通过选股超配/低配成分股跑赢基准。\n\n## 四步框架\n\n### 1. 选股模型（Alpha模型）\n- 输入：Alpha158因子（158个量价特征）\n- 模型：LightGBM\n- 输出：每只股票未来N天的预期收益率\n- 训练方式：滚动训练（每隔几个月重新训练）\n\n### 2. 组合构建（Portfolio Construction）\n- 基准权重：沪深300成分股的市值加权\n- 超配看好的（+2~5%），低配不看好的（-2~5%）\n- 约束条件：\n  - 行业偏离 ≤ ±3%\n  - 个股偏离 ≤ ±3%\n  - 跟踪误差 ≤ 5-8%\n  - 满仓（不做仓位择时）\n\n### 3. 换仓执行\n- 频率：月度或双周\n- 成本：佣金0.03% + 印花税0.05%(卖出) + 滑点0.1%\n- 换手约束：单次≤30%\n\n### 4. 绩效评价\n- 超额收益 = 组合收益 - 沪深300收益\n- 信息比率(IR) = 超额收益/跟踪误差（>1.5优秀）\n- 超额最大回撤（<5%优秀）\n- 月度胜率（>60%及格）\n\n## 能力分级\n\n| 级别 | 描述 | 需要的组件 |\n|------|------|-----------|\n| L1 | TopK选股+等权 | Alpha158 + LightGBM |\n| L2 | 行业中性+跟踪误差 | + 行业分类 + 基准权重 |\n| L3 | Barra优化器 | + CNE6风格因子 + CVXPY |\n| L4 | 实盘（不做） | + 交易接口 |\n\n## 数据需求\n\n| 数据 | 用途 | 状态 |\n|------|------|------|\n| 日线行情 | Alpha158因子 | ✅ Qlib cn_data |\n| 申万行业分类 | 行业中性 | ❌ 待补 |\n| 300成分股权重 | 基准构建 | ✅ Tushare接口已有 |\n| 市值/PB/PE | Barra风格因子 | ✅ daily_basic接口已有 |\n| 财报数据 | Growth/Leverage | ✅ income/balancesheet接口已有 |\n\n**决策：** 先跑L1验证alpha模型有效性，再逐步升级约束。\n\n**相关讨论：**\n- [[Alpha158_量价因子库]] — 选股因子来源\n- [[Barra_CNE6风格因子]] — 风险控制框架\n- [[离散度]] — alpha环境判断\n\n**标签：** #量化 #回测 #指增 #框架\n"}, {"name": "2026-03-10 量化因子体系深度讨论", "path": "notes/sessions/2026-03-10_量化因子体系深度讨论.md", "category": "sessions", "content": "# 2026-03-10 量化因子体系深度讨论\n\n**参与者：** Roni + Musk\n\n## 讨论内容\n\n### 1. Alpha158 因子全面解读\n- 从 Qlib 源码提取了完整 158 个因子的定义\n- 为每个因子制作了 FOF 视角的教学版解读（大白话+类比+信号解读）\n- 产出文件：`~/Desktop/quant-backtest/alpha158_factors.html`\n\n### 2. 300指增回测框架讨论\n- 明确了四步框架：选股模型 → 组合构建 → 换仓执行 → 绩效评价\n- 能力分级：L1(TopK简易) → L2(行业中性+约束) → L3(Barra优化器) → L4(实盘,不做)\n- 决策：先跑L1看alpha模型效果，再加Barra约束\n\n### 3. Barra CNE6 风格因子详解\n- 10大风格因子逐个讲解：Size/Beta/Momentum/ResVol/NL-Size/BP/Liquidity/EY/Growth/Leverage\n- 每个因子的计算方式、不控制的后果、与FOF评价的关联\n- 核心观点：Alpha158是进攻（选股），Barra是防守（控风格）\n\n### 4. 关键共识\n- 指增不该赌大小盘、不该赌价值/成长、不该赌Beta → 只赚纯alpha\n- Size是A股量化最大的坑（2021小盘行情→2024小微盘暴跌）\n- Alpha158只是基线（纯量价），后续要加基本面/资金流/另类因子\n\n## 产出物\n- `alpha158_factors.html` — Alpha158因子教学版图鉴\n- Smart Notes: Alpha158量价因子库、Barra CNE6风格因子、300指增回测框架\n\n## Roni的反馈\n- \"跟你聊天很棒\" — 因子讲解的方式（大白话+FOF类比）效果好\n- 要求把讨论内容记录到Smart Notes\n\n**标签：** #量化 #因子 #Barra #对话记录\n"}, {"name": "择时回测方法论", "path": "notes/concepts/择时回测方法论.md", "category": "concepts", "content": "# 择时回测方法论\n\n**定义:** 把交易直觉/看板指标转化为可量化择时信号的标准化框架。适用于所有FOF看板模块。\n\n**相关讨论:**\n- [[强势股情绪择时回测]] 是第一个试验田\n- [[Alpha158_量价因子库]] 是选股侧对照\n- [[300指增回测框架]] 是alpha端框架\n\n## 三层架构\n\n### 第一层：单因子检验\n- 对每个候选因子，计算IC（和未来N天收益的Spearman相关系数）\n- 按因子值分5档，看每档的未来收益是否单调\n- 判断因子方向：趋势型（高→涨）vs 反转型（高→跌）\n- **关键指标：** IC、ICIR、分档单调性、多空差\n\n### 第二层：因子组合\n- 方案A：专家权重（现有看板配置）\n- 方案B：IC加权（数据驱动，按IC绝对值分配权重）\n- 方案C：单因子直接映射（反转/不反转）\n- 方案D：周期标签离散映射\n- **关键决策：** 因子方向必须正确（趋势vs反转）\n\n### 第三层：仓位映射+回测\n- 离散档位：信号分5档 → 对应20%/40%/60%/80%/100%仓位\n- Sigmoid连续映射：平滑过渡，可调center/steepness\n- 周期标签直接映射：冰点→20%，加速→100%等\n- **回测规则：** T+1执行、最小调仓10%、单边成本0.5%\n\n## 评估体系\n- **绝对收益：** 年化收益、夏普比率\n- **相对收益：** 超额收益（vs满仓）、超额夏普\n- **风控价值：** 最大回撤、回撤改善幅度\n- **择时质量：** 择时胜率、踏空率\n- **实操成本：** 换仓次数、平均仓位\n\n## 关键教训\n1. **样本偏差是最大陷阱** — 131天得出反转结论，524天变成趋势型。至少2年数据。\n2. **因子方向决定成败** — 方向搞反直接亏钱（方案C：-23.2%）\n3. **回撤控制可能比超额收益更值钱** — 对FOF来说客户留存>绝对收益\n4. **信号弱时别急着重仓** — IC<0.1的因子单独用效果有限，需要多因子组合\n\n## 复制到其他模块\n强势股验证通过后，同一框架可以复制到：\n- 量化股票环境适配（成交额CV、拥挤度）\n- 商品CTA环境适配\n- 转债指增环境适配\n- 耐心资本/国家队信号\n\n**标签:** #方法论 #择时 #回测框架 #FOF #因子检验\n"}, {"name": "2026-03-11 强势股情绪择时回测", "path": "notes/sessions/2026-03-11_强势股情绪择时回测.md", "category": "sessions", "content": "# 强势股情绪择时回测\n\n**定义:** 用强势股涨跌停数据计算情绪指数（0-100），映射成沪深300的仓位（0%-100%），验证择时效果。\n\n**相关讨论:**\n- [[强势股环境适配]] 提供了5个子因子（连板高度/晋级率/炸板率/涨跌停比/封板质量）\n- [[Alpha158_量价因子库]] 是选股侧的因子基准\n- 两股力量框架：市场化资金（情绪=主信号）+ 非市场化资金（耐心资本=修正信号）\n\n## 核心发现\n\n### 1. 情绪是趋势信号，不是逆向信号\n- 524天完整回测（2024.01-2026.03），情绪IC=+0.087\n- 情绪最高档 → 未来20天沪深300平均涨3.19%\n- 情绪最低档 → 未来20天只涨0.98%\n- **直觉\"情绪高=见顶\"是错的**，至少在这个数据窗口内\n\n### 2. 样本偏差是真正的敌人\n- 131天牛市样本 → 得出\"反转型\"结论（IC=-0.19）\n- 524天完整样本 → 完全反转为\"趋势型\"（IC=+0.09）\n- **教训：短样本的结论不能当真，至少2年以上**\n\n### 3. 回撤控制是实在的价值\n- A1方案（离散档位）最大回撤-3.2%（满仓-15.7%）\n- 回撤改善12.5%，夏普比满仓还高\n- **对FOF来说，回撤控制≈客户留存**\n\n### 4. 周期标签的意外结果\n- **加速期**未来20天涨2.79%（最强看涨信号）\n- **冰点**反而跌-0.39%（样本仅5天，不可靠）\n- 退潮期竟然也涨+1.40%（说明市场在结构性轮动）\n\n## 因子排行（20日IC）\n| 因子 | IC | 方向 | 解读 |\n|------|-----|------|------|\n| sentiment | +0.087 | 趋势↗ | 综合情绪高→看涨 |\n| max_height | +0.069 | 趋势↗ | 龙头效应强→看涨 |\n| promotion_rate | +0.054 | 趋势↗ | 接力意愿强→看涨 |\n| down_count | +0.049 | 趋势↗ | 恐慌出清→反弹 |\n| ud_ratio | -0.027 | 弱反转↘ | 多头过强略看跌 |\n\n## 当前问题\n- 所有6种仓位方案都跑输满仓——因为映射方向反了（假设高情绪→减仓）\n- IC绝对值都在0.1以下，信号偏弱\n- 2年数据仍嫌短，需要3-5年验证\n\n## 下一步\n1. 加入\"顺势择时\"方案（高情绪→加仓）\n2. 叠加耐心资本作为修正信号\n3. 多因子组合增强信号强度\n4. 接入iFind扩展历史数据\n\n**标签:** #择时 #情绪因子 #回测 #强势股 #FOF仓位管理\n"}, {"name": "强势股择时因子全景", "path": "notes/concepts/强势股择时因子全景.md", "category": "concepts", "content": "# 强势股择时因子全景\n\n**定义:** 从强势股涨跌停生态中提取的全部可量化择时因子，用于FOF仓位管理。\n\n**相关讨论:**\n- [[强势股情绪择时回测]] — 第一轮回测结果\n- [[择时回测方法论]] — 三层框架\n- [[封单额轧差_抄底指标]] — 冰点判定核心指标\n- [[涨停指数信号框架v3]] — 三重交叉验证\n\n## 因子全景（中证1000，20日IC）\n\n### 第一梯队（|IC| > 0.05，有实战价值）\n| 因子 | IC | 方向 | 核心逻辑 |\n|------|-----|------|----------|\n| **down_count** 跌停家数 | +0.095 | 趋势↗ | 恐慌出清→反弹，\"别人恐惧时贪婪\" |\n| **seal_spread** 封单额轧差 | +0.088 | 趋势↗ | 跌停封单远超涨停=冰点=抄底 |\n| **ud_market_ratio** 涨跌家数比 | +0.052 | 趋势↗ | 全市场涨多跌少→继续涨 |\n| **promotion_rate** 晋级率 | -0.054* | 弱反转 | 接力过强→过热 |\n| **max_height** 连板高度 | -0.051* | 反转↘ | 龙头高度太高→见顶 |\n\n### 第二梯队（|IC| 0.03-0.05）\n| 因子 | IC | 方向 | 核心逻辑 |\n|------|-----|------|----------|\n| **sentiment** 综合情绪 | -0.032 | 反转↘ | 情绪高→减仓（中小盘） |\n| **first_bias** 首板BIAS | -0.040 | 反转↘ | 首板乖离率高=拥挤见顶 |\n\n### 第三梯队（|IC| < 0.03，信号弱）\n| 因子 | IC | 备注 |\n|------|-----|------|\n| zha_rate 炸板率 | ~0 | 无预测力 |\n| up_count 涨停家数 | ~0 | 单独无效 |\n| seal_ratio 封单比值 | +0.02 | 弱于轧差 |\n\n## 关键发现\n\n### 1. 冰点指标组合\n**seal_spread（封单轧差）+ down_count（跌停家数）** 是最强的冰点判定组合：\n- 封单轧差大幅为负（<5%分位数）= 恐慌到极致\n- 跌停家数暴增 = 市场在无差别抛售\n- 两者共振时 = **高置信度底部信号**\n- 历史验证：20240130/31, 20240415/16, 20240910 均命中底部\n\n### 2. 过热指标组合\n**first_bias（首板BIAS）+ sentiment（情绪）+ max_height（连板高度）** 是过热信号：\n- 首板乖离率飙升 = 涨停板被过度追捧\n- 情绪高位 + 连板高度极端 = 分歧/退潮前兆\n- 方向一致（都是反转型IC < 0）\n\n### 3. 不对称性\n- **冰点信号比过热信号更可靠**（IC更大，分档收益更单调）\n- 这符合行为金融：恐慌是尖锐的（暴跌），贪婪是渐进的（慢涨）\n- FOF含义：**抄底比逃顶更容易量化**\n\n## 因子在不同指数上的表现差异\n- 中小盘（中证1000/国证2000）：情绪、连板高度是**反转型**\n- 大盘（沪深300）：情绪几乎无效，连板高度弱趋势\n- down_count 和 seal_spread 跨指数一致（都是趋势型/冰点信号）\n- **结论：冰点信号是普适的，过热信号对中小盘更有效**\n\n## 数据来源\n- 涨跌停缓存：`~/Desktop/gamt-dashboard/env_fit/momentum_stock/_cache/`（526天）\n- 全市场日线：`limit_index/_cache_daily/`（526天）\n- 涨停指数：`limit_index/limit_index.csv`（479天）\n- 封单轧差：`limit_index/seal_spread/seal_spread.csv`（526天）\n\n**标签:** #因子 #择时 #强势股 #冰点 #封单轧差 #回测\n"}, {"name": "2026-03-11 强势股择时单因子检验结论", "path": "notes/sessions/2026-03-11_强势股择时单因子检验结论.md", "category": "sessions", "content": "# 2026-03-11 强势股择时单因子检验结论\n\n**定义:** 第一轮单因子择时检验的完整结论，12个因子×3个指数×526天。\n\n**相关讨论:**\n- [[强势股择时因子全景]] — 因子IC排行\n- [[择时回测方法论]] — 三层框架设计\n- [[封单额轧差_抄底指标]] — 冰点信号核心\n\n## 检验概要\n\n- **因子数量:** 12个（情绪、晋级率、炸板率、涨跌停比、连板高度、涨停家数、跌停家数、一进二率、首板BIAS、涨跌家数比、封单额轧差、封单比值）\n- **指数:** 中证1000 / 国证2000 / 沪深300\n- **时间:** 2024-01-02 ~ 2026-03-10（526个交易日）\n- **方法:** Spearman Rank IC（因子值 vs 未来20日累计收益）\n\n## 因子排行（中证1000）\n\n| 因子 | IC | 能力 | 逻辑 |\n|------|-----|------|--------|\n| 跌停家数 | +0.095 | ⭐⭐⭐ | 跌停越多→未来涨越多（恐慌出清） |\n| **封单额轧差** | **+0.088** | **⭐⭐⭐** | **跌停封单远超涨停=冰点=抄底** |\n| 涨跌家数比 | +0.052 | ⭐⭐ | 全市场涨多跌少→惯性继续涨 |\n| 首板BIAS | -0.040 | ⭐⭐ | 首板乖离率高=拥挤见顶 |\n| 综合情绪 | -0.032 | ⭐ | 情绪高→后面跌（中小盘有效） |\n| 连板高度 | -0.030 | ⭐ | 龙头太高→见顶 |\n| 炸板率 | ~0 | ❌ | 单独无预测力 |\n| 涨停家数 | ~0 | ❌ | 单独无预测力 |\n| 封单比值 | +0.02 | ❌ | 弱于封单轧差 |\n\n## 三大结论\n\n### 1. 冰点信号 > 过热信号\n最强因子全是\"恐慌指标\"。抄底比逃顶更容易量化——恐慌是尖锐的（暴跌一步到位），贪婪是渐进的（慢慢磨顶）。\n\n封单轧差极端恐慌信号（<5%分位数）精准命中历史底部：\n- 2024.01.30（1月暴跌底）✅\n- 2024.04.15（4月调整底）✅\n- 2024.09.10（924行情前最后一跌）✅\n- 2024.12.17（年底调整底）✅\n\n### 2. 对中小盘有效，对大盘无效\n- 中证1000/国证2000：情绪、连板高度是反转型（高→后面跌）\n- 沪深300：情绪IC=-0.013，几乎无效\n- 合理——涨停板生态本身就是中小盘的事\n\n### 3. 策略尚未跑赢满仓\n所有6种仓位策略全部跑输满仓持有。原因：2024-2026整体牛市，减仓=踏空。\n这不代表因子无效——只是简单的线性仓位映射不够。\n\n## 下一步\n1. **冰点加仓策略** — 不做常态择时，只在极端恐慌时加仓\n2. **多因子组合** — 冰点因子 + 过热因子双向\n3. **分牛熊检验** — 单独看2024.01-09熊市段表现\n4. **非线性映射** — 只在极端区间动仓位，中间保持不动\n\n**标签:** #择时 #单因子 #结论 #冰点 #强势股 #回测\n"}, {"name": "择时因子测试框架V2上线", "path": "sessions/2026-03-15_择时因子测试框架V2上线.md", "category": "sessions", "content": "# 2026-03-15 择时因子测试框架V2上线\n\n> Roni × Musk\n\n## 背景\n\nRoni 提出冰点策略的核心问题：**极致冰点触发太少，实用性不够**。需要一个标准化的因子测试框架，快速验证不同因子的效果。\n\n同时，Roni 认为现有的因子报告\"太复杂、字太多\"，希望参考聚宽（JoinQuant）的极简交互设计。\n\n## 完成内容\n\n### 1. Framework V2 - 标准化因子测试框架\n\n**位置：** `~/Desktop/quant-backtest/timing_model/framework_v2/`\n\n**核心特点：**\n- 标准化参数空间：2阈值 × 3持有期 × 3指数 = 18种组合\n- 极简报告：1页因子卡片，核心信息一目了然\n- 深色主题：与GAMT看板择时模块风格统一\n- 可扩展：添加新因子只需实现 `generate_signal()` 方法\n\n### 2. 聚宽式因子卡片\n\n**设计原则：**\n- 极简：1行参数 + 1行指标 + 2张图\n- 图表为主：净值曲线 + 交易收益柱状图\n- 信息密度高：一屏看完核心内容\n\n**净值曲线：**\n- 策略净值 vs 多个宽基指数对比\n- 开仓标记点（绿色）\n- 持仓期间：净值跟随指数波动\n- 空仓期间：净值保持不变\n\n**交易柱状图：**\n- 横轴：交易时间（月-日格式）\n- 柱子高度：收益率（%）\n- 鼠标悬停：显示触发条件（跌停X家 涨停Y家）\n\n### 3. 整合到GAMT看板\n\n**整合方式：**\n- 在\"冰点研究迭代版本\"部分添加新的subtab：\"📊 因子回测\"\n- 通过iframe嵌入ice_point_card_v2.html\n- 保持V1/V2/V3等原有内容不变\n\n**访问路径：**\nhttps://dashboard.gamtfof.com/timing-research/ → \"冰点研究迭代版本\" → \"📊 因子回测\"\n\n## 冰点因子测试结果\n\n**最优参数：**\n- 阈值：5%分位\n- 持有期：15天\n- 标的：中证500\n\n**核心指标（7年全样本）：**\n- 胜率：87.5%\n- 平均收益：+4.71%\n- Calmar：3.21\n- 最大回撤：2.23%\n- 年化收益：7.1%\n- 交易次数：8次（年均1.1次）\n\n**关键发现：**\n- ✅ 效果极好（Calmar 3.21）\n- ❌ 触发太少（年均1.1次）\n- 验证了 Roni 的判断：**极致冰点实用性不够**\n\n## 核心洞察\n\n### 1. 高回测 vs 高触发的矛盾\n\n| 阈值 | Calmar | 年均触发 | 评价 |\n|------|--------|----------|------|\n| 5%   | 3.21   | 1.1次    | 效果极好，但太少 |\n| 10%  | 0.89   | 3.7次    | 效果下降，仍偏低 |\n\n**矛盾的本质：**\n- 极端阈值 → 高回测效果，但触发太少\n- 放宽阈值 → 触发增加，但效果下降\n- 需要找到\"高回测+高触发\"的平衡点\n\n**可能方向：**\n- 10-15%分位可能是甜蜜点\n- 单因子替代双因子（提高触发频率）\n- 分批建仓（提高资金利用率）\n- 动态持有期（根据市场修复速度调整）\n\n### 2. 中证2000不是最优\n\n**Roni 的判断：** \"中证2000效果应该是最好的\"\n\n**实际结果：**\n- 2000排名第3（Calmar 1.17）\n- 500排名第1（Calmar 3.21）\n- 原因：2000年化收益高（14.9%），但回撤也大\n\n### 3. 聚宽式交互的价值\n\n**Roni 的诉求：**\n> \"我觉得我们的冰点模板做的还是太复杂了，字多但是看完就那么个意思。未来会加很多因子，需要一个简洁、标准化的交互方式。\"\n\n**解决方案：**\n- 参考聚宽的极简设计\n- 1页因子卡片，核心信息一目了然\n- 标准化格式，易于对比\n- 未来可扩展为本地化的聚宽式回测平台\n\n## Roni 的关键观点\n\n1. **\"极致冰点触发太少，实用性不够。\"**\n   - 5%分位年均1.1次，FOF仓位管理无法用\n   - 需要找到平衡点\n\n2. **\"中证2000效果应该是最好的。\"**\n   - 实际测试发现不是\n   - 说明直觉需要数据验证\n\n3. **\"参考聚宽的交互设计方式来构建因子的回测。\"**\n   - 聚宽的很多小策略也就是一些非常简单的小因子\n   - 我们本地也能做到差不多的效果\n\n4. **\"我觉得我们的冰点模板做的还是太复杂了。\"**\n   - 字多但是看完就那么个意思\n   - 未来会加很多因子，需要标准化\n\n## 下一步\n\n### 短期（本周）\n- [ ] 测试10-15%分位：找到平衡点\n- [ ] 单因子测试：封单轧差、跌停家数\n- [ ] 添加2-3个新因子\n\n### 中期（本月）\n- [ ] 分批建仓策略\n- [ ] 动态持有期\n- [ ] 因子组合策略\n- [ ] 分牛熊检验\n\n### 长期（季度）\n- [ ] 完整的因子库（10+因子）\n- [ ] Web界面：本地化的聚宽式回测平台\n- [ ] RD-Agent 接入（AI自动挖因子）\n\n## 技术细节\n\n**净值计算逻辑：**\n- 持仓期间：净值跟随指数波动\n- 空仓期间：净值保持不变（水平线）\n- 不能是直线！\n\n**触发条件记录：**\n- 每笔交易记录：跌停X家、涨停Y家\n- 柱状图鼠标悬停显示\n\n**色调统一（择时模块风格）：**\n- 背景：#0d1117（深黑）\n- 卡片：#161b22（深灰）\n- 强调色：蓝#58a6ff、绿#7ee787、橙#f0883e\n\n## 重要提醒\n\n**飞书接口默认 Roni 不在电脑旁边：**\n- 不要让他去打开本地文件\n- 不要让他去运行命令\n- 直接把结果推送到他能远程访问的地方（比如FOF看板）\n\n**标签:** #择时 #因子测试 #框架 #聚宽 #冰点 #回测 #对话记录\n"}, {"name": "盘中发现层角色事件叙事框架", "path": "sessions/2026-03-22_盘中发现层角色事件叙事框架.md", "category": "sessions", "content": "# 2026-03-22 盘中发现层角色事件叙事框架\n\n- 日期：2026-03-22\n- 类型：阶段共识 / 盘中发现层母框架\n- 标签：择时模块, 盘中发现层, 龙头, PM沟通, 人工交易语言\n\n## 一、为什么这一段讨论重要\n\n今晚这段讨论把一个关键问题讲透了：\n\n> 盘中发现层不是普通因子表，而是把人工盘面语言翻译成 PM 可理解、可计算状态框架的“翻译器”。\n\n人工交易看盘，看的不是一个静态量价点，\n而是一条不断演绎的盘面链条：\n- 龙头是否在变\n- 龙一龙二龙三是否联动\n- 是否打出了市场新高度\n- 跌停是否被翘起\n- 高位是否集体松动\n- 10cm 到 20cm 是否出现板块共振\n- 盘面是否从单核走向多核\n\n这类信息对人工交易极其重要，\n但如果不先做结构翻译，PM 很难理解，量化也很难直接写条件。\n\n---\n\n## 二、正式母框架\n\n盘中发现层正式定义为：\n\n```text\n角色层 → 事件层 → 叙事层\n```\n\n### 1）角色层：盘中到底在看谁\n\n角色层解决的是：\n\n> 盘中到底在观察哪些对象。\n\n当前确认的核心角色包括：\n- 龙头观察池\n- 辨识度龙头\n- 成交额龙头\n- 龙一 / 龙二 / 龙三\n- 高位核心\n- 首板试错\n- 跟风扩散\n- 跌停翘板修复\n\n### 2）事件层：盘中到底发生了什么\n\n事件层解决的是：\n\n> 这些角色身上发生了哪些关键事件。\n\n当前确认的关键事件包括：\n- 首次封板\n- 炸板\n- 回封\n- 翘板\n- 尾盘回落\n- 10cm → 20cm 扩散\n- 单核 → 多核扩散\n- 高位股集体松动\n- 梯队同步加强\n- 午后分歧后修复\n\n### 3）叙事层：这些事件意味着什么\n\n叙事层解决的是：\n\n> 这些事件组合起来，对市场状态意味着什么。\n\n当前确认的核心叙事包括：\n- 龙头确认\n- 试错启动\n- 梯队加强\n- 高度突破\n- 板块共振扩散\n- 分歧转修复\n- 高位退潮\n- 风险偏好抬升 / 回落\n\n---\n\n## 三、龙头的最新正式定义\n\n今晚最关键的推进，是把“龙头”从静态标签改成动态结构。\n\n### 1）龙头不是静态单票\n\n龙头不是简单等于“最高板那只股票”。\n\n更准确的定义是：\n\n> 龙头是由 T 日收盘后的日频强信号筛出来的“龙头观察池”，\n> 到 T+1 盘中继续动态确认的角色体系。\n\n也就是说：\n- T 日的日频强信号，提供先验\n- T+1 的盘中表现，完成确认或证伪\n\n这就把“日频因子 → 盘中发现层”真正接上了。\n\n### 2）龙头观察池\n\n龙头观察池不是一只股票，\n而是一组由日频强信号筛出来的候选序列。\n\n进入观察池的优先条件包括：\n- 高板 / 最高板\n- 打板成交额高\n- 高度高\n- 在日频强信号中排名靠前\n\n也就是：\n\n> T 日的日频信号，到 T+1 就转化为龙头观察池。\n\n### 3）辨识度龙头\n\n辨识度龙头指：\n- 市场最认\n- 最有高度\n- 最有位置感\n- 最有带动性的核心票\n\n它更贴近人工交易语言。\n\n### 4）成交额龙头\n\n成交额龙头指：\n- 当日成交额最高的核心票\n\n它更贴近量价资金语言。\n\n### 5）为什么要拆成两类龙头\n\n因为 A 股里：\n- 龙头会变\n- 龙一龙二龙三会变\n- 辨识度龙头和成交额龙头有时重合，有时不重合\n\n而人工交易恰恰会观察：\n- 两类龙头是否重合\n- 是否切换\n- 是否联动\n- 是否共同推动高度与共振\n\n所以龙头不能只写成一个静态字段。\n\n---\n\n## 四、PM 为什么难理解人工交易过程\n\nRoni 明确指出，\nPM 经常难理解人工交易，不是因为他们不懂量价，\n而是因为人工交易真正处理的是：\n\n- 动态角色\n- 连续事件\n- 叙事演绎\n\n而不是单一时点的指标。\n\n人工交易盘中会关心：\n- 龙头和龙一龙二龙三是否联动\n- 有没有打出市场新高度\n- 是否出现高位股集体走弱\n- 跌停是否被翘板修复\n- 10cm 到 20cm 是否出现共振\n- 是否从单点变成群体行为\n\n这些都在改变交易员对盘面的处理，\n但如果不先翻译成结构化框架，\n量化系统很难写条件，PM 也难以形成共同语言。\n\n---\n\n## 五、对后续盘中因子设计的直接影响\n\n由这段讨论确认：\n\n> 后续盘中因子不能硬压成“一个名字 + 一个静态公式”。\n\n更合理的做法是：\n1. 先挂到角色层\n2. 再定义它记录的事件\n3. 最后说明它对应的叙事含义\n4. 再抽出 v1 可计算定义\n\n也就是说，未来盘中因子的标准记录方式应该包含：\n- 挂靠角色\n- 事件定义\n- 叙事含义\n- v1 可计算口径\n- 后续升级方向\n\n---\n\n## 六、落地顺序：哪些先做，哪些后做\n\n今晚进一步确认：盘中演绎样板页最终一定需要独立 Python 文件，但**第一性原理应是事件流，不是固定 15 分钟切片**。\n\n### 先不建议现在就做\n- 不先做 15 分钟一个 bar 的大表\n- 不先做纯日评数据硬凑盘中演绎\n- 不先把所有盘中语义都压成统一 ratio / score\n\n原因：人工交易真正重视的是事件顺序和状态转移，固定切片很容易把“先炸再回封、先分歧再修复”这类最重要的信息抹平。\n\n### 当前最先做的 3 个文件\n\n#### 1）`intraday_event_engine.py`\n作用：\n- 从当前能稳定拿到的数据里抽取盘中事件流\n- 保留角色归属、时间顺序、事件类型、叙事标签\n- 输出事件流 JSON，而不是直接输出因子表\n\n当前 v1 输入数据先限定为：\n- `limit_list_d` / `_cache/{date}.json`\n- `first_time`\n- `last_time`\n- `open_times`\n- `limit_times`\n- `amount`\n- 最终 `U / Z / D` 状态\n\n#### 2）`intraday_story_builder.py`\n作用：\n- 从事件流里聚合出“盘中演绎”结构\n- 输出：龙头观察池、时间轴、状态切换、叙事结论、仓位动作建议\n- 为前端样板页服务\n\n#### 3）前端样板数据（如 `intraday_story.json`）\n作用：\n- 给 PM 看结论和证据链\n- 给 Roni 看时间轴和角色切换\n- 支持“日频先验 → 盘中演绎 → 阶段判断 → 仓位动作”的页面结构\n\n### v1 先支持的 5 类事件\n- 龙头首次封板\n- 龙头炸板后回封\n- 首板批量启动\n- 高位股集体炸板\n- 尾盘高位回落\n\n原因：\n- 当前已有数据就能勉强支持\n- 事件语义清晰\n- 足以搭出第一版事件流和样板页\n\n### 暂缓到下一阶段的内容\n- 10cm → 20cm 共振传导\n- 午后修复全过程\n- 单核 → 多核扩散\n- 龙一龙二龙三切换路径\n- 更细的分钟级跟随与带动顺序\n\n原因：\n- 当前日终/摘要类数据无法完整表达\n- 需要更细分时数据源才能做准\n\n### 当前正式结论\n\n> 先做事件流，再做状态聚合，最后视需要再做切片。\n\n也就是：\n- 不是纯日评硬拉\n- 也不是一上来就 15 分钟切片\n- 而是先保住盘面演绎最关键的“事件顺序”和“状态变化”\n\n## 七、当前结论\n\n今晚这段讨论的核心产出，不只是“补了几个盘中因子定义”，\n而是把整个盘中发现层抬升成一个更稳定的顶层框架：\n\n> 人工盘面语言 → PM 可理解框架 → 可计算状态定义\n\n这是后面继续做：\n- 龙头定义\n- 盘中状态记录\n- 阶段输出\n- 仓位判断\n- 盘中事件引擎\n- 盘中演绎样板页\n\n的真正基础。\n"}, {"name": "大摩宏观框架与GAMT看板结合方案", "path": "sessions/2026-03-15_大摩宏观框架与GAMT看板结合方案.md", "category": "sessions", "content": "# 大摩宏观框架与GAMT看板结合方案\n\n**日期：** 2026-03-15  \n**类型：** 对话记录 - 框架设计  \n**关键词：** 大摩四象限、宏观逻辑链、资产配置、利润周期、内需接棒\n\n---\n\n## 一、背景\n\nRoni 提供了大摩李圣尧的宏观交易框架PDF，核心理念：\n- **经济范式变更：** 旧范式（货币紧缩+全球化）→ 新范式（财政主导+通胀回归）\n- **四象限驱动：** 增长/通胀/货币/信用 → 标准化映射 → 资产配置（股/债/商品）\n- **风险预算控制：** 通过组合波动率预算控制风险，而非单纯看资产波动率\n- **多资产组合：** 股/债/商品底层现金流结构不同，提供离散收益\n\n**GAMT现状：**\n- ✅ 宏观数据丰富（PMI/CPI/PPI/流动性/利率汇率）\n- ✅ 策略环境适配（量化股票/强势股/CTA/转债/套利）\n- ❌ **缺少决策逻辑：** 数据 → 象限定位 → 资产配置建议\n\n---\n\n## 二、核心逻辑链（优先级排序）\n\n### 逻辑链1：增长-通胀四象限 → 资产配置决策（最高优先级）\n\n**框架：**\n```\n宏观四维度（增长/通胀/货币/信用）\n    ↓ 标准化打分（Z-score）\n四象限定位（增长↑↓ × 通胀↑↓）\n    ↓ 映射规则\n资产配置权重（股/债/商品/现金）\n    ↓ 细化到策略\n策略环境适配（量化股票/强势股/CTA/转债/套利）\n```\n\n**数据需求（P0）：**\n- 增长：PMI（已有）、社融结构（需补充）\n- 通胀：CPI/PPI（已有）、PPI环比（需补充）\n- 货币：Shibor/DR007（已有）、R007-DR007利差（需补充）\n- 信用：企业债利差（需补充）、社融信贷占比（需补充）\n\n**和GAMT结合：**\n- 新增**四象限仪表盘**（宏观层顶部）\n- 输出：当前象限 + 资产配置建议 + 策略权重建议\n- 美林时钟作为验证（四象限 vs 美林时钟一致性）\n\n---\n\n### 逻辑链2：中国利润周期 → 股票策略择时（第二优先级）\n\n**框架：**\n```\nPPI环比转正（价格止跌）\n    ↓\n出厂价-购进价剪刀差为正（企业可以转嫁成本）\n    ↓\nPMI新订单/出货改善（需求回暖）\n    ↓\n规上工业企业利润同比转正（利润上行段开始）\n    ↓\n股票策略环境改善（量化股票/强势股适配度↑）\n```\n\n**数据需求（P0）：**\n- PPI环比（Tushare已有）\n- 出厂价-购进价剪刀差（Tushare已有）\n- 规上工业企业利润（Tushare已有）\n- PMI新订单（已有）\n\n**和GAMT结合：**\n- 新增**利润周期监控模块**（中观层）\n- 输出：利润周期阶段（筑底/上行/见顶/下行）+ 股票策略适配度\n- 作为策略环境适配的输入信号\n\n---\n\n### 逻辑链3：中国内需接棒验证 → 风格切换信号（第三优先级）\n\n**框架：**\n```\n社融结构：政府债占比↓ + 居民/企业信贷占比↑（内生需求接棒）\n    ↓\n居民中长期贷款回升（购房/消费意愿↑）\n    ↓\n核心CPI抬升（需求驱动通胀）\n    ↓\n进口资本品走强（企业扩产）\n    ↓\n内需接棒确认 → 大盘价值风格受益（银行/地产/消费）\n```\n\n**数据需求（P0）：**\n- 社融结构（Tushare `cn_m`表）\n- 居民中长期贷款（Tushare已有）\n- 核心CPI（Tushare已有）\n- 进口资本品（海关/iFind，需补充）\n\n**和GAMT结合：**\n- 新增**内需接棒验证模块**（宏观层）\n- 输出：内需接棒进度（0-100%）+ 风格建议（大盘价值 vs 小盘成长）\n- 作为风格轧差的输入信号\n\n---\n\n### 逻辑链4：美国软着陆 vs 硬着陆 → 全球风险开关（第四优先级）\n\n**框架：**\n```\n【软着陆路径】\n服务业PMI不塌（>50）+ 红皮书零售正增长 + 工资温和回落\n    ↓\n核心PCE接近2%（通胀可控）\n    ↓\n美联储降息 → 全球风险偏好改善 → A股受益\n\n【硬着陆路径】\nFCI持续收紧 + 信用利差扩张 + 消费断崖\n    ↓\n美国衰退 → 全球风险厌恶 → A股避险（转债/套利策略受益）\n```\n\n**数据需求（P1）：**\n- 服务业PMI（需爬虫）\n- 红皮书零售（需爬虫）\n- 核心PCE（FRED免费）\n- 信用利差（FRED免费）\n- 金融条件指数（高盛FCI或自建）\n\n**和GAMT结合：**\n- 新增**美国软硬着陆监控模块**（全球层）\n- 输出：软着陆概率（0-100%）+ 全球风险开关（risk-on/off）\n- 作为红灯预警的全球风险维度\n\n---\n\n### 逻辑链5：经济范式转换 → 战略资产配置调整（长期战略）\n\n**框架：**\n```\n【旧范式（1990-2020）】\n货币紧缩 + 全球化 + 通胀目标制\n    ↓\n股债60/40组合有效 + 债券是避险资产\n\n【新范式（2020-现在）】\n财政主导 + 逆全球化 + 通胀回归\n    ↓\n股债相关性上升（同时下跌）\n    ↓\n商品/黄金成为避险资产 + 多资产组合必要性提升\n```\n\n**数据需求（P2）：**\n- 财政赤字率（Tushare/财政部）\n- 全球化指数（贸易依存度，需自建）\n- 通胀预期锚定程度（5y5y TIPS breakeven，FRED）\n\n**和GAMT结合：**\n- 新增**经济范式监控模块**（战略层）\n- 输出：当前范式（旧/新/转换中）+ 战略资产配置建议\n- 结合宏观Meme叙事（地缘风险/去美元化/财政主导）\n\n---\n\n## 三、大摩指标体系与逻辑演绎\n\n### 美国宏观\n\n#### 增长维度\n1. **服务业PMI（整体+新订单+就业）**  \n   逻辑：美国70%是服务业 → 新订单↑+就业↑ = 服务业自我强化（软着陆）\n\n2. **红皮书商业零售销售（周同比）**  \n   逻辑：消费占GDP 68% → 周度高频领先指标 → 断崖式下滑 = 硬着陆第一预警\n\n3. **ISM制造业PMI**  \n   逻辑：vs S&P500 EPS → 判断盈利驱动来源\n\n#### 通胀维度\n4. **核心CPI/核心PCE**  \n   逻辑：剔除食品能源 → 反映需求驱动通胀 → 核心PCE>2.5% = 美联储不敢降息\n\n5. **CPI住房分项（OER/租金）**  \n   逻辑：占核心CPI权重40% → 通胀\"最后一公里\" → OER滞后实际租金12-18个月\n\n6. **Realtor.com新签租金**  \n   逻辑：领先实际租金6-12个月 → 新签租金↓ → 实际租金↓ → OER↓ → 核心CPI↓\n\n7. **ISM服务业物价指数**  \n   逻辑：服务通胀扩散指标 → >60 = 通胀扩散，<50 = 通胀收敛\n\n8. **核心服务通胀（住房外服务）**  \n   逻辑：核心CPI - 住房 - 商品 → 核心服务>4% = 美联储不敢降息（工资粘性）\n\n#### 工资与成本\n9. **私营部门名义工资增速（尤其服务业）**  \n   逻辑：工资↑ → 企业成本↑ → 服务价格↑ → 核心CPI↑ → 工资>4% = 通胀粘性强\n\n10. **单位劳动力成本（ULC）**  \n    逻辑：ULC = 工资增速 - 生产率增速 → ULC>0 = 通胀压力，ULC<0 = 通胀可控\n\n#### 金融条件与资金流\n11. **金融条件指数（FCI）**  \n    逻辑：利率+信用利差+股市+汇率 → FCI宽松 = 增长加速，FCI收紧 = 增长放缓\n\n12. **信用利差**  \n    逻辑：企业债收益率 - 国债收益率 → 利差扩张 = 经济衰退预警\n\n13. **美国财政部TIC数据**  \n    逻辑：海外买入美债 → 长端利率下行 → 美元走强\n\n14. **经济意外指数**  \n    逻辑：实际数据 - 市场预期 → 指数>0 = 数据超预期 → 股市上涨/美联储鹰派\n\n#### 利率与政策\n15. **联邦基金利率/政策利率路径**  \n    逻辑：降息 → 融资成本下降 → 股市上涨/美元走弱\n\n16. **10Y美债收益率**  \n    逻辑：无风险利率基准 → 10Y上行 = 股市估值压缩\n\n17. **期限溢价（Term Premium）**  \n    逻辑：10Y美债 - 预期短期利率 → 期限溢价>0 = 投资者要求补偿（通胀/财政风险）\n\n18. **收益率曲线形态（2-5Y vs 10Y）**  \n    逻辑：熊陡 = 通胀预期上升，牛陡 = 降息预期，倒挂 = 衰退预警\n\n19. **财政供给节奏（国债发行）**  \n    逻辑：发债增加 → 供给压力 → 长端利率上行\n\n20. **实际利率（TIPS）**  \n    逻辑：名义利率 - 通胀预期 → 实际利率上行 = 黄金下跌/久期资产下跌\n\n#### 大宗与避险\n21. **5y5y通胀预期（TIPS breakeven）**  \n    逻辑：5年后的5年通胀预期 → 5y5y>2.5% = 通胀预期脱锚\n\n22. **汽油/原油价格**  \n    逻辑：供给扰动 = 油价上涨 → CPI上行，需求冲击 = 油价下跌 → CPI下行\n\n23. **Brent原油+裂解价差+库存节奏**  \n    逻辑：库存下降+裂解价差扩大 = 需求强劲 → 油价上涨\n\n24. **黄金**  \n    逻辑：地缘风险溢价 + 实际利率 + 央行买盘 → 实际利率下行 = 黄金上涨\n\n25. **工业金属库存+近月升水**  \n    逻辑：库存下降+近月升水 = 供给紧张 → 价格弹性大\n\n---\n\n### 中国宏观\n\n#### 信用与内需\n26. **社融总量+结构拆分**  \n    逻辑：政府债占比高 = 财政发力但内生需求弱，居民/企业信贷占比高 = 内需接棒\n\n27. **居民中长期贷款**  \n    逻辑：中长贷↑ = 购房/消费意愿强 → 内需扩张\n\n28. **金融机构存贷款增速差**  \n    逻辑：增速差扩大 = \"钱多但不敢花\" → 流动性陷阱\n\n29. **社零（服务vs商品、必选vs可选）**  \n    逻辑：服务消费↑ = 消费升级，可选消费↑ = 消费信心强\n\n30. **固定资产投资（制造业/基建/地产）**  \n    逻辑：制造业投资↑ = 企业扩产 → 经济内生动力强\n\n31. **GDP需求侧拆分**  \n    逻辑：消费贡献↑ = 内需接棒，净出口贡献↓ = 外需走弱\n\n#### 通胀与利润链条\n32. **CPI（整体+食品vs核心服务）**  \n    逻辑：食品CPI↑ = 猪周期/供给冲击，核心服务CPI↑ = 就业收入预期改善\n\n33. **核心CPI**  \n    逻辑：CPI - 食品 - 能源 → 核心CPI↑ = 需求驱动通胀\n\n34. **PPI（整体+分行业）**  \n    逻辑：PPI环比转正 = 利润上行段开始\n\n35. **PPI环比**  \n    逻辑：月度变化 → 环比转正 = 价格止跌 → 利润改善关键信号\n\n36. **出厂价-购进价剪刀差**  \n    逻辑：剪刀差>0 = 企业可以转嫁成本 → 利润改善\n\n37. **规上工业企业利润**  \n    逻辑：利润同比转正 = 盈利止跌\n\n38. **主营业务收入利润率+资产负债率**  \n    逻辑：利润率↑+资产负债率↓ = 企业健康度改善\n\n#### 外需与汇率\n39. **出口数量指数vs出口价格指数**  \n    逻辑：数量↑价格↓ = \"以价换量\"，数量↑价格↑ = 外需强劲\n\n40. **PMI新出口订单**  \n    逻辑：领先指标 → 新出口订单>50 = 外需扩张\n\n41. **进出口金额分项**  \n    逻辑：资本品进口↑ = 企业扩产 → 内需扩张\n\n42. **银行代客结售汇/净结汇**  \n    逻辑：净结汇↑ = 人民币升值压力\n\n43. **USDCNY即期+中间价Fixing Bias**  \n    逻辑：Bias>0 = 央行引导贬值，Bias<0 = 央行引导升值\n\n44. **USDCNY FX Swap Points/CIP Basis**  \n    逻辑：CIP Basis>0 = 离岸人民币流动性紧张 → 人民币升值压力\n\n45. **美元指数**  \n    逻辑：美元指数↑ = 人民币被动贬值压力\n\n#### 市场与资金流\n46. **金融条件指数（中国）**  \n    逻辑：FCI宽松 = 风险偏好改善 → 股市上涨\n\n47. **沪深300**  \n    逻辑：A股基准指数\n\n48. **南向资金净流入**  \n    逻辑：南向资金↑ = 港股边际定价者 → 港股上涨\n\n49. **收益率曲线（中国国债）**  \n    逻辑：陡峭化 = 经济复苏预期 → 长端利率上行\n\n---\n\n## 四、关键联合验证信号（共振逻辑）\n\n| 验证目标 | 联合信号组合 | 逻辑链 |\n|---------|------------|--------|\n| **美国软着陆延续** | 服务业PMI不塌 + 红皮书零售正增长 + 工资温和回落 | 服务业需求稳定 + 消费流量端不崩 + 成本压力缓解 = 增长+通胀双降 |\n| **美国通胀\"最后一公里\"** | 前瞻租金下行 + 核心服务通胀收敛 + ULC回落 | 住房通胀领先指标见顶 + 服务通胀粘性消退 + 工资成本下降 = 核心PCE接近2% |\n| **美国硬着陆预警** | FCI持续收紧 + 信用利差扩张共振 + 消费断崖 | 金融条件收紧 + 企业融资成本飙升 + 消费崩溃 = 衰退 |\n| **中国利润进入上行段** | PPI环比转正 + 剪刀差为正 + 订单/出货改善 | 价格止跌 + 企业可以转嫁成本 + 需求回暖 = 利润改善 |\n| **中国内需真正接棒** | 社融信贷占比提升 + 居民中长贷回升 + 核心CPI抬升 + 进口资本品走强 | 内生信贷需求↑ + 购房/消费意愿↑ + 需求驱动通胀↑ + 企业扩产↑ = 内需接棒 |\n| **人民币行情可持续性** | 结汇趋势 + 资金利率 + 中间价Fixing Bias | 企业结汇意愿↑ + 离岸流动性宽松 + 央行不引导贬值 = 人民币升值 |\n\n---\n\n## 五、实施方案\n\n### Roni的决策：\n- **先做宏观逻辑：** 所有指标先放在**宏观与流动性看板**里，增加对应的小模块\n- **策略环境呼应：** 如何让宏观指标呼应策略环境，需要进一步思考\n- **不急于打通：** 先把宏观逻辑链做扎实，策略映射逻辑后续再完善\n\n### 实施优先级：\n\n**Phase 1：本周（Tushare已有数据）**\n1. **利润周期监控模块**\n   - PPI环比 + 剪刀差 + 企业利润 + PMI新订单\n   - 输出：利润周期阶段（筑底/上行/见顶/下行）\n\n2. **内需接棒验证模块**\n   - 社融结构 + 居民中长贷 + 核心CPI\n   - 输出：内需接棒进度（0-100%）\n\n**Phase 2：下周（测试iFind权限）**\n3. **四象限仪表盘（部分）**\n   - 增长/通胀/货币/信用四维度标准化\n   - 输出：当前象限位置 + 历史轨迹\n\n4. **信用利差监控**\n   - 企业债利差（中美）\n   - R007-DR007利差\n\n**Phase 3：2周后（外部API）**\n5. **美国软硬着陆监控**\n   - 服务业PMI + 红皮书零售 + 核心PCE + 信用利差 + FCI\n   - 输出：软着陆概率（0-100%）\n\n---\n\n## 六、关键洞察\n\n1. **大摩框架的核心价值：** 把宏观数据标准化为四象限 → 映射到资产配置决策，填补了\"数据丰富但缺少决策逻辑\"的空白\n\n2. **共振信号的重要性：** 不依赖单一指标，而是看多指标共振（例如：PPI环比转正 + 剪刀差为正 + 订单改善 = 利润上行段确认）\n\n3. **经济范式转换：** 旧范式（货币紧缩+全球化）→ 新范式（财政主导+通胀回归），多资产组合（股/债/商品）必要性提升\n\n4. **逻辑链的层次：**\n   - 战略层：经济范式监控（长期）\n   - 战术层：四象限定位 → 资产配置（中期）\n   - 交易层：利润周期/内需接棒 → 策略择时（短期）\n\n5. **GAMT看板的演进方向：**\n   - 从\"数据展示\"升级为\"决策支持\"\n   - 从\"单一指标\"升级为\"共振信号\"\n   - 从\"静态配置\"升级为\"动态调整\"\n\n---\n\n## 七、待补充数据清单\n\n| 优先级 | 数据类别 | 具体指标 | 数据源 | 实现难度 |\n|-------|---------|---------|--------|---------|\n| **P0** | 信用利差 | 企业债利差（中美） | iFind | 低 |\n| **P0** | 社融结构 | 居民/企业短贷中长贷 | Tushare | 低 |\n| **P0** | PPI环比 | PPI环比 + 剪刀差 | Tushare | 低 |\n| **P1** | 美联储路径 | FF期货隐含降息路径 | CME/FRED | 中 |\n| **P1** | 前瞻租金 | Realtor.com新签租金 | Realtor.com | 中 |\n| **P1** | 工资成本 | 私营部门工资 + ULC | BLS | 中 |\n| **P2** | 金融条件 | 高盛FCI（中美） | 高盛/自建 | 高 |\n| **P2** | 商品供需 | 原油库存/铜库存/BDI | EIA/iFind | 中 |\n| **P3** | 经济意外 | 花旗经济意外指数 | 花旗 | 高 |\n\n---\n\n## 八、下一步行动\n\n1. ✅ 保存本次对话逻辑到smart-notes\n2. ⏳ 从Tushare已有数据开始：利润周期监控 + 内需接棒验证\n3. ⏳ 测试iFind权限：企业债利差 + R007-DR007利差\n4. ⏳ Roni思考：宏观指标如何呼应策略环境\n\n---\n\n**备注：** 本文档作为后续丰满逻辑链的基础框架，随着实施进展持续更新。\n"}, {"name": "宏观Meme叙事生命周期框架", "path": "sessions/2026-03-05_宏观Meme叙事生命周期框架.md", "category": "sessions", "content": "# 宏观 Meme 叙事生命周期框架\n\n**日期：** 2026-03-05  \n**来源：** Roni × Eva 对话\n\n---\n\n## 核心定义厘清\n\n### 这个系统实际在做什么\n\n**本质：舆情频次 → 事件热度时序表**\n\n```\n每天拉财经新闻\n    ↓\n统计每个主题词出现频次\n    ↓\n频次高 = 热度高 = 打分高\n    ↓\n每天记录一次 → 形成时序热度表\n```\n\n\"叙事得分7/10\" 的真实含义：**今天这个主题在财经信息里出现密度很高**。\n\n---\n\n## 题材交易 vs 宏观 Meme 交易\n\n| 维度 | 题材交易 | 宏观 Meme 交易 |\n|------|---------|--------------|\n| 时间尺度 | 1–5天 | 数周到数月 |\n| 信号特征 | 短促尖峰，快速衰减 | 缓慢积累，持续高位 |\n| 核心问题 | 今天爆了什么？ | 这个叙事是否正在成为共识？ |\n| 机会判断 | 抢在新闻消化前进入 | 抢在市场完全定价前配置 |\n| 事件波适用性 | ✅ 完全适用 | ❌ 时间尺度太短 |\n\n> Roni 原话：\"事件波不是不能做，事件波更短线了，不适合宏观Meme交易，更偏向题材交易。\"\n\n---\n\n## 宏观 Meme 生命周期四阶段\n\n每个阶段的判断维度：\n1. **历史分位** — 当前热度在自身历史中的位置（高=成熟，低=新兴）\n2. **动量** — MA7斜率（上升=早期/积累，下降=消退）\n3. **持续时长** — 连续活跃天数（短=新兴，长=成熟/共识）\n4. **价格确认** — 叙事热但价格未动=机会窗口；价格已动=共识化\n\n```\n🌱 新兴  → 热度从低位升起，市场尚未定价，最大配置窗口\n🔥 积累  → 持续升温，价格开始跟随，窗口收窄中  \n⚡ 共识  → 高位稳定，已成市场共识，慎追\n📉 消退  → 热度下行，叙事衰退，关注反向机会\n```\n\n**关键判断：新兴叙事 vs 共识叙事**  \n一旦成为共识 → 对应资产已充分定价 → 宏观 Meme 交易窗口关闭\n\n---\n\n## 资产映射逻辑\n\n因为都是财经信息，每个叙事天然对应一套资产涨跌预期：\n\n| 叙事主题 | 对应资产 | 方向 |\n|--------|---------|------|\n| 地缘风险↑ | 黄金、原油、国防股 | 涨 |\n| 中国刺激↑ | A股、港股、铜、铁矿 | 涨 |\n| 去美元化↑ | 黄金、BTC | 涨 |\n| 美国衰退↑ | 美债、黄金 | 涨；美股 跌 |\n| AI CapEx↑ | 纳指、半导体ETF、铜 | 涨 |\n| 全球再武装↑ | 军工ETF、稀有金属 | 涨 |\n\n---\n\n## 完整系统架构（三层）\n\n```\nLayer 1: 舆情热度层\n  narrative_monitor.py → 每日得分 + narrative_history.json\n\nLayer 2: 价格背离检测层  \n  get_divergence_signal() → 叙事热但价格未动 = 机会信号\n\nLayer 3: 宏观生命周期层（本次新增）\n  macro_lifecycle.py → 多周趋势 → 阶段判断 → 配置建议\n```\n\n---\n\n## 实现\n\n**文件路径：** `~/Desktop/gamt-dashboard/meme/macro_lifecycle.py`  \n**数据来源：** `daily_report/meme交易/cache/narrative_history.json`  \n**输出：** `meme/lifecycle_output.json` + 控制台报告  \n**注意：** 数据积累 ≥ 14 天后判断才有参考价值（目前仅2天历史）\n"}, {"name": "择时模块阶段共识与工作流", "path": "sessions/2026-03-22_择时模块阶段共识与工作流.md", "category": "sessions", "content": "# 2026-03-22 择时模块阶段共识与工作流\n\n- 日期：2026-03-22\n- 类型：阶段共识 / 工作流\n- 标签：择时模块, 情绪因子, Smart Notes, PM沟通, 工作流\n\n## 一、当前模块目标\n\n当前这条研究线只服务一个核心目标：\n\n> 输出股票仓位/股票敞口判断。\n\n不是先做 FOF 多策略映射，也不是先做大而全的策略适配总控台。\n\n当前重点是把“情绪”这件事本身讲清楚，并组织成一个可持续扩展的择时模块。\n\n---\n\n## 二、当前共识：这个模块的本质\n\nRoni 的 PDF 不是一张普通因子表，而是一套市场理解。\n\n里面同时包含：\n1. **日频原始因子**（如涨跌家数比、涨跌停家数比、晋级率等）\n2. **盘中状态条件**（如龙头封板时间、后排跟随、竞价强度等）\n3. **结构过滤条件**（如题材独立性、题材成交额占比等）\n\n因此，这套模块未来不是把所有变量都简单做成同一种日频回测因子，\n而是先把它们翻译成一个 Roni 和 PM 都能对话的择时条件系统。\n\n---\n\n## 三、页面/认知结构的最新共识\n\n### 第一页：原始因子页\n放强逻辑原始因子。\n\n包括：\n- 日频因子\n- 盘中条件（后续可单列）\n- 结构过滤条件（后续可单列）\n\n这页看的是：\n> 原料 / 底层材料\n\n### 第二页：合成因子 / 阶段输出页\n放加工后的结果。\n\n包括：\n- 综合情绪\n- 周期标签\n- 后续的阶段判断/状态机输出\n\n这页看的是：\n> 结论 / 加工结果\n\n一句话：\n- **第一页看原料**\n- **第二页看结论**\n\n---\n\n## 四、当前阶段：先补原始强逻辑因子，不急着回测\n\n当前不是优先做：\n- 每个因子的 300/500/1000 回测\n- 每个因子的 5日/10日/15日 IC\n- 参数最优搜索\n\n而是优先做：\n1. 把原有择时模块中的因子解释清楚\n2. 把 PDF 里新增的强逻辑因子逐步补进来\n3. 明确每个因子在情绪链条中的角色\n4. 再决定哪些值得进入回测候选池\n\n当前原则：\n\n> 强逻辑优先，回测后置。\n\n---\n\n## 五、当前工作流（以后新增因子统一按这个走）\n\n### Step 1：提出因子\nRoni 提一个新因子。\n\n### Step 2：记录到 dashboard 侧 Smart Notes\n路径：\n`~/Desktop/gamt-dashboard/smart-notes/`\n\n先记录：\n- 因子名称\n- 频率（日频/盘中）\n- 类别（广度/极值/接力/龙头/结构）\n- 因子定义\n- 逻辑说明\n- 极端含义\n- 在情绪链条中的角色\n- 与原有因子的关系\n\n### Step 3：判断是否进入 quant-backtest 候选池\n路径：\n`~/Desktop/quant-backtest/timing_model/memory/`\n\n不是所有因子都立刻回测。\n先判断它属于：\n- 日频因子\n- 盘中条件\n- 结构过滤器\n\n再决定是否进入候选池。\n\n### Step 4：后续再决定怎么测\n等第一层因子清单和第二层结构关系更完整后，再决定：\n- 是否回测\n- 测什么命题\n- 用什么方式测\n\n---\n\n## 六、当前已确认的两个记录文件\n\n### 1. dashboard 侧：强逻辑因子清单\n`~/Desktop/gamt-dashboard/smart-notes/concepts/情绪择时强逻辑因子清单.md`\n\n作用：\n- 记录原始因子\n- 先讲逻辑，不急着回测\n\n### 2. quant-backtest 侧：回测候选池\n`~/Desktop/quant-backtest/timing_model/memory/FACTOR_CANDIDATES.md`\n\n作用：\n- 记录哪些因子未来值得测\n- 但当前不急着展开正式回测\n\n---\n\n## 七、当前已补入的第一个新增因子\n\n### 涨跌家数比\n定位：\n- 日频\n- 广度类\n- 强逻辑因子\n- 底层先导因子\n\n它补足的是原有情绪体系缺失的“广度底板”，\n作用不是确认高潮，而是判断市场是否已经从普跌转向普修复。\n\n---\n\n## 八、原有择时模块 10 项的最新理解\n\n原来看板中明确使用的 10 项包括：\n1. 综合情绪 sentiment\n2. 涨停家数 up_count\n3. 跌停家数 down_count\n4. 连板高度 max_height\n5. 晋级率 promotion_rate\n6. 炸板率 zha_rate\n7. 涨跌停比 ud_ratio\n8. 封板质量 seal_quality\n9. 一进二率 rate_1to2\n10. 周期标签 cycle_label\n\n其中应重新分类为：\n\n### 原始因子\n- 涨停家数\n- 跌停家数\n- 连板高度\n- 晋级率\n- 炸板率\n- 涨跌停比\n- 封板质量\n- 一进二率\n\n### 合成因子\n- 综合情绪 sentiment\n\n### 阶段输出\n- 周期标签 cycle_label\n\n---\n\n## 九、综合情绪的最新定位\n\n综合情绪保留，但其性质已明确：\n\n> 它不是原始强逻辑因子，而是合成因子。\n\n原始算法：\n- 晋级率 25%\n- 封板质量 25%\n- 连板高度 20%\n- 反炸板率 20%\n- 涨跌停比 10%\n\n因此它适合放在第二页：\n- 合成因子 / 阶段输出页\n\n而不应再与原始强逻辑因子混在第一页。\n\n---\n\n## 十、下一阶段的实际推进顺序\n\n### 当前先做\n1. 补齐原始强逻辑因子页\n2. 同步修正原有 10 项的解释和分类\n3. 把新增因子持续纳入 Smart Notes\n\n### 暂不急做\n1. 每个因子立刻做 IC\n2. 每个因子立刻进正式回测\n3. 过早做复杂总分模型\n\n### 之后再做\n1. 递进关系整理\n2. 第二页合成因子 / 阶段输出页\n3. 回测方式与必要性讨论\n\n---\n\n## 十一、沟通风格提醒\n\nRoni 明确要求：\n- 聊天尽可能简约\n- 逻辑清晰\n- 先结论，再分层表达\n- 只有在明确需要展开时，再详细解释\n\n另外：\n- 当前对话中，Roni 提醒称呼为“雷军”\n\n---\n\n## 十二、一句话总结\n\n当前阶段不是“把所有因子拉去回测”，而是：\n\n> 先把原始强逻辑因子体系搭起来，\n> 再把合成因子和阶段输出单列，\n> 最后再决定哪些值得进入量化验证。\n"}, {"name": "iFinD_MCP金融数据接入", "path": "sessions/2026-03-26_iFinD_MCP金融数据接入.md", "category": "sessions", "content": "# iFinD MCP 金融数据接入\n\n- 日期：2026-03-26\n- 类型：工具接入\n- 标签：iFinD, MCP, 数据源, 同花顺, API\n\n## 背景\n同花顺于 2026-03-12 正式上线 iFinD MCP 金融数据服务，专为 AI 智能体设计，支持自然语言查询金融数据。\n\n## 接入的4个服务\n\n### 1. 股票服务 (stock)\n- 智能选股（自然语言条件筛选）\n- 股票摘要、基本资料、行情与技术指标\n- 财务数据、股东结构、风险指标、ESG、重大事件\n- 示例：`\"电子行业市值大于100亿的股票\"`\n\n### 2. 基金服务 (fund)\n- 基金搜索、基本资料、行情业绩\n- 持仓明细、持有人结构、财务指标、基金公司信息\n- 对 FOF 工作直接有用\n- 示例：`\"南方基金新能源ETF\"`\n\n### 3. 宏观经济服务 (edb)\n- GDP、CPI、PPI、行业经济指标、大宗商品\n- 支持\"先搜再查\"：先 search_edb 模糊搜索，再 get_edb_data 精确取数\n- 示例：`\"光伏电池产量202301-202506\"`\n\n### 4. 新闻公告服务 (news)\n- 财经新闻语义检索、上市公司公告搜索、热点事件\n- 示例：`\"脑机接口技术最新进展\"`\n\n## 技术细节\n- 协议：MCP (Model Context Protocol) over Streamable HTTP\n- 端点：`https://api-mcp.51ifind.com:8643/ds-mcp-servers/`\n- 认证：JWE Authorization token\n- 直连可用，不需要代理\n- Skill 位置：`~/.openclaw/extensions/ifind-finance-data/`\n- 调用方式：Node.js（推荐，无依赖）或 Python\n\n## 与现有 iFinD HTTP API 的区别\n- HTTP API：需要知道具体指标代码和字段名，写代码拼参数\n- MCP 方式：自然语言查询，AI 自动理解意图并返回结构化结果\n- 两套可以并存，MCP 更适合 AI agent 交互场景\n\n## 对 GAMT 看板的价值\n- 基金数据：Tushare 覆盖不到的公募基金详细数据\n- 宏观指标：可替代部分 iFind HTTP API 的宏观数据拉取\n- 新闻公告：叙事监控模块可用于热点事件追踪\n"}, {"name": "择时因子标准化测试框架", "path": "concepts/择时因子标准化测试框架.md", "category": "concepts", "content": "# 择时因子标准化测试框架\n\n**定义：** 标准化的因子回测框架，用于快速验证择时因子的有效性。参考聚宽（JoinQuant）的交互设计，极简、高效、易扩展。\n\n**核心问题：** 如何快速验证一个择时因子是否有效？如何在\"高回测效果\"和\"高触发频率\"之间找到平衡？\n\n## 框架设计\n\n**标准化参数空间：**\n- 阈值：2个（5%、10%分位）\n- 持有期：3个（10天、15天、20天）\n- 标的指数：3个（中证500、1000、2000）\n- 总计：2×3×3 = 18种组合（不是180种）\n\n**输出：1页因子卡片**\n- 1行参数 + 1行核心指标\n- 净值曲线图（策略 vs 多指数对比）\n- 交易收益柱状图（时间 + 触发条件）\n\n**技术栈：**\n- Python 3.14 + Qlib + Tushare\n- ECharts 图表\n- 深色主题（与GAMT看板统一）\n\n## 冰点因子的困境\n\n**测试结果（7年全样本）：**\n- 最优参数：5%分位 + 15天 + 中证500\n- Calmar 3.21，胜率87.5%，平均收益+4.71%\n- **但年均只触发1.1次**\n\n**核心矛盾：**\n| 阈值 | Calmar | 年均触发 | 评价 |\n|------|--------|----------|------|\n| 5%   | 3.21   | 1.1次    | 效果极好，但太少 |\n| 10%  | 0.89   | 3.7次    | 效果下降，仍偏低 |\n\n**Roni 的判断：** \"极致冰点触发太少，实用性不够。\"\n\n## 关键洞察\n\n### 1. 抄底比逃顶更容易量化\n- 恐慌是尖锐的（暴跌一步到位）\n- 贪婪是渐进的（慢慢磨顶）\n- 冰点信号（跌停家数、封单轧差）比过热信号更可靠\n\n### 2. 中证2000不是最优\n- Roni 认为2000效果会最好\n- 实际：2000排名第3（Calmar 1.17 vs 500的3.21）\n- 原因：2000年化收益高（14.9%），但回撤也大\n\n### 3. 标准化框架的价值\n- 添加新因子只需实现 `generate_signal()` 方法\n- 自动生成标准化报告，易于对比\n- 未来可扩展为本地化的聚宽式回测平台\n\n## 聚宽式交互设计\n\n**Roni 的诉求：**\n> \"我觉得我们的冰点模板做的还是太复杂了，字多但是看完就那么个意思。未来会加很多因子，需要一个简洁、标准化的交互方式。\"\n\n**聚宽的优势：**\n- 极简：核心指标一行搞定\n- 图表为主：少文字多图\n- 信息密度高：一屏看完\n- 标准化：每个策略都是这个格式\n\n**我们的实现：**\n- 参考聚宽的设计\n- 深色主题（与择时模块统一）\n- iframe嵌入到冰点研究模块\n\n## 下一步方向\n\n### 优化冰点因子\n- 放宽阈值到15%分位\n- 改变因子定义（单因子而非双因子）\n- 分批建仓、动态持有期\n\n### 扩展因子库\n- 封单轧差单因子\n- 涨跌家数比\n- 首板BIAS\n- 因子组合策略\n\n### 长期愿景\n- 本地化的聚宽式回测平台\n- Web界面：因子编辑器 + 一键回测\n- RD-Agent 接入（AI自动挖因子）\n\n## 相关讨论\n- [[强势股择时因子全景]] — 10个因子的IC排名\n- [[封单额轧差_抄底指标]] — 冰点信号核心\n- [[择时回测方法论]] — 三层框架\n\n## 技术细节\n\n**净值计算：**\n- 持仓期间：净值跟随指数波动\n- 空仓期间：净值保持不变（水平线）\n- 不能是直线！\n\n**触发条件记录：**\n- 每笔交易记录：跌停X家、涨停Y家\n- 柱状图鼠标悬停显示\n\n**整合方式：**\n- 在冰点研究的\"冰点研究迭代版本\"部分\n- 添加subtab：\"📊 因子回测\"\n- iframe嵌入独立页面\n\n## 数据来源\n- 7年sentiment: `~/Desktop/quant-backtest/timing_model/data/sentiment_7y.csv`\n- 指数数据: `csi300/500/1000/2000_7y.csv`\n- 框架位置: `~/Desktop/quant-backtest/timing_model/framework_v2/`\n\n**标签:** #择时 #因子测试 #框架 #聚宽 #标准化 #冰点\n"}, {"name": "高回测vs高触发的矛盾", "path": "concepts/高回测vs高触发的矛盾.md", "category": "concepts", "content": "# 高回测 vs 高触发的矛盾\n\n**定义：** 择时因子优化中的核心困境——极端阈值带来高回测效果，但触发频率太低；放宽阈值提高触发频率，但回测效果下降。\n\n**典型案例：** 冰点双因子（跌停家数 + 涨停家数共振）\n\n## 数据验证（7年全样本）\n\n| 阈值 | 持有期 | 指数 | Calmar | 胜率 | 年化 | 年均触发 | 评价 |\n|------|--------|------|--------|------|------|----------|------|\n| 5%   | 15天   | 500  | 3.21   | 87.5%| 7.1% | 1.1次    | ⭐⭐⭐ 效果极好，但太少 |\n| 10%  | 15天   | 500  | 0.89   | 73.1%| 11.0%| 3.7次    | ⚠️ 效果下降，仍偏低 |\n\n**Roni 的判断：**\n> \"极致冰点触发太少，实用性不够。\"\n\n## 矛盾的本质\n\n### 为什么极端阈值效果好？\n- 极端恐慌时，市场超卖严重\n- 修复概率高、幅度大\n- 胜率高、平均收益高\n\n### 为什么触发太少？\n- 极端事件本身就稀缺\n- 5%分位意味着一年只有12个交易日\n- 双因子共振进一步降低触发概率\n\n### 为什么放宽阈值效果差？\n- 包含了更多\"假冰点\"\n- 市场还没到真正的超卖区间\n- 胜率下降、平均收益下降\n\n## 可能的解决方案\n\n### 1. 非线性阈值\n- 不用固定分位数\n- 用动态阈值（如：历史波动率调整）\n- 市场环境不同，阈值不同\n\n### 2. 单因子替代双因子\n- 双因子共振降低触发频率\n- 单因子（如：跌停家数）触发更频繁\n- 但需要验证单因子效果是否足够好\n\n### 3. 分批建仓\n- 不是一次性全仓\n- 10%分位：建30%仓位\n- 5%分位：加到100%仓位\n- 提高资金利用率\n\n### 4. 动态持有期\n- 不是固定15天\n- 根据市场修复速度调整\n- 快速修复：提前止盈\n- 缓慢修复：延长持有\n\n### 5. 因子组合\n- 冰点因子 + 其他情绪因子\n- 不同因子触发时间不同\n- 提高整体触发频率\n\n## 其他因子的表现\n\n**封单轧差（单因子）：**\n- IC = +0.088（7年全样本）\n- 触发频率：待测试\n- 可能比双因子更实用\n\n**涨跌家数比：**\n- IC = +0.052\n- 触发频率高（常态化择时）\n- 但效果不如冰点\n\n## 关键权衡\n\n**FOF仓位管理的需求：**\n- 不能一年只调1次仓（太少）\n- 也不能每天都调（成本高）\n- 理想频率：每月1-2次（年均12-24次）\n\n**回测效果的底线：**\n- Calmar > 1.0（可接受）\n- 胜率 > 60%（可接受）\n- 平均收益 > 2%（可接受）\n\n**平衡点：**\n- 10-15%分位可能是甜蜜点\n- 需要进一步测试验证\n\n## Roni 的思考\n\n**2026-03-15 讨论：**\n> \"我觉得参考聚宽的交互设计方式来构建因子的回测。聚宽的很多小策略也就是一些非常简单的小因子。我们本地不也有个回测平台嘛，可能能做到差不多的效果？\"\n\n**核心诉求：**\n- 快速验证多个因子\n- 标准化的对比方式\n- 找到\"高回测+高触发\"的平衡点\n\n## 下一步\n\n1. **测试10-15%分位**：找到平衡点\n2. **单因子测试**：封单轧差、跌停家数\n3. **分批建仓策略**：提高资金利用率\n4. **因子组合**：多因子轮动\n\n## 相关讨论\n- [[择时因子标准化测试框架]] — 快速验证框架\n- [[强势股择时因子全景]] — 10个因子IC排名\n- [[封单额轧差_抄底指标]] — 冰点信号核心\n\n**标签:** #择时 #因子优化 #矛盾 #平衡点 #实用性\n"}, {"name": "股票择时模块前后端改版草图_v1", "path": "concepts/股票择时模块前后端改版草图_v1.md", "category": "concepts", "content": "# 股票择时模块前后端改版草图 v1\n\n- 日期：2026-03-22\n- 类型：前后端结构草图\n- 状态：待确认后进入开发\n\n## 一、目标\n\n这次不是重做整个择时页面。\n\n这次只做一件事：\n\n> 先把旧的因子库口径拆顺，让前后端都能承接“持续加因子”这件事。\n\n---\n\n## 二、页面结构（v1）\n\n原有大框架先不动：\n- 总览\n- 因子系统\n- 研究方法 / 因子库\n- 命题研究\n- 敞口输出\n\n本次只改：\n\n### 研究方法 / 因子库\n从“10个因子平铺”改成两层：\n\n#### Tab A：原始因子\n放底层原料。\n\n#### Tab B：合成因子 / 阶段输出\n放加工结果。\n\n---\n\n## 三、Tab A：原始因子页（v1先上）\n\n### 1. 广度类\n- 涨跌家数比（新增）\n- 涨跌停比\n\n### 2. 极值类\n- 涨停家数\n- 跌停家数\n\n### 3. 接力 / 龙头类\n- 连板高度\n- 晋级率\n- 一进二率\n- 炸板率\n- 封板质量\n\n### 原始因子页合计\n共 9 个。\n\n---\n\n## 四、Tab B：合成因子 / 阶段输出页\n\n### 合成因子\n- 综合情绪 sentiment\n\n### 阶段输出\n- 周期标签 cycle_label\n\n说明：\n- 综合情绪保留，但降级为合成因子\n- 周期标签不再算原始因子，而是阶段判断结果\n\n---\n\n## 五、综合情绪算法说明\n\n综合情绪由以下 5 个子因子加权合成：\n- 晋级率 25%\n- 封板质量 25%\n- 连板高度 20%\n- 反炸板率 20%\n- 涨跌停比 10%\n\n定位：\n- 用于总览\n- 用于快速感知强势股生态热度\n- 不再与原始强逻辑因子混放\n\n---\n\n## 六、前端展示方式（v1）\n\n每个原始因子卡片先只放 4 个信息：\n- 因子名\n- 频率\n- 一句话逻辑\n- 链条角色\n\n链条角色先用这几个标签：\n- 先导\n- 确认\n- 强化\n- 分歧\n- 退潮\n\n这版先不展开太多回测描述。\n\n---\n\n## 七、前端改动原则\n\n### 保留\n- 现有大框架\n- 命题研究区\n- 回测区\n- 敞口输出区\n\n### 调整\n- 因子库区从单层平铺改成分层展示\n- 新增“涨跌家数比”入口\n- 把 `sentiment` 和 `cycle_label` 从原始因子列表中拆出来\n\n### 暂不处理\n- 盘中因子正式接入\n- 结构过滤条件正式接入\n- IC 页面整体重构\n- 回测逻辑改写\n- 状态机系统\n\n---\n\n## 八、后端同步口径（v1）\n\n前后端统一字段建议：\n- `name`\n- `display_name`\n- `category`\n- `frequency`\n- `factor_level`\n- `role_in_chain`\n- `logic`\n- `status`\n\n### 字段含义\n- `category`：广度 / 极值 / 接力 / 龙头 / 结构\n- `frequency`：日频 / 盘中\n- `factor_level`：raw / composite / stage\n- `status`：active / planned\n\n### 本次需要明确调整\n- `sentiment` → `composite`\n- `cycle_label` → `stage`\n- `涨跌家数比` → 新增 `raw`\n\n---\n\n## 九、v1 的核心结果\n\n这版不是做复杂升级。\n\n这版的核心结果只有两个：\n1. 前端因子页面口径拆顺\n2. 前后端字段口径统一\n\n这样后面新增因子时，就能稳定往里接。\n\n---\n\n## 十、开发顺序\n\n### 第一步\n确认这版因子名单。\n\n### 第二步\n前端改“研究方法 / 因子库”页的结构。\n\n### 第三步\n后端补齐字段和分类口径。\n\n### 第四步\n把第二个新增因子继续补进原始因子页。\n\n---\n\n## 十一、一句话总结\n\n> 先不重建择时页面，只先把旧因子库拆层，把新增的涨跌家数比接进去，让前后端口径统一。"}, {"name": "情绪择时强逻辑因子清单", "path": "concepts/情绪择时强逻辑因子清单.md", "category": "concepts", "content": "# 情绪择时强逻辑因子清单\n\n- 目的：先沉淀强逻辑因子，不急着回测；先讲清楚因子测什么、为什么成立、在情绪链条里处于哪一层。\n- 适用范围：股票择时模块，最终服务于股票敞口判断。\n- 记录原则：每新增一个因子，先登记到这里；等逻辑链条更完整后，再决定是否进入回测候选池。\n\n---\n\n## 记录模板\n\n### 因子名称\n\n### 频率\n- 日频 / 盘中\n\n### 类别\n- 广度 / 极值 / 接力 / 龙头 / 结构\n\n### 因子定义\n\n### 逻辑说明\n\n### 极端含义\n- 极强：\n- 极弱：\n\n### 在情绪链条中的角色\n- 先导 / 确认 / 强化 / 分歧 / 退潮\n\n### 与原有因子的关系\n- 重叠 / 补充 / 前置 / 后置\n\n### 是否纳入核心观察\n- 是 / 否\n\n### 备注\n- 后续是否适合回测\n- 更适合做状态还是信号\n\n---\n\n## 因子 01：涨跌家数比\n\n### 频率\n- 日频\n\n### 类别\n- 广度\n\n### 因子定义\n- 上涨家数与下跌家数的对比，用于衡量市场整体涨跌分布状态。\n- 第一版建议口径：\n- `涨跌家数比 = (上涨家数 - 下跌家数) / (上涨家数 + 下跌家数)`\n\n### 逻辑说明\n- 这是一个强逻辑因子。\n- 如果市场处于明显强势或明显弱势状态，广度一定会体现出来。\n- 当上涨家数显著多于下跌家数，说明市场正在普遍修复，风险偏好在扩散。\n- 当下跌家数显著多于上涨家数，说明市场仍处于普遍风险回避状态。\n- 这个因子不主要负责确认高潮，而是负责判断市场底板有没有抬起来。\n\n### 极端含义\n- 极强：市场处于普涨、情绪扩散、风险偏好显著抬升。\n- 极弱：市场处于普跌、风险释放、亏钱效应广谱蔓延。\n\n### 在情绪链条中的角色\n- 先导\n\n### 与原有因子的关系\n- 前置\n- 它补的是原有涨停家数、跌停家数、晋级率、封单强度之前的底层广度。\n\n### 是否纳入核心观察\n- 是\n\n### 备注\n- 后续适合做环境过滤器，也适合和首板数量、晋级率做领先关系验证。\n- 暂不急于单独做交易信号回测。\n\n---\n\n## 盘中发现层母框架（角色层 / 事件层 / 叙事层）\n\n- 定位：盘中发现层不是简单“再补几个因子”，而是把人工盘面语言翻译成 PM 可讨论、可计算的状态框架。\n- 结构：`角色层 → 事件层 → 叙事层`。\n- 与其他层的关系：\n  - 日频因子负责给出 **T日收盘先验**\n  - 盘中发现层负责在 **T+1 交易时段** 对这个先验做确认、强化或证伪\n  - 合成因子 / 阶段输出负责把这些信息翻成阶段判断和仓位动作\n\n### 一、角色层：盘中到底在看谁\n\n- 龙头观察池：由 T 日收盘后的日频强信号筛出来的候选序列，不是一只固定股票。\n- 辨识度龙头：市场最认、位置最高、最有带动性的核心票。\n- 成交额龙头：当日成交额最高、最吸金的核心票。\n- 龙一 / 龙二 / 龙三：同一条主线或同一梯队中，承担不同位置功能的动态角色。\n- 高位核心：高板、高辨识度、高情绪杀伤力的个股集合。\n- 首板试错：当天最先承接风险偏好的低位启动组。\n- 跟风扩散：从单核走向多核、从单票走向板块共振的跟随层。\n- 跌停翘板修复：从极端亏钱效应反向修复风险偏好的角色集合。\n\n### 龙头定义（当前正式口径）\n\n#### 1）龙头观察池\n- 不是单票定义，而是 T 日收盘后由日频信号筛出来的观察池。\n- 进入观察池的优先条件：\n  - 高板 / 最高板\n  - 打板成交额高\n  - 高度高\n  - 在日频强信号中排名靠前\n- 含义：T 日的日频强因子，到 T+1 就转化为“龙头观察池”。\n\n#### 2）辨识度龙头\n- 在观察池中，市场最认、最有高度、最有位置感、最有带动性的那只。\n- 更偏人工交易语义。\n\n#### 3）成交额龙头\n- 在观察池中，当日成交额最高的核心票。\n- 更偏量价资金语义。\n\n#### 4）为什么要拆成两类龙头\n- A 股里“龙头 / 龙一 / 龙二 / 龙三”是动态变化的。\n- 辨识度龙头和成交额龙头有时重合，有时不重合。\n- 人工盘面处理经常正是在观察它们是否联动、是否切换、是否共振。\n\n### 二、事件层：盘中到底发生了什么\n\n- 首次封板\n- 炸板\n- 回封\n- 翘板\n- 尾盘回落\n- 10cm → 20cm 扩散\n- 单核 → 多核扩散\n- 高位股集体松动\n- 梯队同步加强\n- 午后分歧后修复\n\n### 三、叙事层：这些事件意味着什么\n\n- 龙头确认\n- 试错启动\n- 梯队加强\n- 高度突破\n- 板块共振扩散\n- 分歧转修复\n- 高位退潮\n- 风险偏好抬升 / 回落\n\n## 盘中发现因子 v1（单独作为盘中确认层）\n\n- 定义：盘中因子 = 在交易时段内出现的、用于确认或证伪当日日频判断的事件型 / 过程型信号。\n- 页面位置：Tab B「盘中发现因子」。\n- 统一要求：每个盘中因子都必须回答 3 个问题：\n  - 它挂在哪个角色上\n  - 它记录了什么事件\n  - 它对应什么叙事含义\n\n### 推荐字段\n- `name`\n- `display_name`\n- `factor_level` = `intraday_signal`\n- `frequency` = `intraday`\n- `role_layer` = `character`\n- `event_layer` = `event / process`\n- `narrative_layer`\n- `trigger_type` = `event / process / confirm / warning`\n- `observation_window` = `open_30m / morning / late_morning / afternoon / close_near / full_session`\n- `role_in_chain`\n- `output_type` = `binary / count / ratio / timestamp / state_label`\n- `related_daily_factors`\n- `impact_on_stage`\n- `logic`\n- `status`\n\n### 因子 A1：龙头首次封板时间\n- `name`: `leader_first_limit_time`\n- `trigger_type`: `event`\n- `observation_window`: `morning`\n- `role_in_chain`: `确认`\n- `output_type`: `timestamp`\n- `related_daily_factors`: `max_height`, `promotion_rate`\n- `impact_on_stage`: `回暖确认 / 强化确认`\n- 逻辑：龙头越早封板，说明核心票凝聚力越强。\n\n### 因子 A2：龙头炸板后回封\n- `name`: `leader_refeng`\n- `trigger_type`: `confirm`\n- `observation_window`: `full_session`\n- `role_in_chain`: `修复`\n- `output_type`: `binary`\n- `related_daily_factors`: `refeng_rate`, `max_height`\n- `impact_on_stage`: `分歧转修复`\n- 逻辑：龙头被砸后还能封回去，说明分歧承接强。\n\n### 因子 A3：高位股集体炸板\n- `name`: `high_level_bomb_group`\n- `trigger_type`: `warning`\n- `observation_window`: `afternoon`\n- `role_in_chain`: `退潮`\n- `output_type`: `count`\n- `related_daily_factors`: `high_duanban_count`, `duanban_count`\n- `impact_on_stage`: `退潮确认`\n- 逻辑：高位核心同时松动，杀伤力远大于单票炸板。\n\n### 因子 A4：首板批量启动时间\n- `name`: `shouban_batch_start_time`\n- `trigger_type`: `event`\n- `observation_window`: `morning`\n- `role_in_chain`: `先导`\n- `output_type`: `timestamp`\n- `related_daily_factors`: `shouban_count`\n- `impact_on_stage`: `试错启动`\n- 逻辑：首板若在早盘集中出现，说明试错资金开始集体行动。\n\n### 因子 A5：首板午后继续扩散\n- `name`: `shouban_afternoon_expand`\n- `trigger_type`: `process`\n- `observation_window`: `afternoon`\n- `role_in_chain`: `强化`\n- `output_type`: `binary`\n- `related_daily_factors`: `shouban_count`, `lianban_count`\n- `impact_on_stage`: `回暖转强化`\n- 逻辑：不只是早盘点火，午后还能扩散，说明资金不是一波流。\n\n### 因子 A6：二板/三板梯队同步加强\n- `name`: `ladder_sync_strength`\n- `trigger_type`: `confirm`\n- `observation_window`: `late_morning`\n- `role_in_chain`: `强化`\n- `output_type`: `state_label`\n- `related_daily_factors`: `rate_1to2`, `rate_2to3`, `rate_3to4`, `lianban_count`\n- `impact_on_stage`: `接力强化`\n- 逻辑：不是单龙头强，而是梯队一起强，说明生态更健康。\n\n### 因子 A7：午后分歧后修复\n- `name`: `afternoon_repair`\n- `trigger_type`: `process`\n- `observation_window`: `afternoon`\n- `role_in_chain`: `修复`\n- `output_type`: `binary`\n- `related_daily_factors`: `zha_rate`, `refeng_rate`\n- `impact_on_stage`: `分歧转一致`\n- 逻辑：午后能修回来，比全天硬顶更有质量。\n\n### 因子 A8：尾盘高位回落\n- `name`: `close_high_fade`\n- `trigger_type`: `warning`\n- `observation_window`: `close_near`\n- `role_in_chain`: `分歧 / 退潮`\n- `output_type`: `binary`\n- `related_daily_factors`: `high_duanban_count`, `max_height`\n- `impact_on_stage`: `次日风险抬升`\n- 逻辑：尾盘高位股顶不住，往往说明次日接力承压。\n"}];

"content": "# 择时框架协作机制\n\n**类型：** 决策  \n**创建时间：** 2026-03-15\n\n---\n\n## 核心定位\n\nRoni（思考者）+ Musk（共创者）的协作框架\n\n**目标：** 把市场理解力翻译成PM能理解的因子和回测\n\n---\n\n## 三层架构\n\n```\n因子库（原料层）→ 命题研究（逻辑层）→ 敞口输出（决策层）\n```\n\n---\n\n## 使用方式（zs前缀）\n\n**所有择时框架操作都用\"zs\"前缀，避免和其他场景混淆**\n\n### 触发词\n\n- `zs加因子：XXX` → 分析相关性 → 提示命题 → 自动测试\n- `zs测命题：XXX` → 生成框架 → 运行回测 → 分析结果\n- `zs优化：XXX` → 分析问题 → 提出方案 → 测试对比\n- `zs加标的：XXX` → 修改回测 → 运行测试 → 对比分析\n- `zs因子库` → 查询当前所有因子\n\n---\n\n## Musk的工作机制\n\n1. **主动提示相关性**：新因子时告诉你和哪些因子/命题相关\n2. **自动关联测试**：把新因子放到对应命题里测试\n3. **勾稽关系管理**：理解因子之间、因子和命题之间的关系\n4. **记录所有操作**：写入工作日志\n\n---\n\n## 示例\n\n```\nRoni: zs加因子：封板质量\nMusk: \n  - 与封单额轧差相关性0.45（中等）\n  - 可能和\"冰点策略\"、\"强势股接力\"相关\n  - IC=+0.054, ICIR=0.62（信号稳定）\n  - 加入冰点测试：胜率75%，不如V3\n```\n\n---\n\n## 关键文件\n\n- 框架设计：`~/Desktop/quant-backtest/timing_model/memory/FRAMEWORK_DESIGN.md`\n- 使用手册：`~/Desktop/quant-backtest/timing_model/memory/HOW_TO_USE_MUSK.md`\n- 工作日志：`~/Desktop/quant-backtest/timing_model/memory/WORK_LOG.md`\n\n---\n\n## 当前状态\n\n- ✅ 框架设计完成\n- ✅ 冰点策略V3（跌停家数+封单额轧差）\n- ✅ 中证2000加入回测（4指数）\n- ⏳ 可视化页面更新中\n\n**标签:** #择时 #协作机制 #框架 #zs前缀\n"

// === localStorage persistence ===
function loadUserData() {
  try { return JSON.parse(localStorage.getItem('smartnotes_user') || '{}'); }
  catch(e) { return {}; }
}
function saveUserData(data) {
  localStorage.setItem('smartnotes_user', JSON.stringify(data));
}

async function loadNotes() {
  const userData = loadUserData();
  
  // 从API加载笔记
  try {
    const response = await fetch('/api/notes');
    const notes = await response.json();
    
    for (const entry of notes) {
      const id = entry.path.replace(/\.md$/, '');
      const content = userData[id]?.content || entry.content;
      parseNote(id, entry.path, entry.category, entry.name, content);
    }
  } catch (error) {
    console.error('Failed to load notes from API:', error);
    // 降级：使用BUILTIN_NOTES
    for (const entry of BUILTIN_NOTES) {
      const id = entry.path.replace(/\.md$/, '');
      const content = userData[id]?.content || entry.content;
      parseNote(id, entry.path, entry.category, entry.name, content);
    }
  }
  
  // Load user-created notes
  if (userData._created) {
    for (const entry of userData._created) {
      const id = entry.path.replace(/\.md$/, '');
      if (!NOTES[id]) parseNote(id, entry.path, entry.category, entry.name, entry.content);
    }
  }
  
  renderNav();
  showWelcome();
}

function parseNote(id, path, category, name, content) {
  const title = content.match(/^#\s+(.+)$/m)?.[1] || name;
  const tags = [...content.matchAll(/#(\S+)/g)].map(m => m[1]).filter(t => !t.startsWith('#'));
  const links = [...content.matchAll(/\[\[([^\]]+)\]\]/g)].map(m => m[1]);
  NOTES[id] = { id, title, path, category, content, tags, links, name };
}

// === Navigation ===
function renderNav(filter) {
  const nav = document.getElementById('navSection');
  const cats = { concepts: '💡 核心概念', sessions: '💬 对话记录', decisions: '⚖️ 决策记录' };
  let html = '';
  for (const [cat, label] of Object.entries(cats)) {
    const ns = Object.values(NOTES).filter(n => n.category === cat &&
      (!filter || n.title.toLowerCase().includes(filter) || n.content.toLowerCase().includes(filter)));
    if (!ns.length) continue;
    html += '<div class="nav-group"><div class="nav-group-title">' + label + '</div>';
    ns.forEach(n => {
      html += '<div class="nav-item ' + (currentNote?.id===n.id?'active':'') + '" onclick="openNote(\'' + n.id + '\')">'
        + '<span class="icon">' + (cat==='concepts'?'◆':cat==='sessions'?'◇':'▸') + '</span>' + n.title + '</div>';
    });
    html += '</div>';
  }
  nav.innerHTML = html || '<div style="padding:20px;color:var(--text3);font-size:13px;">无匹配结果</div>';
}

// === Note Rendering ===
function openNote(id) {
  const note = NOTES[id] || Object.values(NOTES).find(n => n.title === id);
  if (!note) return;
  if (currentNote) history.push(currentNote.id);
  currentNote = note;
  editing = false;
  renderNote(note);
  renderNav();
  document.getElementById('breadcrumb').innerHTML = '<span>' + ({concepts:'概念',sessions:'对话',decisions:'决策'}[note.category]||'') + '</span> / ' + note.title;
  document.getElementById('btnEdit').style.display = '';
  document.getElementById('btnDelete').style.display = '';
}

function renderNote(note) {
  const area = document.getElementById('contentArea');
  area.style.display = 'block';
  document.getElementById('graphCanvas').style.display = 'none';
  document.getElementById('btnNotes').classList.add('active');
  document.getElementById('btnGraph').classList.remove('active');
  document.getElementById('btnEdit').textContent = '✏️ 编辑';

  let body = note.content
    .replace(/^#\s+.+$/m, '')
    .replace(/\|(.+)\|/g, function(line) { return line; })
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^>\s*(.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\[\[([^\]]+)\]\]/g, function(_, name) {
      const t = Object.values(NOTES).find(n => n.title===name || n.id.endsWith('/'+name) || n.id.includes(name));
      return t ? '<a class="wiki-link" onclick="openNote(\''+t.id+'\')">'+name+'</a>'
               : '<a class="wiki-link broken">'+name+'</a>';
    })
    .replace(/#(\S+)/g, '<span class="tag" onclick="searchTag(\'$1\')">#$1</span>');

  body = body.replace(/<\/blockquote>\s*<blockquote>/g, '<br>');
  body = body.split('\n').map(function(line) {
    var t = line.trim();
    if (!t) return '';
    if (t.startsWith('<')) return t;
    return '<p>'+t+'</p>';
  }).join('\n');

  // Backlinks
  var bl = Object.values(NOTES).filter(function(n) {
    return n.links.some(function(l) {
      var t = Object.values(NOTES).find(function(x){ return x.title===l || x.id.endsWith('/'+l) || x.id.includes(l); });
      return t && t.id === note.id;
    });
  });
  var blHtml = '';
  if (bl.length) {
    blHtml = '<div class="backlinks"><h3>🔗 反向链接 ('+bl.length+')</h3>';
    bl.forEach(function(b) {
      blHtml += '<div class="backlink-item" onclick="openNote(\''+b.id+'\')"><div>'+b.title+'</div></div>';
    });
    blHtml += '</div>';
  }
  area.innerHTML = '<div class="note-title">'+note.title+'</div><div class="note-body">'+body+'</div>'+blHtml;
}

// === Edit ===
function toggleEdit() {
  if (!currentNote) return;
  editing = !editing;
  var area = document.getElementById('contentArea');
  var btn = document.getElementById('btnEdit');
  if (editing) {
    btn.textContent = '💾 保存';
    area.innerHTML = '<textarea class="editor-area" id="editorTA">'+currentNote.content.replace(/</g,'&lt;')+'</textarea>';
    document.getElementById('editorTA').focus();
  } else {
    var ta = document.getElementById('editorTA');
    if (ta) {
      var newContent = ta.value;
      currentNote.content = newContent;
      // Re-parse
      parseNote(currentNote.id, currentNote.path, currentNote.category, currentNote.name, newContent);
      // Save to localStorage
      var ud = loadUserData();
      // Check if user-created
      var isCreated = ud._created && ud._created.some(function(e){ return e.path === currentNote.path; });
      if (isCreated) {
        ud._created = ud._created.map(function(e){ return e.path===currentNote.path ? Object.assign(e,{content:newContent}) : e; });
      } else {
        ud[currentNote.id] = { content: newContent };
      }
      saveUserData(ud);
      // Also save to notes/ folder file (for git sync) — only works via http server
      // For file:// mode, localStorage is the persistence layer
    }
    btn.textContent = '✏️ 编辑';
    openNote(currentNote.id);
  }
}

// === New Note ===
function newNote() {
  editing = true;
  currentNote = null;
  document.getElementById('btnEdit').style.display = '';

// === Search ===
var searchInput = document.getElementById('searchInput');
var searchTimeout;
searchInput.addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() {
    var q = searchInput.value.trim().toLowerCase();
    if (!q) { renderNav(); if (currentNote) renderNote(currentNote); else showWelcome(); return; }
    showSearchResults(q);
  }, 200);
});

function showSearchResults(query) {
  var area = document.getElementById('contentArea');
  var results = Object.values(NOTES).filter(function(n) {
    return n.title.toLowerCase().includes(query) || n.content.toLowerCase().includes(query);
  }).map(function(n) {
    var lines = n.content.split('\n').filter(function(l){ return l.toLowerCase().includes(query); });
    var snippet = lines.slice(0,2).join(' ').substring(0,200);
    var re = new RegExp(query, 'gi');
    return { note: n, snippet: snippet.replace(re, function(m){ return '<mark>'+m+'</mark>'; }) };
  });
  area.innerHTML = '<div class="search-results"><h3 style="color:var(--text3);margin-bottom:16px">搜索 "'+query+'" — '+results.length+' 条结果</h3>'
    + results.map(function(r){ return '<div class="search-result" onclick="openNote(\''+r.note.id+'\');searchInput.value=\'\'"><div class="title">'+r.note.title+'</div><div class="snippet">'+r.snippet+'</div></div>'; }).join('')
    + '</div>';
  renderNav(query);
}

function searchTag(tag) { searchInput.value = tag; showSearchResults(tag.toLowerCase()); }

  document.getElementById('contentArea').innerHTML = '<div class="welcome"><h2>GAMT 投研知识库</h2><p>记录每一次对话的洞察、每一个参数背后的"为什么"。</p>'

    + '<div class="shortcuts"><div class="shortcut"><kbd>⌘K</kbd> 搜索</div><div class="shortcut"><kbd>←</kbd> 返回</div></div></div>';

  if ((e.metaKey||e.ctrlKey)&&e.key==='s'&&editing) { e.preventDefault(); toggleEdit(); }
});

// === Init ===
loadNotes();
</script>
