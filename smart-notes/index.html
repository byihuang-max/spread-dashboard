<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notes — GAMT 投研知识库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1e1e2e; --bg2: #252536; --bg3: #2d2d44;
  --text: #cdd6f4; --text2: #a6adc8; --text3: #6c7086;
  --accent: #89b4fa; --accent2: #74c7ec; --green: #a6e3a1;
  --yellow: #f9e2af; --red: #f38ba8; --mauve: #cba6f7;
  --border: #45475a; --hover: #313244;
}
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
.sidebar { width: 280px; min-width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 16px; margin-bottom: 12px; }
.search-box { width: 100%; padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.nav-section { flex: 1; overflow-y: auto; padding: 12px; }
.nav-group-title { font-size: 11px; color: var(--text3); text-transform: uppercase; padding: 8px 0 4px; font-weight: 600; }
.nav-item { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.nav-item:hover { background: var(--hover); }
.nav-item.active { background: var(--accent); color: var(--bg); font-weight: 600; }
.icon { font-size: 10px; opacity: 0.6; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { padding: 10px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text3); }
.toolbar button { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.toolbar button:hover { border-color: var(--accent); color: var(--accent); }
.toolbar button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.toolbar .spacer { flex: 1; }
#breadcrumb { flex: 1; }
#contentArea { flex: 1; overflow-y: auto; padding: 32px 48px; }
.note-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; color: var(--text); }
.note-body { line-height: 1.8; font-size: 14px; }
.note-body h2 { font-size: 20px; margin: 24px 0 12px; color: var(--accent); }
.note-body h3 { font-size: 16px; margin: 18px 0 8px; color: var(--text); }
.note-body p { margin-bottom: 8px; }
.note-body ul { padding-left: 20px; margin-bottom: 8px; }
.note-body li { margin-bottom: 4px; }
.note-body blockquote { border-left: 3px solid var(--mauve); padding: 8px 16px; margin: 12px 0; color: var(--text2); background: var(--bg3); border-radius: 0 8px 8px 0; }
.note-body pre { background: var(--bg3); padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
.note-body code { background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.note-body pre code { background: none; padding: 0; }
.note-body table { border-collapse: collapse; margin: 12px 0; width: 100%; }
.note-body th, .note-body td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; text-align: left; }
.note-body th { background: var(--bg3); }
.wiki-link { color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
.wiki-link:hover { color: var(--accent2); }
.wiki-link.broken { color: var(--red); text-decoration: line-through; cursor: default; }
.tag { color: var(--yellow); cursor: pointer; font-size: 12px; }
.tag:hover { text-decoration: underline; }
.backlinks { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
.backlinks h3 { font-size: 14px; color: var(--text3); margin-bottom: 10px; }
.backlink-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
.backlink-item:hover { background: var(--hover); }
.backlink-item .context { font-size: 12px; color: var(--text3); margin-top: 2px; }
.welcome { text-align: center; padding-top: 120px; color: var(--text3); }
.welcome h2 { font-size: 24px; color: var(--text2); margin-bottom: 12px; }
.welcome p { line-height: 1.8; }
.shortcuts { display: flex; gap: 20px; justify-content: center; margin-top: 24px; }
.shortcut { font-size: 12px; color: var(--text3); }
.shortcut kbd { background: var(--bg3); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); }
.search-results .search-result { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; }
.search-results .search-result:hover { background: var(--hover); }
.search-results .title { font-weight: 600; }
.search-results .path { font-size: 11px; color: var(--text3); }
.search-results .snippet { font-size: 13px; color: var(--text2); margin-top: 4px; }
.search-results mark { background: var(--yellow); color: var(--bg); padding: 0 2px; border-radius: 2px; }
.btn-new { width: 100%; padding: 8px; margin-top: 10px; background: var(--bg3); border: 1px dashed var(--border); border-radius: 8px; color: var(--text3); cursor: pointer; font-size: 13px; }
.btn-new:hover { border-color: var(--accent); color: var(--accent); }
.editor-area { width: 100%; height: calc(100vh - 200px); background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.7; resize: none; outline: none; }
.editor-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.editor-bar select { background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
.editor-bar input { background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 4px 12px; border-radius: 6px; font-size: 13px; flex: 1; outline: none; }
.editor-bar input:focus { border-color: var(--accent); }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>📚 Smart Notes</h1>
    <input type="text" class="search-box" id="searchInput" placeholder="搜索笔记... (⌘K)">
    <button class="btn-new" onclick="newNote()">＋ 新建笔记</button>
  </div>
  <div class="nav-section" id="navSection"></div>
</div>
<div class="main">
  <div class="toolbar">
    <span id="breadcrumb" style="flex:1"></span>
    <button id="btnEdit" onclick="toggleEdit()" style="display:none">✏️ 编辑</button>
    <button id="btnDelete" onclick="deleteNote()" style="display:none;color:var(--red)">🗑️ 删除</button>
    <button id="btnNotes" class="active" onclick="switchView('notes')">📝 笔记</button>
    <button id="btnGraph" onclick="switchView('graph')">🕸️ 图谱</button>
  </div>
  <div id="contentArea"></div>
  <canvas id="graphCanvas" style="display:none; width:100%; height:100%;"></canvas>
</div>

<script>
const BUILTIN_NOTES = [{"name": "离散度", "path": "notes/concepts/离散度.md", "category": "concepts", "content": "# 离散度\n\n**定义：** 个股收益率的截面标准差，衡量市场中个股分化程度。\n\n**与超额的关系：** 离散度高 → 个股分化大 → 选股alpha空间大 → 量化超额容易做。离散度低 → 个股同涨同跌 → 选谁都差不多 → 超额收敛。\n\n**关键洞察：** 离散度不能单独看，必须和[[风格集中度]]交叉判断。高离散度+低集中度=最佳alpha环境；高离散度+高集中度=假象，alpha被风格beta吃掉。\n\n**相关讨论：**\n- [[2026-03-01_量化超额五因子框架]] — 离散度作为核心因子的定位\n- [[量化宽基超额环境]] — 在整体框架中的角色\n\n**数据来源：** Tushare 全A日线，计算截面std\n\n**标签：** #量化 #alpha环境 #核心概念\n"}, {"name": "风格集中度", "path": "notes/concepts/风格集中度.md", "category": "concepts", "content": "# 风格集中度\n\n**定义：** 市场收益被少数风格因子（大小盘、行业、动量等）解释的程度。用主成分分析（PCA）前N个主成分的解释方差比衡量。\n\n**与超额的关系：** 集中度高 → 市场被一两个风格主导（比如\"只涨大票\"）→ 量化多因子模型容易被单一风格碾压 → 超额难做。\n\n**Roni的洞察：** \"集中度和[[离散度]]是交互项，不能简单加权。\" 两者组合才有意义：\n- 高离散度 + 低集中度 = ✅ 最佳alpha环境\n- 高离散度 + 高集中度 = ⚠️ 假象，分化来自风格而非个股alpha\n- 低离散度 + 高集中度 = ❌ 最差环境\n- 低离散度 + 低集中度 = 😐 平淡，超额一般\n\n**相关讨论：**\n- [[2026-03-01_量化超额五因子框架]]\n- [[离散度]]\n\n**标签：** #量化 #alpha环境 #核心概念\n"}, {"name": "基差情绪", "path": "notes/concepts/基差情绪.md", "category": "concepts", "content": "# 基差情绪\n\n**定义：** 股指期货相对现货的升贴水幅度，反映市场对冲需求和情绪。\n\n**Roni的关键洞察（反直觉）：**\n> \"基差是结果变量不是原因。升水 = 情绪过热 + 大票虹吸 → 超额反而难做。\"\n\n这跟很多人的直觉相反 — 很多人以为升水=市场好=超额好做，但实际上：\n- **深贴水** → 对冲成本高，但alpha环境往往好（恐慌时个股分化大）\n- **升水** → 对冲有收益，但往往伴随风格极端集中（大票抱团）→ 超额反而收敛\n\n**使用方式：** 必须用历史分位数比较，绝对值没有意义。当前基差在过去一年的分位决定信号强弱。\n\n**在框架中的角色：** 修正项，不是核心驱动。先看[[离散度]]×[[风格集中度]]，再用基差情绪做修正。\n\n**相关讨论：**\n- [[2026-03-01_量化超额五因子框架]]\n- [[量化宽基超额环境]]\n\n**标签：** #量化 #alpha环境 #情绪指标\n"}, {"name": "情绪量化", "path": "notes/concepts/情绪量化.md", "category": "concepts", "content": "# 情绪量化\n\n**核心问题：** 市场情绪如何从\"感觉\"变成可计算的数字？\n\n**Roni提出的挑战：**\n在讨论[[强势股环境适配]]时，Roni指出：情绪是模糊的，怎么界定\"情绪高\"还是\"情绪低\"？就像量化交易一样，参数的边界在哪里？\n\n**当前方案（强势股模块）：**\n- 涨停家数、跌停家数、连板高度 → 量化赚钱效应\n- 全A成交额及其波动率（CV）→ 资金活跃度\n- 北向资金流向 → 外资情绪\n\n**未解决的问题：**\n- 情绪指标的阈值如何确定？固定阈值 vs 滚动分位数？\n- 不同市场环境下阈值是否需要自适应？\n- 当市场regime切换时，历史参数可能失效 → 这就是为什么要记录\"当时为什么这么设\"\n\n**Roni的担忧：**\n> \"可能有一天市场环境变了，我突然忘记了当时我们为什么会把参数设置成这样。\"\n→ 这正是这个知识库存在的意义。\n\n**相关讨论：**\n- [[强势股环境适配]]\n- [[2026-03-01_强势股模块讨论]]\n\n**标签：** #方法论 #情绪 #参数设计\n"}, {"name": "强势股环境适配", "path": "notes/concepts/强势股环境适配.md", "category": "concepts", "content": "# 强势股环境适配\n\n**用途：** 判断当前市场环境是否适合强势股/打板策略。\n\n**核心逻辑：** 强势股策略依赖赚钱效应和市场情绪，环境好时爆发力强，环境差时回撤也大。需要一个\"油门/刹车\"信号。\n\n**模块位置：** `env_fit/momentum_stock/`\n\n**数据构成：**\n- 涨跌停家数、连板高度 → 赚钱效应\n- 全A成交额 + CV → 资金活跃度和稳定性\n- 北向资金 → 外资情绪参考\n\n**关键讨论：**\n- [[情绪量化]] — Roni提出的核心问题：情绪指标的阈值怎么定？\n- 参数设计需要记录\"为什么\"，不只是\"是什么\"\n\n**设计决策记录：**\n- 成交额用20日均值+CV，而非简单均线 → 因为\"稳定放量 > 脉冲放量\"（Roni原话）\n\n**标签：** #策略环境 #强势股 #模块设计\n"}, {"name": "商品CTA PCA环境诊断", "path": "notes/concepts/商品CTA_PCA环境诊断.md", "category": "concepts", "content": "# 商品CTA PCA环境诊断\n\n> 2026-03-01 Roni × Eva 共创\n\n## 核心命题\n\n商品指数长期低夏普（熊长牛短），海外 hedge fund 主要用趋势跟踪做 CTA。传统方法用人为定义的指标（波动率+趋势占比+成交量比）评估 CTA 环境，PCA 方法让数据自己说话。\n\n## 为什么用 PCA\n\n对所有活跃期货品种的等权日收益率做主成分分析：\n\n- **PC1**（第一主成分）= 全市场共同运动方向，比等权指数更聪明——自动按解释力分配权重，不会被板块对冲抵消信号\n- **PC2**（第二主成分）= 与 PC1 正交的最大分化轴，通常对应板块对立（如工业品 vs 农产品、内需 vs 外需）\n\n## 关键指标\n\n| 指标 | 含义 | CTA 环境判读 |\n|------|------|-------------|\n| PC1 方差解释比 | 品种共振程度 | 高(>35%)=趋势环境好，低(<20%)=震荡 |\n| PC2 方差解释比 | 市场内部分化程度 | 高=两阵营对抗 |\n| PC1+PC2 联合 | 市场结构清晰度 | 合计>50%=结构清晰 |\n| PC1 累计值 | 动量 vs 反转 | 持续同方向=动量主导，频繁翻转=反转主导 |\n\n## 环境类型四象限\n\n- **PC1高 + PC2低** → 单一趋势主导（最好的 CTA 环境）\n- **PC1高 + PC2高** → 双阵营对抗（板块轮动，方向型 CTA 难做但多空 CTA 能做）\n- **PC1低 + PC2低** → 全市场震荡（最差环境）\n- **PC1低 + PC2高** → 个别板块独立行情\n\n## 比传统 CTA 友好度好在哪\n\n| | 传统（mod1） | PCA（mod1b） |\n|---|---|---|\n| 权重 | 人为定义 0.4/0.3/0.3 | 数据驱动，自适应 |\n| 趋势定义 | 规则判定（MA斜率>0.5%算趋势） | 协方差结构，品种共振自然涌现 |\n| 板块对冲 | 不处理 | PC1 能识别\"方向不同但波动同步放大\" |\n| 因果链 | 波动率×趋势占比×成交量比（间接） | 方差解释比=共振强度=趋势跟踪盈利条件（直接） |\n\n## PCA Loading 增强品种扫描\n\n- PC1 loading 高的品种 = **驱动全市场节奏的主力**（谁在带节奏）\n- PC2 loading 高的品种 = **市场分化的旗手**（谁在对抗）\n- 板块一致性 = 同板块品种 loading 的标准差，越小越一致\n- 分化轴 = PC2 正向 vs 负向最大的板块\n\n## 实现细节\n\n- 滚动窗口：60 个交易日\n- 品种池：日均成交额 > 500 万的活跃连续合约（约 58 个）\n- PCA 方法：协方差矩阵 + 幂迭代法（纯 Python，无 numpy 依赖）\n- 数据源：`fut_daily.csv`（现有 commodity_data.py 生成，无需新数据）\n\n## 文件\n\n| 文件 | 说明 |\n|------|------|\n| `mod1b_pca_engine.py` | PCA 核心引擎：滚动 PCA + 环境类型 + 友好度 |\n| `mod2b_pca_loading.py` | Loading 增强扫描：品种角色 + 板块一致性 + 分化轴 |\n| `mod1b_pca_engine.json` | mod1b 输出（滚动时序 + 最新 loading 快照） |\n| `mod2b_pca_loading.json` | mod2b 输出（增强品种分析 + 板块聚合） |\n\n## Roni 的投研洞察\n\n- 商品指数长期低夏普，趋势跟踪是主流策略 → PCA 方差解释比直接对应趋势跟踪盈利条件\n- 保留原 mod1/mod2 作为可折叠参考（涨跌幅更直观），新 PCA 模块作为主角\n- 从数学角度 PCA 更好解释量化 CTA 环境，从直觉角度保留涨跌幅版本辅助理解\n"}, {"name": "CTA波动率因子与归因", "path": "notes/concepts/CTA波动率因子与归因.md", "category": "concepts", "content": "# CTA趋势策略的波动率因子\n\n**日期：** 2026-03-01\n**标签：** #CTA #波动率 #归因 #因子模型\n**关联：** [[商品CTA_PCA环境诊断]]\n\n---\n\n## 核心洞察\n\nCTA趋势跟踪策略的盈利公式本质上是：\n\n**收益 ≈ 波动率 × 趋势持续性 × 仓位**\n\nPCA方差解释比衡量的是\"趋势持续性\"（品种共振强度），但遗漏了\"波动率水平\"这个关键乘数：\n- 高波动 + 趋势 = 暴利（信号幅度大，止盈空间充裕）\n- 低波动 + 趋势 = 微利（信号淹没在噪音中，手续费吃掉利润）\n- PCA看不出这个差别 — 两种情况PC1解释比可能一样高\n\n## PCA为什么不能单独解释CTA涨幅\n\n从实测数据看：\n- PCA友好度 vs 产品超额收益的R² = 0.039（只解释约4%）\n- 加入波动率后综合R²仍然很低，但原因是**数据覆盖太短**（PCA仅覆盖92/275天）\n- 随着数据积累，环境因子的解释力会逐步上升\n\n## PCA无法覆盖的其他维度\n\n1. **回撤路径 / 趋势线性度**\n   - 同样涨10%，一路涨和涨15%再回吐5%，对趋势策略的损耗完全不同\n   - 可以用PC1得分序列的自相关来补充\n\n2. **管理人择时频率**\n   - 中短周期CTA换手率远高于长周期\n   - 震荡市频繁止损是亏损主要来源\n   - PCA只说\"环境差\"，不说\"差到什么程度触发多少止损\"\n\n3. **期限结构 / carry**（需要新数据）\n   - Back结构=空头有carry收益，Contango=多头有carry成本\n   - 这是趋势策略的隐性收益/成本来源\n\n## 波动率因子的实现\n\n- 从现有 `fut_daily.csv` 直接计算，不需要新数据源\n- 全市场等权平均20日年化波动率\n- 120日历史分位数做regime分类\n- 作为第二个环境因子与PCA友好度一起做两步OLS回归\n\n## Roni的关注点\n\nRoni问\"PCA能否解释涨幅\" — 这说明他在思考因子的**充分性**，不只是必要性。好的FOF分析应该能回答\"为什么这段时间产品赚钱/亏钱\"，单一因子不够。\n\n---\n\n*波动率是趋势策略的放大器，PCA是方向的过滤器。两者缺一不可。*\n"}, {"name": "2026-03-01 量化超额五因子框架", "path": "notes/sessions/2026-03-01_量化超额五因子框架.md", "category": "sessions", "content": "# 2026-03-01 量化超额五因子框架\n\n**日期：** 2026年3月1日\n**主题：** 量化宽基超额环境诊断框架设计\n**背景：** 从\"看板基础模块搭建\"进入\"模块间逻辑串联\"阶段\n\n---\n\n## 对话过程\n\n### 起点\nEva提出量化超额环境的多因子方案，初版是平行加权。\n\n### Roni的关键修正\n1. **\"基差是结果不是原因\"** — 推翻了基差作为核心驱动的定位，降级为修正项\n2. **\"升水时超额反而难做\"** — 反直觉洞察，因为升水往往伴随大票虹吸\n3. **\"离散度和集中度是交互项\"** — 不能简单加权，必须看组合\n4. **\"稳定放量 > 脉冲放量，用CV衡量\"** — 流动性的质量比数量重要\n\n### 最终框架\n**5因子嵌套结构：**\n```\n流动性(前提条件)\n  → 离散度 × 风格集中度(交互项，核心)\n    → 基差情绪(修正)\n      → 微观结构(尾部风险)\n```\n\n不是平行打分，而是层级嵌套 — 流动性不达标则直接降级。\n\n### 为什么这么设计\n- 流动性是前提：量不够的时候，其他因子再好也没用（滑点吃掉alpha）\n- 离散度×集中度是核心：这决定了alpha的\"可获取性\"\n- 基差是温度计不是发动机：告诉你市场多热，但热不等于好\n- 微观结构兜底：极端拥挤/踩踏时一票否决\n\n## 关联概念\n- [[离散度]]\n- [[风格集中度]]\n- [[基差情绪]]\n- [[量化宽基超额环境]]\n\n**标签：** #会话记录 #量化 #框架设计 #2026-03\n"}, {"name": "2026-03-01 强势股模块讨论", "path": "notes/sessions/2026-03-01_强势股模块讨论.md", "category": "sessions", "content": "# 2026-03-01 强势股模块讨论\n\n**日期：** 2026年3月1日\n**主题：** 强势股环境适配模块的情绪量化问题\n\n---\n\n## 对话过程\n\n### Eva的方案\n用涨跌停家数、连板高度、成交额等指标构建情绪评分。\n\n### Roni的挑战\n> \"情绪量化怎么界定？就像量化交易一样，参数的边界在哪里？\"\n\n核心问题：\n- 什么算\"情绪高\"？涨停50家算高还是100家算高？\n- 阈值是固定的还是应该随市场regime变化？\n- 如果未来市场结构变了（比如注册制扩容后涨停家数基准变了），现在设的参数还有没有意义？\n\n### 暂时的解决思路\n- 用滚动分位数而非固定阈值（自适应）\n- 记录每个参数\"为什么这么设\" → 市场变化时有据可查\n- 这个问题没有完全解决，是一个持续思考的方向\n\n## 核心教训\n**参数设计必须留痕。** 不是记住参数是多少，而是记住\"当时为什么选这个值\"。市场会变，参数会调，但决策逻辑应该可追溯。\n\n## 关联\n- [[情绪量化]]\n- [[强势股环境适配]]\n\n**标签：** #会话记录 #强势股 #方法论 #2026-03\n"}, {"name": "2026-03-01 商品CTA PCA模块讨论", "path": "notes/sessions/2026-03-01_商品CTA_PCA模块讨论.md", "category": "sessions", "content": "# 2026-03-01 商品CTA PCA模块讨论\n\n> 参与者：Roni × Eva\n\n## 讨论要点\n\n1. **Roni 提出用 PCA 替代传统 CTA 环境指标**\n   - 起因：认为商品指数长期低夏普、熊长牛短，海外 hedge fund 用趋势跟踪\n   - 问题：对所有活跃品种的等权日收益率做 PCA，能否代表商品市场的动量或反转？\n\n2. **Eva 分析 PCA 在 CTA 语境下的适用性**\n   - PC1 方差解释比 = 品种共振强度 = CTA 趋势跟踪盈利的直接条件\n   - PC1+PC2 联合看：单一趋势 vs 双阵营对抗 vs 全市场震荡\n   - 比传统 mod1（固定权重加权）更客观，因果链更干净\n\n3. **架构决策：新老并存，折叠展示**\n   - 原 mod1（CTA友好度）→ 可折叠，默认收起\n   - 原 mod2（品种趋势扫描）→ 可折叠，默认收起\n   - 新 mod1b（PCA核心引擎）→ 默认展开，主角\n   - 新 mod2b（PCA Loading增强）→ 默认展开，主角\n   - mod3 宏观比价不动\n\n4. **Roni 的关键判断**\n   - \"涨跌幅我更好理解所以保留，但从数学角度新模块更好解释量化 CTA 环境\"\n   - 保留旧模块是为了直觉辅助，新模块是定量主角\n\n## 产出\n\n- `mod1b_pca_engine.py` — 滚动PCA + 环境类型 + 友好度\n- `mod2b_pca_loading.py` — Loading增强品种扫描 + 板块一致性\n- 知识库笔记：`concepts/商品CTA_PCA环境诊断.md`\n\n## 首次运行结果（2026-02-27数据）\n\n- PC1 解释比 29.3%（温和趋势）\n- PC2 解释比 9.5%（分化不严重）\n- 分化轴：黑色系 vs 能源化工\n- PCA友好度 40.8（中等偏低）\n- 能源化工板块 loading 最高，驱动市场节奏\n- 贵金属一致性最高（0.96）\n"}, {"name": "2026-03-01 CTA归因与波动率讨论", "path": "notes/sessions/2026-03-01_CTA归因与波动率讨论.md", "category": "sessions", "content": "# CTA产品归因与波动率讨论\n\n**日期：** 2026-03-01\n**标签：** #CTA #归因 #波动率 #PCA #讨论\n**关联：** [[CTA波动率因子与归因]] [[商品CTA_PCA环境诊断]]\n\n---\n\n## 背景\n\n完成PCA模块后，Roni要求做CTA产品的收益归因（参照强势股板块已有的归因框架），基准为南华商品指数。\n\n## 关键发现\n\n### Beta几乎为零是正确的\n- 产品 vs 南华商品相关系数 = 0.10，β ≈ 0.01\n- 这完全合理：量化中短周期趋势CTA做多空择时，不是商品多头\n- Beta贡献仅+0.93%，说明产品收益几乎不来自\"商品涨了\"\n\n### PCA单因子解释力不足\n- R² = 0.039，只能解释约4%的超额收益变动\n- 原因：PCA只抓了\"趋势持续性\"，没抓\"波动率水平\"\n- Eva提出：**收益 ≈ 波动率 × 趋势持续性 × 仓位**，PCA只是其中一项\n\n### 波动率因子补充\n- Roni决定加入全市场平均波动率作为第二环境因子\n- 波动率R² = 0.005（更弱），但方向正确\n- 目前数据覆盖太短（PCA仅92天），解释力会随积累提升\n\n## Roni的思维方式\n\nRoni在问\"PCA能否解释涨幅\"时，本质上是在质疑因子的**充分性** — 作为FOF，他需要能向投资人解释\"为什么这段时间赚了/亏了\"。这是从评估维度升级到归因维度的思考。\n\n## 技术决策\n\n- 4因子归因：Beta + PCA环境 + 波动率环境 + Alpha\n- 前端布局：产品净值图 → 归因拆解 → 波动率独立图 → PCA走势\n- 格式参照强势股板块（Roni明确要求）\n\n---\n\n*从\"环境好不好\"到\"产品为什么赚钱\"，是FOF分析的自然进化。*\n"}, {"name": "2026-03-04 MEME化趋势与完整监控系统", "path": "notes/sessions/2026-03-04_MEME化趋势与完整监控系统.md", "category": "sessions", "content": "# MEME化趋势与完整监控系统\n\n**日期：** 2026-03-04  \n**类型：** 投研框架设计  \n**状态：** 设计阶段\n\n---\n\n## 背景：新世界投资范式\n\n### 核心命题\n\n资产定价正在经历结构性转变：\n- **短期**：资产越来越成为\"博弈符号\"，由宏大叙事主导，远离基本面\n- **周期压缩**：过去10年一轮的周期，现在2-3年就走完3-4轮mini-cycle\n- **新世界≠更多MEME**：而是\"周期压缩+叙事统治路径\"的系统性变化\n\n### 三大驱动力\n\n1. **叙事带宽爆炸**\n   - LLM+社交媒体，信息生产成本→0\n   - Meta-叙事可在几小时内全球同步\n   - 信息半衰期极短\n\n2. **衍生品杠杆**\n   - 0DTE/短期期权/杠杆ETF\n   - 把\"情绪→仓位→价格\"封成高频闭环\n   - 保证金调整强制reset\n\n3. **被动资金**\n   - ETF+CTA/vol-target\n   - \"价格→权重→被动买卖\"共振强度远超10年前\n\n### 典型案例\n\n**黄金/白银：**\n- 黄金3年涨2.5倍+87%，2026年初突破$5540\n- 不是缓慢爬坡，而是3年内塞进3-4段20-40%冲击\n- 白银gold/silver ratio从120→48，只用9个月\n\n**内存HBM/DRAM：**\n- Micron 8个月涨330%（$61.54→$264.75）\n- DRAM价格2个月涨60%\n- 不到1年：周期底部→价格暴涨→CapEx冲顶→担忧oversupply\n\n---\n\n## 当前叙事监控系统的不足\n\n### 已有能力\n- 每天4次自动拉取2912条新闻\n- 8条宏大叙事的热度评分（0-10）\n- 情绪判断（利好/利空/中性）\n- 推送到飞书\n\n### 核心问题：只监控\"叙事\"一个维度\n\n文章强调的是**\"叙事→价格→仓位→叙事\"的反身性闭环**，但当前系统：\n\n1. **只看叙事热度，看不到是否price in**\n   - 地缘风险10分，但黄金可能已涨30%，处于历史95%分位\n   - 无法判断\"叙事过热\"还是\"刚开始\"\n\n2. **只看新闻，看不到交易结构**\n   - 没监控期权持仓、杠杆水平、ETF流向\n   - 看不到\"什么时候会强制reset\"\n\n3. **只看输入，看不到供给响应**\n   - 没监控CapEx、产能、库存、央行购金\n   - 看不到\"反身性的下一步\"\n\n4. **只有快照，看不到周期定位**\n   - 不知道\"当前处于哪个mini-cycle的哪个阶段\"\n   - 看不到\"拐点什么时候来\"\n\n---\n\n## 完整的5维监控框架\n\n| 维度 | 监控内容 | 作用 | 数据源 |\n|------|---------|------|--------|\n| **1. 叙事热度** | 新闻数量、关键词、情绪 | 输入端：叙事升温/降温 | Tushare新闻（已有） |\n| **2. 资产价格** | 价格、涨跌幅、历史分位数 | 判断是否price in | iFind/Tushare（待接入） |\n| **3. 交易结构** | 期权PCR/IV、杠杆、ETF流向 | 放大器：传导效率 | 期权数据/ETF流向（待接入） |\n| **4. 供给响应** | CapEx、产能、库存、央行购金 | 反身性：下轮拐点 | 公司财报/宏观数据（待接入） |\n| **5. 周期定位** | 当前处于mini-cycle哪个阶段 | 决策框架：买/卖/等 | 综合1-4维度判断 |\n\n### 示例：地缘风险→黄金\n\n- **维度1**：叙事10分（伊朗攻击以色列）✅\n- **维度2**：黄金$5540，历史98%分位 → **可能过热**\n- **维度3**：黄金ETF单周流入$2B，期权IV30% → **FOMO加速**\n- **维度4**：央行购金放缓，矿企产量Q1增5% → **供给开始响应**\n- **维度5**：判断处于\"冲顶阶段\"，接近\"强制reset\"拐点\n\n**结论**：叙事10分，但应该减仓而非加仓\n\n---\n\n## 优先实现：1-2-3框架\n\n基于讨论，优先实现3个核心维度：\n\n### 1. 叙事演化路径\n\n**核心问题**：同一个底层逻辑，叙事会\"换皮\"\n\n**示例**：黄金超级周期\n- 通胀hedge → 去美元化 → 地缘避险 → 货币贬值 → 主权债务危机\n- 这些是同一逻辑的不同表达\n\n**实现方案**：\n- 手动定义演化图谱（`narrative_evolution.json`）\n- 用LLM分析新闻关键词，识别当前阶段\n- 预测下一阶段和换皮时机\n\n**输出**：\n- 从\"地缘风险10分\"\n- 变成\"地缘风险10分（地缘避险阶段，持续2周，预计换皮到货币贬值）\"\n\n### 2. 叙事生命周期\n\n**核心问题**：判断叙事处于哪个阶段\n\n**6个阶段**：\n1. **萌芽期**：新闻<50条，情绪中性，价格未动\n2. **升温期**：新闻50-150条，情绪偏正，价格开始涨\n3. **狂热期**：新闻>150条，情绪极度乐观，价格暴涨，ETF大量流入\n4. **质疑期**：新闻回落，出现\"泡沫\"\"过热\"关键词，价格高位震荡\n5. **衰退期**：新闻<50条，情绪悲观，价格回调15-30%\n6. **换皮期**：同一逻辑，新的叙事表达\n\n**实现方案**：\n- 定义判断标准（`lifecycle_model.json`）\n- 综合新闻数量、情绪、价格、资金流\n- 输出当前阶段+持续时间+下一阶段预测\n\n**关键依赖**：需要接入价格数据和ETF流向\n\n### 3. 跨资产传导链\n\n**核心问题**：叙事如何沿产业链传导\n\n**示例**：AI CapEx\n- **一级受益**（0-1周）：NVDA、TSMC、ASML\n- **二级受益**（1-4周）：Micron、SK Hynix、HBM\n- **三级受益**（4-12周）：电力设备、散热、铜、稀土\n\n**实现方案**：\n- 定义传导图谱（`transmission_chain.json`）\n- 监控各级资产的价格表现\n- 识别传导效率和机会\n\n**输出**：\n- \"AI CapEx叙事10分\"\n- \"一级资产NVDA已涨50%（过热）\"\n- \"二级资产Micron涨20%（跟涨中）\"\n- \"三级资产铜未动（机会）\"\n- **建议**：一级减仓，二级持有，三级关注\n\n---\n\n## 已创建的配置文件\n\n**位置**：`~/Desktop/gamt-dashboard/daily_report/meme交易/`\n\n1. **narrative_evolution.json** (1.9K)\n   - 黄金超级周期：通胀hedge → 去美元化 → 地缘避险 → 货币贬值\n   - AI超级周期：CapEx狂热 → 应用落地 → 产能过剩担忧 → 结构分化\n\n2. **lifecycle_model.json** (2.0K)\n   - 6个生命周期阶段的判断标准\n   - 新闻数量、情绪、价格、资金流的阈值\n\n3. **transmission_chain.json** (3.1K)\n   - 8条叙事的传导链定义\n   - 一级/二级/三级受益资产\n   - 传导时滞和弹性系数\n\n---\n\n## 下一步实现路径\n\n### Phase 1：叙事演化分析（立即可做）\n- 修改 `narrative_monitor.py`\n- 读取 `narrative_evolution.json`\n- 用LLM分析新闻关键词，识别当前演化阶段\n- **优势**：只需新闻数据，无需价格数据\n\n### Phase 2：价格数据接入（本周）\n- 接入iFind/Tushare价格数据\n- 接入ETF流向数据（可选）\n- 为生命周期和传导链分析做准备\n\n### Phase 3：生命周期判断（下周）\n- 实现生命周期判断逻辑\n- 综合新闻、价格、资金流\n- 生成生命周期预警\n\n### Phase 4：传导链分析（第3周）\n- 实现传导链监控\n- 识别传导效率和机会\n- 生成交易建议\n\n### Phase 5：完整5维系统（第4周+）\n- 补充交易结构监控（期权、杠杆）\n- 补充供给响应监控（CapEx、产能）\n- 实现周期定位和拐点预测\n\n---\n\n## 关键洞察\n\n1. **不是\"更多MEME\"，而是\"周期压缩\"**\n   - 同一个3-5年逻辑里，经历3-5轮mini-cycle\n   - 应对好→资金效率飞跃\n   - 应对不好→被磨成\"手续费+行为亏损机器\"\n\n2. **叙事会\"换皮\"，但底层逻辑不变**\n   - 黄金：通胀→去美元→地缘→货币贬值\n   - 识别演化路径，才能提前布局下一阶段\n\n3. **传导链有时滞，是alpha来源**\n   - 一级资产过热时，二级/三级可能刚启动\n   - 监控传导效率，捕捉结构性机会\n\n4. **完整系统=监控+预测**\n   - 不只是\"地缘风险10分\"\n   - 而是\"处于狂热期，1-2周后进入质疑期，建议减仓\"\n\n---\n\n**相关文件**：\n- `~/Desktop/gamt-dashboard/daily_report/meme交易/narrative_monitor.py`\n- `~/Desktop/gamt-dashboard/daily_report/meme交易/narrative_evolution.json`\n- `~/Desktop/gamt-dashboard/daily_report/meme交易/lifecycle_model.json`\n- `~/Desktop/gamt-dashboard/daily_report/meme交易/transmission_chain.json`\n"}, {"name": "五因子嵌套而非平行", "path": "notes/decisions/2026-03-01_五因子嵌套而非平行.md", "category": "decisions", "content": "# 决策：五因子用嵌套结构而非平行加权\n\n**日期：** 2026-03-01\n**模块：** 量化宽基超额环境（`env_fit/quant_stock/`）\n\n---\n\n## 决策内容\n量化超额环境的5个因子采用**嵌套层级**结构，而非传统的平行加权打分。\n\n## 备选方案\n1. ~~平行加权~~ — 5因子各打分，加权平均 → 被否决\n2. ✅ 嵌套层级 — 流动性→离散度×集中度→基差→微观\n\n## 为什么选嵌套\n**Roni的逻辑：**\n- 因子之间不是独立的，有前提条件关系\n- 流动性不够时，离散度再高也没用（你选到了alpha股但买不进去）\n- 离散度和集中度必须交叉看，不能分开打分\n- 平行加权会掩盖\"一票否决\"型风险\n\n**类比：** 就像体检，不是每项指标平均分高就健康。血压200，其他再好也得住院。\n\n## 影响\n- `quant_stock_data.py` 的计算逻辑按嵌套设计\n- 前端展示不是简单的总分，而是层级判断树\n- 设计文档：`README_design.md`\n\n## 关联\n- [[2026-03-01_量化超额五因子框架]]\n- [[离散度]]\n- [[风格集中度]]\n\n**标签：** #决策 #量化 #架构选择\n"}, {"name": "2026-03-05 叙事监控系统升级·价格背离检测", "path": "notes/sessions/2026-03-05_叙事监控系统升级-价格背离检测.md", "category": "sessions", "content": "# 叙事监控系统升级：价格背离检测\n\n**日期：** 2026-03-05  \n**类型：** 系统开发 + 投研框架  \n**状态：** 价格层已上线，生命周期阶段待升级\n\n---\n\n## 核心思路\n\n叙事监控系统的本质不是\"监控仪表盘\"，而应该是**叙事生命周期预测引擎**。\n\n需要回答3个问题：\n\n| # | 问题 | 状态 |\n|---|------|------|\n| 1 | 这条叙事现在在哪个阶段？（萌芽/狂热/衰退/换皮） | 🟡有雏形，逻辑待升级 |\n| 2 | 价格有没有跟上来？ | ✅今日上线 |\n| 3 | 下一步会发生什么？（换皮方向 + 传导链） | ❌待做 |\n\n---\n\n## 问题2：叙事-价格背离检测（今日完成）\n\n### 设计逻辑\n\n```\n叙事热度高 + 关联资产价格没动 → 💡叙事未price in（潜在机会）\n叙事热度高 + 关联资产1W已大涨 → ⚠️追顶风险\n叙事热度中 + 关联资产1M已大涨 → 🔔注意叙事衰退\n```\n\n### 实现细节\n\n**文件：** `~/Desktop/gamt-dashboard/daily_report/meme交易/narrative_monitor.py`\n\n**新增函数：**\n- `fetch_asset_prices()` — 用 yfinance 拉取9个资产的1D/1W/1M涨跌幅\n- `get_divergence_signal()` — 3条背离规则\n\n**叙事-资产映射（NARRATIVE_PRICE_MAP）：**\n\n| 叙事 | 监控资产 |\n|------|---------|\n| AI CapEx | QQQ纳指ETF / 英伟达 / 铜(HG=F) |\n| 去美元化 | 黄金(GC=F) / BTC |\n| 全球再武装 | 黄金 / 原油(CL=F) |\n| 财政主导 | 黄金 / 美债20Y(TLT) |\n| 地缘风险 | 黄金 / 原油 |\n| 美国衰退 | 黄金 / QQQ |\n| 中国刺激 | 恒生科技ETF(3033.HK) / 沪深300 |\n| 通胀预期 | 黄金 / 铜 |\n\n**技术坑：**\n- yfinance 新版下载单 ticker 时 `Close` 是 MultiIndex DataFrame，需要 `.squeeze()` 才能转成 Series\n- yfinance 直连（不走代理）；沪深300 走 Tushare HTTP API\n\n### 今日读数（2026-03-05 10:34）\n\n| 叙事 | 叙事分 | 关键信号 |\n|------|--------|---------|\n| 地缘风险 | 10/10 | 💡黄金1W仅-0.2%，叙事未price in |\n| 地缘风险 | 10/10 | ⚠️原油1W已+18.1%，追顶风险 |\n| 去美元化 | 5/10 | BTC 1W+10.3%（BTC先于叙事动了） |\n| 中国刺激 | 6/10 | 恒生科技ETF 1W-7.0%（叙事与价格背离，两会）|\n\n---\n\n## 问题1：叙事生命周期阶段判断（待升级）\n\n### 当前版本的不足\n\n`get_lifecycle()` 只看7天评分曲线形状（连续上升/高位平稳），没有：\n- 历史分位（这条叙事在过去60天的相对强度）\n- 价格联动（叙事热时价格有没有同步）\n- 持续时长（这条叙事热了多少天）\n\n### 升级方案\n\n```\n叙事阶段 =\n  评分曲线形状（近7天）\n  + 历史分位（当前分 vs 过去60天分布）\n  + 价格是否跟上\n  + 持续时长\n\n萌芽：分位<40% + 快速上升 + 价格未动\n狂热：分位>80% + 持续≥5天 + 价格同步大涨\n饱和：分位>80% + 持续≥10天 + 价格涨幅趋缓\n衰退：从高位下降 + 价格开始回落\n换皮：分数降但传导链二级资产开始动\n```\n\n---\n\n## 问题3：下一步预测（待做）\n\n### 已有配置文件\n\n- `narrative_evolution.json` — 叙事换皮路径（e.g. 黄金：通胀hedge→去美元化→地缘避险→货币贬值）\n- `transmission_chain.json` — 跨资产传导链（一级0-1周 / 二级1-4周 / 三级4-12周）\n\n### 实现思路\n\n当叙事处于**饱和/衰退期**时，自动查找 `narrative_evolution.json` 中的下一阶段，并从 `transmission_chain.json` 找出尚未price in的二级/三级资产，作为\"换皮机会\"推送。\n\n---\n\n## 今日叙事监控早报（08:32）\n\n扫描2396条新闻：\n- 🔴 全球再武装 10/10↑（以色列黑进德黑兰摄像头）\n- 🔴 地缘风险 10/10（伊朗媒体：未向美国发送任何信息）\n- 🟠 去美元化 7/10↑（较昨天4分上升，博通CEO千亿预言）\n- 🟠 通胀预期 7/10\n- 🟡 AI CapEx 6/10\n- 🟡 中国刺激 5/10（两会第一天，量子手机冲热搜）\n- 🟢 财政主导 3/10\n- 🟢 美国衰退 1/10\n"}, {"name": "叙事-价格背离检测", "path": "notes/concepts/叙事-价格背离检测.md", "category": "concepts", "content": "# 叙事-价格背离检测\n\n**核心逻辑：** 叙事热度和资产价格不同步时，存在套利窗口\n\n---\n\n## 三种信号\n\n| 信号 | 条件 | 含义 | 操作方向 |\n|------|------|------|---------|\n| 💡 未price in | 叙事分≥7 + 关联资产1W涨幅<1% | 市场还没反应，窗口期 | 考虑建仓 |\n| ⚠️ 追顶风险 | 叙事分≥7 + 关联资产1W涨幅≥8% | 价格已充分反映甚至透支 | 避免追涨 |\n| 🔔 注意衰退 | 叙事分≥6 + 关联资产1M涨幅≥15% | 叙事近月已deep in，警惕换皮 | 逐步减仓 |\n\n---\n\n## 背后原理\n\n叙事和价格存在时滞，原因：\n\n1. **传播时差**：新闻出来 → 分析师解读 → 大资金建仓，需要时间\n2. **认知惰性**：市场参与者需要反复看到同一叙事才会行动\n3. **仓位约束**：基金有调仓流程，不能即时反应\n\n**因此：叙事先动，价格后动——或者价格先动，叙事跟上**\n\n两种异常情形值得关注：\n- 叙事热 + 价格没动 → 价格补涨机会\n- 价格先动 + 叙事滞后 → 可能是资金已嗅到变化，叙事是滞后确认\n\n---\n\n## 局限性\n\n- 叙事评分基于关键词匹配，可能把\"反转叙事\"（如\"地缘风险降温\"）也算进去\n- 1W涨跌幅有噪音，单周波动可能是技术性调整，不一定是价格未反应叙事\n- 部分叙事资产不唯一（地缘风险→黄金&原油，可能黄金未动但原油已大涨）\n\n---\n\n## 代码位置\n\n`~/Desktop/gamt-dashboard/daily_report/meme交易/narrative_monitor.py`\n\n函数：`fetch_asset_prices()` + `get_divergence_signal()`\n"}, {"name": "2026-03-05 宏观Meme叙事生命周期框架", "path": "notes/sessions/2026-03-05_宏观Meme叙事生命周期框架.md", "category": "sessions", "content": "# 宏观 Meme 叙事生命周期框架\n\n**日期：** 2026-03-05  \n**来源：** Roni × Eva 对话\n\n---\n\n## 核心定义厘清\n\n### 这个系统实际在做什么\n\n**本质：舆情频次 → 事件热度时序表**\n\n```\n每天拉财经新闻\n    ↓\n统计每个主题词出现频次\n    ↓\n频次高 = 热度高 = 打分高\n    ↓\n每天记录一次 → 形成时序热度表\n```\n\n\"叙事得分7/10\" 的真实含义：**今天这个主题在财经信息里出现密度很高**。\n\n---\n\n## 题材交易 vs 宏观 Meme 交易\n\n| 维度 | 题材交易 | 宏观 Meme 交易 |\n|------|---------|--------------|\n| 时间尺度 | 1–5天 | 数周到数月 |\n| 信号特征 | 短促尖峰，快速衰减 | 缓慢积累，持续高位 |\n| 核心问题 | 今天爆了什么？ | 这个叙事是否正在成为共识？ |\n| 机会判断 | 抢在新闻消化前进入 | 抢在市场完全定价前配置 |\n| 事件波适用性 | ✅ 完全适用 | ❌ 时间尺度太短 |\n\n> Roni 原话：\"事件波不是不能做，事件波更短线了，不适合宏观Meme交易，更偏向题材交易。\"\n\n---\n\n## 宏观 Meme 生命周期四阶段\n\n每个阶段的判断维度：\n1. **历史分位** — 当前热度在自身历史中的位置（高=成熟，低=新兴）\n2. **动量** — MA7斜率（上升=早期/积累，下降=消退）\n3. **持续时长** — 连续活跃天数（短=新兴，长=成熟/共识）\n4. **价格确认** — 叙事热但价格未动=机会窗口；价格已动=共识化\n\n```\n🌱 新兴  → 热度从低位升起，市场尚未定价，最大配置窗口\n🔥 积累  → 持续升温，价格开始跟随，窗口收窄中  \n⚡ 共识  → 高位稳定，已成市场共识，慎追\n📉 消退  → 热度下行，叙事衰退，关注反向机会\n```\n\n**关键判断：新兴叙事 vs 共识叙事**  \n一旦成为共识 → 对应资产已充分定价 → 宏观 Meme 交易窗口关闭\n\n---\n\n## 资产映射逻辑\n\n因为都是财经信息，每个叙事天然对应一套资产涨跌预期：\n\n| 叙事主题 | 对应资产 | 方向 |\n|--------|---------|------|\n| 地缘风险↑ | 黄金、原油、国防股 | 涨 |\n| 中国刺激↑ | A股、港股、铜、铁矿 | 涨 |\n| 去美元化↑ | 黄金、BTC | 涨 |\n| 美国衰退↑ | 美债、黄金 | 涨；美股 跌 |\n| AI CapEx↑ | 纳指、半导体ETF、铜 | 涨 |\n| 全球再武装↑ | 军工ETF、稀有金属 | 涨 |\n\n---\n\n## 完整系统架构（三层）\n\n```\nLayer 1: 舆情热度层\n  narrative_monitor.py → 每日得分 + narrative_history.json\n\nLayer 2: 价格背离检测层  \n  get_divergence_signal() → 叙事热但价格未动 = 机会信号\n\nLayer 3: 宏观生命周期层（本次新增）\n  macro_lifecycle.py → 多周趋势 → 阶段判断 → 配置建议\n```\n\n---\n\n## 实现\n\n**文件路径：** `~/Desktop/gamt-dashboard/meme/macro_lifecycle.py`  \n**数据来源：** `daily_report/meme交易/cache/narrative_history.json`  \n**输出：** `meme/lifecycle_output.json` + 控制台报告  \n**注意：** 数据积累 ≥ 14 天后判断才有参考价值（目前仅2天历史）\n"}, {"name": "2026-03-05 高盛HALO策略观察框架", "path": "notes/sessions/2026-03-05_高盛HALO策略观察框架.md", "category": "sessions", "content": "# 高盛 HALO 策略观察框架\n\n**日期：** 2026-03-05  \n**来源：** 高盛研究报告 + Roni 提炼  \n**主题：** 从\"轻资产、高扩张\"向\"重资产、低淘汰风险\"的资产定价范式转移\n\n---\n\n## 核心逻辑链\n\n```\nAI算力/能源物理约束 + 地缘碎片化\n        ↓\n超大规模 CapEx 史诗级扩张 → 重资产受益\n        ↓\n重资产 EPS 反转（2026年预期+14%，十年来首次反超轻资产）\n        ↓\n历史20%估值折价已完全收敛 → 下一阶段靠盈利兑现驱动\n```\n\n**关键数据：**\n- 2026年重资产 EPS 增速预期 +14%，十年来首次反超轻资产\n- 历史上重资产 vs 轻资产长期存在 20% 估值折价 → 现已收敛至零\n- 超大规模科技企业 2026 年单年 CapEx > 2022 年前 50 年累计投入\n\n---\n\n## 三条主线 + 观察指标\n\n### ① AI 能耗主线\n\n**关注标的：** Constellation Energy / GE Vernova / 伊顿 / NextEra Energy  \n**逻辑：** AI 算力爆发引发电力物理短缺，公用事业承接巨头史诗级 CapEx\n\n| 观察点 | 频率 | 看什么 |\n|--------|------|--------|\n| 超大规模科技 CapEx | 季报 | 微软/亚马逊/谷歌/Meta 资本支出增速，**二阶导是否拐头** |\n| 电网容量申请队列 | 季度 | PJM/MISO 数据中心接入申请量 |\n| 公用事业订单积压 | 财报 | CEG/GEV 签约电力合同量 |\n| 天然气 + 电价 | 周度 | Henry Hub / 区域电价走势 |\n\n**失效信号：** 科技巨头单季 CapEx 增速转负，或数据中心需求增长低于预期\n\n---\n\n### ② 地缘重装主线\n\n**关注标的：** 洛克希德马丁 / 莱茵金属  \n**逻辑：** 地缘碎片化重塑防务壁垒，低技术过时风险确立业绩主导\n\n| 观察点 | 频率 | 看什么 |\n|--------|------|--------|\n| NATO 成员国军费落地 | 季度 | 德国/波兰/英法实际预算执行 vs GDP 2% 承诺 |\n| 订单积压 | 财报 | 莱茵金属/LMT backlog 同比增速 |\n| 地缘风险强度 | 周度 | 俄乌/中东/台海叙事热度（叙事监控系统追踪） |\n\n**失效信号：** 停火协议落地，或欧洲财政紧缩导致军费承诺无法落地\n\n---\n\n### ③ 盈利兑现主线\n\n**关注标的：** 埃克森美孚 / 摩根大通 / 德国电信  \n**逻辑：** 通胀重塑实物定价，价值策略高安全边际\n\n| 观察点 | 频率 | 看什么 |\n|--------|------|--------|\n| 重资产 vs 轻资产 EPS 差 | 季报 | 实际增速 vs 14% 预期，是否持续扩大 |\n| 实物通胀预期 | 月度 | 大宗商品/能源价格，美国 CPI 服务分项 |\n| 银行净息差 | 季报 | 利率预期路径对 JPM 盈利的影响 |\n\n---\n\n## 微软：单独观察的过渡态标的\n\n微软是 HALO 里从轻资产向重资产强制转型的典型案例：\n\n- **催化剂：** CapEx 二阶导拐点（增速从加速变平稳）\n- **风险：** 转型期盈利受压，软件业务增速同时下滑则两头不讨好\n- **关键观察：** 每季财报中 cloud 收入增速 vs CapEx 增速的剪刀差是否收窄\n\n---\n\n## 三种场景下的交易结论\n\n| 场景 | 信号 | 动作 |\n|------|------|------|\n| **逻辑强化** | CapEx 继续加速 + 电力缺口扩大 + 重资产 EPS 超预期 | 继续持有，能耗/国防加仓 |\n| **估值充分但盈利平淡** | EPS 增速贴近但未超预期，CapEx 二阶导走平 | 缩仓，等下一个盈利超预期窗口 |\n| **逻辑受损** | CapEx 二阶导转负 or 地缘缓和 or 软资产估值修复 | 减仓，切回成长 |\n\n---\n\n## 与叙事监控的关联\n\nHALO 策略横跨我们系统里的多个叙事：\n- **AI_CapEx** → 算力/能源主线的上游驱动\n- **全球再武装** → 地缘重装主线的宏观背景\n- **地缘风险** → 国防标的的催化来源\n- **通胀通缩** → 埃克森/实物资产的定价基础\n\n可以用叙事热度分数作为这几条主线的实时监控信号。\n\n---\n\n## 核心月度追踪两件事\n\n1. **超大规模 CapEx 二阶导** —— 加速/平稳/转负，是 HALO 逻辑的生死线\n2. **重资产 EPS 实际兑现进度** —— 季报验证 14% 预期是否兑现\n\n其他指标均为辅助验证。\n"}, {"name": "HALO 重资产范式转移", "path": "notes/concepts/HALO_重资产范式转移.md", "category": "concepts", "content": "# HALO 策略：重资产范式转移\n\n**提出方：** 高盛（2026年初）  \n**本质：** 资产定价范式从\"轻资产、高扩张\"向\"重资产、低淘汰风险\"的系统性切换\n\n---\n\n## 为什么现在发生\n\n1. **AI 物理约束**：算力扩张碰到电力/冷却等物理瓶颈，实物资产变稀缺\n2. **地缘碎片化**：供应链本土化、国防重建，推升重资产需求\n3. **CapEx 史诗级扩张**：超大规模科技企业 2026 年单年 CapEx > 2022 年前 50 年累计，直接为公用事业/国防制造需求\n\n## 核心信号\n\n- 重资产 EPS 2026 预期 +14%，十年来首次反超轻资产\n- 历史 20% 估值折价已收敛 → 估值修复完成，现在靠盈利驱动\n- CapEx 二阶导：从加速 → 平稳 → 转负，是逻辑强弱的晴雨表\n\n## 受益板块分层\n\n| 层级 | 板块 | 代表标的 | 逻辑强度 |\n|------|------|---------|---------|\n| 核心 | 公用事业/电力 | CEG、GEV、Eaton、NEE | 物理约束，确定性最高 |\n| 弹性 | 国防军工 | 洛克希德、莱茵金属 | 地缘持续但存在缓和风险 |\n| 观察 | 价值金融 | 埃克森、摩根大通、德电 | 通胀重塑实物定价 |\n| 过渡 | 轻转重科技 | 微软 | CapEx 二阶导拐点为配置关键 |\n\n## 与其他框架的关系\n\n- HALO ≠ 价值投资（不是低估值修复，是范式切换）\n- HALO 的逻辑支柱之一是 AI_CapEx 叙事持续强化\n- 若 AI 泡沫破裂或 CapEx 急刹，HALO 全线受损\n"}, {"name": "2026-03-06 仪表盘打分系统优化方案", "path": "notes/sessions/2026-03-06_仪表盘打分系统优化方案.md", "category": "sessions", "content": "# 仪表盘打分系统优化方案\n\n**日期：** 2026-03-06  \n**类型：** 系统架构优化  \n**状态：** 设计阶段\n\n---\n\n## 背景：当前打分系统架构\n\nGAMT FOF 看板有**两套独立的打分系统**：\n\n### 1. 风险预警系统（alerts_calc.py）\n**目标**：识别市场极端风险  \n**评分**：0-100分（100=最危险）\n\n**5维度权重**：\n- 💧 流动性风险（20%）：DR007/Shibor/R-D价差\n- 📊 估值泡沫（25%）：PE分位+股债性价比\n- 🔥 情绪过热（20%）：成交额/涨跌停\n- 🌍 外部冲击（20%）：中美利差+汇率+期权IV\n- 🏃 微观恶化（15%）：北向资金+期权PCR\n\n**输出**：综合风险分数 + 风险等级（🟢🟡🟠🔴）+ 预警文本\n\n### 2. 宏观打分系统（macro_score.py）\n**目标**：评估宏观环境+策略适配度+配置建议  \n**评分**：0-100分（100=最好）\n\n**5维度权重**：\n- 流动性（20%）：Shibor趋势+M1-M2剪刀差\n- 基本面（25%）：PMI+美林时钟+CPI-PPI\n- 利率汇率（20%）：中美利差+汇率压力+中债走势\n- 期权情绪（20%）：IV分位+PCR\n- 资金流+拥挤度（15%）：三路资金共识+拥挤度信号\n\n**输出**：宏观总分 + 阶段判断（进攻/均衡/谨慎/防守）+ 策略适配度 + 配置建议\n\n---\n\n## 核心问题诊断\n\n### 问题1：风险预警缺少\"市场结构性风险\"维度\n**表现**：\n- 2021年初GameStop、2024年AI泡沫等Meme行情，传统指标（估值/流动性/情绪）可能正常\n- 但市场已进入\"叙事驱动+反身性高峰\"状态，尾部风险极高\n- 当前系统无法识别这类结构性风险\n\n**根因**：缺少对\"叙事联动+量能加速度\"的监控\n\n### 问题2：宏观打分缺少\"主力持仓成本\"信息\n**表现**：\n- 指数远低于耐心资本成本 → 主力被套 → 反弹压力大（应加分）\n- 指数远高于成本 → 主力获利丰厚 → 抛压风险（应减分）\n- 当前系统只看资金流方向，不看持仓成本\n\n**根因**：未整合 patient_capital 模块的成本数据\n\n### 问题3：策略适配度缺少\"风格轮动时机\"判断\n**表现**：\n- 风格轧差到极值（如中证2000-沪深300 Z-score > 2）→ 均值回归机会\n- 当前系统只看因子表现，不看轮动时机\n\n**根因**：未整合 size_spread 模块的轧差极值信号\n\n### 问题4：宏观打分只看绝对水平，缺少趋势持续性\n**表现**：\n- PMI连续3个月上行 vs PMI单月反弹，前者信号更强\n- 当前系统对两者评分相同\n\n**根因**：缺少趋势斜率计算\n\n### 问题5：风险预警用绝对阈值，缺少历史分位\n**表现**：\n- DR007>2.5 触发预警，但如果过去1年经常>2.5，这次可能不算异常\n- 绝对阈值容易\"狼来了\"\n\n**根因**：缺少动态阈值机制\n\n---\n\n## 优化方案：三个优先级\n\n### 优先级1：立即可用（数据已有，逻辑成熟）\n\n#### 1.1 Meme反身性信号 → 风险预警系统\n\n**数据来源**：`meme/antifragile/meme_signal.json`\n\n**核心指标**：\n- **叙事联动指数（NLI）**：多资产30日滚动相关性均值（0-1）\n- **量能加速度（VA）**：近5日均量/近30日均量（BTC35% + 纳指25% + 恒科20% + 科创20%）\n- **综合Meme信号**：NLI历史分位×50% + VA历史分位×50%（0-100分）\n\n**整合方案**：\n```python\n# 在 alerts_calc.py 增加第6维度\n# ═══════ 6. 市场结构风险（Meme反身性）═══════\nmeme = load_json(os.path.join(BASE, 'meme', 'antifragile', 'meme_signal.json'))\nif meme:\n    current = meme.get('current', {})\n    meme_score = current.get('meme_score', 50)\n    \n    struct['items'].append(f\"Meme信号: {meme_score:.0f}/100\")\n    \n    if meme_score >= 75:\n        struct['score'] += 40\n        result['alerts'].append('🎭 反身性高峰期，叙事驱动达到极致，注意循环破裂')\n    elif meme_score >= 50:\n        struct['score'] += 20\n    \n    # 量能加速度作为辅助判断\n    va = current.get('va')\n    if va and va < 0 and meme_score > 60:\n        struct['score'] += 20\n        result['alerts'].append('⚠️ 量能萎缩但价格仍高，顶部特征明显')\n```\n\n**权重建议**：10%（新增维度，其他维度按比例调整为：流动性18%、估值22%、情绪18%、外部18%、微观14%）\n\n**预期效果**：\n- 识别2021年初GameStop式Meme行情\n- 识别2024年AI泡沫式反身性高峰\n- 提前预警\"量能萎缩+价格高位\"的顶部特征\n\n#### 1.2 耐心资本成本偏离 → 宏观打分系统\n\n**数据来源**：`micro_flow/patient_capital/patient_capital.json`\n\n**核心指标**：\n- 各指数的累计持仓、成本价、浮盈亏（pnl%）\n- 重点看沪深300和中证1000（代表大小盘）\n\n**整合方案**：\n```python\n# 在 macro_score.py 的 score_crowding_flow() 中增加\ndef score_crowding_flow(d):\n    score = 50\n    signals = []\n    # ... 原有逻辑 ...\n    \n    # 新增：耐心资本成本偏离\n    patient = load(\"micro_flow/patient_capital/patient_capital.json\")\n    if patient:\n        indices = patient.get('indices', {})\n        for idx_name in ['沪深300', '中证1000']:\n            idx_data = indices.get(idx_name, {})\n            latest = idx_data.get('latest', {})\n            if latest:\n                pnl = latest.get('pnl', 0)\n                \n                if pnl < -10:  # 主力被套超过10%\n                    score += 10  # 反弹动力强\n                    signals.append(f\"{idx_name}耐心资本被套{pnl:.1f}%，反弹空间大 🟢\")\n                elif pnl > 30:  # 主力获利超过30%\n                    score -= 10  # 抛压风险\n                    signals.append(f\"{idx_name}耐心资本获利{pnl:.1f}%，抛压风险 🔴\")\n    \n    return {\"score\": clamp(score), \"signals\": signals}\n```\n\n**预期效果**：\n- 识别主力被套时的反弹机会\n- 识别主力获利丰厚时的抛压风险\n- 提供更精准的资金流判断\n\n---\n\n### 优先级2：需要增强（逻辑可优化）\n\n#### 2.1 风格轧差极值 → 策略适配度\n\n**数据来源**：`size_spread/data/style_spread.json`\n\n**核心指标**：\n- 红利-科创、微盘-全指、中证2000-沪深300等轧差净值\n- Z-score（当前值 vs 60日均值和标准差）\n\n**整合方案**：\n```python\n# 在 macro_score.py 增加风格轮动信号\ndef get_style_rotation_signal():\n    \"\"\"从风格轧差判断轮动机会\"\"\"\n    signals = []\n    \n    spread_data = load(\"size_spread/data/style_spread.json\")\n    if spread_data:\n        for pair_name, data in spread_data.items():\n            navs = data.get('navs', [])\n            if len(navs) >= 60:\n                recent = navs[-1]\n                mean_60 = sum(navs[-60:]) / 60\n                std_60 = statistics.stdev(navs[-60:])\n                \n                z_score = (recent - mean_60) / std_60 if std_60 > 0 else 0\n                \n                if abs(z_score) > 2:  # 偏离2倍标准差\n                    direction = \"做多\" if z_score < -2 else \"做空\"\n                    signals.append({\n                        'pair': pair_name,\n                        'z_score': round(z_score, 2),\n                        'direction': direction,\n                        'strength': min(abs(z_score) / 3 * 100, 100)\n                    })\n    \n    return signals\n\n# 在 fit_quant_stock() 中使用\ndef fit_quant_stock(config):\n    score = 50\n    signals = []\n    # ... 原有逻辑 ...\n    \n    # 新增：风格轮动机会\n    rotation = get_style_rotation_signal()\n    for r in rotation:\n        if '中证2000-沪深300' in r['pair'] or '微盘-全指' in r['pair']:\n            score += r['strength'] * 0.15  # 最多加15分\n            signals.append(f\"{r['pair']} Z={r['z_score']:.1f}，{r['direction']}机会 🟢\")\n    \n    return {\"score\": clamp(score), \"signals\": signals}\n```\n\n**预期效果**：\n- 识别风格轮动的极值机会\n- 提升量化股票和套利策略的适配度判断\n- 捕捉均值回归交易机会\n\n#### 2.2 宏观打分的趋势权重\n\n**问题**：当前只看绝对水平和短期变化，缺少趋势持续性判断\n\n**整合方案**：\n```python\n# 在 score_fundamentals() 中增加趋势权重\ndef score_fundamentals(d):\n    score = 50\n    # ... 原有逻辑 ...\n    \n    # 新增：趋势持续性加权\n    pmi_list = d.get(\"pmi\", [])\n    if len(pmi_list) >= 6:\n        vals = [x[\"pmi\"] for x in pmi_list[-6:] if x.get(\"pmi\")]\n        if len(vals) >= 6:\n            # 计算6个月线性回归斜率\n            x = list(range(len(vals)))\n            slope = (sum((i - sum(x)/len(x)) * (v - sum(vals)/len(vals)) \n                        for i, v in zip(x, vals)) /\n                    sum((i - sum(x)/len(x))**2 for i in x))\n            \n            if slope > 0.5:  # 持续改善\n                score += 15\n                signals.append(\"PMI持续改善趋势 🟢\")\n            elif slope < -0.5:  # 持续恶化\n                score -= 15\n                signals.append(\"PMI持续恶化趋势 🔴\")\n    \n    return clamp(score)\n```\n\n**预期效果**：\n- 区分\"持续改善\"和\"单月反弹\"\n- 提升宏观打分的前瞻性\n- 减少噪音信号\n\n---\n\n### 优先级3：长期完善（需要新数据或架构调整）\n\n#### 3.1 风险预警的历史分位\n\n**目标**：用动态阈值替代绝对阈值\n\n**实现方案**：\n```python\n# 保存历史风险分数到 alerts_history.json\n# 每次计算时加载历史，计算分位\ndef calc_risk_percentile(current_score, history_scores):\n    \"\"\"计算当前风险分数在历史中的分位\"\"\"\n    if len(history_scores) < 60:\n        return 50\n    return (sum(1 for s in history_scores if s < current_score) / \n            len(history_scores)) * 100\n\n# 如果当前风险分位 > 80% → 即使绝对分数不高，也要预警\n```\n\n#### 3.2 产业链景气度扩散 → 宏观打分\n\n**数据来源**：`meso/chain_prosperity/chain_prosperity.json`\n\n**逻辑**：\n- 如果多个产业链同时景气 → 经济动能广度强 → 宏观环境好\n- 如果只有个别产业链景气 → 结构性行情 → 宏观环境一般\n\n---\n\n## 实施路径\n\n### 第一步：快速见效（本周可完成）\n1. **Meme反身性 → 风险预警**（新增第6维度，权重10%）\n2. **耐心资本成本 → 宏观打分**（整合进资金流维度）\n\n**预计工作量**：2-3小时  \n**预期收益**：识别结构性风险 + 精准判断资金流\n\n### 第二步：优化现有（下周）\n3. **风格轧差极值 → 策略适配度**（量化股票+套利策略）\n4. **宏观打分趋势权重**（PMI/Shibor/中美利差的6个月斜率）\n\n**预计工作量**：4-5小时  \n**预期收益**：捕捉轮动机会 + 提升前瞻性\n\n### 第三步：长期完善（月度迭代）\n5. **风险预警历史分位**（动态阈值，避免\"狼来了\"）\n6. **产业链景气度扩散**（宏观动能广度指标）\n\n**预计工作量**：8-10小时  \n**预期收益**：减少噪音 + 增加宏观维度\n\n---\n\n## 关键洞察\n\n### 1. 两套打分系统的互补性\n- **风险预警**：自下而上，从微观指标识别极端风险\n- **宏观打分**：自上而下，从宏观环境评估策略适配度\n- 两者结合才能形成完整的风险-收益评估框架\n\n### 2. Meme反身性是当前最大盲区\n- 传统指标（估值/流动性/情绪）在Meme行情中失效\n- 叙事联动+量能加速度是识别反身性高峰的关键\n- 这是2021-2024年市场最重要的结构性变化\n\n### 3. 耐心资本成本是资金流的\"第二层\"\n- 当前系统只看资金流方向（流入/流出）\n- 但主力持仓成本决定了\"愿不愿意卖\"\n- 成本偏离度是判断反弹/抛压的关键\n\n### 4. 风格轮动是alpha的重要来源\n- 风格轧差到极值 → 均值回归机会\n- 当前系统缺少这个维度\n- 整合后可提升量化股票和套利策略的适配度判断\n\n### 5. 趋势持续性比绝对水平更重要\n- PMI连续3个月上行 vs PMI单月反弹，前者信号更强\n- 当前系统对两者评分相同\n- 增加趋势斜率可提升前瞻性\n\n---\n\n## 相关文件\n\n**风险预警系统**：\n- `~/Desktop/gamt-dashboard/alerts/alerts_calc.py`\n- `~/Desktop/gamt-dashboard/alerts/alerts.json`\n\n**宏观打分系统**：\n- `~/Desktop/gamt-dashboard/macro/score/macro_score.py`\n- `~/Desktop/gamt-dashboard/macro/score/macro_score.json`\n- `~/Desktop/gamt-dashboard/macro/score/score_config.json`\n\n**数据源模块**：\n- `~/Desktop/gamt-dashboard/meme/antifragile/meme_signal.json`（Meme反身性）\n- `~/Desktop/gamt-dashboard/micro_flow/patient_capital/patient_capital.json`（耐心资本）\n- `~/Desktop/gamt-dashboard/size_spread/data/style_spread.json`（风格轧差）\n- `~/Desktop/gamt-dashboard/meso/chain_prosperity/chain_prosperity.json`（产业链景气度）\n"}, {"name": "2026-03-07 配置多个Telegram AI员工", "path": "notes/telegram-multi-bots.md", "category": "sessions", "content": "# 配置多个 Telegram AI 员工\n\n**日期：** 2026-03-07  \n**状态：** 配置完成，待重启验证\n\n---\n\n## 需求背景\n\nRoni 想要3个独立的 AI 员工，每个有不同的职责和人设：\n- **员工1（Eva）**：FOF 投资顾问 - 每天帮思考 FOF 整体投资思路、策略探讨\n- **员工2（Leijun）**：策略分析师 - 分析不同策略的净值和表现\n- **员工3（Musk）**：量化交易员 - 接收交易思路，实现量化交易代码\n\n飞书无法实现多个独立 AI 身份，所以转向 Telegram。\n\n---\n\n## 创建的 Telegram Bot\n\n| 员工 | Bot 用户名 | Token | 模型 |\n|------|-----------|-------|------|\n| Eva | eva_fof_bot | 8702748600:AAG1DcfnY4ls8y5k00-h-aEa5QHpyUZH4a0 | Claude Opus 4.6 |\n| Leijun | leijun_quant_bot | 8711572283:AAHL7vkAbZdltbOmmvSWoOIL9zFyBUzx7UM | GPT-5.3-codex |\n| Musk | musk_trader_bot | 8787904751:AAF_39sx3CEXvEINS2gwP5hO5iT_bWuTFFI | Claude Opus 4.6 |\n\n---\n\n## 配置修改\n\n**文件：** `~/.openclaw/openclaw.json`  \n**备份：** `~/.openclaw/openclaw.json.backup`\n\n修改了 `channels.telegram` 配置，参考 feishu 的 accounts 结构：\n\n```json\n\"telegram\": {\n  \"enabled\": true,\n  \"dmPolicy\": \"pairing\",\n  \"groupPolicy\": \"allowlist\",\n  \"streamMode\": \"partial\",\n  \"accounts\": {\n    \"eva\": {\n      \"botToken\": \"8702748600:AAG1DcfnY4ls8y5k00-h-aEa5QHpyUZH4a0\",\n      \"model\": \"aicanapi/claude-opus-4-6\"\n    },\n    \"leijun\": {\n      \"botToken\": \"8711572283:AAHL7vkAbZdltbOmmvSWoOIL9zFyBUzx7UM\",\n      \"model\": \"aicanopenai/gpt-5.3-codex\"\n    },\n    \"musk\": {\n      \"botToken\": \"8787904751:AAF_39sx3CEXvEINS2gwP5hO5iT_bWuTFFI\",\n      \"model\": \"aicanapi/claude-opus-4-6\"\n    }\n  }\n}\n```\n\n---\n\n## 待完成任务\n\n### 1. 重启 OpenAWS\n```bash\nopenclaw gateway restart\n```\n\n### 2. 在 Telegram 中启动 bot\n搜索并点击 Start：\n- @eva_fof_bot\n- @leijun_quant_bot\n- @musk_trader_bot\n\n### 3. 配置角色定义\n为每个员工创建独立的角色配置，让他们有不同的\"人设\"和职责。\n\n可能的方案：\n- 在 workspace 下创建子文件夹（eva/, leijun/, musk/）\n- 每个文件夹有独立的 SOUL.md 定义角色\n- 或者使用 OpenAWS 的 agents 配置\n\n---\n\n## 注意事项\n\n- ⚠️ Token 已暴露，如需安全可找 BotFather 重新生成\n- 配置文件已备份，如有问题可回滚\n- OpenAWS 的 telegram plugin 是否支持 accounts 结构需验证\n"}, {"name": "2026-03-07 美股风险监控系统设计", "path": "notes/2026-03-07_美股风险监控系统设计.md", "category": "sessions", "content": "# 美股风险监控系统设计与实现\n\n**日期：** 2026-03-07  \n**类型：** 系统设计 + 投资哲学\n\n---\n\n## 背景：为什么需要美股风险监控\n\nRoni 对当前美股崩盘风险的判断：\n\n**看空逻辑链条：**\n1. **地缘风险**：伊以战争短期解决不了 → 持续不确定性\n2. **美国基本面**：不太行 → 盈利预期下调\n3. **AI叙事理性化**：从狂热转向理性 → 泡沫降温信号\n4. **Capex-需求错配**：大厂疯狂投AI基础设施，但实际付费客户没那么多 → 投资回报率质疑\n\n**核心矛盾：** AI Capex-需求错配是当前市场最大争议点。如果这个逻辑被市场接受，科技股会大幅回调。\n\n---\n\n## 核心设计哲学：不打分，看趋势\n\n### 为什么不做固定权重打分？\n\nRoni 的洞察：\n> \"市场或者整个世界我看不懂，所以逻辑上来说固定的打分并不能帮助我们思考，哪个变量变了权重就得改变\"\n\n**问题：**\n- 2020年疫情时，流动性最重要（美联储印钱）\n- 2022年通胀时，利率最重要（美联储加息）\n- 2023年AI热潮时，估值泡沫最重要（科技股狂飙）\n- 现在担心的是：AI Capex错配 + 地缘风险\n\n**固定权重的缺陷：**\n- 刻舟求剑，无法适应环境变化\n- 掩盖真实信号（某个指标可能很重要，但权重低）\n- 让人懒于思考（看到60分就觉得\"中等风险\"，不去深究）\n\n### 新的设计方向\n\n**核心：原始数据 + 自主判断**\n\n不是\"告诉你风险多少\"，而是\"帮你更好地思考\"：\n- 提供数据，不提供结论\n- 展示趋势，不预设权重\n- 辅助判断，不替代判断\n\n用户根据：\n- 当下的宏观环境\n- 自己的投资组合\n- 自己的风险偏好\n- 自己的经验直觉\n\n来决定哪些指标更重要，如何组合判断。\n\n---\n\n## 系统设计\n\n### 数据架构\n\n**时间范围：** 2008年至今（约18年，覆盖3次危机）\n\n**数据源：**\n- yfinance：VIX、标普、纳指、黄金、美元、比特币、原油、美债（免费无限制）\n- FRED API：利率、失业率、PMI（需免费key）\n\n**存储：**\n- CSV：原始数据缓存（cache/us_*.csv）\n- JSON：前端展示（us_alerts.json）\n\n**更新模式：** 增量更新（首次回填18年，后续只拉新数据）\n\n### 核心指标（8个）\n\n| 指标 | 类别 | 风险理解 |\n|------|------|---------|\n| VIX | 情绪 | 上升=恐慌增加，>30=极度恐慌 |\n| 标普vs200MA | 技术 | 跌破=趋势转弱，<-10%=熊市 |\n| 纳指vs200MA | 技术 | 跌破=科技股泡沫破裂风险 |\n| 黄金 | 跨市场 | 上涨=避险情绪升温 |\n| 美元指数 | 跨市场 | 飙升=全球避险+新兴市场压力 |\n| 比特币 | 跨市场 | 暴跌=风险资产抛售 |\n| WTI原油 | 跨市场 | >100=通胀压力+衰退风险 |\n| 10年期美债 | 流动性 | >5%=融资成本高企，股市承压 |\n\n### 危机事件标注\n\n在数据中标注6个历史关键时点：\n- 2008-09-15：雷曼倒闭\n- 2008-10-10：VIX创纪录\n- 2020-03-16：熔断\n- 2020-03-23：市场底部\n- 2022-03-16：首次加息\n- 2022-06-15：加息75bp\n\n**用途：** 帮助理解指标在历史危机中的表现，识别当前是否接近危机水平。\n\n---\n\n## 前端展示\n\n### 中美双Tab设计\n\n**A股Tab：**\n- 保持原有5维度打分展示\n- 4个趋势图（DR007、PE、成交额、中美利差）\n- 每张图下方添加风险理解注释\n\n**美股Tab：**\n- 8个指标网格展示\n- 每个指标卡片包含：\n  - 当前值 + 趋势箭头（↗↘→）\n  - 1周/1月变化\n  - 历史走势图（最近180天）\n  - 风险理解注释\n  - 颜色编码（🟢安全 🟡警戒 🔴危险）\n\n### 时间格式\n\n统一改为月-日格式（MM-DD），去掉年份，让图表更简洁。\n\n---\n\n## 关键实现细节\n\n### 增量更新逻辑\n\n```python\ndef get_start_date(csv_path, default_days=6570):\n    \"\"\"确定起始日期（增量逻辑）\"\"\"\n    last_date = get_csv_last_date(csv_path)\n    if last_date is None:\n        # 首次运行：回填18年\n        return (datetime.now() - timedelta(days=default_days)).strftime('%Y-%m-%d')\n    else:\n        # 增量：从最后日期+1天开始\n        return (last_date + timedelta(days=1)).strftime('%Y-%m-%d')\n```\n\n### 趋势判断\n\n```python\ndef calc_trend(series, window=20):\n    \"\"\"计算趋势方向\"\"\"\n    if len(series) < window:\n        return \"→\"\n    recent = series.tail(window)\n    slope = np.polyfit(range(len(recent)), recent, 1)[0]\n    if slope > 0.01:\n        return \"↗\"\n    elif slope < -0.01:\n        return \"↘\"\n    else:\n        return \"→\"\n```\n\n### 风险等级\n\n```python\ndef calc_level(current, thresholds):\n    \"\"\"判断风险等级\"\"\"\n    if current >= thresholds.get('danger', float('inf')):\n        return \"🔴\"\n    elif current >= thresholds.get('warning', float('inf')):\n        return \"🟡\"\n    else:\n        return \"🟢\"\n```\n\n---\n\n## 使用方式\n\n**数据更新：**\n```bash\ncd ~/Desktop/gamt-dashboard/alerts\npython3 us_alerts_data.py  # 获取数据（增量）\npython3 us_alerts_calc.py  # 计算+输出JSON\n```\n\n**查看：**\n打开看板 → 红灯预警 → 点击\"🇺🇸 美股风险\"Tab\n\n---\n\n## 待扩展\n\n1. 配置FRED API key，拉取利率、失业率等数据（扩展到12个指标）\n2. 在图表上标注危机事件（红色虚线）\n3. 添加到update_all.py自动更新\n4. 设置定时任务（美股收盘后更新）\n\n---\n\n## 投资哲学总结\n\n**承认不确定性：** 市场太复杂，没有人能完全看懂\n\n**反对机械化：** 固定权重的打分系统是刻舟求剑\n\n**动态思考：** 不同时期，不同变量的重要性不同\n\n**保持灵活：** 需要根据当下环境调整判断框架\n\n**工具定位：** 不是告诉你答案，而是帮你更好地思考\n\n---\n\n## 相关文件\n\n- `~/Desktop/gamt-dashboard/alerts/us_alerts_data.py`\n- `~/Desktop/gamt-dashboard/alerts/us_alerts_calc.py`\n- `~/Desktop/gamt-dashboard/alerts/us_alerts.json`\n- `~/Desktop/gamt-dashboard/alerts/alerts.html`\n"}, {"name": "2026-03-08 API密钥配置全面检查", "path": "notes/sessions/2026-03-08_API密钥配置检查.md", "category": "sessions", "content": "# 2026-03-08 API 密钥配置全面检查\n\n> Eva 与 Roni 对 GAMT 看板所有 Python 模块的 API 密钥进行全面盘点\n\n---\n\n## 总览\n\n| 数据源 | 状态 | 覆盖文件数 | 备注 |\n|--------|------|-----------|------|\n| Tushare Pro | ✅ 正常 | 26 | 全模块覆盖 |\n| iFind | ⚠️ 即将过期 | 3 | 2026-03-09 19:00 过期 |\n| 火富牛(fof99) | ✅ 正常 | 2 | 基金净值专用 |\n\n---\n\n## 1. Tushare Pro\n\n- **Token:** `8a2c71af4fbc6faf83da2ad4404c1c47f41983562cc9fb2fa6dd4fae`\n- **API URL:** `https://api.tushare.pro`\n- **状态:** 正常\n\n### 覆盖模块\n\n**宏观层：**\n- `macro/liquidity/liquidity_data.py` — 流动性(Shibor/DR007/M1M2)\n- `macro/rates/rates_data.py` — 全球利率汇率\n- `macro/fundamentals/fundamentals_d 司价格\n\n### 跟踪产品\n| 产品名 | 代码 | 基准 | 策略标签 |\n|--------|------|------|---------|\n| 超量子中证1000增强9号A类 | XZ916A | 000852 | quant-stock |\n| 简文致盛尊享一号 | SAVV99 | 000001 | momentum-stock |\n| 铭跃行远均衡专享九号 | SAJX53 | NHCI | cta |\n| 赢仕安盈二号 | SLQ349 | 000832 | convertible |\n| 量客长阳一号 | SLL241 | 000001 | arbitrage |\n\n---\n\n## ⚡ 行动项\n\n- [ ] **紧急：iFind refresh token 明天过期，需要续期**\n- [x] Tushare 全模块配置完成\n- [x] 火富牛配置完成\n"}, {"name": "涨停指数信号框架 v3 — 三重交叉验证", "path": "notes/concepts/涨停指数信号框架v3.md", "category": "concepts", "content": "# 涨停指数信号框架 v3 — 三重交叉验证\n\n> 2026-03-08 Roni × Eva 共同设计\n\n## 核心问题\n\n涨停指数（昨日涨停/首板等权买入，次日卖出的净值曲线）是**长期正期望**的策略。用固定 BIAS 阈值（如 ±3%）做拥挤判断，会导致信号在趋势行情中**一直报拥挤**，完全失去预警价值。\n\n## Roni 的洞察\n\n> \"真正的降温是净值有回撤，且乖离率有变化，两者共同下降才是市场降温的过程。\"\n\n关键认知：\n- **BIAS 高 ≠ 拥挤**。正期望曲线长期跑在均线上方是正常的\n- **BIAS 变化方向**才有意义，而不是绝对值\n- **净值回撤 + BIAS 同步下行** = 真实降温信号\n- **净值上行 + BIAS 同步上行** = 真实升温信号\n\n## 三重交叉验证框架\n\n### 因子1：净值回撤\n\n```\nnav_drawdown = (当前净值 - 近20日峰值) / 近20日峰值 × 100\n```\n\n- 回撤 < -3% → 明显降温\n- 回撤 < -1.5% → 边际降温\n- 回撤 > -0.5% → 高位运行\n\n### 因子2：BIAS 变化方向\n\n```\nbias_delta = 近3日BIAS均值 - 前3日BIAS均值\n```\n\n- Δ < -1.0 → BIAS 快速下行\n- Δ < -0.5 → BIAS 边际下行\n- Δ > +0.5 → BIAS 上行\n- Δ > +1.0 → BIAS 加速上行\n\n用3日均值平滑，避免单日噪声。\n\n### 因子3：情绪周期标签\n\n来自强势股情绪诊断系统（`momentum_sentiment`），综合涨停数、晋级率、炸板率、涨跌停比、封板质量五维指标：\n\n- **退潮 / 冰点** → 情绪降温方向\n- **加速 / 回暖** → 情绪升温方向\n- **震荡 / 分歧** → 中性\n\n## 共振信号判定\n\n| 净值 | BIAS方向 | 情绪周期 | 信号 | 置信度 |\n|------|----------|----------|------|--------|\n| 回撤 | 下行 | 退潮/冰点 | 🔵 降温 | ★★★ |\n| 回撤 | 下行 | 中性 | ⬇️ 边际降温 | ★★ |\n| 高位 | 掉头下行 | 退潮 | 🟡 见顶退潮 | ★★★ |\n| 高位 | 掉头下行 | 中性 | 🟡 见顶分歧 | ★★ |\n| 止跌 | 回升 | 回暖/加速 | 🟢 筑底回暖 | ★★★ |\n| 创新高 | 加速上行 | 加速 | 🔴 加速升温 | ★★★ |\n| 上行 | 上行 | 回暖 | 🟠 持续升温 | ★★★ |\n| 矛盾 | 矛盾 | — | 🟡 多空分歧 | — |\n| 无方向 | 无方向 | 震荡 | ⚪ 中性 | — |\n\n**置信度规则：**\n- ★★★ = 三个因子方向一致\n- ★★ = 两个因子一致，第三个中性\n- 无星 = 信号矛盾或无方向\n\n## 回测验证（120个交易日）\n\n| 情绪周期 | 天数 | 平均BIASΔ | BIASΔ<0占比 | 涨停指数日收益<0占比 |\n|----------|------|----------|------------|-------------------|\n| **加速** | 30 | **+1.51** | 10% | 0% |\n| 回暖 | 24 | +0.37 | 29% | 8% |\n| 震荡 | 10 | -0.09 | 60% | 10% |\n| 分歧 | 16 | +0.53 | 31% | 12% |\n| **退潮** | 36 | **-1.60** | **75%** | **39%** |\n\n结论：情绪周期与涨停指数BIAS方向**高度共振**，退潮日75%概率BIAS下行，加速日90%概率BIAS上行，交叉验证有效。\n\n## 连续退潮才是真风险\n\n单日退潮后，下一日大概率反弹（正期望曲线的均值回归）。但**连续退潮**（退潮→退潮）时风险才真正放大，例如：\n\n- 20260302 退潮 → 20260304 退潮：涨停指数日收益 **-3.71%**，BIASΔ = **-6.05**\n\n## 与旧逻辑对比\n\n| | 旧逻辑 v1 | 新逻辑 v3 |\n|--|-----------|-----------|\n| 判据 | BIAS 绝对值 ±3% | 净值回撤 × BIAS方向 × 情绪周期 |\n| 问题 | 正期望曲线下永远报拥挤 | 看变化方向和共振 |\n| 信号类型 | 6种（固定阈值） | 8种（动态共振） |\n| 置信度 | 无 | ★★★ / ★★ |\n| 展示信息 | BIAS + 高低开 | BIAS + BIASΔ + 回撤% + 情绪周期 + 首板BIASΔ |\n\n## 代码位置\n\n- 信号判定：`env_fit/momentum_stock/inject_momentum.py`（v3 三重交叉验证块）\n- 涨停指数数据：`env_fit/momentum_stock/limit_index/limit_index_data.py`\n- 情绪周期数据：`env_fit/momentum_stock/momentum_data.py`\n\n## 后续可优化\n\n- [ ] 加入成交额萎缩确认（量价配合）\n- [ ] 连续退潮天数计数，作为风险加权因子\n- [ ] 首板 vs 全板信号分离（首板更灵敏，可做领先指标）\n"}, {"name": "封单额轧差 — A股抄底指标", "path": "notes/concepts/封单额轧差_抄底指标.md", "category": "concepts", "content": "# 涨跌停封单额轧差 (Seal Spread) — A股抄底指标\n\n> 2026-03-08 Roni × Musk 设计\n\n## 核心逻辑\n\n**封单额轧差** = 当日全市场涨停封单额合计 − 跌停封单额合计（亿元）\n\n- **正值大** → 涨停封单远超跌停，多头封锁力量强，市场亢奋\n- **负值大** → 跌停封单远超涨停，空头封锁力量强，恐慌蔓延\n- **接近零** → 多空均衡\n\n## 抄底信号\n\n轧差在近 250 个交易日（约1年）做滚动分位排名：\n\n| 分位数 | 信号 | 含义 |\n|--------|------|------|\n| <5% | 🟢 极度恐慌 | 跌停封单远超涨停，恐慌见底 → **抄底信号** |\n| 5%~20% | 🔵 偏空 | 空头占优但未到极端 |\n| 20%~80% | ⚪ 均衡 | 正常波动 |\n| 80%~95% | 🟡 偏多 | 多头占优 |\n| >95% | 🔴 极度亢奋 | 过热警告 |\n\n## 历史验证\n\n- 20260115: 轧差 **-320亿**，跌停封单 440亿 vs 涨停 120亿 → 🟢 极度恐慌\n- 20260202: 轧差 **-651亿**，跌停封单 692亿 vs 涨停 41亿 → 🟢 极度恐慌\n- 20250904: 轧差 **-36亿**，罕见反转日 → 🟢 极度恐慌\n\n这些极端恐慌日后，市场大概率出现反弹。\n\n## 辅助指标\n\n- `seal_ratio`：涨停封单额占比（0~1），<0.3 极度恐慌，>0.9 极度亢奋\n- `spread_ma5 / ma20`：均线平滑，连续走低 + 分位底部 = 高置信底部\n- 可与涨停指数 BIAS、情绪周期交叉验证\n\n## 数据源\n\n直接读 `_cache/{date}.json` 中的 `fd_amount`（封单额），无需额外 API。\n\n## 代码位置\n\n- 计算脚本：`env_fit/momentum_stock/limit_index/seal_spread/seal_spread_data.py`\n- 输出：`seal_spread.csv` + `seal_spread.json`\n- 增量模式，每次只算新交易日\n"}, {"name": "Alpha158 量价因子库", "path": "notes/concepts/Alpha158_量价因子库.md", "category": "concepts", "content": "# Alpha158 量价因子库\n\n**定义：** 微软 Qlib 内置的 158 个量价因子集，是量化选股的标准化因子库基线。\n\n**因子构成：** 9个K线形态 + 4个原始价格 + 29类×5时间窗口(5/10/20/30/60天) = 158个因子\n\n## 13大类因子\n\n| 类别 | 数量 | 回答的问题 |\n|------|------|-----------|\n| K线形态 | 9 | 今天多空谁赢了？赢得干脆吗？ |\n| 原始价格 | 4 | OHLV基础关系 |\n| 动量 ROC | 5 | 过去N天涨了还是跌了？ |\n| 均线偏离 MA | 5 | 当前价格偏贵还是偏便宜？ |\n| 波动率 STD | 5 | 价格波动大不大？ |\n| 趋势 BETA/RSQR/RESI | 15 | 趋势方向、确定性、偏离度 |\n| 价格区间 MAX/MIN/RSV | 25 | 当前价格在历史区间什么位置？ |\n| Aroon IMAX/IMIN/IMXD | 15 | 距创新高/新低多久了？ |\n| 量价关系 CORR/CORD | 10 | 涨的时候有真实买盘吗？ |\n| 涨跌统计 CNTP/CNTN/CNTD | 15 | 赢的次数多还是输的多？ |\n| RSI类 SUMP/SUMN/SUMD | 15 | 赢的力度大还是输的力度大？ |\n| 成交量 VMA/VSTD/WVMA | 15 | 市场关注度高不高？稳不稳？ |\n| 量RSI VSUMP/VSUMN/VSUMD | 15 | 关注度在增加还是减少？ |\n\n## 关键区分\n\n- **CNTP vs SUMP：** CNTP数\"涨了几天\"（频率），SUMP数\"涨了多大幅度\"（力度）。10笔赢8笔每次赚一点 vs 10笔赢3笔每次赚很多。\n- **CORR vs CORD：** CORR看价格绝对值和成交量的关系，CORD看变化率。CORD更能捕捉\"涨的那天放量、跌的那天缩量\"这种结构。\n- **STD vs ResVol（Barra）：** STD是总波动，ResVol去掉了市场涨跌的影响后的特质波动。\n\n## 局限\n\n只有量价因子（K线+成交量），完全没有：基本面（PE/ROE）、资金流（北向/两融）、分析师预期、另类数据。\n\n**FOF视角：** 纯量价Alpha158相当于只看基金的净值曲线选基金，不看持仓、不看经理、不看策略。能做到基线，但一定不是天花板。\n\n**相关讨论：**\n- [[Barra_CNE6风格因子]] — 风险控制层面的因子体系\n- [[300指增回测框架]] — Alpha158作为选股模型的输入\n\n**数据来源：** Qlib cn_data（6061只A股，2000-2026）\n\n**详细图鉴：** ~/Desktop/quant-backtest/alpha158_factors.html\n\n**标签：** #量化 #因子 #Qlib #核心概念\n"}, {"name": "Barra CNE6 风格因子", "path": "notes/concepts/Barra_CNE6风格因子.md", "category": "concepts", "content": "# Barra CNE6 风格因子\n\n**定义：** Barra CNE6 是 A 股指增的行业标准风险模型，把股票收益拆解为：行业因子 + 风格因子 + 残差alpha。指增的核心就是控制前两者，只赚残差alpha。\n\n**核心公式：** `股票收益 = 行业暴露×行业因子收益 + 风格暴露×风格因子收益 + alpha`\n\n## 十大风格因子\n\n| 因子 | 英文 | 含义 | 不控的后果 | 需要的数据 |\n|------|------|------|-----------|-----------|\n| 市值 | Size | ln(总市值) | 大小盘轮动吃掉超额 | 总市值 |\n| Beta | Beta | 对市场的敏感度 | 牛市虚胖、熊市裸泳 | 日收益率回归 |\n| 动量 | Momentum | 过去252天收益(去近21天) | 风格反转时超额巨亏 | 日收益率 |\n| 残差波动率 | Residual Vol | 特质波动(去市场后) | 组合波动大、不稳定 | 回归残差 |\n| 非线性市值 | NL-Size | 中盘效应(Size³的残差) | 中盘暴露不可控 | 总市值 |\n| 估值 | Book-to-Price | 1/PB | 价值/成长轮动吃超额 | 每股净资产 |\n| 流动性 | Liquidity | 月均换手率 | 回测好看实盘跑不出 | 换手率 |\n| 盈利 | Earnings Yield | 1/PE (EP) | 赌错盈利风格 | 净利润/市值 |\n| 成长 | Growth | 营收/利润增长率 | 加息周期杀成长 | 财报数据 |\n| 杠杆 | Leverage | 资产负债率 | 信用风险暴露 | 资产负债表 |\n\n## 行业因子\n\n30个申万一级行业，每只股票归属一个行业。指增要求行业偏离≤±3%，不做行业赌注。\n\n## 关键洞察\n\n- **Alpha158 vs Barra：** Alpha158是\"进攻\"（选股赚alpha），Barra是\"防守\"（控制风格暴露不被风格反转吃掉超额）\n- **风格因子的本质：** 都是系统性风险。你可以赚，但也可以亏，而且不可控。指增只要确定能赚的alpha，不要不确定的风格beta\n- **Size 是 A 股最大的坑：** 很多量化指增2021年超额爆表（小盘行情），2024年遇到小微盘暴跌超额回撤20%+——就是Size没控好\n- **BP（价值/成长）在 GAMT 看板里有对应：** 风格轧差模块就是监控这个\n\n## FOF经理评价量化指增时的核心问题\n\n1. **风格暴露控制得怎么样？** → 看持仓的Barra因子暴露\n2. **超额回撤时在赌什么风格？** → 归因到10个风格因子\n3. **纯alpha有多少？** → 去掉风格贡献后的残差收益\n4. **跟踪误差多大？** → 过高说明偏离基准太多\n\n**相关讨论：**\n- [[Alpha158_量价因子库]] — 选股alpha的因子来源\n- [[300指增回测框架]] — 完整回测框架\n- [[离散度]] — alpha环境判断\n- [[风格集中度]] — 风格轮动风险\n\n**数据来源：** 行业分类(Tushare)、日线行情(Qlib)、财报数据(Tushare income/balancesheet)\n\n**标签：** #量化 #Barra #风险模型 #核心概念\n"}, {"name": "300指增回测框架", "path": "notes/concepts/300指增回测框架.md", "category": "concepts", "content": "# 300指增回测框架\n\n**定义：** 沪深300指数增强策略的量化回测体系，目标是通过选股超配/低配成分股跑赢基准。\n\n## 四步框架\n\n### 1. 选股模型（Alpha模型）\n- 输入：Alpha158因子（158个量价特征）\n- 模型：LightGBM\n- 输出：每只股票未来N天的预期收益率\n- 训练方式：滚动训练（每隔几个月重新训练）\n\n### 2. 组合构建（Portfolio Construction）\n- 基准权重：沪深300成分股的市值加权\n- 超配看好的（+2~5%），低配不看好的（-2~5%）\n- 约束条件：\n  - 行业偏离 ≤ ±3%\n  - 个股偏离 ≤ ±3%\n  - 跟踪误差 ≤ 5-8%\n  - 满仓（不做仓位择时）\n\n### 3. 换仓执行\n- 频率：月度或双周\n- 成本：佣金0.03% + 印花税0.05%(卖出) + 滑点0.1%\n- 换手约束：单次≤30%\n\n### 4. 绩效评价\n- 超额收益 = 组合收益 - 沪深300收益\n- 信息比率(IR) = 超额收益/跟踪误差（>1.5优秀）\n- 超额最大回撤（<5%优秀）\n- 月度胜率（>60%及格）\n\n## 能力分级\n\n| 级别 | 描述 | 需要的组件 |\n|------|------|-----------|\n| L1 | TopK选股+等权 | Alpha158 + LightGBM |\n| L2 | 行业中性+跟踪误差 | + 行业分类 + 基准权重 |\n| L3 | Barra优化器 | + CNE6风格因子 + CVXPY |\n| L4 | 实盘（不做） | + 交易接口 |\n\n## 数据需求\n\n| 数据 | 用途 | 状态 |\n|------|------|------|\n| 日线行情 | Alpha158因子 | ✅ Qlib cn_data |\n| 申万行业分类 | 行业中性 | ❌ 待补 |\n| 300成分股权重 | 基准构建 | ✅ Tushare接口已有 |\n| 市值/PB/PE | Barra风格因子 | ✅ daily_basic接口已有 |\n| 财报数据 | Growth/Leverage | ✅ income/balancesheet接口已有 |\n\n**决策：** 先跑L1验证alpha模型有效性，再逐步升级约束。\n\n**相关讨论：**\n- [[Alpha158_量价因子库]] — 选股因子来源\n- [[Barra_CNE6风格因子]] — 风险控制框架\n- [[离散度]] — alpha环境判断\n\n**标签：** #量化 #回测 #指增 #框架\n"}, {"name": "2026-03-10 量化因子体系深度讨论", "path": "notes/sessions/2026-03-10_量化因子体系深度讨论.md", "category": "sessions", "content": "# 2026-03-10 量化因子体系深度讨论\n\n**参与者：** Roni + Musk\n\n## 讨论内容\n\n### 1. Alpha158 因子全面解读\n- 从 Qlib 源码提取了完整 158 个因子的定义\n- 为每个因子制作了 FOF 视角的教学版解读（大白话+类比+信号解读）\n- 产出文件：`~/Desktop/quant-backtest/alpha158_factors.html`\n\n### 2. 300指增回测框架讨论\n- 明确了四步框架：选股模型 → 组合构建 → 换仓执行 → 绩效评价\n- 能力分级：L1(TopK简易) → L2(行业中性+约束) → L3(Barra优化器) → L4(实盘,不做)\n- 决策：先跑L1看alpha模型效果，再加Barra约束\n\n### 3. Barra CNE6 风格因子详解\n- 10大风格因子逐个讲解：Size/Beta/Momentum/ResVol/NL-Size/BP/Liquidity/EY/Growth/Leverage\n- 每个因子的计算方式、不控制的后果、与FOF评价的关联\n- 核心观点：Alpha158是进攻（选股），Barra是防守（控风格）\n\n### 4. 关键共识\n- 指增不该赌大小盘、不该赌价值/成长、不该赌Beta → 只赚纯alpha\n- Size是A股量化最大的坑（2021小盘行情→2024小微盘暴跌）\n- Alpha158只是基线（纯量价），后续要加基本面/资金流/另类因子\n\n## 产出物\n- `alpha158_factors.html` — Alpha158因子教学版图鉴\n- Smart Notes: Alpha158量价因子库、Barra CNE6风格因子、300指增回测框架\n\n## Roni的反馈\n- \"跟你聊天很棒\" — 因子讲解的方式（大白话+FOF类比）效果好\n- 要求把讨论内容记录到Smart Notes\n\n**标签：** #量化 #因子 #Barra #对话记录\n"}, {"name": "择时回测方法论", "path": "notes/concepts/择时回测方法论.md", "category": "concepts", "content": "# 择时回测方法论\n\n**定义:** 把交易直觉/看板指标转化为可量化择时信号的标准化框架。适用于所有FOF看板模块。\n\n**相关讨论:**\n- [[强势股情绪择时回测]] 是第一个试验田\n- [[Alpha158_量价因子库]] 是选股侧对照\n- [[300指增回测框架]] 是alpha端框架\n\n## 三层架构\n\n### 第一层：单因子检验\n- 对每个候选因子，计算IC（和未来N天收益的Spearman相关系数）\n- 按因子值分5档，看每档的未来收益是否单调\n- 判断因子方向：趋势型（高→涨）vs 反转型（高→跌）\n- **关键指标：** IC、ICIR、分档单调性、多空差\n\n### 第二层：因子组合\n- 方案A：专家权重（现有看板配置）\n- 方案B：IC加权（数据驱动，按IC绝对值分配权重）\n- 方案C：单因子直接映射（反转/不反转）\n- 方案D：周期标签离散映射\n- **关键决策：** 因子方向必须正确（趋势vs反转）\n\n### 第三层：仓位映射+回测\n- 离散档位：信号分5档 → 对应20%/40%/60%/80%/100%仓位\n- Sigmoid连续映射：平滑过渡，可调center/steepness\n- 周期标签直接映射：冰点→20%，加速→100%等\n- **回测规则：** T+1执行、最小调仓10%、单边成本0.5%\n\n## 评估体系\n- **绝对收益：** 年化收益、夏普比率\n- **相对收益：** 超额收益（vs满仓）、超额夏普\n- **风控价值：** 最大回撤、回撤改善幅度\n- **择时质量：** 择时胜率、踏空率\n- **实操成本：** 换仓次数、平均仓位\n\n## 关键教训\n1. **样本偏差是最大陷阱** — 131天得出反转结论，524天变成趋势型。至少2年数据。\n2. **因子方向决定成败** — 方向搞反直接亏钱（方案C：-23.2%）\n3. **回撤控制可能比超额收益更值钱** — 对FOF来说客户留存>绝对收益\n4. **信号弱时别急着重仓** — IC<0.1的因子单独用效果有限，需要多因子组合\n\n## 复制到其他模块\n强势股验证通过后，同一框架可以复制到：\n- 量化股票环境适配（成交额CV、拥挤度）\n- 商品CTA环境适配\n- 转债指增环境适配\n- 耐心资本/国家队信号\n\n**标签:** #方法论 #择时 #回测框架 #FOF #因子检验\n"}, {"name": "2026-03-11 强势股情绪择时回测", "path": "notes/sessions/2026-03-11_强势股情绪择时回测.md", "category": "sessions", "content": "# 强势股情绪择时回测\n\n**定义:** 用强势股涨跌停数据计算情绪指数（0-100），映射成沪深300的仓位（0%-100%），验证择时效果。\n\n**相关讨论:**\n- [[强势股环境适配]] 提供了5个子因子（连板高度/晋级率/炸板率/涨跌停比/封板质量）\n- [[Alpha158_量价因子库]] 是选股侧的因子基准\n- 两股力量框架：市场化资金（情绪=主信号）+ 非市场化资金（耐心资本=修正信号）\n\n## 核心发现\n\n### 1. 情绪是趋势信号，不是逆向信号\n- 524天完整回测（2024.01-2026.03），情绪IC=+0.087\n- 情绪最高档 → 未来20天沪深300平均涨3.19%\n- 情绪最低档 → 未来20天只涨0.98%\n- **直觉\"情绪高=见顶\"是错的**，至少在这个数据窗口内\n\n### 2. 样本偏差是真正的敌人\n- 131天牛市样本 → 得出\"反转型\"结论（IC=-0.19）\n- 524天完整样本 → 完全反转为\"趋势型\"（IC=+0.09）\n- **教训：短样本的结论不能当真，至少2年以上**\n\n### 3. 回撤控制是实在的价值\n- A1方案（离散档位）最大回撤-3.2%（满仓-15.7%）\n- 回撤改善12.5%，夏普比满仓还高\n- **对FOF来说，回撤控制≈客户留存**\n\n### 4. 周期标签的意外结果\n- **加速期**未来20天涨2.79%（最强看涨信号）\n- **冰点**反而跌-0.39%（样本仅5天，不可靠）\n- 退潮期竟然也涨+1.40%（说明市场在结构性轮动）\n\n## 因子排行（20日IC）\n| 因子 | IC | 方向 | 解读 |\n|------|-----|------|------|\n| sentiment | +0.087 | 趋势↗ | 综合情绪高→看涨 |\n| max_height | +0.069 | 趋势↗ | 龙头效应强→看涨 |\n| promotion_rate | +0.054 | 趋势↗ | 接力意愿强→看涨 |\n| down_count | +0.049 | 趋势↗ | 恐慌出清→反弹 |\n| ud_ratio | -0.027 | 弱反转↘ | 多头过强略看跌 |\n\n## 当前问题\n- 所有6种仓位方案都跑输满仓——因为映射方向反了（假设高情绪→减仓）\n- IC绝对值都在0.1以下，信号偏弱\n- 2年数据仍嫌短，需要3-5年验证\n\n## 下一步\n1. 加入\"顺势择时\"方案（高情绪→加仓）\n2. 叠加耐心资本作为修正信号\n3. 多因子组合增强信号强度\n4. 接入iFind扩展历史数据\n\n**标签:** #择时 #情绪因子 #回测 #强势股 #FOF仓位管理\n"}, {"name": "强势股择时因子全景", "path": "notes/concepts/强势股择时因子全景.md", "category": "concepts", "content": "# 强势股择时因子全景\n\n**定义:** 从强势股涨跌停生态中提取的全部可量化择时因子，用于FOF仓位管理。\n\n**相关讨论:**\n- [[强势股情绪择时回测]] — 第一轮回测结果\n- [[择时回测方法论]] — 三层框架\n- [[封单额轧差_抄底指标]] — 冰点判定核心指标\n- [[涨停指数信号框架v3]] — 三重交叉验证\n\n## 因子全景（中证1000，20日IC）\n\n### 第一梯队（|IC| > 0.05，有实战价值）\n| 因子 | IC | 方向 | 核心逻辑 |\n|------|-----|------|----------|\n| **down_count** 跌停家数 | +0.095 | 趋势↗ | 恐慌出清→反弹，\"别人恐惧时贪婪\" |\n| **seal_spread** 封单额轧差 | +0.088 | 趋势↗ | 跌停封单远超涨停=冰点=抄底 |\n| **ud_market_ratio** 涨跌家数比 | +0.052 | 趋势↗ | 全市场涨多跌少→继续涨 |\n| **promotion_rate** 晋级率 | -0.054* | 弱反转 | 接力过强→过热 |\n| **max_height** 连板高度 | -0.051* | 反转↘ | 龙头高度太高→见顶 |\n\n### 第二梯队（|IC| 0.03-0.05）\n| 因子 | IC | 方向 | 核心逻辑 |\n|------|-----|------|----------|\n| **sentiment** 综合情绪 | -0.032 | 反转↘ | 情绪高→减仓（中小盘） |\n| **first_bias** 首板BIAS | -0.040 | 反转↘ | 首板乖离率高=拥挤见顶 |\n\n### 第三梯队（|IC| < 0.03，信号弱）\n| 因子 | IC | 备注 |\n|------|-----|------|\n| zha_rate 炸板率 | ~0 | 无预测力 |\n| up_count 涨停家数 | ~0 | 单独无效 |\n| seal_ratio 封单比值 | +0.02 | 弱于轧差 |\n\n## 关键发现\n\n### 1. 冰点指标组合\n**seal_spread（封单轧差）+ down_count（跌停家数）** 是最强的冰点判定组合：\n- 封单轧差大幅为负（<5%分位数）= 恐慌到极致\n- 跌停家数暴增 = 市场在无差别抛售\n- 两者共振时 = **高置信度底部信号**\n- 历史验证：20240130/31, 20240415/16, 20240910 均命中底部\n\n### 2. 过热指标组合\n**first_bias（首板BIAS）+ sentiment（情绪）+ max_height（连板高度）** 是过热信号：\n- 首板乖离率飙升 = 涨停板被过度追捧\n- 情绪高位 + 连板高度极端 = 分歧/退潮前兆\n- 方向一致（都是反转型IC < 0）\n\n### 3. 不对称性\n- **冰点信号比过热信号更可靠**（IC更大，分档收益更单调）\n- 这符合行为金融：恐慌是尖锐的（暴跌），贪婪是渐进的（慢涨）\n- FOF含义：**抄底比逃顶更容易量化**\n\n## 因子在不同指数上的表现差异\n- 中小盘（中证1000/国证2000）：情绪、连板高度是**反转型**\n- 大盘（沪深300）：情绪几乎无效，连板高度弱趋势\n- down_count 和 seal_spread 跨指数一致（都是趋势型/冰点信号）\n- **结论：冰点信号是普适的，过热信号对中小盘更有效**\n\n## 数据来源\n- 涨跌停缓存：`~/Desktop/gamt-dashboard/env_fit/momentum_stock/_cache/`（526天）\n- 全市场日线：`limit_index/_cache_daily/`（526天）\n- 涨停指数：`limit_index/limit_index.csv`（479天）\n- 封单轧差：`limit_index/seal_spread/seal_spread.csv`（526天）\n\n**标签:** #因子 #择时 #强势股 #冰点 #封单轧差 #回测\n"}, {"name": "2026-03-11 强势股择时单因子检验结论", "path": "notes/sessions/2026-03-11_强势股择时单因子检验结论.md", "category": "sessions", "content": "# 2026-03-11 强势股择时单因子检验结论\n\n**定义:** 第一轮单因子择时检验的完整结论，12个因子×3个指数×526天。\n\n**相关讨论:**\n- [[强势股择时因子全景]] — 因子IC排行\n- [[择时回测方法论]] — 三层框架设计\n- [[封单额轧差_抄底指标]] — 冰点信号核心\n\n## 检验概要\n\n- **因子数量:** 12个（情绪、晋级率、炸板率、涨跌停比、连板高度、涨停家数、跌停家数、一进二率、首板BIAS、涨跌家数比、封单额轧差、封单比值）\n- **指数:** 中证1000 / 国证2000 / 沪深300\n- **时间:** 2024-01-02 ~ 2026-03-10（526个交易日）\n- **方法:** Spearman Rank IC（因子值 vs 未来20日累计收益）\n\n## 因子排行（中证1000）\n\n| 因子 | IC | 能力 | 逻辑 |\n|------|-----|------|--------|\n| 跌停家数 | +0.095 | ⭐⭐⭐ | 跌停越多→未来涨越多（恐慌出清） |\n| **封单额轧差** | **+0.088** | **⭐⭐⭐** | **跌停封单远超涨停=冰点=抄底** |\n| 涨跌家数比 | +0.052 | ⭐⭐ | 全市场涨多跌少→惯性继续涨 |\n| 首板BIAS | -0.040 | ⭐⭐ | 首板乖离率高=拥挤见顶 |\n| 综合情绪 | -0.032 | ⭐ | 情绪高→后面跌（中小盘有效） |\n| 连板高度 | -0.030 | ⭐ | 龙头太高→见顶 |\n| 炸板率 | ~0 | ❌ | 单独无预测力 |\n| 涨停家数 | ~0 | ❌ | 单独无预测力 |\n| 封单比值 | +0.02 | ❌ | 弱于封单轧差 |\n\n## 三大结论\n\n### 1. 冰点信号 > 过热信号\n最强因子全是\"恐慌指标\"。抄底比逃顶更容易量化——恐慌是尖锐的（暴跌一步到位），贪婪是渐进的（慢慢磨顶）。\n\n封单轧差极端恐慌信号（<5%分位数）精准命中历史底部：\n- 2024.01.30（1月暴跌底）✅\n- 2024.04.15（4月调整底）✅\n- 2024.09.10（924行情前最后一跌）✅\n- 2024.12.17（年底调整底）✅\n\n### 2. 对中小盘有效，对大盘无效\n- 中证1000/国证2000：情绪、连板高度是反转型（高→后面跌）\n- 沪深300：情绪IC=-0.013，几乎无效\n- 合理——涨停板生态本身就是中小盘的事\n\n### 3. 策略尚未跑赢满仓\n所有6种仓位策略全部跑输满仓持有。原因：2024-2026整体牛市，减仓=踏空。\n这不代表因子无效——只是简单的线性仓位映射不够。\n\n## 下一步\n1. **冰点加仓策略** — 不做常态择时，只在极端恐慌时加仓\n2. **多因子组合** — 冰点因子 + 过热因子双向\n3. **分牛熊检验** — 单独看2024.01-09熊市段表现\n4. **非线性映射** — 只在极端区间动仓位，中间保持不动\n\n**标签:** #择时 #单因子 #结论 #冰点 #强势股 #回测\n"}, {"name": "GAMT看板工作流与Git操作指南", "path": "notes/decisions/GAMT看板工作流与Git操作指南.md", "category": "decisions", "content": "# GAMT 看板工作流与 Git 操作指南\n\n**创建时间**: 2026-03-31  \n**类型**: 决策记录  \n**标签**: #工作流 #Git #部署 #GAMT\n\n---\n\n## 核心结论\n\n### Git Push 不需要代理\n- 本地和腾讯云都用 **HTTPS + GitHub Personal Access Token**\n- URL 格式：`https://username:token@github.com/repo.git`\n- 国内直连 GitHub HTTPS 能通（虽然偶尔慢）\n- **实测验证：关闭代理，git push 成功**\n\n### 腾讯云每天自动 push\n- 腾讯云 cron：08:20 / 17:00 / 18:00\n- 每次跑完 `update_all.py` 后自动 `git push`\n- commit 作者：`GAMT Server <server@gamtfof.com>`\n- **所以不手动 push，前端也会每天更新**\n\n### 本地 Mac 也在 push\n- 本地 cron：17:00 / 18:00\n- 也跑 `update_all.py` 并 push\n- commit 作者：`byihuang-max`\n- 作为备份和补跑机制\n\n---\n\n## 完整工作流\n\n```\n【数据更新层】\n\n腾讯云 cron (08:20/17:00/18:00)\n  ↓\npython3 update_all.py\n  ↓\n拉数据 (Tushare/iFind/火富牛)\n  ↓\n生成 JSON/HTML\n  ↓\ngit add + commit + push\n  ↓\nGitHub 仓库更新\n  ↓\nCloudflare Pages 自动部署\n  ↓\n前端显示最新数据\n```\n\n---\n\n## 什么时候需要手动 push？\n\n### 需要手动 push 的情况\n- 新增模块\n- 改代码逻辑\n- 改前端页面结构\n- 改 HTML 模板\n- 临时修复 bug\n- 改 `module_registry.py`\n\n### 不需要手动 push 的情况\n- 日常数据更新（腾讯云自动处理）\n- 定时任务正常运行（自动 commit + push）\n\n---\n\n## Git 操作口令表\n\n### 最常用命令\n| 你说 | 我做 |\n|------|------|\n| **\"推 git\"** | 直接 push 当前改动 |\n| **\"查 git\"** | 检查未 push / 未 commit |\n| **\"上线这个模块\"** | commit + push + 确认部署 |\n| **\"帮我 commit + push\"** | 规范提交信息后 push |\n\n### 标准流程\n```bash\n# 1. 检查改动\ngit status\n\n# 2. 添加文件\ngit add -A\n\n# 3. 提交\ngit commit -m \"feat: 描述改动\"\n\n# 4. 推送\ngit push origin main\n\n# 5. 确认\ngit log origin/main -3\n```\n\n---\n\n## 三个角色分工\n\n### 1. 本地 Mac\n- **作用**: 开发台 / 调试台 / 备用生产机\n- **负责**: 写代码、测试模块、生成数据、补跑任务\n- **push 方式**: HTTPS + Token（不需要代理）\n\n### 2. 腾讯云服务器\n- **作用**: 生产服务器 + 后端服务器\n- **负责**: 定时自动更新、生成数据、提供 API\n- **push 方式**: HTTPS + Token（不需要代理）\n- **IP**: 111.229.129.146\n\n### 3. GitHub + Cloudflare Pages\n- **GitHub**: 中央仓库 + 部署中转站\n- **Pages**: 静态前端托管\n- **触发**: GitHub push → 自动部署\n\n---\n\n## 常见误区澄清\n\n### 误区 1: \"push 必须开代理\"\n❌ 错误  \n✅ 正确：HTTPS + Token 方式不需要代理\n\n### 误区 2: \"腾讯云 push 不上去\"\n❌ 错误  \n✅ 正确：腾讯云每天都在成功 push\n\n### 误区 3: \"日志里的同步失败 = git push 失败\"\n❌ 错误  \n✅ 正确：那是 SSH 同步到其他服务器失败，git push 本身成功\n\n---\n\n## 验证方法\n\n### 检查本地和远端差异\n```bash\ncd ~/Desktop/gamt-dashboard\ngit log --oneline -5\ngit log origin/main --oneline -5\n```\n\n### 测试不开代理能否 push\n```bash\nunset http_proxy\nunset https_proxy\ngit push --dry-run origin main\n```\n\n### 查看谁在 push\n```bash\ngit log --format=\"%h %ai %an %s\" -10\n```\n\n---\n\n## 关键文件位置\n\n- 本地项目：`~/Desktop/gamt-dashboard/`\n- 腾讯云项目：`/home/ubuntu/gamt-dashboard/`\n- 更新脚本：`server/update_all.py`\n- 模块注册：`server/module_registry.py`\n- GitHub 仓库：`https://github.com/byihuang-max/spread-dashboard`\n- 前端地址：`https://gamt-dashboard.pages.dev/`\n- 正式域名：`https://dashboard.gamtfof.com/`\n\n---\n\n## 记录时间\n2026-03-31 19:12\n"}, {"name": "2026-04-04 财报风险因子可视化页面设计", "path": "notes/2026-04-04_财报风险因子可视化页面设计.md", "category": "notes", "content": "# 财报风险因子可视化页面设计\n\n**日期**: 2026-04-04  \n**类型**: 决策  \n**标签**: #财报风险 #因子化 #可视化 #PM工具\n\n---\n\n## 核心定位\n\n**不是\"垃圾股榜单\"，而是\"行业财报风险因子地图\"**\n\n这个页面的目标是把\"行业风险如何被定义\"这件事因子化、讲清楚，而不是简单列出最差的几只票。\n\n---\n\n## 三个核心理解\n\n### 1. 关于票的理解\n- **一个季度才算一次**，不需要高频数据\n- **表格必须完整**，包含全部A股\n- **不要只给Top N**，PM需要看全市场映射\n- 支持按行业、因子、分数、是否剔除筛选\n\n### 2. 关于行业风险的理解\n- **目标是定义每个行业的风险框架**\n- 每个行业有它自己该盯的财务指标\n- 要把\"为什么这个行业看这些指标\"的逻辑讲清楚\n- 例如电子行业：需求波动、库存堆积、现金回流慢、短债覆盖压力\n\n### 3. 关于表格的理解\n- 对于做多强势股，最差的5-20只票意义不大\n- 重要的是把最强的挑出来，最差的要给完整分布\n- **每一个部分的构建要去想底层思路**\n\n---\n\n## 页面结构（三层架构）\n\n### 第一层：行业风险地图\n**主视角：行业**\n\n展示内容：\n- 全行业热力图（行业 × 风险因子）\n- 每个行业的主导风险因子\n- 行业平均风险水平\n- 行业内高风险占比\n- 行业风险定义说明\n\n### 第二层：行业因子拆解\n**深入：行业内部结构**\n\n展示内容：\n- 这个行业为什么看这几个因子（逻辑说明）\n- 各因子在行业内的分布\n- 因子之间谁是主导矛盾\n- 行业内全部股票的分层（不只看Top N）\n\n### 第三层：个股解释页\n**验证：单票在行业框架下的位置**\n\n展示内容：\n- 这只票在行业框架下为什么得这个分\n- 4个核心子因子拆解：\n  - 利润恶化分数\n  - 现金流恶化分数\n  - 短债压力分数\n  - 营运资本恶化分数\n- 历史截面变化（前年年报、去年Q1/Q2/Q3）\n- 一段人话解释（自动生成）\n\n---\n\n## 可视化重点\n\n**不再把\"最新高风险Top20\"当核心模块**\n\n改用以下图表类型：\n1. **行业 × 风险因子 热力图** - 一眼看出哪个行业的核心问题是什么\n2. **行业内股票风险分布直方图/箱线图** - 看分布，不只看极值\n3. **个股因子雷达图或条形图** - 4个子因子的拆解\n4. **历史截面趋势图** - 看\"从哪里开始坏掉\"\n5. **完整明细表** - 支持筛选，全市场映射\n\n---\n\n## 技术实现\n\n- **前端**: 纯HTML + Chart.js + 原生JS\n- **数据**: 读取JSON文件（从CSV转换）\n- **部署**: 独立页面，后续可接入GAMT导航栏\n- **更新频率**: 季度更新（跟随财报披露）\n\n---\n\n## 接入GAMT的方式（待确认）\n\n两种方案：\n1. **独立页面** - 在GAMT导航栏加\"财报风险\"入口\n2. **嵌入模块** - 把总览层卡片嵌到现有看板\n\n---\n\n## 一句话总结\n\n**这页不是\"垃圾股剔除名单\"，而是\"行业财报风险因子地图 + 全市场映射 + 单票解释器\"。**\n\n---\n\n## 下一步\n\n1. 确认CSV路径和字段结构\n2. 生成HTML原型（今天完成）\n3. 确认接入GAMT的方式\n\n---\n\n## 2026-04-05 补充：验证层的价值与最小可行落地\n\n### 一个关键升级\n\n这套东西不能只停在“我反向筛出一些看起来危险的票”，还需要一个**验证层**，去证明剔除项是不是后验上真的更差。\n\n但第一步不需要上来就做大而全，也**不是做股价回测**。\n\n### 最聪明、也最轻的验证办法\n\n先缩小验证域，只做：\n\n- **剔除项样本**\n- 在这些票里找**已经发年报**的公司\n- 直接看这些公司发出来的年报是不是“普遍不好”\n\n这一步本质上验证的是：\n\n**我们事前打成剔除项的票，在后验财报上是不是大概率真的不行。**\n\n### 为什么这个验证很值钱\n\n因为它不需要额外发明复杂方法论，而是直接回答最现实的问题：\n\n- 这套剔除逻辑是不是有命中率\n- 是不是在胡筛\n- 行业规则有没有提供增量信息\n- 至少在最危险那一批票上，后验有没有被验证\n\n### 第一版验证层，故意做窄\n\n先不碰全市场，不碰收益，不碰完整统计学显著性。\n\n先做一个极窄但很实用的口径：\n\n1. 从 `exclude_flag = 1` 的股票里取样\n2. 找出其中**已披露最新年报**的公司\n3. 观察这些公司后验的几个核心结果是否偏差：\n   - 利润同比是否明显更差\n   - 经营现金流是否偏弱/为负\n   - 货币资金是否覆盖不了短债\n   - 是否存在明显减值 / ST / 非标 / 大亏\n4. 直接形成一个“剔除项后验验证表”\n\n### 这个验证层的真正意义\n\n不是为了证明“模型绝对正确”，而是为了回答：\n\n- **最危险那一批，我们抓得准不准？**\n\n如果这一步先能成立，后面再往外扩：\n\n- 剔除组 vs 非剔除组\n- 行业内命中率\n- 误杀案例\n- 非标 / ST / 减值事件验证\n\n### 产品层面的理解\n\n因此，这套财报风险页面未来不只是三层：\n\n1. 行业风险地图\n2. 行业因子拆解\n3. 个股解释器\n\n后面还应该补成四层：\n\n4. **验证层** —— 用已披露财报去检验剔除项有没有后验命中率\n\n---\n\n## 2026-04-05 再补：验证层第一次跑通后的方法与发现\n\n### 这次最重要的，不是某个瞬时数字，而是验证框架跑通了\n\n已经把财报风险解释器从“只有筛选层”推进到“筛选层 + 验证层”。\n\n验证层目前拆成两面：\n\n1. **正向验证**\n   - 已披露 2025 年报的公司里，落在剔除项里的票，后验财务是不是确实更差\n2. **反向验证**\n   - 已披露 2025 年报但**不在剔除项**里的公司里，有没有其实也很差的漏判样本\n\n### 今年年报验证口径（第一版）\n\n- 披露样本：`disclosure_date` 中 `end_date = 20251231`，且 `actual_date <= 20260405`\n- 当前已实际披露 2025 年报公司：**1285 家**\n- 与财务字段成功对齐样本：**1281 家**\n\n### 正向验证（第一次尝试）\n\n- 剔除项中，已披露 2025 年报并成功对齐字段的：**85 家**\n- 当前“坏信号”定义（第一版）包含：\n  - 利润同比为负\n  - 经营现金流为负\n  - 货币资金 < 短债\n  - 资产负债率 > 70%\n  - 现金流/营收为负\n- 结果：这 85 家里，**全部都有至少 2 个坏信号**；其中 **32 家有至少 3 个坏信号**\n\n### 反向验证（第一次尝试）\n\n- 在其余已披露但**不在剔除项**的样本中：\n  - **149 家** 仍有 `bad_signal_count >= 2`\n  - **35 家** 仍有 `bad_signal_count >= 3`\n- 这说明当前规则已经有一定 **precision**，能抓住一批真坏票；\n  但 **recall** 还不够，仍然漏掉了一批后验也很差的票。\n\n### 漏判归因的第一眼结论\n\n漏判样本（bad >= 2）主要集中在：\n\n- 证券\n- 元器件\n- 半导体\n- 银行\n- 生物制药\n- 航空\n- 电气设备\n- 化工原料\n\n严格漏判（bad >= 3）里也出现了：\n\n- 证券\n- 元器件\n- 普钢\n- 食品\n- 生物制药\n- 化学制药\n- 航空\n\n### 坏信号频次（漏判样本里）\n\n- `现金流/营收为负`：119\n- `经营现金流为负`：86\n- `资产负债率 > 70%`：70\n- `货币资金 < 短债`：61\n\n这说明当前规则最容易漏掉的，往往不是单一利润问题，而是：\n\n**现金流质量弱 + 资产负债表压力重** 的组合。\n\n### 2026-04-05 下午 第四个板块正式定名：财报验证层\n\n**产品结构最终收敛为四个板块：**\n\n1. 行业风险地图\n2. 行业因子拆解\n3. 个股解释 / 完整明细\n4. **财报验证层**\n\n**财报验证层的定义：**\n用新披露财报去验证行业风险定义、恶化链条与筛选命中率的后验板块。\n\n**第四个板块包含 3 块（已删掉行业验证热力图）：**\n1. 总体验证总览（命中数 / 漏判数 / 命中率）\n2. 恶化链条验证表（行业 × 原定义风险链 × 财报验证结果）\n3. 样本清单（命中 / 漏判 / 争议三组）\n\n**关键口径共识：**\n- 财报验证层不再用统一标准，必须沿用行业逻辑里的\"截面标准\"和\"变化标准\"\n- \"变得更差\"是行业化的，不是统一财务指标\n- 行业逻辑的作用有三层：筛选层 / 解释层 / 验证层\n- 前端先不动，逻辑先理通\n\n### 这一轮真正沉淀下来的研发方向\n\n不是争论某个数字，而是把验证层固定成长期机制：\n\n1. **筛选层**：谁被打成剔除项\n2. **正向验证**：命中的票是不是后验上确实差\n3. **反向验证**：没命中的票里有没有其实也差的\n4. **归因层**：漏判主要发生在哪些行业、哪些口径\n5. **规则迭代层**：再决定阈值、行业修正和新增因子怎么补\n\n### 方法论上的一句话总结\n\n**思路比结果更重要。**\n\n这次最大的成果，不是“命中多少只”，而是：\n\n> 财报风险解释器的验证层已经跑通，可以开始围绕“命中 / 漏判 / 误杀”做真正可迭代的优化。\n\n---\n\n## 2026-04-05 下午再补：第四层已推前端，第一版页面口径落地\n\n在用户确认“先让我看效果”之后，已经把**第四层：财报验证层**直接接到现有页面底部。\n\n### 前端当前结构\n\n新增的第四层包含 3 个模块：\n\n1. **总览卡片**\n   - 已披露样本\n   - 命中样本\n   - 漏判样本\n   - 当前命中率\n\n2. **恶化链条验证表**\n   - 行业\n   - 行业类型\n   - 核心风险\n   - 变得更差的标准\n   - 本期主要坏信号\n   - 命中数 / 漏判数\n   - 不应误判情形\n\n3. **样本清单**\n   - 命中\n   - 漏判\n   - 争议\n   三个 tab 切换\n\n### 已新增的数据与脚本\n\n- 行业恶化链条规则：\n  - `~/Desktop/gamt-dashboard/timing-research/industry_deterioration_rules.json`\n- 验证底表脚本：\n  - `~/Desktop/gamt-dashboard/timing-research/build_financial_validation_tables.py`\n- 前端读取 JSON：\n  - `~/Desktop/gamt-dashboard/data/financial_validation/validation_view.json`\n- 同时生成 3 张底表：\n  - `validation_summary.csv`\n  - `deterioration_chain_validation.csv`\n  - `validation_samples.csv`\n\n### 当前一个必须讲清楚的展示口径\n\n页面总览里如果直接显示：\n\n- 已披露样本：1281\n- 命中样本：85\n- 命中率：6.6%\n\n这只是**已披露全样本口径**下的命中率（85 / 1281）。\n\n但从策略有效性的表达角度，真正更重要的是：\n\n> 当前已进入剔除项、且已披露 2025 年报的这 85 个样本，**全部都有 ≥2 个坏信号**。\n\n也就是说：\n- `6.6%` 这个数字适合表达“在全披露样本里，当前命中的绝对占比”\n- 但不适合直接表达“策略准不准”\n- 后续页面文案必须补一句说明，否则 PM 很容易误解成“命中率只有 6.6%”\n\n### 产品与工程上的进一步共识\n\n- 财报风险 / 财报验证层已经被明确视为**独立模块**\n- 当前暂时仍挂在 `timing-research/` 周边生成，只是为了先把链路跑通\n- 正确做法不是中途反复搬，而是：\n  1. 先把逻辑、底表、页面都跑顺\n  2. 最后一次性迁到独立目录\n  3. 迁移时统一对齐线下生成链路、线上读取链路、目录结构与链接结构\n\n### 当前前端上线状态\n\n- 页面文件：`~/Desktop/gamt-dashboard/financial_risk_factor.html`\n- 本次上线 commit：`bd40f6c`\n- message：`feat: add financial validation layer (4th section)`\n\n### 到这一步，这条线的产品结构已经正式变成四层\n\n1. 行业风险地图\n2. 行业因子拆解\n3. 个股解释 / 完整明细\n4. 财报验证层\n"}, {"name": "024 财报雷票系统与行业ETF基本面写照是一体两面", "path": "notes/024_财报雷票系统与行业ETF基本面写照是一体两面_2026-04-04.md", "category": "notes", "content": "# 财报雷票系统与行业ETF基本面写照是一体两面\n\n- **日期**: 2026-04-04\n- **类型**: 概念 / 产品抽象\n- **标签**: 财报风险, 雷票, 行业ETF, 基本面强弱, PM工具\n\n## 核心结论\n\n当前在 GAMT 内开发的“财报预期风险看板 / 雷票剔除系统”，不应该只被理解为一个 **4 月财报窗口的爆雷票预测工具**。\n\n当底层数据扩展到**全市场全量股票**后，它本质上会同时变成一个：\n\n1. **风险剔除系统**：帮助多因子选股 PM 识别哪些行业、哪些股票在财报窗口更危险，适合做剔除或降权；\n2. **行业ETF基本面写照系统**：通过行业内全量股票的财务信号分布，反向刻画该行业/ETF 的基本面强弱、脆弱点与结构质量。\n\n换句话说：\n\n> “雷票系统”和“行业ETF基本面强弱系统”，本质上是一套底层数据与行业框架的两种读取方式。\n\n---\n\n## 为什么这两个视角是一体两面\n\n如果我们已经跑通：\n- 全市场股票池\n- 四个财报截面（前年年报、去年Q1/Q2/Q3）\n- 行业内个股的财务风险因子\n- 行业内风险分布与分位\n\n那么这套系统就不仅能回答：\n- 哪些股票要剔除？\n- 哪些行业容易爆雷？\n\n还可以回答：\n- 哪些行业的财务质量在整体走弱？\n- 哪些行业的库存/应收/现金流结构明显恶化？\n- 哪些行业虽然少数股票爆雷，但整体基本面仍稳？\n- 哪些行业整体财务质量更适合做多、做行业ETF配置？\n\n也就是说：\n- **自下而上看**：它是个股风险打分 / 雷票识别系统\n- **自上而下看**：它是行业ETF基本面强弱雷达\n\n---\n\n## 对 PM 的实际价值\n\n### 视角一：4月财报窗口的风险剔除\n给多因子 PM 用时，重点是：\n- 先按行业理解财务脆弱点\n- 再看行业内哪些票处于高风险分位\n- 最后决定是否做剔除、降权、回避\n\n### 视角二：行业配置 / ETF 观察\n给行业配置或宏观中观视角用时，重点是：\n- 某行业整体财务质量是否改善/恶化\n- 风险是否集中在少数尾部票，还是整个行业面上变差\n- 行业 ETF 的基本面支撑是否在增强或减弱\n\n因此，这套系统的输出不应只停留在：\n- “危险个股名单”\n\n还应逐步扩展到：\n- 行业财务温度\n- 行业脆弱点标签\n- 行业ETF基本面强弱对比\n- 行业内部分布宽度（是集中爆雷，还是整体走弱）\n\n---\n\n## 后续产品化方向\n\n### A. 风险剔除视角\n- 个股 landmine score\n- 行业内分位数\n- 剔除建议（硬剔 / 软剔）\n- 风险解释链条（不是只说利润差，而是说为什么差）\n\n### B. 行业ETF视角\n- 行业平均风险分\n- 行业内高风险个股占比\n- 行业内核心因子恶化程度\n- 行业主导矛盾（库存、应收、现金流、债务、利润质量）\n- 行业分布图（尾部风险 vs 整体恶化）\n\n---\n\n## 一句话定位\n\n> 这不是一个单纯的“爆雷票名单工具”，而是一套把**行业财报脆弱性**翻译成 PM 可用信号的框架；既能做风险剔除，也能反过来做行业ETF基本面强弱刻画。\n"}, {"name": "2026-04-06 行业财报风险系统升级为双轴评分体系", "path": "notes/2026-04-06_行业财报风险系统升级为双轴评分体系.md", "category": "decisions", "content": "# 行业财报风险系统升级为双轴评分体系\n\n**日期**: 2026-04-06  \n**类型**: 决策 / 框架升级  \n**标签**: #财报风险 #行业规则 #双轴评分 #正负向 #万德三级行业 #传导链\n\n---\n\n## 核心决策\n\n当前的\"财报风险因子页面\"不应只停留在\"风险剔除系统\"，而应升级为：\n\n**分行业基本面双轴评分体系**\n\n- **负向轴**：经营恶化分（风险剔除）\n- **正向轴**：经营质量分（优等生识别）\n\n这不是简单的\"加一个反向打分\"，而是整个系统定位的升级：\n\n> 从\"财报雷票识别器\"  \n> 升级为\"分行业基本面评分与分层系统\"\n\n---\n\n## 为什么可以正反一起做\n\n一旦有了：\n- **5 年全 A 股财务数据**（万德三级行业）\n- 全市场覆盖\n- 多年期面板\n- 分行业可比\n- 后验验证\n\n这套系统就不只是\"坏公司识别器\"，而是：\n\n**分行业的基本面质量评分系统**\n\n它天然可以拆成两面：\n\n### 负向端：差等生 / 风险生\n- 哪些公司经营质量在恶化\n- 哪些是财报雷\n- 哪些该剔除\n- 哪些是连续下台阶而不是短期波动\n\n### 正向端：优等生 / 经营强者\n- 哪些公司在本行业里经营质量持续领先\n- 哪些不是题材强，而是基本面真强\n- 哪些是利润、现金流、周转、负债表一起更健康\n- 哪些行业里\"最稳、最能打\"的公司是谁\n\n---\n\n## 行业规则是整个系统的脊梁\n\n行业规则不只是\"这个行业看什么指标\"，而是在回答 **5 个层次的问题**：\n\n### 第 1 层：这个行业的生意本质是什么\n- 赚的是周转的钱，还是杠杆的钱，还是研发兑现的钱\n- 这决定了评分系统应该侧重哪个轴\n\n### 第 2 层：什么叫\"好\"，什么叫\"坏\"\n- 银行利润下滑 10% 和半导体利润下滑 10%，严重程度完全不一样\n- 消费品库存高和电子库存高，含义完全不同\n- 不能跨行业用统一阈值\n\n### 第 3 层：恶化/改善的传导顺序\n- **先行因子 → 同步验证 → 滞后结果**\n- 有些行业是\"应收先坏 → 现金流跟着坏 → 利润最后坏\"\n- 有些行业是\"价格先跌 → 库存跌价 → 利润和现金一起坏\"\n- 不知道顺序，就不知道现在到底是\"刚开始坏\"还是\"已经快坏完了\"\n\n### 第 4 层：什么情况下不该判负\n- 半导体库存高但周转正常 → 战略备货\n- 生物制药持续亏损但现金储备足 → 研发投入期\n- 证券 CFO 为负 → 正常业务结构\n- 这层决定了系统有没有\"冤假错案\"\n\n### 第 5 层：什么情况下该判正\n- 优等生的定义也必须分行业\n- 消费品的优等生可能是\"高周转 + 高现金创造\"\n- 科技股的优等生可能是\"研发兑现 + 收入加速\"\n- 金融股的优等生可能是\"资产质量稳 + 拨备厚\"\n\n---\n\n## 升级后的行业规则结构\n\n```\n每个行业的规则 = {\n  生意本质,\n  \n  负向轴: {\n    bad_when,        // 什么叫差\n    worse_when,      // 什么叫在变差\n    not_worse_if,    // 什么情况不该判差\n    传导链: [先行因子, 同步验证, 滞后结果],\n  },\n  \n  正向轴: {\n    good_when,       // 什么叫好\n    better_when,     // 什么叫在变好\n    not_better_if,   // 什么情况不该判好（假强）\n    传导链: [先行因子, 同步验证, 滞后结果],\n  },\n  \n  阈值: {\n    行业内分位基准,   // 用 5 年全量数据算出来\n    极端值处理,       // 金融类/周期类需要特殊处理\n  },\n  \n  特例二级行业: [\n    { 名称, 归属, 差异点, 独立规则 }\n  ]\n}\n```\n\n---\n\n## 传导链的核心价值\n\n**传导链不是装饰，而是这套系统的核心竞争力。**\n\n它回答的是：\n\n### 对于负向轴\n- 这个行业的公司，通常是从哪里开始坏的？\n- 什么指标是\"先行信号\"（最早反映问题）\n- 什么指标是\"同步验证\"（确认恶化在传导）\n- 什么指标是\"滞后结果\"（已经坏完了）\n\n### 对于正向轴\n- 这个行业的优等生，通常是从哪里开始强的？\n- 什么指标是\"先行信号\"（最早反映改善）\n- 什么指标是\"同步验证\"（确认质量在提升）\n- 什么指标是\"滞后结果\"（已经变成稳定优势）\n\n### 为什么传导链很重要\n因为它决定了：\n- **你现在看到的信号，处于恶化/改善的哪个阶段**\n- 是刚开始坏，还是已经快坏完了\n- 是刚开始好，还是已经进入稳定期\n\n这直接影响 PM 的决策：\n- 如果只看到先行因子恶化，可能还有时间观察\n- 如果同步验证也开始恶化，说明传导链已经启动\n- 如果滞后结果也恶化了，说明已经坏透了\n\n---\n\n## 最终框架：双轴评分 + 行业内分层\n\n### 输出 1：负向轴（经营恶化分）\n- 谁在变坏\n- 适合：剔除项、风险预警、雷票识别\n\n### 输出 2：正向轴（经营质量分）\n- 谁在变好 / 谁长期更强\n- 适合：优等生筛选、行业龙头质量比较、基本面优选池\n\n### 输出 3：行业内分层\n- 优等生\n- 稳健生\n- 普通生\n- 风险生\n- 雷区生\n\n### 输出 4：风险-质量二维图\n横轴：经营质量  \n纵轴：恶化风险\n\n公司会分成四象限：\n- **右下：高质量低风险** → 真优等生\n- **右上：高质量高风险** → 可能景气拐点/高波动成长股\n- **左下：低质量低风险** → 平庸但暂时稳定\n- **左上：低质量高风险** → 真正该规避\n\n---\n\n## 价值与目标\n\n### 对 PM 的价值\n- **正向**：识别行业内真正的优等生，不只看题材和情绪\n- **负向**：识别财报雷和经营恶化股，做风险剔除\n- **多空**：正负两端都能用，甚至可以做多空组合\n\n### 对行业配置的价值\n- 行业内优等生占比\n- 行业内风险生占比\n- 行业整体基本面质量趋势\n- 行业 ETF 的基本面支撑强弱\n\n### 最终定位\n这不是一个\"财报雷票页面\"，而是：\n\n**分行业基本面评分与分层系统**\n\n它有两套标准：\n1. **打分体系**：正向质量分 + 负向风险分\n2. **财务体系**：分行业的财务恶化/改善传导链\n\n---\n\n## 后续工作要求\n\n### 1. 行业分析要非常细\n- 数据来源：**万德三级行业**\n- 5 年全 A 股财务数据\n- 由 Musk 进行分析\n\n### 2. 配合行业研报\n- 用于从研报中抽取、提炼每个行业的特征\n- 验证传导链是否符合行业实际\n- 补充行业特例规则\n\n### 3. 数据验证与规则迭代\n- 先用全量数据验证现有 31 个行业的负向规则\n- 看哪些规则靠谱、哪些太粗\n- 把阈值从拍脑袋升级成分行业分位\n- 再给每个行业补正向规则\n- 最后做行业内分层和二维图\n\n---\n\n## 一句话总结\n\n**有了 5 年全量数据之后，这个项目的定位从\"财报风险因子页面\"升级为\"分行业基本面双轴评分与分层系统\"，正负向都能做，甚至能做多空。行业规则是整个系统的脊梁，传导链是核心竞争力。**\n"}, {"name": "2026-04-12 自选股跟踪器模块数据源清单", "path": "notes/2026-04-12_自选股跟踪器模块数据源清单.md", "category": "notes", "content": "# 自选股跟踪器：模块数据源清单（2026-04-12）\n\n## 背景\n\n桌面项目：`~/Desktop/自选股跟踪器`\n\n这条线当前已经明确不再追求“所有模块都硬切到同一种接口”，而是采取更实用的分层方案：\n\n- **行情层**：优先走 `iFind direct API`\n- **事件层**：先保留可用方案，不强行全改成 direct API\n\n原因很简单：已经实测确认，`iFind direct API` 对 **行情/量价** 这类接口是通的，但对 `公告 / 新闻检索` 这类事件型入口，当前没有找到和 MCP 等价的现成 HTTP endpoint；直接尝试 `search_notice` / `search_news` 返回 `404`。\n\n---\n\n## 当前模块分层清单\n\n| 模块 | 文件 | 当前数据源 | 状态判断 |\n|---|---|---|---|\n| 股价变动 | `src/collectors/price_action_collector.py` | iFind direct API | 已切换，较干净 |\n| 量价关系 | `src/collectors/volume_price_collector.py` | iFind direct API | 已切换，较干净 |\n| 公告 | `src/collectors/announcement_collector.py` | iFind MCP | 仍依赖 MCP |\n| 舆情 | `src/collectors/sentiment_collector.py` | iFind MCP | 仍依赖 MCP |\n| 股东行为 | `src/collectors/shareholder_event_collector.py` | iFind MCP | 仍依赖 MCP |\n| 质押 | `src/collectors/pledge_collector.py` | iFind MCP | 仍依赖 MCP |\n| 资金异动 | `src/collectors/capital_flow_collector.py` | iFind MCP / 文本解析 | 未完成纯 API 化 |\n| 大单成交 | `src/collectors/block_trade_collector.py` | iFind MCP / 文本解析 | 未完成纯 API 化 |\n\n---\n\n## 核心依赖文件\n\n### 1）行情层依赖\n- `src/utils/ifind_client.py`\n\n当前已确认可用的 direct API 包括：\n- `get_access_token`\n- `real_time_quotation`\n- `cmd_history_quotation`\n\n已经实测：\n- `688262.SH`（国芯科技）的实时行情可拉\n- 历史行情与成交量可拉\n\n### 2）事件层依赖\n- `src/utils/ifind_mcp_client.py`\n\n当前事件层模块仍通过 MCP 拿：\n- 公告片段\n- 新闻片段\n- 一部分事件型文本结果\n\n但问题也很明确：\n- 返回偏文本/表格片段\n- 更适合“先拿到结果”\n- 不够适合后面做稳定工程化抽取\n\n---\n\n## 当前技术判断\n\n### 已经清楚的事\n1. **行情层适合 direct API**\n2. **事件层暂时不能强行全 direct API**\n3. 当前项目最合理的路线是：\n   - 先把分层口径定住\n   - 再逐步优化事件层，而不是继续在“全 direct API”上死磕\n\n### 为什么不继续硬拗“全 direct API”\n因为实测中：\n- `real_time_quotation`、`cmd_history_quotation` 可用\n- 但 `search_notice`、`search_news` 在 direct API 路径下返回 `404`\n\n这说明至少在目前已掌握的 HTTP 接口里：\n- 行情接口存在\n- 事件检索接口并没有以同样方式暴露出来\n\n所以如果现在强行把事件层都改成 direct API，大概率不是在推进项目，而是在和接口清单死耗。\n\n---\n\n## 项目当前正式口径\n\n`~/Desktop/自选股跟踪器` 现在按下面的结构推进：\n\n### A. 行情层（保留 direct API）\n目标模块：\n- 股价变动\n- 量价关系\n\n特点：\n- 结构清晰\n- 更适合定时任务\n- 更适合后面飞书直推稳定运行\n\n### B. 事件层（先分开）\n目标模块：\n- 公告\n- 舆情\n- 股东行为\n- 质押\n- 资金异动\n- 大单成交\n\n当前策略：\n- 先保留可用事件源\n- 先把日报结果稳定做出来\n- 后续如果找到 direct API 的正式事件接口，再逐步替换\n\n---\n\n## 对后续开发的实际意义\n\n这份清单的价值不是“记接口名”，而是防止后面继续绕回去。\n\n后面只要记住一句话：\n\n> **行情层已经能 direct API 化；事件层先别死磕统一，先保证可用和稳定。**\n\n这样才能更快推进到下一步：\n- 单票调试稳定\n- 多票股票池扩展\n- 定时任务\n- 飞书推送给领导\n\n---\n\n## 一句话总结\n\n到 2026-04-12 这一步，`自选股跟踪器` 的最优推进方式已经不是“全都改成一种接口”，而是：\n\n> **行情层用 iFind direct API，事件层单独保留可用源，先把系统做成。**\n"}, {"name": "2026-04-12 经济基本面模块MCP落地说明", "path": "notes/2026-04-12_经济基本面模块MCP落地说明.md", "category": "notes", "content": "# 2026-04-12 经济基本面模块 MCP 落地说明\n\n## 一句话\nGAMT 的“宏观与流动性 → 经济基本面”这条月频数据链，当前可以先用 **iFinD MCP** 跑通。\n\n原因很简单：\n- direct API 的 EDB 正确入口已经确认是 `https://quantapi.51ifind.com/api/v1/edb_service`\n- 但当前账号返回 `-4318`，即 **本月额度超限**\n- 而 MCP 的 `search_edb` / `get_edb_data` 已实测可成功返回月频宏观数据\n\n所以现阶段更现实的执行口径是：\n\n> **经济基本面模块先用 MCP 把图做起来，后续若 direct API 的 EDB 恢复，再切回更稳的生产链路。**\n\n---\n\n## 为什么这条线成立\n这个模块的核心特点不是高频，而是：\n- 大部分指标 **月更**\n- 指标数量有限\n- 重点是把宏观论证链画清楚，而不是做高频大吞吐\n\n所以 MCP 虽然不适合高频批量扫库，但对这一页是够用的。\n\n---\n\n## 已实测可用的 MCP 指标（第一批）\n\n### 1. 增长总量拆解图\n- `规模以上工业增加值:当月同比`\n- `社会消费品零售总额:当月同比`\n- `出口金额(人民币计价):总值:累计同比`\n- `固定资产投资(不含农户)完成额:累计同比`\n- `固定资产投资(不含农户)完成额:制造业:累计同比`\n- `固定资产投资(不含农户)完成额:基础设施建设投资:累计同比`\n- `房地产开发投资:累计同比`\n\n### 2. 信用结构拆解图\n- `社会融资规模存量:期末同比`\n- `社会融资规模存量:期末值`\n- `社会融资规模存量:政府债券:占比`\n- `金融机构:人民币贷款:累计增加:住户:中长期`\n- `金融机构:人民币贷款:累计增加:企(事)业单位:中长期`\n- `M1(货币):同比`\n- `M2(货币和准货币):同比`\n\n### 3. 地产修复验证图（已摸到的主字段）\n- `商品房销售面积:累计同比`\n\n---\n\n## 当前最合理的开发顺序\n\n### 第一批先开\n1. 增长总量拆解图\n2. 信用结构拆解图\n\n原因：\n- 主字段已基本摸清\n- MCP 已实测能返回\n- 最能支撑“经济基本面”第一页的主论证\n\n### 第二批再补\n3. 地产修复验证图\n4. 库存周期验证图\n\n原因：\n- 这两块还要继续补字段与口径\n- 但不影响先把核心框架搭起来\n\n---\n\n## 工程注意点\nMCP 的 EDB **要控频**。\n\n已实测：连续批量 `search_edb` 会触发：\n- `429`\n- `用户请求过于频繁，请稍后重试`\n\n所以更合适的做法是：\n- 一次只查少量指标\n- 把已确认字段固化到配置/映射表\n- 后续更新只做 `get_edb_data`，少做反复搜索\n\n一句话：\n\n> **MCP 适合“低频、少量、月更”的宏观图表链路，不适合高频批量探索式扫库。**\n\n---\n\n## 和已有价格链条说明的关系\n这条笔记不是替代 `026_PPI_CPI_流动性回流实体观察框架_2026-04-06`，而是给它补一层“数据落地路径”。\n\n前者解决：\n- 价格修复怎么解释\n- 流动性是否回流实体\n\n这条新说明解决：\n- 经济基本面模块新增 4 张图后，\n- **短期到底用哪条数据链先把页面做出来**\n\n也就是：\n- `026` 偏方法论与解释层\n- 本文偏数据接入与落地层\n\n---\n\n## 当前执行口径\n对于 GAMT 的“经济基本面”页，当前临时但明确的执行口径是：\n\n> **先用 iFinD MCP 跑通月频宏观图表，优先完成增长图与信用图；等 direct API 的 EDB 可用后，再评估是否切换。**\n\n标签：#GAMT #宏观 #经济基本面 #iFinD #MCP #EDB\n"}, {"name": "2026-04-12 GAMT用户库并表与主库统一", "path": "notes/2026-04-12_GAMT用户库并表与主库统一.md", "category": "notes", "content": "# 2026-04-12 GAMT 用户库并表与主库统一\n\n## 事件概述\n2026-04-12 晚，排查 GAMT 手机端管理员登录失败时，确认项目里曾同时存在两份用户库：\n\n- `~/Desktop/gamt-dashboard/users.db`\n- `~/Desktop/gamt-dashboard/server/users.db`\n\n这导致同一管理员账号在不同库中口径不一致，进而表现为：同样的账号密码，在不同运行链路下会出现“能登/不能登”的分叉现象。\n\n---\n\n## 这次做了什么\n### 1. 先确认问题根因\n确认不是简单的“手机输错密码”，而是 **双库分叉**：\n- 当前实际登录链路命中了旧库；\n- 新库与旧库中的重名用户（尤其管理员）存在哈希不一致；\n- 因此表面报错是“
