密码错了”，本质是服务端读了不同数据库文件。\n\n### 2. 做了稳妥并表\n合并时没有粗暴覆盖，而是采用了“保当前可用口径 + 保新库增量用户”的方式：\n- 保留当前实际可登录的管理员口径；\n- 把新库中旧库没有的用户保留下来；\n- 最终统一后主库用户数为 **27**。\n\n### 3. 统一唯一主库\n最终将：\n- `~/Desktop/gamt-dashboard/server/users.db`\n\n确定为 **唯一主库**。\n\n同时把根目录的：\n- `~/Desktop/gamt-dashboard/users.db`\n\n改成指向主库的**软链接**，避免未来再次出现两份库各自演化、继续分叉的问题。\n\n### 4. 代码层同步收口\n认证模块的数据库口径也同步收口到 `server/users.db`。\n\n本次修复提交为：\n- commit: `781a810`\n- message: `fix: unify auth database to server users db`\n\n执行日志显示：\n- 已同步到云端\n- 后端已重启\n\n---\n\n## 经验教训\n### 1. 登录问题不要只看表面报错\n后台提示“用户名或密码错误”，未必真是用户输错，也可能是：\n- 服务端读错库\n- 本地/线上库不一致\n- 历史迁移时遗留双库\n\n### 2. 用户系统必须只有一个主库\n认证、注册、删除、管理后台这类功能，一旦存在两份库并行，迟早会出现：\n- 某些用户能登，某些用户不能登\n- 管理员密码不同步\n- 用户列表与实际登录状态不一致\n\n所以这类系统必须尽早收口到单一主库。\n\n### 3. 并表优先保“当前可用链路”\n处理用户库合并时，不应先追求“结构最漂亮”，而应先保：\n- 当前已经能用的登录口径不被打断\n- 现有可用用户不失效\n- 再做统一与收口\n\n---\n\n## 当前状态\nGAMT 用户认证库现已统一为单库模式，后续新增/修改用户时，都应默认只以：\n\n`server/users.db`\n\n作为唯一有效主库处理。\n"}, {"name": "2026-04-13 财报风险页多年序列与单季度口径修正", "path": "notes/2026-04-13_财报风险页多年序列与单季度口径修正.md", "category": "notes", "content": "# 财报风险页多年序列与单季度口径修正\n\n**日期**: 2026-04-13  \n**类型**: 数据链路修正 / 验收口径补充  \n**标签**: #财报风险 #多年序列 #单季度拆分 #负基数同比 #万科A校验\n\n---\n\n## 一、这篇笔记与 4 月 12 日那篇的衔接关系\n\n这篇不是另起炉灶，而是对上一条：\n\n- `2026-04-12_财报双地图目标与数据底座确认.md`\n\n的**直接续写**。\n\n4 月 12 日那篇解决的是：\n- 目标要先做负向风险地图\n- 桌面财报数据库足够长\n- 主生成链应从 snapshot 走向多年底座\n\n而 4 月 13 日这一轮真正解决的是：\n\n> 当多年历史真的接进页面后，如何保证这些历史点**不是假动态**，而是能反映真实财报节奏的有效序列。\n\n---\n\n## 二、这一轮暴露出的两个真问题\n\n### 1）多年历史虽然接进来了，但前十几个截面几乎不抖\n\n用户第一眼就看出来了：\n- 历史长度变长了\n- 但前十几个点几乎像平线\n\n这说明问题不在前端，而在**多年历史口径本身**。\n\n根因后来确认是：\n\n- Wind Parquet 里的 `TOT_OPER_REV`\n- `NET_PROFIT_EXCL_MIN_INT_INC`\n- `NET_CASH_FLOWS_OPER_ACT`\n\n按当前使用场景应视作**累计值**，不能直接拿来做季度同比和趋势判断。\n\n如果直接拿累计值做：\n- `q_sales_yoy`\n- `q_dtprofit_yoy`\n- `q_ocf_to_sales`\n\n就会把很多历史波动压平，导致曲线看起来“有长度，但没动态”。\n\n### 2）历史详情文案仍在读旧 `periods`\n\n另一个真 bug 是：\n- 虽然 `merged_periods` 已经把多年历史融合进来\n- 但 `history` 构造时还在用旧的 `periods.get(p)`\n\n结果就是：\n- 分数部分部分吃到了多年数据\n- 但详情文案早期点位却读不到\n- 页面表现成“前段不抖 + 一堆暂无数据”\n\n---\n\n## 三、这一轮的核心修正\n\n### 1）累计值先拆成单季度值\n\n采用标准拆法：\n\n- Q1 = Q1累计\n- Q2 = H1累计 - Q1\n- Q3 = 三季报累计 - H1\n- Q4 = 年报累计 - 三季报\n\n然后再基于**单季度值**重算：\n\n- `q_sales_yoy`\n- `q_dtprofit_yoy`\n- `q_ocf_to_sales`\n- `ocf_to_or`\n- `inv_turn`\n- `ar_turn`\n\n### 2）历史展示统一改读 `merged_periods`\n\n把历史详情构造从：\n- `periods.get(p)`\n\n改为：\n- `merged_periods.get(p)`\n\n这样多年序列的数据和文案终于对齐。\n\n---\n\n## 四、人工验收方式也被重新定下来了\n\n这轮还有一个很重要的方法论收口：\n\n> 不能只看“代码跑通了”，必须随便找一家有代表性的公司，手工把累计值拆成单季度，再和页面历史点逐项对账。\n\n当前实际采用的验收样本是：\n\n- `000002.SZ 万科A`\n\n原因很直接：\n- 财报数据公开且连续\n- 2022-2025 的基本面恶化很典型\n- 网上公开叙事和市场记忆都比较清楚\n\n---\n\n## 五、万科A对账后的结论\n\n### 结论一：单季度拆分算法本身是对的\n\n把万科A的累计营收、扣非净利润、经营现金流拆成单季度后，\n与页面里的历史点重新对照，关键拐点是能对上的。\n\n例如：\n- 2023 年中到 2024 年，利润恶化明显加速\n- 经营现金流出现阶段性转负与波动\n- 页面上对应的风险分数和历史点方向大体一致\n\n这说明：\n\n> “多年序列 + 单季度拆分” 这一层不是假动态，而是已经开始具备财务事实基础。\n\n### 结论二：负数基数下不能机械看利润同比\n\n万科A对账时也暴露出另一个关键问题。\n\n比如：\n- 2023Q4 单季利润已经转负\n- 2024Q4 亏损进一步放大\n\n这时普通同比公式会给出一个类似：\n- `2061.7%`\n\n数学上没错，业务上却极易误导，\n因为它看起来像“大幅改善”，实际上却是**亏损扩大**。\n\n所以这轮确认了一个必须固化的规则：\n\n> 在亏损区间，利润同比百分比不能直接拿来做人话解释和风险打分。\n\n---\n\n## 六、利润层的新口径（已落到生成链）\n\n为了解决上面的问题，这轮在主生成链中新增了两层处理：\n\n- `describe_profit_change(yoy, current_profit, prior_profit)`\n- `profit_score_from_metrics(yoy, sales_yoy, current_profit, prior_profit)`\n\n当前利润层优先输出的已不是生硬的同比数字，而是：\n\n- `由盈转亏`\n- `由亏转盈`\n- `亏损扩大`\n- `亏损收窄`\n- `持续亏损`\n\n只有在正常盈利区间里，才继续保留普通同比表达。\n\n### 这带来的直接效果\n\n万科A最近几期的历史点，已经从原来的误导性同比，变成：\n\n- `20231231`：由盈转亏\n- `20240331`：由盈转亏\n- `20240630`：由盈转亏\n- `20240930`：由盈转亏\n- `20241231`：亏损扩大\n- `20250331`：亏损扩大\n- `20250630`：亏损收窄\n- `20250930`：亏损扩大\n\n这就比“+2061.7%”这种数字更接近 PM 真正关心的东西。\n\n---\n\n## 七、这一轮之后，财报风险页的真实状态\n\n截至当前，财报风险页这条线已经完成了三层关键修复：\n\n### 1）历史长度\n- 已从 4 截面扩到 20 期\n\n### 2）历史动态真实性\n- 已从累计值逻辑改成单季度逻辑\n\n### 3）利润解释可靠性\n- 已从机械同比改成符号感知口径\n\n也就是说，这一轮之后页面不再只是：\n- “看起来像动态”\n\n而是开始变成：\n- “有真实财务节奏、且文案不会被负基数误导”的动态\n\n---\n\n## 八、下一步最合理的延续方向\n\n利润层已经先修好了，后面最自然的延续是把另外两层也收顺：\n\n### 1）营收层\n从裸同比进一步升级为：\n- 增长\n- 下滑\n- 下滑扩大\n- 下滑收窄\n\n### 2）经营现金流层\n从单纯正负值，升级为：\n- 转正\n- 转负\n- 压力加大\n- 压力缓解\n\n这样历史解释链才能从“利润一个点修好”，继续走向：\n\n> **利润 + 营收 + 现金流 三条链同时可解释**\n\n---\n\n## 九、一句话总结\n\n这轮最重要的收获不是“页面终于有 20 个点”，而是：\n\n> **财报风险页的多年序列，已经从“长度扩容”进入到“口径纠偏 + 人话解释纠偏”的阶段。**\n\n真正让它开始靠谱的，不是多了多少点，而是：\n- 累计值拆成了单季度值\n- 负基数利润同比不再误导\n- 历史点终于能和真实财务拐点对上\n"}, {"name": "2026-04-25 GAMT主页Bloomberg风格改造与sed教训", "path": "notes/2026-04-25_GAMT主页Bloomberg风格改造与sed教训.md", "category": "notes", "content": "# GAMT 主页 Bloomberg 风格改造与 sed 教训\n\n**日期：** 2026-04-25\n**类别：** 决策 + 教训\n\n## 改造内容\n\nRoni 决定将 GAMT 主页从\"AI 味 emoji 风格\"改为 Bloomberg Terminal 风格——纯文字、高信息密度、无装饰性图标。\n\n### 清理范围\n- 侧边栏导航：去掉所有 `<span class=\"icon\">🏠/📈/🎯/💰/🌍/🏭/🔬/📊/⚠️/🏦/🚨/📝/📋/⚙️</span>`\n- 策略环境 tab：`📊/🔥/📦/🧾/🔄/⚖️` 全部去掉\n- 资金流 tab：`🏛️/📡/🎯` 去掉\n- 宏观 tab：`🌐/🎯/📊/📈` 去掉（💧境内流动性保留，因为是语义性的）\n- 内容区标题、刷新按钮文字、策略卡片图标映射（stratIcons）\n- **保留**：功能性状态指示 🟢🔴🟡⚠️❄️，以及数据判断用的 🔥\n\n### 关键 commits\n- `736d2297` 择时页面龙头 🐉 删除\n- `be16de40` 主页全面去 emoji\n- `b5757b66` 修复 sed 引号 bug\n\n## 教训：sed 批量替换的陷阱\n\n用 `sed` 批量删 emoji 时，有一行把引号也吃掉了：\n\n```js\n// 原始：\ntitle.textContent='🔄 '+(s.module_name||s.module||'刷新中');\n// sed 删完变成（坏的）：\ntitle.textContent='+(s.module_name||s.module||'刷新中');\n// 正确应该是：\ntitle.textContent=(s.module_name||s.module||'刷新中');\n```\n\n这个 JS 语法错误导致整个 `<script>` 块崩溃，所有事件绑定失效——侧边栏点击、tab 切换全部挂掉。\n\n**规则：用 sed 批量替换 emoji 后，必须检查 JS 语法完整性（尤其是引号配对）。**\n\n## 微信小程序讨论\n\nRoni 问过能否做成小程序。结论：\n- 技术上可行，但 20+ 模块全部重写渲染逻辑工作量大\n- 当前用户只有团队内部，H5 + 浏览器已够用\n- 更务实的路径：先做 H5 移动端响应式适配，成本低十倍\n- 如果未来有对外展示/LP 需求，再考虑小程序（web-view 壳 + 1-2 个原生页面）\n"}, {"name": "强势股择时研究初衷与交易指导定位", "path": "001_强势股择时研究初衷与交易指导定位.md", "category": "notes", "content": "# 强势股择时研究初衷与交易指导定位\n\n- 日期：2026-03-12\n- 类型：决策 / 研究定位\n- 标签：择时, 强势股, 冰点, 交易指导, 研究框架\n\n## 核心背景\nRoni 明确补充了这条择时研究线的真实初衷：\n\n1. 起点不是为了做一个“好看的量化报告”，而是为了**指导交易**。\n2. 研究源头来自 Roni 自己对市场的理解：先构建 FOF 看板里的**强势股板块**，再把围绕强势股生态能想到的择时思路拆成**单因子**。\n3. 单因子研究之后，才进一步形成**双因子冰点**，再往后才有风格过滤与策略优化。\n4. 整条链路应理解为：\n   **交易认知 → 强势股观察框架 → 单因子测算 → 双因子冰点状态 → 风格过滤 / 优化 → 交易动作映射**。\n\n## 更深一层的初衷\nRoni 提到一个关键动机：\n\n- 他的朋友在做**择时量化交易**，但对方的择时模块写得比较一般。\n- 对方的思路更偏向：\n  - 用阿尔法强弱分阈值\n  - 做 15min 截面\n  - 打分高的票多，就把仓位加上去\n- Roni 希望从自己更强的**市场逻辑与交易理解**出发，给这类纯量化择时框架补充一个新视角。\n\n也就是说，这套研究不是为了替代量化执行，而是为了给量化执行增加一个**更有市场语义、更有逻辑约束**的上层框架。\n\n## Roni 的自我定位\nRoni 明确说：\n\n- **对市场有自己的理解**\n- 但**不擅长量化**\n\n这意味着协作分工应当是：\n\n- Roni 负责：市场理解、交易逻辑、状态定义、框架约束\n- AI / 量化实现负责：把这些认知翻译成可测算、可回测、可落地的研究结构\n\n## 对报告结构的启发\n因此，择时总报告的主叙事不应只写成“V1 / V1.1 / V1.2”。\n更准确的表达应该是：\n\n1. 为什么从强势股生态出发\n2. 如何把交易认知拆成单因子\n3. 为什么单因子进一步抽象成双因子冰点\n4. 为什么冰点之后还需要风格过滤与动作映射\n5. 最终怎样服务于交易指导\n\n## 结论\n这条线的本质不是“为了找到最优参数”，而是：\n\n> 把 Roni 的市场理解，转成一套能辅助交易、能补强纯量化择时视角的研究框架。\n"}, {"name": "股票择时模块的最终目标是输出股票敞口值", "path": "002_股票择时模块的最终目标是输出股票敞口值.md", "category": "notes", "content": "# 股票择时模块的最终目标是输出股票敞口值\n\n- 日期：2026-03-12\n- 类型：框架定位 / 研究边界\n- 标签：股票择时, 股票敞口, 冰点, 强势股, 研究框架\n\n## 最终目标\nRoni 明确补充：这条研究线当前只聚焦一个模块目标——**股票择时，并最终输出股票敞口值**。\n\n这意味着当前模块不先讨论“策略适配度”，也不做 FOF 全策略适配总控台。那些未来可以成为更大母框架下的其他子模块。\n\n当前模块的唯一核心问题是：\n\n> 当前股票敞口应该给多少合适？\n\n## 冰点的真实定位\n冰点不是这套框架的起点，也不是框架本身。\n\n正确顺序是：\n1. 在强势股研究框架里，先基于市场理解写了很多**强逻辑单因子**。\n2. 对这些单因子做 IC 检验与有效性验证。\n3. 在当前阶段，冰点这条线因为**最好理解、最容易刻画、粗看也最有效**，所以被优先拎出来先做。\n\n因此，冰点应被定义为：\n\n> 股票敞口研究框架中的第一个优先展开命题。\n\n## 正确总结构\n正确结构不是“强势股 → 冰点 → 风格过滤”，而是：\n\n**目标：输出股票敞口值**\n→ 为达成这个目标，研究一组能刻画市场状态的因子\n→ 冰点是当前第一条先跑通的子命题\n→ 后面继续补其他命题\n→ 最后统一整合成股票敞口输出系统\n\n## 表达原则\n后续所有 HTML / README / 研究说明都应遵循以下边界：\n\n- 冰点是当前重点命题，不是全部\n- 单因子研究服务于股票敞口目标\n- 最终系统输出是股票敞口值，而不是单一策略回测结果\n"}, {"name": "MOM业务合作与系统方案沉淀_2026-03-26", "path": "023_MOM业务合作与系统方案沉淀_2026-03-26.md", "category": "notes", "content": "# MOM业务合作与系统方案沉淀（2026-03-26）\n\n## 背景\n今晚围绕国联民生证券的 MOM 业务可行性分析，基于云信 MOM 材料、迅投量化交易系统材料，以及参考文档《爱建信托-迅投mom低延时量化交易可行性方案》，快速整理并迭代了两套可落地方案。\n\n## 最终沉淀出的两个独立方案\n### 1）云信方案：业务合作/产品承接方案\n文件：\n- `~/Desktop/国联民生证券-云信MOM业务合作可行性方案.docx`\n\n定位：\n- 这是 **MOM业务合作方案**，不是交易系统方案\n- 核心是：云信提供 MOM 产品载体、账户结构、运营支持、估值清算、托管协同\n- 国联民生证券负责客户、投顾、投资审批、交易执行、风控管理\n\n关键要求：\n- 不能混入迅投角色\n- 必须单独体现 MOM 业务结构图\n- 需要包含首期预算测算 + 佣金回本测算\n- 要做成能直接给老板看的版本，前面加 Executive Summary\n\n### 2）迅投方案：系统建设方案\n文件：\n- `~/Desktop/国联民生证券-迅投MOM低延时量化交易系统可行性方案.docx`\n\n定位：\n- 这是 **MOM/量化交易系统建设方案**，不是业务合作方案\n- 核心是：迅投 GT 提供交易引擎、统一风控、估值绩效、投顾接入、合规留痕\n- 国联民生证券负责业务场景、投顾引入、交易管理、客户承接\n\n关键要求：\n- 不能混入云信角色\n- 必须有正式汇报风格的交易结构图\n- 必须写清预算 50-100 万\n- 必须用佣金价差模型算回本\n- 同样要有 Executive Summary\n\n## 关键业务口径（后续做 MOM 模块可直接复用）\n### 预算口径\n- 系统/合作首期预算：**50-100 万**\n\n### 佣金测算口径\n- 佣金底线（成本）：**万0.8**\n- 量化私募常见收费：**万1.1**\n- 佣金价差：**万0.3**\n- 换手率：**双边100倍/年**\n\n### 回本测算示例\n- 5亿规模：年交易额 500 亿，年净佣金约 **150 万**\n- 10亿规模：年交易额 1000 亿，年净佣金约 **300 万**\n- 20亿规模：年净佣金约 **600 万**\n- 50亿规模：年净佣金约 **1500 万**\n\n结论：\n- **5亿规模基本可覆盖首期50-100万投入**\n- **10亿以上进入显著盈利区间**\n\n## 重要认知（后续如果做 MOM 模块，要直接沿用）\n### 1. 云信和迅投是两个不同供应商，绝不能混写\n- **云信**解决的是：MOM 业务怎么搭起来（产品载体、账户结构、运营支持）\n- **迅投**解决的是：MOM/量化交易怎么跑起来（系统、风控、交易、估值绩效）\n- 这两个可以组合，但在方案、汇报、产品设计里必须明确边界\n\n### 2. 正确的方案拆分方式\n- **路径A：与云信合作，优先解决 MOM 产品载体与业务落地问题**\n- **路径B：采购迅投系统，优先解决量化交易、统一风控与投顾接入问题**\n- 两者可以独立推进，也可以组合推进，但不能说成一个供应商的一体化交付\n\n### 3. 如果未来做成 GAMT 的 MOM 模块，建议拆成两层\n- **业务层（MOM 合作层）**\n  - 合作方\n  - 产品载体\n  - 投顾管理\n  - 大M / 小M 结构\n  - 业务推进阶段\n- **系统层（交易与风控层）**\n  - 交易系统供应商\n  - 风控体系\n  - 投顾接入方式\n  - 预算与回本测算\n  - 系统落地状态\n\n### 4. 老板/高层最关心的不是定义，而是四件事\n- 能不能做\n- 投多少钱\n- 多久回本\n- 谁负责什么\n\n所以如果以后做 MOM 模块或 smart note，结构要优先围绕这四个问题展开。\n\n## 可转化为未来 MOM 模块的页面要素\n- 合作路径图（云信路径 / 迅投路径 / 组合路径）\n- MOM 大M/小M 结构图\n- 预算区间（50-100 万）\n- 佣金回本测算面板\n- 投顾类型与接入方式\n- 风险清单（客户需求、投顾管理、合作协同、合规）\n- 试点推进路线图\n\n## 备注\n- 这次产出虽然暂时与短期看板无直接关系，但如果后续国联民生证券或类似客户真的推进 MOM 业务，这套认知和结构图非常适合演化为一个正式的 **MOM 模块** 或 **机构业务机会看板**。\n"}, {"name": "数据token与权限补全_通联DataYes_UQER_iFind_Tushare_2026-04-06", "path": "024_数据token与权限补全_通联DataYes_UQER_iFind_Tushare_2026-04-06.md", "category": "notes", "content": "# 数据 token 与权限补全（通联 DataYes / UQER / iFind / Tushare）\n\n## 背景\n\n到 2026-04-06，GAMT / quant-backtest 这套研究链路里，已经不再只有 Tushare 和 iFind 两个数据入口，而是逐步补成四条线：\n\n1. **Tushare**：A 股基础与部分衍生数据的长期兜底\n2. **iFind**：海外行情、宏观、基金等更广覆盖的数据源\n3. **通联 DataYes（HTTP）**：偏 Barra 风险模型的专项接口\n4. **UQER / 优矿（SDK）**：更完整的股票 / 基金 / Barra 数据入口\n\n这条笔记的目标不是讲 API 教程，而是把 **现有 token、权限边界、适合用途** 一次性记清楚，避免以后只记得“好像能用”，却忘了到底哪把钥匙开哪扇门。\n\n---\n\n## 当前可用数据源总览\n\n| 数据源 | 体系 | 当前状态 | 更适合干什么 |\n|---|---|---|---|\n| Tushare | HTTP API | 可用 | A 股基础日频、交易日历、常规研究兜底 |\n| iFind | 终端/API | 可用（另有到期时间） | 海外行情、宏观、基金、补 Tushare 不足 |\n| DataYes | HTTP API | 可用，但偏专项 | **Barra CNE6 风险模型** |\n| UQER | SDK / 优矿 | 可用 | **股票 + 基金 + Barra** 的统一研究入口 |\n\n---\n\n## 1. Tushare\n\n### 现有配置\n- Token：`33b3ff939d0d7954cd76cacce7cf6cbb2b3c3feda13d1ca2cfa594e20ecd`\n- 私有地址：`http://lianghua.nanyangqiankun.top`\n- 状态：可用\n\n### 当前定位\nTushare 不是最豪华的数据源，但它最大的价值是：\n\n> **稳、熟、够用、适合做日常研究兜底。**\n\n适合：\n- A 股日线/基础行情\n- 交易日历\n- 指数基础数据\n- 常规因子研究底表\n- 当别的数据源权限不明时，先顶上\n\n### 经验口径\n- 公有 `https://api.tushare.pro` 直连通常更稳\n- 开代理时容易超时，尤其 `trade_cal`\n- Cloudflare 要走代理时，Tushare 反而更适合关代理直连\n\n---\n\n## 2. iFind\n\n### 现有配置\n- 账号：`glmssf001`\n- Token 过期：`2026-04-07 19:04:12`\n\n### 当前定位\niFind 这条线更像：\n\n> **覆盖面更广的补充源，尤其适合 Tushare 覆盖不好的海外 / 宏观 / 基金口径。**\n\n当前已知用途：\n- SOXX 费城半导体\n- 汇率等海外实时行情\n- 宏观 / 基金等更广数据补位\n\n---\n\n## 3. 通联 DataYes（HTTP token）\n\n### token\n`5f8b8de95e7651d3c1f9ff491bde902e0e3587c546d44fc211adb755216139f5`\n\n### 权限判断\n这个 token 已确认：\n- **能走 HTTP 方式访问 Barra 相关接口**\n- **不能当作 UQER SDK token 使用**\n- 用 UQER SDK 登录时会报：`无UQER SDK权限`\n\n所以当前最准确的定位是：\n\n> **这是通联 / DataYes 体系里的 Barra 专项 HTTP token，不是完整 UQER 账号 token。**\n\n### 已知能拿的数据\n主要是 Barra CNE6 风险模型五件套：\n- `exposure`\n- `factor_return`\n- `specific_return`\n- `covariance`\n- `specific_risk`\n\n### 更适合干什么\n- 风格暴露分析\n- 风格收益归因\n- 协方差矩阵\n- 特质风险 / 特质收益\n- 组合风险拆解\n- 未来做 Barra 约束回测\n\n### 不适合默认指望什么\n- 大而全股票行情库\n- 全基金数据\n- 普通 UQER SDK 扫库式研究\n\n一句话：\n\n> **这把钥匙主要是开 Barra 风险模型那扇门。**\n\n---\n\n## 4. UQER / 优矿（SDK token）\n\n### token\n`6b1c26f10036171bf12fa225d2bb98046db6a88b5999b0110c7fcfe574e810ce`\n\n### 权限判断\n这个 token 已确认：\n- 可以用 `uqer.Client(token=...)` 正常登录\n- 登录账号显示：`10693187@wmcloud.com`\n- 不是纯 Barra 专项，而是 **完整 UQER / 优矿 SDK token**\n\n### 已实测能拿的数据\n#### 股票\n- `MktEqudAdjGet`：A 股复权行情 ✅\n- `SecIDGet`：证券主数据 ✅\n\n#### Barra\n- `RMExposureDayGet` ✅\n- `RMFactorRetDayGet` ✅\n- `RMSpecificRetDayGet` ✅\n- `RMCovarianceDayGet` ✅\n- `RMSriskDayGet` ✅\n\n#### 基金\n- `MktFunddGet`：ETF 日行情 ✅（如 `510300`）\n- `FundNavGet`：公募基金净值 ✅（如 `110027 易方达安心回报债券A`）\n\n### 当前最合理的定位\n\n> **这是股票 + 基金 + Barra 三层都能打通的主力研究 token。**\n\n### 更适合干什么\n- A 股日频研究\n- 股票池和因子研究\n- 基金净值 / ETF 行情研究\n- 固收+基金研究的净值序列补充\n- Barra 风格暴露与风险归因\n- 给 `quant-backtest` 做统一研究入口\n\n一句话：\n\n> **如果 DataYes token 是 Barra 专项刀，那 UQER token 更像一把多用途瑞士军刀。**\n\n---\n\n## 实操分工建议\n\n### 最稳的分工\n#### Tushare\n- 做基础兜底\n- 适合常规 A 股研究和日常稳定更新\n\n#### iFind\n- 做海外 / 宏观 / 基金 / 更广覆盖补位\n- 尤其适合 Tushare 不够的部分\n\n#### DataYes / 通联 HTTP token\n- 专门做 Barra 五件套\n- 不要拿它去幻想全库权限\n\n#### UQER token\n- 做主力探索入口\n- 股票、基金、Barra 都优先从这边接\n\n---\n\n## 对当前研究链路的意义\n\n现在这套配置补齐后，Roni 这边的数据能力已经从“两个源勉强拼起来”变成：\n\n> **Tushare 兜底 + iFind 补广度 + DataYes 补 Barra 专项 + UQER 补股票/基金/Barra 一体化。**\n\n这意味着后面几条线都更顺了：\n- `quant-backtest`：Barra 约束 / 风格归因 / 基础股票研究\n- GAMT：风格暴露解释层、基金净值补充、更多统一数据入口\n- 固收+：基金净值与产品横向比较更容易落地\n\n---\n\n## 注意事项\n\n- 这些 token 不要乱扫库，尤其是朋友账号，优先走 **少量调用 + 本地缓存**。\n- DataYes 和 UQER 不是同一种权限体系，不能混着理解。\n- “能登录”不等于“全库都开了”；但当前已知，UQER 这把 token 的研究价值已经很高。\n\n---\n\n## 一句话总结\n\n到 2026-04-06 为止，这套数据底盘可以这么记：\n\n> **Tushare 管基础兜底，iFind 管广覆盖补位，通联 DataYes 管 Barra 专项，UQER 管股票 + 基金 + Barra 的主力接入。**\n"}, {"name": "数据源地图_四条数据线与分工_2026-04-06", "path": "025_数据源地图_四条数据线与分工_2026-04-06.md", "category": "notes", "content": "# 数据源地图：四条数据线与分工（2026-04-06）\n\n## 一句话总览\n\n> Tushare 管基础兜底，iFind 管广覆盖补位，通联 DataYes 管 Barra 专项，UQER 管股票 + 基金 + Barra 的主力接入。\n\n---\n\n## 快速分工表\n\n| 数据源 | 当前定位 | 已知能做什么 | 更适合放在哪条链路 |\n|---|---|---|---|\n| **Tushare** | 基础兜底 | A 股基础日频、交易日历、常规研究底表 | 日常更新、底表、兜底 |\n| **iFind** | 广覆盖补位 | 海外行情、宏观、基金、补 Tushare 不足 | FOF 观察、宏观/海外补数 |\n| **通联 DataYes** | Barra 专项 | `exposure` / `factor_return` / `specific_return` / `covariance` / `specific_risk` | 风格暴露、风险归因、Barra 约束 |\n| **UQER** | 主力研究入口 | A 股复权行情、证券主数据、ETF 日行情、公募净值、Barra 全套 | 股票研究、基金研究、Barra 一体化接入 |\n\n---\n\n## 最推荐的使用方式\n\n### 1. 股票常规研究\n优先：**UQER**  \n兜底：**Tushare**\n\n### 2. 基金 / 固收+ 研究\n优先：**UQER + iFind**\n\n### 3. Barra 风格与风险模型\n优先：**通联 DataYes + UQER**\n\n### 4. GAMT 看板日常稳定更新\n优先：**Tushare + iFind**\n\n---\n\n## 已知权限边界\n\n### 通联 DataYes token\n- 更像 **Barra 专项 token**\n- 能下 Barra\n- 不要默认它有完整股票 / 基金全库权限\n\n### UQER token\n- 已确认可走 SDK\n- 已实测能拿：\n  - A 股复权行情\n  - 证券主数据\n  - ETF 日行情\n  - 公募基金净值\n  - Barra 全套核心接口\n- 当前是最值得优先接进研究链路的一把钥匙\n\n---\n\n## 实操原则\n\n- 朋友账号优先 **轻调用 + 本地缓存**\n- 不扫全市场长历史\n- 不高并发\n- 先确认链路值不值得接，再考虑批量下载\n\n---\n\n## 最简记忆法\n\n### 做股票\n先想 **UQER**，不够再补 **Tushare**\n\n### 做基金\n先想 **UQER / iFind**\n\n### 做 Barra\n先想 **DataYes / UQER**\n\n### 做稳定日更\n先想 **Tushare / iFind**\n"}, {"name": "PPI_CPI_流动性回流实体观察框架_2026-04-06", "path": "026_PPI_CPI_流动性回流实体观察框架_2026-04-06.md", "category": "notes", "content": "# PPI / CPI / 流动性回流实体观察框架（2026-04-06）\n\n## 一句话结论\n\n这套观察框架要解决的，不是“PPI涨不涨”这个表面问题，而是：\n\n> **当前的价格修复，到底是在证明实体经济吸走流动性，还是只是在经历一轮成本挤压。**\n\n对 GAMT 的意义是：\n- 它不是单独看一个宏观数字\n- 而是给“宏观与流动性 → 经济基本面”补上一条 **价格链条 → 流动性去向 → A股风格** 的中间解释层\n\n---\n\n## 核心逻辑链\n\n```text\n外部冲击 / 内部供需\n    ↓\nPPI 修复\n    ↓\n先判断：这是成本型，还是需求 / 议价型\n    ↓\n再判断：实体利润是否改善、流动性是否真的回流实体\n    ↓\n再判断：CPI 上行是良性接棒，还是滞胀式恶化\n    ↓\n最后映射到：货币宽松空间 / A股风格 / 风险偏好\n```\n\n---\n\n## 为什么这个框架重要\n\n最近一类宏观叙事会直接把链条写成：\n\n```text\n油价上行 / 中国制造议价权增强\n→ PPI 修复\n→ 人民币更稳\n→ 央行更敢宽松\n→ 资金回流实体\n→ 微盘成长回落，价值占优\n```\n\n这个叙事有启发，但问题在于：\n\n> **中间有多个关键环节，不能自动成立。**\n\n尤其是：\n1. `PPI 修复 ≠ 人民币自动走强`\n2. `PPI 上行 ≠ 实体利润一定改善`\n3. `CPI 上行 ≠ 需求一定恢复`\n\n所以看板里不能只展示 PPI / CPI 水平，还要展示：\n\n> **这轮 PPI / CPI 的“性质”到底是什么。**\n\n---\n\n## 先拆第一层：PPI 修复有两种\n\n### 1. 成本推动型 PPI\n典型来源：\n- 原油上涨\n- 铜铁煤等大宗商品上涨\n- 上游原材料涨价\n\n这类 PPI 修复的特点：\n- 上游价格先涨\n- 中下游成本被挤压\n- 企业未必有真实提价能力\n- 利润未必改善\n- 实体未必真的更愿意吸纳流动性\n\n一句话：\n\n> **这是“被动涨价”，不一定是“实体变强”。**\n\n### 2. 需求 / 议价推动型 PPI\n典型来源：\n- 订单改善\n- 产能利用率提升\n- 制造业景气回升\n- 出口价格和企业议价权增强\n\n这类 PPI 修复的特点：\n- 企业涨价能传导下去\n- 利润改善更可持续\n- 实体回报率上升\n- 流动性更可能从金融系统回到实体\n\n一句话：\n\n> **这才更接近“良性 PPI 修复”。**\n\n---\n\n## 再拆第二层：CPI 上行也有两种\n\n### 1. 良性需求型 CPI\n链条：\n\n```text\nPPI 修复\n→ 企业利润改善\n→ 就业 / 收入改善\n→ 消费回暖\n→ 核心 CPI 抬升\n```\n\n这类 CPI 的含义：\n- 下游需求在恢复\n- 整条链条是通的\n- 货币宽松走到后半段后收紧，属于正常再平衡\n\n### 2. 成本传导型 CPI\n链条：\n\n```text\n油价 / 上游成本上行\n→ PPI 被动抬升\n→ 终端被迫涨价\n→ CPI 上行\n但真实需求并未恢复\n```\n\n这类 CPI 的含义：\n- 居民只是被动承受涨价\n- 购买力受损\n- 企业利润可能被两头挤压\n- 更像滞胀，不像复苏\n\n一句话：\n\n> **如果 CPI 上来但需求没起来，不是链条更顺，而可能是链条更差。**\n\n---\n\n## 对 GAMT 看板最有价值的，不是“预测结论”，而是做成一个观察框架\n\n建议在“宏观与流动性 → 经济基本面”里新增一个子模块：\n\n# 价格修复与流动性去向\n\n它回答三个问题：\n\n1. **PPI 修复了吗？**\n2. **这轮修复是成本型还是需求型？**\n3. **CPI 是良性接棒还是滞胀式传导？**\n\n---\n\n## 最小可行观察指标（建议先做 4 组）\n\n### 观察组 A：PPI 修复强度\n这是第一层，只回答“PPI 有没有起来”。\n\n建议指标：\n- **PPI 同比**\n- **PPI 环比**\n- **PPI 环比 3 个月均值**\n\n用途：\n- 同比看方向\n- 环比看拐点\n- 3个月均值看短期修复是否持续\n\n建议展示：\n- 当前值\n- 上月值\n- 3个月趋势箭头\n\n---\n\n### 观察组 B：PPI 修复性质（成本型 vs 需求型）\n这是最关键的一层。\n\n建议指标：\n- **出厂价 - 购进价剪刀差**\n- **PMI 新订单**\n- **PMI 产成品库存**\n- **规上工业企业利润同比**\n\n逻辑：\n- 剪刀差改善 = 企业转嫁成本能力增强\n- 新订单回升 = 需求在接\n- 库存下降 / 不再累库 = 说明不是纯被动涨价\n- 工业利润改善 = 说明价格修复有利润承接\n\n建议合成一个：\n\n### 指标名：PPI修复质量指数\n\n第一版可做成 0-100 分简单评分：\n- 剪刀差改善：30%\n- 新订单回升：30%\n- 库存去化：20%\n- 工业利润改善：20%\n\n解释口径：\n- **高分**：更偏需求 / 议价型修复\n- **低分**：更偏成本推动型修复\n\n这个指标很适合放在经济基本面板块，因为它不是单纯看价格，而是在看：\n\n> **价格修复到底有没有质量。**\n\n---\n\n### 观察组 C：流动性是否回流实体\n这是第二层，回答“钱有没有真的离开金融空转”。\n\n建议指标：\n- **10Y - 1Y 国债期限利差** 或等价期限利差\n- **全A成交额 20日均值 / 60日均值**\n- **微盘 / 中证2000 相对沪深300的强弱**\n\n逻辑：\n- 期限利差走阔：名义增长预期改善的一种迹象\n- 全A成交额下行：金融市场空转流动性边际收缩\n- 微盘相对转弱：纯流动性风格降温\n\n这层不要解释得过满，因为它更像“旁证”，不是铁证。\n\n建议模块名称：\n\n### 流动性回流实体旁证\n\n不要写成“已确认回流实体”，而是：\n- 旁证增强\n- 旁证一般\n- 旁证不足\n\n这样更稳。\n\n---\n\n### 观察组 D：CPI 接棒性质（良性 vs 滞胀）\n这是第三层，回答“链条能不能继续”。\n\n建议指标：\n- **核心 CPI 同比**\n- **社零同比**\n- **服务业 PMI**\n- **居民中长期贷款同比 / 变化**\n\n逻辑：\n- 核心 CPI 上行：比总 CPI 更能反映真实需求\n- 社零改善：消费有没有恢复\n- 服务业 PMI：需求有没有扩散到服务消费\n- 居民中长贷：居民是否敢承担更长期支出\n\n建议合成一个：\n\n### 指标名：CPI接棒健康度\n\n第一版简单评分即可：\n- 核心CPI回升：35%\n- 社零改善：25%\n- 服务业PMI回升：20%\n- 居民中长贷改善：20%\n\n解释口径：\n- **高分**：更偏需求接棒，链条较健康\n- **低分**：更偏成本传导，需防滞胀式恶化\n\n---\n\n## 最推荐先落地的“一个核心观察指标”\n\n如果现在只想先做一个最值钱、最能概括这套逻辑的指标，建议优先做：\n\n# PPI修复质量指数\n\n因为它正好卡在整条链条最关键的位置：\n\n```text\nPPI 修复\n→ 有没有质量\n→ 决定后面是良性链条，还是成本挤压链条\n```\n\n### 推荐定义（第一版）\n\n```text\nPPI修复质量指数 =\n  30% × 出厂价-购进价剪刀差改善\n+ 30% × PMI新订单改善\n+ 20% × PMI产成品库存去化\n+ 20% × 工业企业利润同比改善\n```\n\n### 这个指标最适合放在哪\n放在：\n- **宏观与流动性**\n  - **经济基本面**\n    - 新增一张卡 / 一个子模块\n\n### 展示文案建议\n不要写成：\n- “实体已确认吸纳流动性”\n\n建议写成：\n- **PPI修复质量：高 / 中 / 低**\n- **当前判断：偏需求修复 / 偏成本推动 / 方向不明**\n\n这样更符合 Roni 的风格：\n- 不装懂\n- 不把弱证据包装成强结论\n- 给 PM 留判断空间\n\n---\n\n## 页面文案建议\n\n### 模块名\n**价格修复与流动性去向**\n\n### 三行摘要文案\n- `PPI修复强度：回升 / 震荡 / 走弱`\n- `PPI修复质量：偏需求 / 偏成本 / 不清晰`\n- `CPI接棒健康度：良性 / 中性 / 偏滞胀`\n\n### 风格映射提示（只做辅助）\n- 当 `PPI修复质量高 + CPI接棒健康度中高`：\n  - 偏利好价值 / 周期 / 红利 / 现金流资产\n- 当 `PPI修复强但质量低 + CPI被动上行`：\n  - 偏滞胀，成长和价值都不舒服，谨慎看风险资产\n- 当 `PPI未修复 + 金融流动性宽松`：\n  - 更容易偏向微盘 / 成长 / 纯流动性风格\n\n---\n\n## 一句话总结\n\nGAMT 这里最该补的，不是再加一个 PPI 或 CPI 数字，\n而是补一个：\n\n> **PPI修复质量指数**\n\n它的意义不是预测一切，\n而是帮助判断：\n\n> 当前价格修复，到底是在把流动性拉回实体，还是只是在制造一轮更难受的成本压力。\n"}, {"name": "GPT-Image2工业级提示词模板体系", "path": "concepts/GPT-Image2工业级提示词模板体系.md", "category": "concepts", "content": "# GPT-Image2 工业级提示词模板体系\n\n> 来源：[awesome-gpt-image-2](https://github.com/freestylefly/awesome-gpt-image-2)\n> 338个案例逆向工程，13套工业级模板，核心理念：Prompt as Code\n\n---\n\n## 核心方法论：三步走\n\n1. **定任务类型**：UI、海报、电商、信息图、角色设定、出版物等\n2. **锁结构约束**：比例、布局、模块数量、镜头语言、文字要求\n3. **补风格材质**：色彩、光线、笔触、氛围、质感\n\n每套模板都有两种格式：常规文本模板（给人用）+ JSON结构化模板（给Agent/脚本调用）\n\n---\n\n## 1. UI与界面\n\n**模板：**\n```\n为[产品类型]生成一张[平台，如iOS/Android/Web]界面图。\n核心功能：[功能点A]、[功能点B]、[功能点C]。\n视觉风格：[极简/科技/拟物]，主色[颜色]，强调色[颜色]。\n布局：[顶部导航/双栏/卡片流]，信息层级清晰，留白充足。\n输出：高保真UI截图，文字清晰可读，比例[9:16/16:9]。\n```\n\n**JSON版：**\n```json\n{\n  \"type\": \"UI Screenshot\",\n  \"platform\": \"iOS\",\n  \"product\": \"Fitness App\",\n  \"layout\": \"Card-based feed with bottom tab bar\",\n  \"style\": {\"theme\": \"Dark Mode\", \"primary_color\": \"Neon Green\", \"typography\": \"Clean sans-serif\"},\n  \"content\": {\"header\": \"Today's Activity\", \"cards\": [{\"title\": \"Running\", \"data\": \"5.2 km\", \"button\": \"Start\"}]},\n  \"constraints\": \"High fidelity, readable text, 9:16 aspect ratio\"\n}\n```\n\n**避坑：** 明确\"平台+比例+布局\"；强制文字可读，避免乱码火星文。\n\n---\n\n## 2. 图表与信息可视化\n\n**模板：**\n```\n生成[主题]信息图，目标读者为[人群]。\n结构：标题区 + [3-5]个模块（每模块含图标、短标题、1-2句说明）。\n图表类型：[流程图/对比图/关系图/时间线]。\n风格：[专业报告/科普插画]，主色[颜色]，背景[浅色/深色]。\n输出：信息层级清晰、可读性高的中文信息图。\n```\n\n**避坑：** 控制模块数量和图表类型；文案用短句，别塞大段文字。\n\n---\n\n## 3. 海报与排版\n\n**模板：**\n```\n设计一张[活动/产品/电影]海报，主题为[主题词]。\n主视觉：[主体元素]，标题文案：[标题]，副标题：[副标题]。\n版式：[居中/左对齐/对角构图]，风格：[复古/未来/极简]。\n色彩：[主色+辅色]，氛围：[情绪关键词]。\n输出：可用于社媒传播的高分辨率海报。\n```\n\n**避坑：** 主视觉说清楚是什么；主标题副标题写死，别让模型自由发挥。\n\n---\n\n## 4. 商品与电商\n\n**模板：**\n```\n生成[商品名]电商主图，卖点为[卖点1]、[卖点2]。\n场景：[纯色棚拍/生活方式场景]，镜头：[特写/半身/全景]。\n材质细节：[材质关键词]，灯光：[柔光/侧光/轮廓光]。\n附加元素：[价格角标/卖点icon/促销文案]。\n输出：电商平台可直接使用的商品展示图。\n```\n\n**避坑：** 材质和光影是灵魂，堆叠材质+灯光关键词；促销文案只给1-2句核心的。\n\n---\n\n## 5. 品牌与标志\n\n**模板：**\n```\n为[品牌名]设计品牌视觉方案。\n品牌关键词：[关键词1]、[关键词2]、[关键词3]。\n包含：Logo方向[几何/字标/图形]、辅助图形、主辅色、应用示意。\n风格：[现代/高级/亲和]，行业：[行业]，受众：[受众]。\n输出：统一风格的品牌识别视觉图。\n```\n\n**避坑：** 做减法，先定品牌关键词再出视觉；强制纯白背景方便抠图。\n\n---\n\n## 6. 建筑与空间\n\n**模板：**\n```\n生成[空间类型]设计效果图，功能定位为[用途]。\n风格：[现代简约/工业/新中式]，材质：[木/石/金属/玻璃]。\n空间结构：[开敞/分区]，动线：[主通道说明]。\n光线：[自然采光/人工照明方案]，时间：[白天/夜景]。\n输出：写实建筑空间渲染图。\n```\n\n**避坑：** 用\"Eye-level perspective（人眼视角）\"压住透视变形；室内外冷暖对比提升高级感。\n\n---\n\n## 7. 摄影与写实\n\n**模板：**\n```\n拍摄主题：[人物/物品/街景]，场景为[地点]。\n摄影参数风格：[35mm/85mm]，[浅景深/深景深]，[纪实/电影感]。\n光线：[自然光/夜景霓虹/逆光]，情绪：[情绪词]。\n细节要求：[肤质/材质/颗粒感]。\n输出：高写实摄影风格图像。\n```\n\n**避坑：** 加瑕疵（毛孔、雀斑、胶片颗粒）提升真实感；用相机参数（f/1.4、50mm）代替模糊描述。\n\n---\n\n## 8. 插画与艺术\n\n**模板：**\n```\n创作[题材]插画，主角为[角色/主体]。\n画风：[日漫/水彩/扁平/厚涂]，线条：[细腻/粗犷]。\n配色：[配色方案]，背景：[简洁/复杂场景]。\n构图：[近景/中景/远景]，重点表现[细节]。\n输出：可用于封面或社媒发布的高质量插画。\n```\n\n**避坑：** 锁定笔触（厚涂/水彩）；别直接写大师名，提取大师特征（如\"梵高的旋转星空笔触\"）。\n\n---\n\n## 9. 人物与角色\n\n**模板：**\n```\n设计[角色身份]角色设定图。\n外观：[年龄/发型/服饰/配件]，性格：[关键词]。\n姿态：[站姿/动态动作]，表情：[情绪]。\n世界观：[时代/阵营/职业]，标志性元素：[元素]。\n输出：角色主视图 + 风格统一的人设图。\n```\n\n**避坑：** 拆解五官（桃花眼、高鼻梁、野生眉）；写清服装材质（丝绸、机能面料）。\n\n---\n\n## 10. 场景与叙事\n\n**模板：**\n```\n生成[故事主题]场景图，发生在[时间+地点]。\n主事件：[事件描述]，主角：[角色]，冲突点：[冲突]。\n镜头语言：[广角建立镜头/中景叙事/特写]。\n氛围：[紧张/温暖/悬疑]，色调：[冷/暖/高反差]。\n输出：具备叙事张力的场景概念图。\n```\n\n**避坑：** 必须有动词/事件，别画成风景明信片；用镜头语言（低角度仰拍、倾斜镜头）加戏剧感。\n\n---\n\n## 11. 历史与古风\n\n**模板：**\n```\n生成[朝代/古风设定]题材画面，主题为[主题]。\n人物：[身份/服饰/器物]，场景：[宫廷/市井/山水]。\n美术风格：[工笔/写意/影视写实]，色调：[色调]。\n文化细节：[纹样/礼制/建筑要素]。\n输出：历史氛围准确的古风题材图。\n```\n\n**避坑：** 明确朝代（唐/宋/明）；加\"禁用现代元素\"防穿帮。\n\n---\n\n## 12. 文档与出版物\n\n**模板：**\n```\n制作[文档类型，如菜单/杂志内页/报纸版式]。\n版面结构：[栏数/页边距/标题层级]。\n内容模块：[封面区/正文区/图表区/脚注]。\n字体风格：[衬线/无衬线]，配色：[配色方案]。\n输出：可读性强、版式规范的出版物视觉稿。\n```\n\n**避坑：** 结构优先（栏数、留白）；正文用模拟文本填充，只写死大标题。\n\n---\n\n## 13. 通用场景\n\n**模板：**\n```\n任务目标：[你要生成的内容类型]。\n输入约束：主体[主体]，场景[场景]，风格[风格]，色彩[配色]。\n质量约束：清晰度[高清/4K]，比例[比例]，构图[构图方式]。\n输出约束：用于[用途]，需突出[核心信息]。\n请输出一版主方案 + 一版备选方案。\n```\n\n**避坑：** 先说用途建立上下文；要求一次出主方案+备选方案。\n\n---\n\n## 通用避坑原则\n\n- 文字锁定：所有需要显示的文字必须写死，不让模型自由发挥\n- 材质堆叠：材质+光影关键词越具体，画面质感越好\n- 参数说话：用相机参数（f/1.4、50mm）代替模糊描述（浅景深、半身照）\n- 做减法：约束越精确，输出越可控\n- 加瑕疵：适当加入不完美细节（毛孔、颗粒、磨损）提升真实感\n"}, {"name": "情绪择时强逻辑因子清单", "path": "concepts/情绪择时强逻辑因子清单.md", "category": "concepts", "content": "# 情绪择时强逻辑因子清单\n\n- 目的：先沉淀强逻辑因子，不急着回测；先讲清楚因子测什么、为什么成立、在情绪链条里处于哪一层。\n- 适用范围：股票择时模块，最终服务于股票敞口判断。\n- 记录原则：每新增一个因子，先登记到这里；等逻辑链条更完整后，再决定是否进入回测候选池。\n\n---\n\n## 记录模板\n\n### 因子名称\n\n### 频率\n- 日频 / 盘中\n\n### 类别\n- 广度 / 极值 / 接力 / 龙头 / 结构\n\n### 因子定义\n\n### 逻辑说明\n\n### 极端含义\n- 极强：\n- 极弱：\n\n### 在情绪链条中的角色\n- 先导 / 确认 / 强化 / 分歧 / 退潮\n\n### 与原有因子的关系\n- 重叠 / 补充 / 前置 / 后置\n\n### 是否纳入核心观察\n- 是 / 否\n\n### 备注\n- 后续是否适合回测\n- 更适合做状态还是信号\n\n---\n\n## 因子 01：涨跌家数比\n\n### 频率\n- 日频\n\n### 类别\n- 广度\n\n### 因子定义\n- 上涨家数与下跌家数的对比，用于衡量市场整体涨跌分布状态。\n- 第一版建议口径：\n- `涨跌家数比 = (上涨家数 - 下跌家数) / (上涨家数 + 下跌家数)`\n\n### 逻辑说明\n- 这是一个强逻辑因子。\n- 如果市场处于明显强势或明显弱势状态，广度一定会体现出来。\n- 当上涨家数显著多于下跌家数，说明市场正在普遍修复，风险偏好在扩散。\n- 当下跌家数显著多于上涨家数，说明市场仍处于普遍风险回避状态。\n- 这个因子不主要负责确认高潮，而是负责判断市场底板有没有抬起来。\n\n### 极端含义\n- 极强：市场处于普涨、情绪扩散、风险偏好显著抬升。\n- 极弱：市场处于普跌、风险释放、亏钱效应广谱蔓延。\n\n### 在情绪链条中的角色\n- 先导\n\n### 与原有因子的关系\n- 前置\n- 它补的是原有涨停家数、跌停家数、晋级率、封单强度之前的底层广度。\n\n### 是否纳入核心观察\n- 是\n\n### 备注\n- 后续适合做环境过滤器，也适合和首板数量、晋级率做领先关系验证。\n- 暂不急于单独做交易信号回测。\n\n---\n\n## 盘中发现层母框架（角色层 / 事件层 / 叙事层）\n\n- 定位：盘中发现层不是简单“再补几个因子”，而是把人工盘面语言翻译成 PM 可讨论、可计算的状态框架。\n- 结构：`角色层 → 事件层 → 叙事层`。\n- 与其他层的关系：\n  - 日频因子负责给出 **T日收盘先验**\n  - 盘中发现层负责在 **T+1 交易时段** 对这个先验做确认、强化或证伪\n  - 合成因子 / 阶段输出负责把这些信息翻成阶段判断和仓位动作\n\n### 一、角色层：盘中到底在看谁\n\n- 龙头观察池：由 T 日收盘后的日频强信号筛出来的候选序列，不是一只固定股票。\n- 辨识度龙头：市场最认、位置最高、最有带动性的核心票。\n- 成交额龙头：当日成交额最高、最吸金的核心票。\n- 龙一 / 龙二 / 龙三：同一条主线或同一梯队中，承担不同位置功能的动态角色。\n- 高位核心：高板、高辨识度、高情绪杀伤力的个股集合。\n- 首板试错：当天最先承接风险偏好的低位启动组。\n- 跟风扩散：从单核走向多核、从单票走向板块共振的跟随层。\n- 跌停翘板修复：从极端亏钱效应反向修复风险偏好的角色集合。\n\n### 龙头定义（当前正式口径）\n\n#### 1）龙头观察池\n- 不是单票定义，而是 T 日收盘后由日频信号筛出来的观察池。\n- 进入观察池的优先条件：\n  - 高板 / 最高板\n  - 打板成交额高\n  - 高度高\n  - 在日频强信号中排名靠前\n- 含义：T 日的日频强因子，到 T+1 就转化为“龙头观察池”。\n\n#### 2）辨识度龙头\n- 在观察池中，市场最认、最有高度、最有位置感、最有带动性的那只。\n- 更偏人工交易语义。\n\n#### 3）成交额龙头\n- 在观察池中，当日成交额最高的核心票。\n- 更偏量价资金语义。\n\n#### 4）为什么要拆成两类龙头\n- A 股里“龙头 / 龙一 / 龙二 / 龙三”是动态变化的。\n- 辨识度龙头和成交额龙头有时重合，有时不重合。\n- 人工盘面处理经常正是在观察它们是否联动、是否切换、是否共振。\n\n### 二、事件层：盘中到底发生了什么\n\n- 首次封板\n- 炸板\n- 回封\n- 翘板\n- 尾盘回落\n- 10cm → 20cm 扩散\n- 单核 → 多核扩散\n- 高位股集体松动\n- 梯队同步加强\n- 午后分歧后修复\n\n### 三、叙事层：这些事件意味着什么\n\n- 龙头确认\n- 试错启动\n- 梯队加强\n- 高度突破\n- 板块共振扩散\n- 分歧转修复\n- 高位退潮\n- 风险偏好抬升 / 回落\n\n## 盘中发现因子 v1（单独作为盘中确认层）\n\n- 定义：盘中因子 = 在交易时段内出现的、用于确认或证伪当日日频判断的事件型 / 过程型信号。\n- 页面位置：Tab B「盘中发现因子」。\n- 统一要求：每个盘中因子都必须回答 3 个问题：\n  - 它挂在哪个角色上\n  - 它记录了什么事件\n  - 它对应什么叙事含义\n\n### 推荐字段\n- `name`\n- `display_name`\n- `factor_level` = `intraday_signal`\n- `frequency` = `intraday`\n- `role_layer` = `character`\n- `event_layer` = `event / process`\n- `narrative_layer`\n- `trigger_type` = `event / process / confirm / warning`\n- `observation_window` = `open_30m / morning / late_morning / afternoon / close_near / full_session`\n- `role_in_chain`\n- `output_type` = `binary / count / ratio / timestamp / state_label`\n- `related_daily_factors`\n- `impact_on_stage`\n- `logic`\n- `status`\n\n### 因子 A1：龙头首次封板时间\n- `name`: `leader_first_limit_time`\n- `trigger_type`: `event`\n- `observation_window`: `morning`\n- `role_in_chain`: `确认`\n- `output_type`: `timestamp`\n- `related_daily_factors`: `max_height`, `promotion_rate`\n- `impact_on_stage`: `回暖确认 / 强化确认`\n- 逻辑：龙头越早封板，说明核心票凝聚力越强。\n\n### 因子 A2：龙头炸板后回封\n- `name`: `leader_refeng`\n- `trigger_type`: `confirm`\n- `observation_window`: `full_session`\n- `role_in_chain`: `修复`\n- `output_type`: `binary`\n- `related_daily_factors`: `refeng_rate`, `max_height`\n- `impact_on_stage`: `分歧转修复`\n- 逻辑：龙头被砸后还能封回去，说明分歧承接强。\n\n### 因子 A3：高位股集体炸板\n- `name`: `high_level_bomb_group`\n- `trigger_type`: `warning`\n- `observation_window`: `afternoon`\n- `role_in_chain`: `退潮`\n- `output_type`: `count`\n- `related_daily_factors`: `high_duanban_count`, `duanban_count`\n- `impact_on_stage`: `退潮确认`\n- 逻辑：高位核心同时松动，杀伤力远大于单票炸板。\n\n### 因子 A4：首板批量启动时间\n- `name`: `shouban_batch_start_time`\n- `trigger_type`: `event`\n- `observation_window`: `morning`\n- `role_in_chain`: `先导`\n- `output_type`: `timestamp`\n- `related_daily_factors`: `shouban_count`\n- `impact_on_stage`: `试错启动`\n- 逻辑：首板若在早盘集中出现，说明试错资金开始集体行动。\n\n### 因子 A5：首板午后继续扩散\n- `name`: `shouban_afternoon_expand`\n- `trigger_type`: `process`\n- `observation_window`: `afternoon`\n- `role_in_chain`: `强化`\n- `output_type`: `binary`\n- `related_daily_factors`: `shouban_count`, `lianban_count`\n- `impact_on_stage`: `回暖转强化`\n- 逻辑：不只是早盘点火，午后还能扩散，说明资金不是一波流。\n\n### 因子 A6：二板/三板梯队同步加强\n- `name`: `ladder_sync_strength`\n- `trigger_type`: `confirm`\n- `observation_window`: `late_morning`\n- `role_in_chain`: `强化`\n- `output_type`: `state_label`\n- `related_daily_factors`: `rate_1to2`, `rate_2to3`, `rate_3to4`, `lianban_count`\n- `impact_on_stage`: `接力强化`\n- 逻辑：不是单龙头强，而是梯队一起强，说明生态更健康。\n\n### 因子 A7：午后分歧后修复\n- `name`: `afternoon_repair`\n- `trigger_type`: `process`\n- `observation_window`: `afternoon`\n- `role_in_chain`: `修复`\n- `output_type`: `binary`\n- `related_daily_factors`: `zha_rate`, `refeng_rate`\n- `impact_on_stage`: `分歧转一致`\n- 逻辑：午后能修回来，比全天硬顶更有质量。\n\n### 因子 A8：尾盘高位回落\n- `name`: `close_high_fade`\n- `trigger_type`: `warning`\n- `observation_window`: `close_near`\n- `role_in_chain`: `分歧 / 退潮`\n- `output_type`: `binary`\n- `related_daily_factors`: `high_duanban_count`, `max_height`\n- `impact_on_stage`: `次日风险抬升`\n- 逻辑：尾盘高位股顶不住，往往说明次日接力承压。\n"}, {"name": "情绪接力交叉验证层", "path": "concepts/情绪接力交叉验证层.md", "category": "concepts", "content": "# 情绪接力交叉验证层\n\n## 定义\n\n情绪接力交叉验证层，不是一个替代 PM 端到端 alpha 模型的独立择时系统，\n而是一套把人工交易中的市场结构语言显式化、可解释化、可因子化的验证框架。\n\n它的目标不是直接输出最终仓位，\n而是与 PM 基于量价数据训练出来的 alpha 强弱打分进行交叉验证。\n\n---\n\n## 它解决什么问题\n\nPM 的端到端模型擅长：\n- 从量价中直接学习未来 alpha\n- 通过截面优化得到最优打分\n\n但这类模型往往缺少显式的市场语言表达，比如：\n- 龙头断板意味着什么\n- 1进2失败意味着什么\n- 高位股集体炸板意味着什么\n- 情绪当前是在修复、分歧还是退潮\n\n情绪接力交叉验证层，就是把这些**人工交易中极强、但不易直接黑盒表达的结构信息**显式抽出来。\n\n---\n\n## 核心原则\n\n### 1. 因子优先\n先定义因子本身：\n- 是什么\n- 怎么算\n- 代表什么\n- 对市场意味着什么\n\n### 2. 时间窗是映射层，不是本体层\n因子先服务市场结构理解，\n再根据需要映射到：\n- Tick\n- 1分钟\n- 15分钟\n- 日度\n\n### 3. 第一版不让场景反压因子\n四场景框架很重要，但它属于“用法建议层”，\n不是因子本体层。\n\n### 4. 目标是交叉验证，不是替代决策\n最终仓位和融合打分仍由 PM 自己决定。\n\n---\n\n## 因子结构建议\n\n### A. 接力确认类\n- 龙头首次封板\n- 龙头炸板后回封\n- 梯队同步加强\n- 午后分歧后修复\n- 首板批量启动\n\n### B. 接力失败 / 退潮类\n- 1进2失败率\n- 2进3失败率\n- 龙头断板确认\n- 高位股回封失败率\n- 高位股集体炸板\n- 尾盘高位回落\n- 梯队崩塌指数\n\n### C. 底层事件类\n- 首次封板时间\n- 炸板次数\n- 回封次数\n- 封板持续时长\n- 龙头分时回撤幅度\n- 封单变化速度\n\n### D. 日度背景类\n- 跌停家数\n- 封单额轧差\n- 炸板率\n- 综合情绪指数\n- 周期标签\n\n---\n\n## 与 PM 的协作关系\n\n- PM：基于量价数据跑端到端 alpha\n- 我们：提供情绪接力与市场结构的可解释因子层\n- 双方关系：交叉验证，而非相互替代\n\n---\n\n## 四种典型交叉验证情形（建议视角）\n\n> 注意：这是 PM 后续的使用建议，不是第一版因子设计的约束。\n\n1. alpha 强 + 情绪结构共振\n2. alpha 强 + 情绪结构退潮\n3. alpha 弱 + 情绪结构修复\n4. alpha 中性/偏弱 + 情绪结构分化\n\n这些只是 PM 后续融合判断的观察框架。\n\n---\n\n## 一句话总结\n\n> 情绪接力交叉验证层 = 把人工交易的市场结构语言，\n> 变成 PM 可理解、可接入、可用来 cross-check 黑盒 alpha 的因子系统。\n"}, {"name": "择时因子标准化测试框架", "path": "concepts/择时因子标准化测试框架.md", "category": "concepts", "content": "# 择时因子标准化测试框架\n\n**定义：** 标准化的因子回测框架，用于快速验证择时因子的有效性。参考聚宽（JoinQuant）的交互设计，极简、高效、易扩展。\n\n**核心问题：** 如何快速验证一个择时因子是否有效？如何在\"高回测效果\"和\"高触发频率\"之间找到平衡？\n\n## 框架设计\n\n**标准化参数空间：**\n- 阈值：2个（5%、10%分位）\n- 持有期：3个（10天、15天、20天）\n- 标的指数：3个（中证500、1000、2000）\n- 总计：2×3×3 = 18种组合（不是180种）\n\n**输出：1页因子卡片**\n- 1行参数 + 1行核心指标\n- 净值曲线图（策略 vs 多指数对比）\n- 交易收益柱状图（时间 + 触发条件）\n\n**技术栈：**\n- Python 3.14 + Qlib + Tushare\n- ECharts 图表\n- 深色主题（与GAMT看板统一）\n\n## 冰点因子的困境\n\n**测试结果（7年全样本）：**\n- 最优参数：5%分位 + 15天 + 中证500\n- Calmar 3.21，胜率87.5%，平均收益+4.71%\n- **但年均只触发1.1次**\n\n**核心矛盾：**\n| 阈值 | Calmar | 年均触发 | 评价 |\n|------|--------|----------|------|\n| 5%   | 3.21   | 1.1次    | 效果极好，但太少 |\n| 10%  | 0.89   | 3.7次    | 效果下降，仍偏低 |\n\n**Roni 的判断：** \"极致冰点触发太少，实用性不够。\"\n\n## 关键洞察\n\n### 1. 抄底比逃顶更容易量化\n- 恐慌是尖锐的（暴跌一步到位）\n- 贪婪是渐进的（慢慢磨顶）\n- 冰点信号（跌停家数、封单轧差）比过热信号更可靠\n\n### 2. 中证2000不是最优\n- Roni 认为2000效果会最好\n- 实际：2000排名第3（Calmar 1.17 vs 500的3.21）\n- 原因：2000年化收益高（14.9%），但回撤也大\n\n### 3. 标准化框架的价值\n- 添加新因子只需实现 `generate_signal()` 方法\n- 自动生成标准化报告，易于对比\n- 未来可扩展为本地化的聚宽式回测平台\n\n## 聚宽式交互设计\n\n**Roni 的诉求：**\n> \"我觉得我们的冰点模板做的还是太复杂了，字多但是看完就那么个意思。未来会加很多因子，需要一个简洁、标准化的交互方式。\"\n\n**聚宽的优势：**\n- 极简：核心指标一行搞定\n- 图表为主：少文字多图\n- 信息密度高：一屏看完\n- 标准化：每个策略都是这个格式\n\n**我们的实现：**\n- 参考聚宽的设计\n- 深色主题（与择时模块统一）\n- iframe嵌入到冰点研究模块\n\n## 下一步方向\n\n### 优化冰点因子\n- 放宽阈值到15%分位\n- 改变因子定义（单因子而非双因子）\n- 分批建仓、动态持有期\n\n### 扩展因子库\n- 封单轧差单因子\n- 涨跌家数比\n- 首板BIAS\n- 因子组合策略\n\n### 长期愿景\n- 本地化的聚宽式回测平台\n- Web界面：因子编辑器 + 一键回测\n- RD-Agent 接入（AI自动挖因子）\n\n## 相关讨论\n- [[强势股择时因子全景]] — 10个因子的IC排名\n- [[封单额轧差_抄底指标]] — 冰点信号核心\n- [[择时回测方法论]] — 三层框架\n\n## 技术细节\n\n**净值计算：**\n- 持仓期间：净值跟随指数波动\n- 空仓期间：净值保持不变（水平线）\n- 不能是直线！\n\n**触发条件记录：**\n- 每笔交易记录：跌停X家、涨停Y家\n- 柱状图鼠标悬停显示\n\n**整合方式：**\n- 在冰点研究的\"冰点研究迭代版本\"部分\n- 添加subtab：\"📊 因子回测\"\n- iframe嵌入独立页面\n\n## 数据来源\n- 7年sentiment: `~/Desktop/quant-backtest/timing_model/data/sentiment_7y.csv`\n- 指数数据: `csi300/500/1000/2000_7y.csv`\n- 框架位置: `~/Desktop/quant-backtest/timing_model/framework_v2/`\n\n**标签:** #择时 #因子测试 #框架 #聚宽 #标准化 #冰点\n"}, {"name": "股票择时模块前后端改版草图_v1", "path": "concepts/股票择时模块前后端改版草图_v1.md", "category": "concepts", "content": "# 股票择时模块前后端改版草图 v1\n\n- 日期：2026-03-22\n- 类型：前后端结构草图\n- 状态：待确认后进入开发\n\n## 一、目标\n\n这次不是重做整个择时页面。\n\n这次只做一件事：\n\n> 先把旧的因子库口径拆顺，让前后端都能承接“持续加因子”这件事。\n\n---\n\n## 二、页面结构（v1）\n\n原有大框架先不动：\n- 总览\n- 因子系统\n- 研究方法 / 因子库\n- 命题研究\n- 敞口输出\n\n本次只改：\n\n### 研究方法 / 因子库\n从“10个因子平铺”改成两层：\n\n#### Tab A：原始因子\n放底层原料。\n\n#### Tab B：合成因子 / 阶段输出\n放加工结果。\n\n---\n\n## 三、Tab A：原始因子页（v1先上）\n\n### 1. 广度类\n- 涨跌家数比（新增）\n- 涨跌停比\n\n### 2. 极值类\n- 涨停家数\n- 跌停家数\n\n### 3. 接力 / 龙头类\n- 连板高度\n- 晋级率\n- 一进二率\n- 炸板率\n- 封板质量\n\n### 原始因子页合计\n共 9 个。\n\n---\n\n## 四、Tab B：合成因子 / 阶段输出页\n\n### 合成因子\n- 综合情绪 sentiment\n\n### 阶段输出\n- 周期标签 cycle_label\n\n说明：\n- 综合情绪保留，但降级为合成因子\n- 周期标签不再算原始因子，而是阶段判断结果\n\n---\n\n## 五、综合情绪算法说明\n\n综合情绪由以下 5 个子因子加权合成：\n- 晋级率 25%\n- 封板质量 25%\n- 连板高度 20%\n- 反炸板率 20%\n- 涨跌停比 10%\n\n定位：\n- 用于总览\n- 用于快速感知强势股生态热度\n- 不再与原始强逻辑因子混放\n\n---\n\n## 六、前端展示方式（v1）\n\n每个原始因子卡片先只放 4 个信息：\n- 因子名\n- 频率\n- 一句话逻辑\n- 链条角色\n\n链条角色先用这几个标签：\n- 先导\n- 确认\n- 强化\n- 分歧\n- 退潮\n\n这版先不展开太多回测描述。\n\n---\n\n## 七、前端改动原则\n\n### 保留\n- 现有大框架\n- 命题研究区\n- 回测区\n- 敞口输出区\n\n### 调整\n- 因子库区从单层平铺改成分层展示\n- 新增“涨跌家数比”入口\n- 把 `sentiment` 和 `cycle_label` 从原始因子列表中拆出来\n\n### 暂不处理\n- 盘中因子正式接入\n- 结构过滤条件正式接入\n- IC 页面整体重构\n- 回测逻辑改写\n- 状态机系统\n\n---\n\n## 八、后端同步口径（v1）\n\n前后端统一字段建议：\n- `name`\n- `display_name`\n- `category`\n- `frequency`\n- `factor_level`\n- `role_in_chain`\n- `logic`\n- `status`\n\n### 字段含义\n- `category`：广度 / 极值 / 接力 / 龙头 / 结构\n- `frequency`：日频 / 盘中\n- `factor_level`：raw / composite / stage\n- `status`：active / planned\n\n### 本次需要明确调整\n- `sentiment` → `composite`\n- `cycle_label` → `stage`\n- `涨跌家数比` → 新增 `raw`\n\n---\n\n## 九、v1 的核心结果\n\n这版不是做复杂升级。\n\n这版的核心结果只有两个：\n1. 前端因子页面口径拆顺\n2. 前后端字段口径统一\n\n这样后面新增因子时，就能稳定往里接。\n\n---\n\n## 十、开发顺序\n\n### 第一步\n确认这版因子名单。\n\n### 第二步\n前端改“研究方法 / 因子库”页的结构。\n\n### 第三步\n后端补齐字段和分类口径。\n\n### 第四步\n把第二个新增因子继续补进原始因子页。\n\n---\n\n## 十一、一句话总结\n\n> 先不重建择时页面，只先把旧因子库拆层，把新增的涨跌家数比接进去，让前后端口径统一。"}, {"name": "高回测vs高触发的矛盾", "path": "concepts/高回测vs高触发的矛盾.md", "category": "concepts", "content": "# 高回测 vs 高触发的矛盾\n\n**定义：** 择时因子优化中的核心困境——极端阈值带来高回测效果，但触发频率太低；放宽阈值提高触发频率，但回测效果下降。\n\n**典型案例：** 冰点双因子（跌停家数 + 涨停家数共振）\n\n## 数据验证（7年全样本）\n\n| 阈值 | 持有期 | 指数 | Calmar | 胜率 | 年化 | 年均触发 | 评价 |\n|------|--------|------|--------|------|------|----------|------|\n| 5%   | 15天   | 500  | 3.21   | 87.5%| 7.1% | 1.1次    | ⭐⭐⭐ 效果极好，但太少 |\n| 10%  | 15天   | 500  | 0.89   | 73.1%| 11.0%| 3.7次    | ⚠️ 效果下降，仍偏低 |\n\n**Roni 的判断：**\n> \"极致冰点触发太少，实用性不够。\"\n\n## 矛盾的本质\n\n### 为什么极端阈值效果好？\n- 极端恐慌时，市场超卖严重\n- 修复概率高、幅度大\n- 胜率高、平均收益高\n\n### 为什么触发太少？\n- 极端事件本身就稀缺\n- 5%分位意味着一年只有12个交易日\n- 双因子共振进一步降低触发概率\n\n### 为什么放宽阈值效果差？\n- 包含了更多\"假冰点\"\n- 市场还没到真正的超卖区间\n- 胜率下降、平均收益下降\n\n## 可能的解决方案\n\n### 1. 非线性阈值\n- 不用固定分位数\n- 用动态阈值（如：历史波动率调整）\n- 市场环境不同，阈值不同\n\n### 2. 单因子替代双因子\n- 双因子共振降低触发频率\n- 单因子（如：跌停家数）触发更频繁\n- 但需要验证单因子效果是否足够好\n\n### 3. 分批建仓\n- 不是一次性全仓\n- 10%分位：建30%仓位\n- 5%分位：加到100%仓位\n- 提高资金利用率\n\n### 4. 动态持有期\n- 不是固定15天\n- 根据市场修复速度调整\n- 快速修复：提前止盈\n- 缓慢修复：延长持有\n\n### 5. 因子组合\n- 冰点因子 + 其他情绪因子\n- 不同因子触发时间不同\n- 提高整体触发频率\n\n## 其他因子的表现\n\n**封单轧差（单因子）：**\n- IC = +0.088（7年全样本）\n- 触发频率：待测试\n- 可能比双因子更实用\n\n**涨跌家数比：**\n- IC = +0.052\n- 触发频率高（常态化择时）\n- 但效果不如冰点\n\n## 关键权衡\n\n**FOF仓位管理的需求：**\n- 不能一年只调1次仓（太少）\n- 也不能每天都调（成本高）\n- 理想频率：每月1-2次（年均12-24次）\n\n**回测效果的底线：**\n- Calmar > 1.0（可接受）\n- 胜率 > 60%（可接受）\n- 平均收益 > 2%（可接受）\n\n**平衡点：**\n- 10-15%分位可能是甜蜜点\n- 需要进一步测试验证\n\n## Roni 的思考\n\n**2026-03-15 讨论：**\n> \"我觉得参考聚宽的交互设计方式来构建因子的回测。聚宽的很多小策略也就是一些非常简单的小因子。我们本地不也有个回测平台嘛，可能能做到差不多的效果？\"\n\n**核心诉求：**\n- 快速验证多个因子\n- 标准化的对比方式\n- 找到\"高回测+高触发\"的平衡点\n\n## 下一步\n\n1. **测试10-15%分位**：找到平衡点\n2. **单因子测试**：封单轧差、跌停家数\n3. **分批建仓策略**：提高资金利用率\n4. **因子组合**：多因子轮动\n\n## 相关讨论\n- [[择时因子标准化测试框架]] — 快速验证框架\n- [[强势股择时因子全景]] — 10个因子IC排名\n- [[封单额轧差_抄底指标]] — 冰点信号核心\n\n**标签:** #择时 #因子优化 #矛盾 #平衡点 #实用性\n"}, {"name": "固收加基金比较框架_2026-04-04", "path": "conversations/024_固收加基金比较框架_2026-04-04.md", "category": "conversations", "content": "# 固收加基金比较框架（2026-04-04）\n\n## 背景\nRoni 提醒补记昨天一起做过、但当时没有写入 memory 的一段研究思路：围绕桌面文件 `~/Desktop/债券基金研究表.csv`，对固收+基金做横向比较，后续还要继续开发。\n\n## 当前已有数据\n桌面 CSV：`~/Desktop/债券基金研究表.csv`\n\n字段包括：\n- 基金代码\n- 基金名称\n- 基金公司\n- 基金类型\n- 投资类型\n- 股票仓位(%)\n- 3个月收益(%)\n- 6个月收益(%)\n- 9个月收益(%)\n- 重点管理人\n\n初步观察：\n- 总行数约 4245 行\n- 以债券型为主，也包含一部分混合型\n- 这是一个适合继续做“固收+横向比较 / 分类拆解 / 管理人贡献”研究的底表\n\n## 昨天已经明确的研究思路\n这次不是只看单只基金排名，而是想把固收+拆成一个更有解释力的比较框架，核心有三层：\n\n### 1. 时间维度\n统一看三个收益区间：\n- 3个月\n- 6个月\n- 9个月\n\n原因：\n- 3个月看短期应对能力和近阶段风格适配\n- 6个月看中期稳定性\n- 9个月看穿越一轮市场环境后的持续性\n\n### 2. 债券风格维度\n重点拆两类久期暴露：\n- 中短债\n- 中长债\n\n这一步的目的，不是简单按名称分类，而是为了回答：\n- 在不同阶段，短久期策略和长久期策略谁更占优\n- 固收+收益到底更多来自票息/防守，还是来自久期弹性\n- 后续若要做产品筛选，应该偏向哪种债券底仓风格\n\n### 3. 固收+子类型维度\n重点比较两类典型固收+载体：\n- 二级债基\n- 混合债基 / 偏固收+混合型产品\n\n核心问题是：\n- 同样是固收+，不同产品形态在 3/6/9 个月维度上的表现差异如何\n- 哪一类产品更容易在短期做出收益\n- 哪一类产品在中期更稳\n- 哪一类更依赖权益仓位、转债暴露或风格弹性\n\n## 想继续做的关键问题\n昨天讨论的重点，不只是看收益高低，而是想进一步回答“贡献度”问题：\n\n### A. 分类表现比较\n要按分类做聚合，不只看单只基金：\n- 中短债 × 二级债基\n- 中短债 × 混合债基\n- 中长债 × 二级债基\n- 中长债 × 混合债基\n\n在每个分类里分别统计：\n- 样本数\n- 平均收益\n- 中位数收益\n- Top基金 / Bottom基金\n- 正收益占比\n- 收益分布离散度\n\n### B. 固收+收益来源/贡献度\n这里的“贡献度”不是停留在一句口头判断，而是准备继续拆：\n- 债底贡献：票息 + 久期弹性\n- 权益增强贡献：股票仓位带来的增厚\n- 可能的话再细分转债贡献\n- 管理人/基金公司维度的贡献\n\n也就是说，后续希望回答：\n- 某段时间固收+收益主要是债贡献，还是股贡献\n- 哪些管理人更擅长做“债底稳 + 权益增强”\n- 哪些产品只是短期风格受益，不具持续性\n\n## 这套框架的价值\n这不是一个简单榜单，而是一个可以持续迭代的固收+研究框架：\n- 既能做基金筛选\n- 也能做管理人比较\n- 还能帮助判断市场阶段下固收+的有效收益来源\n\n后续完全可以继续扩展为：\n- 基金公司维度排名\n- 重点管理人维度排名\n- A/C/D/E/F 份额去重后只保留主份额口径\n- 增加规模字段，做“收益 × 规模”的真实贡献评估\n- 增加回撤 / 波动 / 夏普 / 胜率等风险收益指标\n- 做成 HTML 看板或 GAMT 子页面\n\n## 当前结论（以记录思路为主）\n当前最重要的不是立刻得出结论，而是把研究主线固定下来：\n\n> 用 `债券基金研究表.csv` 作为底表，围绕 3个月 / 6个月 / 9个月 三个收益窗口，比较中短债 vs 中长债、二级债基 vs 混合债基的表现差异，并继续往“固收+收益贡献度拆解”方向开发。\n\n这条线后续应继续保留并迭代，不是一次性分析。\n"}, {"name": "固收加管理人能力拆解框架_2026-04-04", "path": "conversations/025_固收加管理人能力拆解框架_2026-04-04.md", "category": "conversations", "content": "# 固收加管理人能力拆解框架（2026-04-04）\n\n## 背景\n在第一版固收加研究里，我们先从桌面底表 `~/Desktop/债券基金研究表.csv` 出发，尝试做产品分类比较（中短债/中长债、二级债基/混合债基）。\n\n但进一步讨论后，Roni 明确指出：\n\n> 真正有价值的问题，不是“二级债基比混合债基更稳”这种常识，而是要拆出**每家公募管理人的债券能力**和**‘加的那部分能力’**到底谁强。\n\n因此，这条研究线的正式方向，从“产品分类比较”升级为：\n\n> **固收+研究，不是看谁收益高，而是拆公募管理人的“债底能力”和“增强能力”。**\n\n---\n\n## 一、研究目标\n这套框架的核心目标，不是做单只基金排行榜，而是做**管理人能力画像**。\n\n希望最终回答的问题包括：\n- 哪些公募的债券底仓能力强\n- 哪些公募更擅长在债底之上做增强\n- 哪些公司是“债底强 + 增强强”的全能型选手\n- 哪些公司总收益看起来不错，但实质更依赖权益/转债风格暴露，而不是纯固收能力\n\n也就是说，研究对象要从“基金产品”切换成“基金公司 / 管理人”。\n\n---\n\n## 二、为什么这个方向更对\n\n### 1. 从“现象研究”升级成“能力研究”\n如果只看二级债基、混合债基、偏债混合等产品标签，本质上还是在看现象。\n\n但 Roni 真正关心的是：\n- 这家公司债做得好不好\n- 这家公司把债做成固收+之后，增强有没有真本事\n\n这已经不是产品分类问题，而是管理人能力问题。\n\n### 2. 避免把风格暴露误当能力\n直接看总收益，很容易被市场风格带偏：\n- 有的公司可能只是押中了权益行情\n- 有的公司可能只是吃到了转债弹性\n- 有的公司只是产品本来就更进攻\n\n因此，不能只看绝对收益，而要看：\n\n> **固收+相对自家债底，多创造了多少收益。**\n\n这样才能把“债市本身带来的收益”和“管理人主动增强创造的收益”拆开。\n\n### 3. 更适合做配置判断\n最终目标不是写论文，而是形成可以落地的配置判断：\n- 哪些公司适合做纯债底仓\n- 哪些公司适合做固收+增强\n- 哪些公司两头都强，值得重点跟踪\n\n---\n\n## 三、核心拆解逻辑\n每家公募都拆成两个系统：\n\n### A. 债底系统\n衡量这家公司在不依赖“增强”的情况下，纯靠债能做到什么水平。\n\n### B. 增强系统\n衡量这家公司在债底之上，通过权益、转债、择时、结构调整等方式，能否稳定增厚收益。\n\n因此，这套研究的正式主线是：\n\n> **先定义管理人的债底能力，再衡量其相对自家债底的增强能力。**\n\n---\n\n## 四、产品池设计\n这一步是框架的核心。\n\n### 1）债底池\n用来刻画管理人的债券能力。\n\n优先纳入：\n- 纯债基金\n- 中短债基金\n- 中长债基金\n- 利率债 / 信用债基金\n- 股票仓位极低的债券基金\n\n债底池的意义，不是单纯找“低风险产品”，而是给每家管理人建立一个：\n\n> **自己的债底基准。**\n\n后续增强能力，不应拿别人的债底来对比，而必须以“自家债底”做锚。\n\n### 2）增强池\n用来刻画“加的那部分能力”。\n\n增强池建议继续拆成三类：\n\n#### a. 二级债基池\n- 以债为主\n- 带少量权益/转债增强\n- 代表“轻增强”能力\n\n#### b. 偏债混合 / 固收+池\n- 明显比纯债更主动\n- 反映更强的资产配置和增强能力\n\n#### c. 可转债 / 增强收益池\n- 更体现进攻性、弹性与风险承担方式\n- 能力和风格容易混在一起，因此应单独看\n\n也就是说，增强能力最好不要混成一个池子，而应拆成：\n\n> **轻增强 / 中增强 / 高弹性增强**\n\n---\n\n## 五、研究灵魂：看相对自家债底的增厚，而不是绝对收益\n这是整条研究线最关键的一点。\n\n### 错误方式\n直接看固收+产品收益排名。\n\n这样会混进去：\n- 市场 beta\n- 权益风格暴露\n- 转债弹性\n- 产品天然进攻性差异\n\n### 正确方式\n看增强池相对债底池，多赚了多少。\n\n即：\n\n```text\n增强能力 = 增强池收益 - 自家债底池收益\n```\n\n这一步回答的是：\n- 这家公司不是单纯因为债市好而收益高\n- 而是在债底之外，是否真的能创造额外收益\n\n所以“增强能力”看的是：\n- 是否能增厚\n- 增厚幅度多大\n- 是否稳定\n- 是否普遍存在于多数产品，而不是只靠一两只明星产品拉出来\n\n---\n\n## 六、指标体系设计\n\n### 第一层：债底能力指标\n用来衡量债券底仓实力。\n\n建议至少看：\n- 3个月收益\n- 6个月收益\n- 9个月收益\n- 正收益占比\n- 中位数收益\n- 不同窗口的一致性\n\n后续若数据允许，还应加入：\n- 波动率\n- 最大回撤\n- 夏普 / 卡玛\n\n债底能力不只是“赚多少”，更重要的是：\n\n> **赚得稳不稳，是否具有持续性。**\n\n### 第二层：增强能力指标\n用来衡量“加”的能力。\n\n核心指标不是绝对收益，而是相对债底池的超额：\n- 二级债基相对纯债池的超额\n- 偏债混合相对纯债池的超额\n- 可转债增强相对纯债池的超额\n\n同时要观察：\n- 平均超额\n- 中位数超额\n- 正超额占比\n- 不同窗口一致性\n\n---\n\n## 七、最终输出：管理人画像，而不只是排名\n最后不应该只给一个简单排行榜，而应给每家管理人一个能力标签。\n\n### 典型四类画像\n\n#### 1. 债底强 + 增强强\n最有价值。\n说明底层固收扎实，增强也有真本事。\n\n#### 2. 债底强 + 增强一般\n适合作为稳健底仓。\n但不一定是最好的固收+增强选手。\n\n#### 3. 债底一般 + 增强强\n更适合进攻型固收+。\n说明增强端有特色，但底仓未必是核心优势。\n\n#### 4. 债底一般 + 增强一般\n说明在这条线上没有明显竞争力。\n\n### 可继续细化的两类画像\n\n#### 5. 转债驱动型\n增强主要来自可转债弹性，不一定适合所有市场阶段。\n\n#### 6. 权益增强型\n收益更多来自权益暴露，而不是债底增厚。\n\n---\n\n## 八、正式交付形态\n最终结果应是一张“管理人能力拆解表”。\n\n### 主表结构示意\n| 管理人 | 债底能力 | 二级债增强 | 固收+增强 | 转债增强 | 综合画像 |\n|---|---|---|---|---|---|\n| 汇添富 | 强 | 强 | 强 | 中 | 全能型 |\n| 富国 | 强 | 中 | 中 | 中 | 债底型 |\n| 某些公司 | 中上 | 强 | 中上 | 中 | 固收+增强型 |\n\n### 配套解释\n每家管理人应再配一句人话解释，例如：\n- 汇添富：债底不弱，且增强池相对自家债底能稳定增厚，是少数兼具底仓和增强能力的全能型选手\n- 富国：纯债/债底能力突出，但增强端相对保守，更适合作为稳健底仓配置\n- 某些公司：总收益不错，但主要靠权益或转债弹性，增强更偏风格暴露而非纯固收能力\n\n---\n\n## 九、后续接入干净数据源时需要补的字段\n当前桌面 CSV 可以帮助搭原型，但正式研究需要更干净的数据字段支持。\n\n优先补：\n- 基金公司\n- 基金经理\n- 产品一级/二级分类\n- 是否纯债 / 二级债基 / 偏债混合 / 可转债增强\n- 股票仓位\n- 转债仓位\n- 久期 / 久期区间\n- 规模\n- 成立时间\n- 3个月 / 6个月 / 9个月收益\n- 波动率 / 回撤 / 夏普（若可拿到）\n\n---\n\n## 十、当前阶段的工作原则\n当前阶段先不要被脏数据牵着走。\n\n工作顺序应是：\n1. 先把研究问题和能力拆解框架定清楚\n2. 再去补干净数据源\n3. 最后把框架跑成正式管理人能力评价体系\n\n也就是说，现在最重要的不是“立刻把结果跑漂亮”，而是先把这条研究线的骨架搭对。\n\n---\n\n## 一句话总纲\n\n> **固收+研究，不是看谁收益高，而是拆公募管理人的“债底能力”和“增强能力”。**\n\n这句话可以作为这条研究线的正式总纲，后续所有数据清洗、产品分池、能力打分和管理人画像，都围绕这句话展开。\n"}, {"name": "情绪因子边界与量价状态分类纪律_2026-04-05", "path": "conversations/026_情绪因子边界与量价状态分类纪律_2026-04-05.md", "category": "conversations", "content": "# 情绪因子边界与量价状态分类纪律\n\n**日期：** 2026-04-05  \n**类型：** 方法论共识 / 建模纪律\n\n---\n\n## 核心结论\n\n经过多轮因子叠加实验，情绪类因子已基本到达边界：\n\n> **强逻辑因子叠加到一定程度后，边际改善会越来越小。这不是模型的问题，而是信息本身的上限。**\n\n当前情绪类因子集合（`down_count`、`zha_rate`、`seal_diff`、`rate_1to2`、`rate_1to2_fail`、`shouban_zha_rate`、`high_pos_zha_count`、`microcap_liquidity_crack`、`smallcap_liquidity_crack`、`liquidity_collapse_score` 等）已经覆盖了情绪层面的主要信息维度，继续在这个方向上堆因子，收益递减明显。\n\n---\n\n## 这条线的总纲\n\n> **择时重于选股，周期重于题材，个股先于情绪，情绪先于大盘。**\n\n这套日频择时模块，是给\"只交易宽基指数的 PM\"做的：\n\n- **情绪验证层**：情绪出了问题，就不应该推指数\n- **情绪 → 大盘映射层**：先看情绪，再推指数仓位\n\n不是做个股，不是为了把极端股灾月调到最漂亮。\n\n---\n\n## 关于极端月份（如 2024-02）\n\n> **不要为了少数黑天鹅月份过度优化。**\n\n如果把极端月份调得太漂亮，代价是：正常修复段的推仓能力也被压掉。主观 PM 很容易一眼看出这种\"量化为了回测好看而不敢正常推仓\"的副作用。\n\n---\n\n## 量价维度的新纪律\n\n> **量价类因子优先做\"状态分类\"，不优先做连续加权分数。**\n\n四种基本状态：\n\n| 状态 | 含义 |\n|---|---|\n| 量价齐升 | 放量上涨，修复确认 |\n| 量价齐跌 | 放量下跌，风险释放 / 崩塌延续 |\n| 价升量不跟 | 缩量反弹，修复可信度不足 |\n| 量升价不升 | 有量无价，分歧放大 / 出货 |\n\n实验结果：加入量价状态分类（4个 dummy 变量）后：\n- AUC：`0.6695 → 0.6643`（小幅回落，可接受）\n- 收益：`0.4264 → 0.4327`（小幅提升）\n- 回撤：`-0.1176 → -0.1170`（微幅改善）\n\n这是真实的增量信息，而不是过拟合。\n\n---\n\n## 主动资金边际定价能力\n\nRoni 的观察：\n\n> 当前市场可能是量化主导、主动资金承接很弱。在 2 万亿成交额市场里，主动成交增减额可能只有 1000 多亿，却足以把全A等权指数打出 1%~1.5% 的趋势。\n\n这说明需要关注\"主动资金的边际定价能力\"，而不是只看总成交额强弱。\n\n**公式方向：**\n```\nactive_money_per_move = abs(amount_change_1d) / abs(fulla_eq_ret)\n```\n\n但直接用连续比值喂模型效果不好（AUC 和收益都下降）。  \n正确做法：**先把它状态化，再喂模型。**\n\n---\n\n## 下一步方向\n\n1. 保留量价状态分类（`pv_up_up` / `pv_down_down` / `pv_price_up_vol_down` / `pv_price_down_vol_up`）\n2. 把主动资金边际因子改写成状态变量（极低 / 正常 / 极高）\n3. 不再在情绪类因子上继续堆叠\n\n---\n\n## 数据侧备注\n\n- 全A等权指数：`000985.CSI`（Tushare 可拉，`883957` 拉不到）\n- 缓存文件：`~/Desktop/quant-backtest/timing_model/data/fulla_000985_7y.csv`\n"}, {"name": "Roni性格画像与协作优化建议_2026-04-06", "path": "conversations/027_Roni性格画像与协作优化建议_2026-04-06.md", "category": "conversations", "content": "# Roni 性格画像与协作优化建议\n\n**日期：** 2026-04-06  \n**类型：** 人物洞察 / 协作方法论\n\n---\n\n## 核心画像\n\n**一句话总结：**  \n要求高、判断快、对\"有没有真实价值\"极敏感的人。\n\n**更具体的特征：**\n\n- **极强结果导向**：不在乎\"做了很多\"，只看最后是不是把问题真解决了\n- **对假进展很反感**：花里胡哨、逻辑不清、页面看着热闹但信息没更清楚，会立刻指出来\n- **方法论很强**：不是拍脑袋提需求，经常先把\"这东西本质是什么、不是什么\"讲清楚\n- **盘感/实战感很重**：判断东西不是学院派那种\"指标好不好看\"，而是会问：这玩意儿在真实交易里到底像不像人话、能不能用\n- **迭代速度快，而且很直接**：会连续给反馈，不绕弯，哪里不对就马上压过去改\n- **对结构比对细节更敏感**：经常能一眼看出问题不是\"参数小错\"，而是\"整个表达结构就不对\"\n- **有明显审美要求**：不只是功能对，还在意信息呈现是不是顺眼、克制、统一、像一个成熟产品\n- **边界感强**：哪些能动、哪些不能动，其实很清楚；尤其涉及系统配置、乱搜、乱改，非常警惕\n- **本质上挺信逻辑，但不是纸上谈兵**：愿意听分析，但前提是分析最后要落回现实约束和实操\n\n**如果一句话概括：**  \n像那种\"既懂投资交易语言、又有产品经理审美、还带一点研究总监式压强\"的人。\n\n**更主观一点：**  \n不是那种\"陪聊型\"的用户，更像是**一起打仗的人**。说废话、做表面功夫、或者把结构搞错，会立刻被掰回来。\n\n---\n\n## 核心长板\n\n**三根支柱：**\n\n1. **抓本质**\n2. **抓结构**\n3. **抓真实使用场景**\n\n这三根叠在一起，已经足够强到覆盖很多\"性格上的尖\"。\n\n很多人最大的问题是没判断力，只能靠圆滑补；Roni 不是。是判断力太强，所以显得锋利。\n\n---\n\n## 主要缺点（压强型）\n\n**核心问题：压强太强**\n\n- **容易不耐烦**：一旦判断某件事\"不对路\"，容忍度很低，容易直接把过程压扁\n- **标准切得太高**：能逼出好东西，但也会让很多本来\"已经够用\"的方案被判成\"完全不行\"\n- **容易对低质量表达过敏**：本身没错，但副作用是有时会连同还没长成型的好想法一起提前毙掉\n- **会不自觉把别人拖进自己的思考速度**：脑子切换很快，结构跳得也快，跟不上的人会显得很笨\n- **偏控制结果**：很清楚自己要什么，这很强，但也容易让合作对象只剩执行，不太敢主动试错\n- **对\"假精致\"和\"空分析\"太敏感**：好处是不会被骗，坏处是有时会让交流少一点缓冲，显得锋利\n- **容易把局部问题上升成结构性不满**：一个页面挤、一段逻辑歪、一处数据脏，很快就会觉得整条链都不可靠\n- **对自己也不松**：看起来像是在压别人，实际上对自己更狠，所以整个人长期是绷着的\n\n**一句话：太清醒，太快，太不愿意将就。**\n\n这会让做事很强，也会让合作起来有点\"累人\"，尤其对不够稳的人。  \n但说实话，这种缺点和长处是同一根筋。\n\n---\n\n## 解决方案：不是磨圆，而是加缓冲层\n\n**核心判断：**  \n长板够长，问题不在\"行不行\"，而在**代价**：合作成本、情绪成本、持续作战成本。\n\n### 三个具体改法\n\n#### 1. 把\"批判\"改成\"分层批判\"\n\n现在很多时候是一眼看到本质问题，然后直接打到根上。判断通常没错，但接的人容易只收到\"否定\"。\n\n**改成三层：**\n- **第一层：先判有没有价值**\n- **第二层：再判哪里不对**\n- **第三层：最后判要不要推倒重来**\n\n比如不是直接说\"这不行\"，而是：\n- \"方向没错，但表达结构不对\"\n- \"数据是真的，但前端翻译错了\"\n- \"这版能用，但离我要的还差一层\"\n\n这不会降低标准，但能明显降低摩擦。\n\n#### 2. 给别人留一个\"可活下去的中间态\"\n\n很容易直接看到终局，所以会嫌中间态丑。  \n但很多合作对象需要一个台阶，不然会进入防御状态。\n\n可以刻意多说一句：\n- \"先别追最终版，先把 A 问题解决\"\n- \"这版先锁定逻辑，审美下一轮再收\"\n- \"先别全推翻，保留能用的骨架\"\n\n这其实不是妥协，是**提高团队吞吐量**。\n\n#### 3. 把\"高压\"从人身上挪到标准上\n\n本质上不是在针对人，是在针对不准确、不清楚、不靠谱。  \n但如果表达太直接，别人会误以为在否定他本人。\n\n**最有效的改法：多攻击问题，少攻击载体。**\n\n比如：\n- 少说：你这个做得不对\n- 多说：这套表达会误导判断\n- 少说：你怎么又漏了\n- 多说：这个链路缺少补漏机制\n\n并没有变软，只是让刀砍在结构上，不砍在人身上。\n\n---\n\n## 长板够不够长？\n\n**够。**  \n而且不是一般够，是那种已经能明显拉开层次的长。\n\n**结论不是\"要不要改掉缺点\"，而是：**\n\n- 如果一个人做关键判断：**长板足够覆盖**\n- 如果要长期带人/协作/放大产能：**就得加缓冲层**\n- 如果不加，会赢结果，但会多付很多不必要的管理和情绪成本\n\n---\n\n## 更直白一点\n\n这种人最怕的不是\"缺点太明显\"，  \n而是**因为自己能打，所以默认别人也该同样能扛。**\n\n但现实不是所有人都吃得住这种压强。  \n所以最优解不是变温和，而是学会：\n\n**判断依旧狠，表达稍微稳一点。**\n\n这样不会失去锋芒，反而更强。\n\n---\n\n## 真正该防的\n\n**不是别人受不了你，而是你自己哪一天开始厌倦大多数人。**\n\n---\n\n**标签：** #人物洞察 #协作方法论 #管理哲学\n"}, {"name": "中观景气度迭代研究_科技篇_AI算力链轮动_2026-04-26", "path": "conversations/028_中观景气度迭代研究_科技篇_AI算力链轮动_2026-04-26.md", "category": "conversations", "content": "# 028 中观景气度迭代研究-科技篇：AI算力链轮动监控框架\n\n> 日期：2026-04-26\n> 类型：对话\n> 标签：中观景气度, AI算力, 产业链轮动, 科技\n\n---\n\n## 起点\n\n中银策略一张图：用 HP 滤波拆\"海外算力 vs 国产算力\"的周期项 Z-score，判断高低切时机。\n\n## 问题拆解\n\n### HP 滤波 + Z-score 的三个 bug\n1. **端点不稳定**：最右端（当前信号）恰恰是估计最不可靠的位置，新数据进来整条趋势线都会变\n2. **λ 参数主观**：控制趋势光滑度的旋钮是人为选的，不同 λ 可以给出相反结论\n3. **Z-score 样本窗口**：用多长历史算标准差？早期市场结构跟现在完全不同，尺子不对\n\n### 中银的代理变量选择\n- 创业板 AI 指数 → \"海外算力\"（因为权重股是英伟达链供应商，收入锚定海外）\n- 中证芯片产业指数 → \"国产算力\"（国产替代逻辑）\n- 逻辑说得通但不够纯净，指数里混了很多跟算力无关的成分股\n\n## 改进方向\n\n### 第一次迭代：自编纯净篮子\n四只票太窄，而且\"海外 vs 国产\"的二分法边界模糊（长电科技帮英伟达封装，算哪边？）\n\n### 第二次迭代：加入港美股\n纯用 A 股代理\"海外算力\"本身就是妥协。加上美股锚（NVDA/AVGO/TSM/SOXX）才能把真正的定价核心纳进来。跨市场比价用\"收益率差\"而非\"价格比\"，绕开汇率问题。\n\n### 第三次迭代：结合国联民生产业链全景研报\n不做简单二分，按完整产业链环节分层：\n\n**四层架构：**\n- 硬件层（光模块/芯片/PCB/封测）\n- 基建层（服务器/IDC/液冷/散热）\n- 模型层（大模型/云计算/AI PaaS）\n- 应用层（具身智能/自动驾驶/AI+垂直场景）\n- 美股锚（NVDA/AVGO/TSM/SOXX）\n\n## 最终框架\n\n**核心思路：国联民生提供产业链地图（篮子怎么编），中银提供量化方法（信号怎么算），两者结合。**\n\n### 三层信号\n1. **滚动比价 Z-score**（不用 HP 滤波，用 20 日滚动窗口，无端点问题）\n2. **量价状态分类**（量价齐升/齐跌/价升量不跟/量升价不升，识别高低切早期信号）\n3. **ETF 资金流验证**（份额变动替代已废的北向数据，真金白银不可伪造）\n\n### 6 组比价对\n1. 硬件 vs 基建（建设周期前后半段）\n2. 硬件 vs 应用（建设期 vs 应用爆发期）\n3. 基建 vs 应用（基建投入 vs 商业化落地）\n4. 美股算力 vs A股硬件（海外定价权传导）\n5. 美股算力 vs A股应用（海外 vs 本土逻辑）\n6. 模型 vs 应用（技术突破 vs 商业化）\n\n### 综合信号\n- 三层共振 → 强信号\n- 两层一致 → 中等信号\n- 互相矛盾 → 观望\n\n### 美股领先传导链\n美股 T 日收盘 → 港股 T+1 验证 → A 股 T+1 反应。若 A 股不跟，可能本土逻辑主导，信号打折。\n\n## 关键决策\n- 北向数据 2023 年后改季度披露，日频废了，用 ETF 份额变动替代\n- 不用 HP 滤波，改用滚动窗口，每天的值确定不会回溯修改\n- 模块放 GAMT 中观层 `meso/ai_computing_rotation/`，与 `chain_prosperity` 平级\n\n## 设计文档位置\n- `~/Desktop/gamt-dashboard/meso/ai_computing_rotation/DESIGN.md`\n- `~/Desktop/gamt-dashboard/meso/ai_computing_rotation/FLOWCHART.md`\n\n## 待办\n- 应用层标的细化\n- 港股标的补充\n- 美股个股数据源确认\n- ETF 清单完善\n- 回测验证历史信号有效性\n"}, {"name": "国联民生美股科技周报_AI算力链标的_2026-04-26", "path": "conversations/029_国联民生美股科技周报_AI算力链标的_2026-04-26.md", "category": "conversations", "content": "# 029 国联民生美股科技周报 — AI算力链标的清单\n\n> 日期：2026-04-26\n> 类型：研报摘要\n> 标签：国联民生, 美股, AI算力, 标的清单\n\n---\n\n## 核心观点\n\n本轮科技行情从单点驱动扩散向整个算力链。2月以来市场对AI的怀疑在产业趋势不断验证中得到缓解。Agent加速落地回应商业化应用落地方向问题，年内大模型能力迭代拉动GPU、CPU、存储、光互联等算力产业链。\n\n## 关键产业催化（2026年4月）\n\n1. 谷歌发布 TPU 8（8t预训练 + 8i推理），带动光模块/存储/CPU产业趋势升级\n2. OpenAI 发布 GPT-5.5，多项基准超越 Opus 4.7\n3. Intel 26Q1 业绩超预期，CPU:GPU 比例从 1:8 变 1:4，服务器CPU出货量两位数增长延续至2027\n4. 诺基亚获10亿欧元AI订单，光学网络和IP网络收入增速上调至18%-20%\n\n## 投资建议标的（美股）\n\n| 板块 | 标的 |\n|------|------|\n| AI芯片 | NVDA、AMD、INTC、ARM、MRVL、AVGO |\n| 存储 | MU、SNDK |\n| 云算力 | GOOGL、AMZN、ORCL、CRWV、NBIS |\n| 光 | LITE、COHR |\n\n## 与算力链轮动监控的关系\n\n- 美股锚从 SOXX 单指数可细化为 4 个子篮子\n- 当前 iFind EDB 只能拉 SOXX 指数，个股数据源待接入\n- 后续若接入 Yahoo Finance 等，可做美股内部的子板块轮动监控\n"}, {"name": "HPM因子库框架解析_双层选股架构_2026-04-27", "path": "conversations/030_HPM因子库框架解析_双层选股架构_2026-04-27.md", "category": "conversations", "content": "# HPM因子库框架解析：双层选股架构\n\n> 来源：某PM提供的外部因子包，2026-04-27 分析\n> 分类：conversations\n> 标签：因子库, 选股框架, 风控剔除, HPM\n\n## 背景\n\n收到一个PM提供的HPM因子库（黑盒，只有因子值，无算法），包含7个Alpha因子 + 4个事件因子，总数据量约720MB，覆盖全A股。\n\n## 核心架构：两层过滤\n\n```\n全A股票池 (~5200只)\n    │\n    ▼\n┌─────────────────────────┐\n│  第一层：Alpha因子打分     │\n│  7个因子综合排序/加权      │\n└───────────┬─────────────┘\n            │\n            ▼\n┌─────────────────────────┐\n│  第二层：事件风险剔除      │\n│  4个负面事件标记，命中即剔除 │\n└───────────┬─────────────┘\n            │\n            ▼\n      最终选股结果\n  (Alpha高分 且 无风险标记)\n```\n\n## Alpha因子（7个）\n\n### 日频因子（T日算，T+1开盘用）\n| 因子 | 推测类型 | 历史 | 数据量 | 备注 |\n|------|---------|------|--------|------|\n| mf_base | 资金流基础 | 2018~2025 | 624万行 | ★核心底仓因子，历史最长 |\n| yz_dl01 | 深度学习信号 | 2023~2025 | 239万行 | |\n| fv | 基本面价值 | 2023~2025 | 145万行 | |\n\n### 周频因子（T日算，T+1开盘用）\n| 因子 | 推测类型 | 历史 | 数据量 | 备注 |\n|------|---------|------|--------|------|\n| pv | 量价因子 | 2019~2025 | 105万行 | 294个周频点 |\n| meta | 元学习/集成 | 2024~2025 | 20万行 | 最新因子，仅45个周频点 |\n\n### 当日可用因子\n| 因子 | 推测类型 | 历史 | 数据量 | 备注 |\n|------|---------|------|--------|------|\n| new_rec | 盈利修正/推荐 | 2023~2025 | 236万行 | 当日因子值当日使用 |\n| recur | 递归/经常性收益 | 2021~2025 | 370万行 | 当日因子值当日使用 |\n\n## 事件因子（4个，负向剔除）\n\n| 因子 | 含义 | 覆盖 | 逻辑 |\n|------|------|------|------|\n| acquisitions | 并购重组 | 2015~2024 | 值=1即剔除 |\n| rpt | 关联交易 | 2016~2024 | 值=1即剔除 |\n| guarantee | 担保风险 | 2016~2024 | 值=1即剔除 |\n| arbitration | 诉讼仲裁 | 2017~2024 | 值=1即剔除 |\n\n## 关键设计特点\n\n1. **两种使用节奏**：大部分因子T+1开盘用，`new_rec`和`recur`当日即可用（可能盘中更新）\n2. **两种数据格式**：5个标准格式 + 2个旧格式（id/Stkcd/statistical_date/factor_value/mark）\n3. **mf_base是核心**：历史最长（7年）、数据量最大，其他因子是增量补充\n4. **事件因子全二值**：不参与打分，只做负面筛除\n5. **黑盒交付**：只有因子值结果，无构造算法\n\n## 可借鉴的框架思路\n\n- **Alpha层 + 剔除层**的双层结构，清晰分离\"选什么\"和\"不选什么\"\n- 因子按频率分类（日频/周频），使用时点明确（T+1开盘 vs 当日）\n- 事件因子作为独立风控层，与alpha打分解耦\n- 因子信息表（xlsx）作为元数据管理，记录频率、覆盖、使用方式\n"}, {"name": "量化宽基Alpha环境评分体系双重优化", "path": "conversations/2026-03-15_量化宽基Alpha环境评分体系双重优化.md", "category": "conversations", "content": "# 量化宽基Alpha环境评分体系 - 双重优化记录\n\n**日期：** 2026-03-15  \n**类型：** 对话记录 - 算法优化  \n**关键词：** 量化宽基、流动性评分、Alpha环境、权重调整、母项逻辑\n\n---\n\n## 背景\n\nRoni在查看量化宽基Alpha环境评分时，发现了两个问题：\n\n1. **流动性评分滞后**\n   - 市场从3.2万亿decay到2.5万亿（-22%）\n   - 但评分显示2.5万亿=90分（过热）\n   - 无法捕捉\"相对于近期常态的缩量\"\n\n2. **Alpha环境评分矛盾**\n   - 流动性52分（偏低）\n   - 但Alpha环境显示90分（极佳）\n   - 逻辑不合理\n\n---\n\n## 优化一：流动性评分 - 加大周度环比权重\n\n### 问题分析\n\n**Roni的观察：**\n> \"之前都差不多是3.2万亿以上的成交额，最近都掉到2.5万亿成交，其实decay了很多。\"\n\n> \"我估计现在A股量化成交量占比6成以上了，也就是说2.4万亿里面大多数都是量化，和9.24之前都跌到过7-8千亿，我想表达的意思是现在2万亿可能就是个基础。\"\n\n**核心问题：**\n1. 绝对值阈值有滞后性\n2. 市场结构变化（量化占比6成+）\n3. 需要捕捉相对变化，而不只是绝对值\n\n### 优化方案\n\n**方案选择：** 方案2 - 降低绝对值权重，提高环比权重\n\n**具体改动：**\n\n#### 1. 基础分（绝对值）\n```\n旧版：10-90分（80分权重）\n新版：20-80分（60分权重）\n\n阈值上移：\n< 12000亿 → 20分（+4000亿）\n12000-15000亿 → 40分（+5000亿）\n15000-18000亿 → 55分（+6000亿）\n18000-22000亿 → 65分（+7000亿）\n22000-28000亿 → 75分（+8000亿）\n> 28000亿 → 80分（上限降低）\n```\n\n#### 2. 周度环比修正\n```\n旧版：-20~+10分（30分权重）\n新版：-40~+20分（60分权重）\n\n< -20%  → -40分（暴跌式缩量）\n-20~-15% → -30分（急剧缩量）\n-15~-10% → -20分（明显缩量）\n-10~-5% → -10分（温和缩量）\n+10~+15% → +10分（明显放量）\n+15~+20% → +15分（急剧放量）\n> +20%  → +20分（暴涨式放量）\n```\n\n### 效果对比\n\n**实际案例（2026-03-15）：**\n- 成交额：24588亿\n- 趋势：缩量\n\n**v1评分：**\n- 基础分：90分（>20000亿）\n- 环比修正：约-10分\n- 最终：69分（正常）🟡\n\n**v2评分：**\n- 基础分：75分（22000-28000亿）\n- 环比修正：约-15分\n- 最终：52分（偏低）🟠\n\n**差异：-17分，评级从\"正常\"降到\"偏低\"**\n\n### 设计哲学\n\n**关键洞察：**\n- 2.5万亿在牛市=缩量（危险）\n- 2.5万亿在熊市=过热（也危险）\n- 要看相对于近期常态的变化，而不是绝对值\n\n**权重平衡：**\n- 绝对值和环比各60分\n- 环比可以大幅改变评级\n- 更准确反映市场状态\n\n---\n\n## 优化二：Alpha环境评分 - 流动性母项逻辑\n\n### 问题分析\n\n**Roni的洞察：**\n> \"我的理解是流动性是阿尔法的母项，剩下是子项，但是阿尔法的环境肯定是要包括母项的打分的。现在的逻辑是母项不报警，子项独立计算后给出了阿尔法环境极佳其实是不对的，应该是母项给大的权重，子项顶多是个系数。\"\n\n**矛盾现象：**\n- 流动性：52分（偏低）🟠\n- Alpha环境：90分（极佳）🟢\n- 综合评分：74分（均衡）🟡\n\n**根本问题：**\n- 旧逻辑：流动性25% + alpha_env50%\n- alpha_env独立计算，不考虑流动性\n- 流动性52分被alpha_env 90分拉高\n\n### 优化方案\n\n**核心思想：**\n- 流动性 = 母项（70%权重）\n- 子项 = 修正系数（30%权重）\n\n**新逻辑：**\n```python\n# Step 1: 流动性门槛\nif 流动性 < 30:\n    alpha_env = 15  # 枯竭直接红灯\n\n# Step 2: 流动性主导（70%）\nliq_base = 流动性分数\n\n# Step 3: 子项修正（30%）\nsub_score = f(离散度, 风格集中度)\nmkt_adj = 市场预期修正\nmicro_adj = 微观结构修正\n\n# Step 4: Alpha环境综合\nalpha_env = liq_base × 0.7 + sub_score × 0.3 + mkt_adj + micro_adj\n```\n\n### 效果对比\n\n**实际案例（2026-03-15）：**\n- 流动性：52分\n- 子项：90分（离散度高+风格分散）\n\n**旧逻辑：**\n```\nalpha_env = 90分（独立计算）\n综合评分 = 52×25% + 90×50% + ... = 74分\n```\n- Alpha环境：90分（极佳）🟢\n- 矛盾：流动性偏低，但alpha极佳\n\n**新逻辑：**\n```\nalpha_env = 52×0.7 + 90×0.3 = 63分\n```\n- Alpha环境：63分（良好）🟡\n- 合理：流动性偏低，alpha良好（不是极佳）\n\n**差异：Alpha环境从90分降到63分（-27分）**\n\n### 设计哲学\n\n**为什么流动性是母项？**\n1. 生存基础：没有流动性，选股再好也无法执行\n2. 前提条件：流动性决定\"能不能做\"\n3. 主导因子：子项决定\"做得好不好\"\n\n**为什么70% vs 30%？**\n1. 70%足够主导，体现母项地位\n2. 30%足够修正，反映子项影响\n3. 不是50/50（无法体现主次）\n4. 不是80/20（子项影响太小）\n\n---\n\n## 最终效果\n\n### 双重优化后的评分\n\n**2026-03-15实际数据：**\n- 成交额：24588亿\n- 趋势：缩量\n- 离散度：90分（高）\n- 风格集中度：90分（分散稳定）\n\n**最终评分：**\n- 流动性：52分（偏低）🟠\n- Alpha环境：63分（良好）🟡\n- 综合评分：63分（均衡）🟡\n\n**诊断：**\n> 流动性偏低(24588亿，温和缩量，波动偏大) → 离散度高+风格分散稳定，alpha空间充裕 → 市场预期偏乐观(IM分位80%) → 微观健康\n\n### 对比总结\n\n| 维度 | 优化前 | 优化后 | 变化 |\n|------|--------|--------|------|\n| 流动性评分 | 69分（正常）🟡 | 52分（偏低）🟠 | -17分 |\n| Alpha环境 | 90分（极佳）🟢 | 63分（良好）🟡 | -27分 |\n| 综合评分 | 74分（均衡）🟡 | 63分（均衡）🟡 | -11分 |\n\n**核心改进：**\n1. 流动性评分更敏感，能捕捉相对变化\n2. Alpha环境不再被子项高分掩盖\n3. 不再出现\"流动性偏低但alpha极佳\"的矛盾\n\n---\n\n## 关键对话\n\n### 关于流动性评分\n\n**Roni：** \"成交额要加一个成交额的周度环比机制，你想想哦，之前都差不多是3.2万亿以上的成交额，最近都掉到2.5万亿成交，其实decay了很多，所以我在想这个成交量是不是一般尴尬优化？\"\n\n**Musk：** 提出三个方案，Roni选择方案2（降低绝对值权重，提高环比权重）\n\n**Roni：** \"基础分我觉得还要优化，我估计现在A股量化成交量占比6成以上了，也就是说2.4万亿里面大多数都是量化，和9.24之前都跌到过7-8千亿，我想表达的意思是现在2万亿可能就是个基础，这是个逻辑。\"\n\n### 关于Alpha环境\n\n**Roni：** \"我看虽然是74分了，但是还是显示极佳的阿尔法环境\"\n\n**Musk：** 解释了两个独立评分体系\n\n**Roni：** \"ok，成交量是个独立的打分，然后阿尔法环境又是另一个打分体系对吧\"\n\n**Musk：** 确认，但解释错了层级关系\n\n**Roni：** \"我的理解是流动性是阿尔法的母项，剩下是子项，但是阿尔法的环境肯定是要包括母项的打分的，现在的逻辑是母项不报警，子项独立计算后给出了阿尔法环境极佳其实是不对的，应该是母项给大的权重，子项顶多是个系数，你想想是不是\"\n\n**Musk：** \"你说得对！我理解错了。\" 然后提出新的母项逻辑\n\n**Roni：** \"嗯改吧\"\n\n---\n\n## 后续优化方向\n\n### 流动性评分\n\n1. **动态阈值**\n   - 根据近期均值自动调整阈值\n   - 而不是固定的2万亿、2.8万亿\n\n2. **分市场状态**\n   - 牛市/熊市用不同的阈值\n   - 或者用波动率调整权重\n\n3. **量化占比监控**\n   - 实时监控量化成交占比\n   - 动态调整基础流动性需求\n\n### Alpha环境评分\n\n1. **动态权重**\n   - 流动性充裕时，子项权重提高（60/40）\n   - 流动性偏低时，子项权重降低（80/20）\n\n2. **非线性关系**\n   - 流动性偏低 → 子项打折（更激进）\n   - 流动性充裕 → 子项加成\n\n3. **阈值优化**\n   - 流动性多少分算\"偏低\"？\n   - 流动性多少分算\"充裕\"？\n   - 不同阈值对应不同的权重分配\n\n---\n\n## 文件位置\n\n- 算法代码：`~/Desktop/gamt-dashboard/env_fit/quant_stock/quant_env_diag.py`\n- 流动性权重表：`~/Desktop/gamt-dashboard/env_fit/quant_stock/流动性评分权重表_v2.md`\n- 决策记录1：`smart-notes/decisions/2026-03-15_量化宽基流动性评分权重优化.md`\n- 决策记录2：`smart-notes/decisions/2026-03-15_Alpha环境评分逻辑修正_流动性母项.md`\n- 提交记录：\n  - commit 3a02e75: 流动性评分优化\n  - commit 17bbf9e: Alpha环境逻辑修正\n\n---\n\n**总结：** 通过双重优化（流动性评分加大环比权重 + Alpha环境流动性母项逻辑），评分体系现在能更准确反映市场状态，不再出现逻辑矛盾。流动性从配角变成主角，子项从主角变成配角，符合量化策略的实际运作逻辑。\n"}, {"name": "商品股指期权卖权环境指数与机会扫描器", "path": "conversations/2026-03-31_商品股指期权卖权环境指数与机会扫描器.md", "category": "conversations", "content": "# 商品股指期权卖权环境指数与机会扫描器（2026-03-31）\n\n## 背景\nRoni 提出，当前商品期权模块如果只是输出“选出 6 个能卖的品种”，定位是不够的。真正需要的不是点状选品，而是像 CTA 环境指标那样，先判断**整个市场是否适合系统性做卖权策略**，再下沉到具体品种与合约机会。\n\n同时，Roni 结合对 2026 年市场环境的主观看法：\n- 上半年受地缘政治等因素影响，整体波动率显著抬升；\n- 下半年更可能进入降波过程；\n- 因此卖方做赌徒对手盘、收保险费，可能是一个值得重点跟踪的策略方向。\n\n## 核心需求重构\n\n### 1. 不能只做“Top 6 品种榜单”\n原来的逻辑更像“机会清单”或“选品榜”，这对于 FOF/配置视角不够。\n\nRoni 的目标是先回答：\n- 现在整个期权卖方环境好不好？\n- 是不是普遍性的机会？\n- 适不适合系统性做卖权，而不是只盯几个点状标的？\n\n### 2. 看板要分两层\n\n#### 第一层：市场环境层（温度计）\n回答：**现在整个卖权环境是否适合下注？**\n\n建议框架：\n- 全市场 IV 历史分位（商品 + 股指）\n- 全市场流动性宽度（成交量 / 成交额 / OI）\n- 高 IV 品种占比\n- 高流动性品种占比\n- 高 IV + 高流动性品种占比（真正的 breadth）\n- 卖权环境指数及其历史分位\n- 当前 regime：系统性卖方窗口 / 精选窗口 / 观察期 / 不适合\n\n#### 第二层：策略机会层（扫描器）\n回答：**现在具体哪些品种、哪些合约值得重点看？**\n\n这里不能停留在品种层，要下沉到合约层：\n- 品种\n- 合约月份\n- Call / Put\n- 行权价梯子\n- 距到期天数\n- 权利金\n- 成交量 / 成交额 / OI\n- IV 分位\n- 流动性分位\n- 综合机会评分\n- 一句话提示理由\n\n目标是能识别出类似：\n- 沪金某个 2605 深虚值 call\n- 距到期约 30 多天\n- 行权价明显偏远，但保险费仍然很肥\n- 这类“高赔率时间价值单”应被系统主动提示\n\n## 对“等权环境指数”的修正\nRoni 明确指出：\n- 如果站在 FOF 基金经理视角，简单等权并不好；\n- 期权机会不能照搬 CTA 模块里“500万成交额过滤”的口径；\n- 期权更应看“赌徒有没有来买保险”，即：\n  - 成交量\n  - 成交额\n  - OI\n  - 如果可能，还应看梯子报价和挂单深度\n\n因此：\n- 期权环境指标不能机械套用 CTA 的活跃成交口径；\n- 第一版至少要先验证 Tushare 能拿到多少期权层数据，再决定环境因子设计。\n\n## 数据能力边界（已确认）\n经测试，Tushare `opt_daily` 可以拿到：\n- `close`\n- `settle`\n- `vol`\n- `amount`\n- `oi`\n\n以及 `opt_basic` 可拿到：\n- 行权价\n- 到期日\n- Call/Put\n- 合约基础信息\n\n结论：\n- ✅ 可以做全市场商品 + 股指期权覆盖\n- ✅ 可以做成交量 / 成交额 / 持仓量维度的流动性刻画\n- ✅ 可以结合行权价、到期日做合约级扫描\n- ❌ Tushare 暂时拿不到盘口挂单额 / 五档梯子深度（Level2）\n\n因此第一版可先基于：\n- IV（或 IV proxy）\n- 成交量\n- 成交额\n- OI\n- 行权价虚值程度\n- 距到期天数\n做 80 分版本的策略机会扫描器。\n\n## 最终收敛出的产品结构\n\n### 模块1：全市场卖权环境指数\n主看板，回答：整个市场是否适合系统性做卖权。\n\n### 模块2：高赔率品种 breadth\n回答：高 IV + 高流动性是否具有普遍性。\n\n### 模块3：合约级卖方机会扫描器\n回答：现在具体卖什么。\n\n### 模块4：卖方择时信号\n回答：什么时候下注。\n\n## 落地优先级\n建议开发顺序：\n1. 先打通全市场期权覆盖（商品 + 股指）\n2. 做品种层 IV 分位 + 流动性分位\n3. 做合约层机会扫描（异常肥的保险费机会）\n4. 最后再做择时灯号（现在能不能上）\n\n## 一句话结论\n这次讨论的本质，不是把原来的“选 6 个品种”微调一下，而是把模块彻底升级为：\n\n**“市场环境层 + 合约机会层 + 择时提示层”的卖权策略机会识别系统。**\n"}, {"name": "Alpha环境评分逻辑修正_流动性母项", "path": "decisions/2026-03-15_Alpha环境评分逻辑修正_流动性母项.md", "category": "decisions", "content": "# Alpha环境评分逻辑优化 - 流动性母项权重调整\n\n**日期：** 2026-03-15  \n**类型：** 决策记录 - 逻辑修正  \n**关键词：** Alpha环境、流动性母项、权重调整\n\n---\n\n## 问题发现\n\n### 矛盾现象\n\n**市场状态：**\n- 流动性：52分（偏低）🟠\n- 离散度：90分（高）🟢\n- 风格集中度：90分（分散稳定）🟢\n\n**旧逻辑输出：**\n- Alpha环境：90分（极佳）🟢\n- 综合评分：74分（均衡）🟡\n\n**矛盾：** 流动性偏低，但Alpha环境显示\"极佳\"\n\n### Roni的洞察\n\n> \"我的理解是流动性是阿尔法的母项，剩下是子项，但是阿尔法的环境肯定是要包括母项的打分的。现在的逻辑是母项不报警，子项独立计算后给出了阿尔法环境极佳其实是不对的，应该是母项给大的权重，子项顶多是个系数。\"\n\n**核心问题：**\n- 流动性应该是**母项**（前提和主导）\n- 其他因子应该是**子项**（修正系数）\n- 不能让子项的高分掩盖母项的低分\n\n---\n\n## 旧逻辑分析\n\n### 旧权重结构\n\n```python\n# Step 1: 流动性门槛（枯竭直接出局）\nif liq['score'] < 30:\n    return 红灯\n\n# Step 2: 离散度 × 风格集中度 → alpha_env（独立计算）\nif 离散度高 and 风格分散:\n    alpha_env = 90  # 极佳\n\n# Step 3: 综合评分（加权平均）\nenv_score = 流动性25% + alpha_env50% + 市场预期10% + 微观15%\n```\n\n**问题：**\n1. **流动性权重过低**（25%）\n   - alpha_env占50%，主导了最终评分\n   - 流动性52分被alpha_env 90分拉高\n\n2. **alpha_env独立计算**\n   - 只看离散度和风格集中度\n   - 不考虑流动性的影响\n   - 结果：流动性偏低，但alpha_env显示\"极佳\"\n\n3. **逻辑不符合现实**\n   - 流动性是量化策略的生存基础\n   - 没有流动性，选股再好也无法执行\n   - 流动性应该是主导因子，不是25%的配角\n\n---\n\n## 新逻辑设计\n\n### 核心思想\n\n**流动性 = 母项（70%）**\n- 前提条件：枯竭直接出局\n- 主导因子：决定Alpha环境的基础分\n- 大权重：70%\n\n**子项 = 修正系数（30%）**\n- 离散度 × 风格集中度：选股空间\n- 市场预期：虹吸风险\n- 微观结构：踩踏风险\n- 小权重：30%\n\n### 新权重结构\n\n```python\n# Step 1: 流动性门槛（枯竭直接出局）\nif liq['score'] < 30:\n    alpha_env = 15\n    return 红灯\n\n# Step 2: 流动性主导（70%权重）\nliq_base = liq['score']  # 流动性作为基础分\n\n# Step 3: 子项修正（30%权重）\n# 3.1 离散度 × 风格集中度\nif 离散度高 and 风格分散:\n    sub_score = 90\nelif 离散度高 but 风格集中:\n    sub_score = 55\nelif 离散度低:\n    sub_score = 25\nelse:\n    sub_score = 离散度60% + 风格集中度40%\n\n# 3.2 市场预期修正\nif 大票虹吸确认:\n    mkt_adj = -15\nelif 极端贴水:\n    mkt_adj = -3\nelse:\n    mkt_adj = 0\n\n# 3.3 微观尾部叠加\nif 踩踏预警:\n    micro_adj = -12\nelif 有压力:\n    micro_adj = -5\nelse:\n    micro_adj = 0\n\n# Step 4: Alpha环境综合评分\nalpha_env = liq_base × 0.7 + sub_score × 0.3 + mkt_adj + micro_adj\n```\n\n---\n\n## 效果对比\n\n### 实际案例（2026-03-15）\n\n**市场状态：**\n- 流动性：52分（偏低）\n- 子项：90分（离散度高+风格分散）\n- 市场预期：无虹吸\n- 微观结构：健康\n\n**旧逻辑：**\n```\nalpha_env = 90分（独立计算，只看子项）\n综合评分 = 52×25% + 90×50% + 55×10% + 70×15%\n        = 13 + 45 + 5.5 + 10.5\n        = 74分（均衡）\n```\n- Alpha环境：90分（极佳）🟢\n- 综合评分：74分（均衡）🟡\n- **矛盾：流动性偏低，但alpha极佳**\n\n**新逻辑：**\n```\nalpha_env = 52×0.7 + 90×0.3 + 0 + 0\n         = 36.4 + 27 + 0 + 0\n         = 63.4 ≈ 63分\n```\n- Alpha环境：63分（良好）🟡\n- 综合评分：63分（均衡）🟡\n- **合理：流动性偏低，alpha良好（不是极佳）**\n\n**差异：**\n- Alpha环境：90分 → 63分（-27分）\n- 综合评分：74分 → 63分（-11分）\n- 评级：极佳 → 良好\n\n---\n\n## 设计哲学\n\n### 为什么流动性是母项？\n\n1. **生存基础**\n   - 量化策略需要频繁交易\n   - 没有流动性，选股再好也无法执行\n   - 滑点、冲击成本会吃掉超额\n\n2. **前提条件**\n   - 流动性枯竭 → 直接红灯\n   - 流动性偏低 → 限制了alpha的发挥空间\n   - 流动性充裕 → alpha才能充分释放\n\n3. **主导因子**\n   - 流动性决定了\"能不能做\"\n   - 子项决定了\"做得好不好\"\n   - 先有\"能做\"，才有\"做好\"\n\n### 为什么子项是系数？\n\n1. **修正作用**\n   - 离散度高 → 选股空间大 → 加分\n   - 风格集中 → alpha不稳 → 扣分\n   - 虹吸确认 → 超额承压 → 扣分\n\n2. **不能主导**\n   - 子项再好，流动性不够也白搭\n   - 子项只能在流动性允许的范围内发挥作用\n   - 30%权重足够反映子项的影响\n\n3. **交互关系**\n   - 流动性充裕 + 子项好 → 极佳\n   - 流动性充裕 + 子项差 → 一般\n   - 流动性偏低 + 子项好 → 良好（不是极佳）\n   - 流动性偏低 + 子项差 → 困难\n\n---\n\n## 权重分配逻辑\n\n### 70% vs 30% 的理由\n\n**流动性70%：**\n- 主导因子，决定基础分\n- 反映\"能不能做\"的问题\n- 权重应该大于50%，才能真正主导\n\n**子项30%：**\n- 修正因子，调整基础分\n- 反映\"做得好不好\"的问题\n- 权重不能太小（否则没意义），也不能太大（否则喧宾夺主）\n\n**为什么不是50% vs 50%？**\n- 50/50会让流动性和子项平分秋色\n- 无法体现流动性的\"母项\"地位\n- 70/30更能体现主次关系\n\n**为什么不是80% vs 20%？**\n- 80/20会让子项影响太小\n- 离散度、风格集中度等因子确实重要\n- 30%权重足够反映它们的影响\n\n---\n\n## 后续优化方向\n\n1. **动态权重**\n   - 流动性充裕时，子项权重可以提高（比如60/40）\n   - 流动性偏低时，子项权重应该降低（比如80/20）\n   - 根据流动性水平动态调整权重\n\n2. **非线性关系**\n   - 流动性枯竭 → 直接红灯（已实现）\n   - 流动性偏低 → 子项打折（可以更激进）\n   - 流动性充裕 → 子项加成\n\n3. **阈值优化**\n   - 流动性多少分算\"偏低\"？（现在是<55）\n   - 流动性多少分算\"充裕\"？（现在是>75）\n   - 不同阈值对应不同的权重分配\n\n---\n\n## 文件位置\n\n- 算法代码：`~/Desktop/gamt-dashboard/env_fit/quant_stock/quant_env_diag.py`\n- 提交记录：commit 17bbf9e\n\n---\n\n**总结：** 通过将流动性设为母项（70%权重），子项设为系数（30%权重），Alpha环境评分现在能正确反映\"流动性主导、子项修正\"的逻辑关系，不再出现\"流动性偏低但alpha极佳\"的矛盾。\n"}, {"name": "量化宽基流动性评分权重优化", "path": "decisions/2026-03-15_量化宽基流动性评分权重优化.md", "category": "decisions", "content": "# 量化宽基阿尔法环境 - 流动性评分权重优化记录\n\n**日期：** 2026-03-15  \n**类型：** 决策记录 - 算法优化  \n**关键词：** 量化宽基、流动性评分、周度环比、权重调整\n\n---\n\n## 背景\n\n### 问题发现\n\nRoni观察到：\n- 之前市场常态：3.2万亿成交额\n- 现在市场状态：2.5万亿成交额\n- **实际变化：** decay了22%（明显缩量）\n- **旧算法评分：** 2.5万亿 → 90分（过热）❌\n\n**矛盾：** 绝对值看起来很高，但相对于近期常态是缩量，旧算法无法捕捉这种相对变化。\n\n### 市场结构变化\n\n- **9.24之前：** 量化占比低，7-8千亿是底部\n- **9.24之后：** 量化占比6成以上\n- **新常态：** 2万亿里1.2万亿是量化，基础流动性需求提高\n\n---\n\n## 优化方案\n\n### 方案选择\n\n讨论了3个方案：\n1. 扩大环比修正范围\n2. **降低绝对值权重，提高环比权重** ✅（采用）\n3. 环比作为乘数\n\n**选择理由：** 方案2平衡了绝对值和相对变化，既保留了基础判断，又能捕捉趋势变化。\n\n---\n\n## 具体改动\n\n### 一、基础分（绝对值）\n\n**旧版（v1）：**\n```\n< 8000亿  → 10分（枯竭）\n8000-10000亿 → 30分（偏低）\n10000-12000亿 → 50分（一般）\n12000-15000亿 → 65分（正常）\n15000-20000亿 → 80分（充裕）\n> 20000亿 → 90分（过热）\n\n权重：80分（10-90）\n```\n\n**新版（v2）：**\n```\n< 12000亿 → 20分（枯竭）+4000亿\n12000-15000亿 → 40分（偏低）+5000亿\n15000-18000亿 → 55分（一般）+6000亿\n18000-22000亿 → 65分（正常）+7000亿\n22000-28000亿 → 75分（充裕）+8000亿\n> 28000亿 → 80分（过热）上限降低\n\n权重：60分（20-80）\n```\n\n**变化：**\n- 阈值整体上移50-100%（反映量化占比提升）\n- 上限降低90→80（为环比修正留出空间）\n- 权重降低80→60\n\n### 二、周度环比修正\n\n**旧版（v1）：**\n```\n< -15%  → -20分（急剧缩量）\n-15~-10% → -15分（明显缩量）\n-10~-5% → -8分（温和缩量）\n+10~+15% → +5分（明显放量）\n> +15%  → +10分（急剧放量）\n\n权重：30分（-20~+10）\n```\n\n**新版（v2）：**\n```\n< -20%  → -40分（暴跌式缩量）⚠️\n-20~-15% → -30分（急剧缩量）\n-15~-10% → -20分（明显缩量）\n-10~-5% → -10分（温和缩量）\n+10~+15% → +10分（明显放量）\n+15~+20% → +15分（急剧放量）\n> +20%  → +20分（暴涨式放量）\n\n权重：60分（-40~+20）\n```\n\n**变化：**\n- 权重翻倍：30→60\n- 扣分/加分范围扩大\n- 与绝对值权重相等（各60分）\n\n### 三、其他修正（不变）\n\n- 稳定性（CV）：-15~0分\n- 趋势：-5~+5分\n- 脉冲：-5分\n\n---\n\n## 效果对比\n\n### 实际案例（2026-03-15）\n\n**市场状态：**\n- 成交额：24588亿\n- 趋势：缩量\n- CV：波动偏大\n\n**v1评分：**\n- 基础分：90分（>20000亿）\n- 环比修正：约-10分（缩量）\n- 其他修正：-8分（CV）-5分（趋势）\n- **最终：69分（正常）🟡**\n\n**v2评分：**\n- 基础分：75分（22000-28000亿）\n- 环比修正：约-15分（缩量，具体待查）\n- 其他修正：-8分（CV）-5分（趋势）\n- **最终：52分（偏低）🟠**\n\n**差异：-17分，评级从\"正常\"降到\"偏低\"**\n\n---\n\n## 设计哲学\n\n### v1的问题\n\n1. **绝对值权重过高**（80分）\n   - 环比修正有限（30分）\n   - 无法大幅改变评级\n\n2. **阈值滞后**\n   - 基于旧市场结构（量化占比低）\n   - 2万亿被认为是\"过热\"，但现在是新常态\n\n### v2的改进\n\n1. **权重平衡**\n   - 绝对值和环比各60分\n   - 环比可以大幅改变评级\n\n2. **阈值上移**\n   - 反映量化占比6成的新常态\n   - 2万亿是\"一般\"，不是\"过热\"\n\n3. **捕捉相对变化**\n   - 不只看绝对值，更看相对于近期常态的变化\n   - 2.5万亿在牛市=缩量，在熊市=过热\n\n---\n\n## 关键洞察\n\n**Roni 2026-03-15：**\n\n> \"之前都差不多是3.2万亿以上的成交额，最近都掉到2.5万亿成交，其实decay了很多。\"\n\n> \"我估计现在A股量化成交量占比6成以上了，也就是说2.4万亿里面大多数都是量化，和9.24之前都跌到过7-8千亿，我想表达的意思是现在2万亿可能就是个基础。\"\n\n**核心逻辑：**\n- 市场结构变了，评分标准也要变\n- 绝对值有滞后性，相对变化更重要\n- 量化占比提升 → 基础流动性需求提高\n\n---\n\n## 后续优化方向\n\n1. **动态阈值**\n   - 根据近期均值自动调整阈值\n   - 而不是固定的2万亿、2.8万亿\n\n2. **分市场状态**\n   - 牛市/熊市用不同的阈值\n   - 或者用波动率调整权重\n\n3. **量化占比监控**\n   - 实时监控量化成交占比\n   - 动态调整基础流动性需求\n\n---\n\n## 文件位置\n\n- 算法代码：`~/Desktop/gamt-dashboard/env_fit/quant_stock/quant_env_diag.py`\n- 权重表：`~/Desktop/gamt-dashboard/env_fit/quant_stock/流动性评分权重表_v2.md`\n- 提交记录：commit 3a02e75\n\n---\n\n**总结：** 通过加大周度环比权重和上移阈值，流动性评分现在能更准确反映\"相对于近期常态的变化\"，而不是被绝对值误导。\n"}, {"name": "财报双地图目标与数据底座确认", "path": "notes/2026-04-12_财报双地图目标与数据底座确认.md", "category": "notes", "content": "# 财报双地图目标与数据底座确认\n\n**日期**: 2026-04-12  \n**类型**: 目标澄清 / 数据底座确认  \n**标签**: #财报风险 #行业机会地图 #双地图 #多因子alpha #财报数据库\n\n---\n\n## 一、Roni 的真实目标（本次已明确澄清）\n\n这套东西的目标不是单纯做一个“财报展示页”，也不是先去讨论组合里怎么精确加权/降权。\n\n更准确地说，它是一个服务于 **多因子 alpha 基金经理** 的、基于行业财务逻辑的双地图系统：\n\n### 1）行业风险地图\n- 延续原来的负向逻辑\n- 识别哪些行业、哪些票在 **持续恶化**\n- 用于：剔除项、风险识别、负向筛除\n\n### 2）行业机会地图\n- 新增的正向镜像逻辑\n- 识别哪些行业、哪些票在 **持续变好**\n- 用于：机会识别、候选池、正向观察\n- **当前阶段先搭框架，不急着做验证层，不急着讨论具体加权公式**\n\n---\n\n## 二、当前最重要的方法论约束\n\nRoni 明确提醒：\n\n> 先理解目标，不要轻易跳到“降权和加权怎么算”。\n\n因此当前优先级应为：\n\n1. 先保留并补齐原来的“行业风险地图”负向逻辑\n2. 先确认财报数据库到底有几年、够不够支撑持续恶化判断\n3. 先把原来“剔除项/不好的财报”这一侧补齐\n4. 在此基础上，再做“行业机会地图”的镜像框架\n\n也就是说，顺序不是：\n- 先公式\n- 先组合权重\n\n而是：\n- 先行业逻辑\n- 先财务链条\n- 先负向框架补齐\n- 再搭正向机会框架\n\n---\n\n## 三、对第二个 Tab（行业机会地图）的阶段定义\n\nRoni 当前要的不是“机会验证页”，而是 **机会框架页**。\n\n现阶段应包含：\n\n### 第一层：行业机会地图\n- 每个行业的主矛盾和机会在哪里\n- 哪些行业正在出现财务改善线索\n\n### 第二层：行业机会逻辑链\n- 以行业为单位写清楚：\n  - 行业逻辑是什么\n  - 哪些报表项代表它在变好\n  - 这些指标之间的改善链条是什么\n\n### 第三层：机会股候选池\n- 哪些票更符合“这个行业正在变好”的财务链条\n- 先做候选池，不急着做命中/漏判验证\n\n### 第四层：暂不做验证\n- 当前阶段不要照搬风险页那套验证层\n\n---\n\n## 四、桌面财报数据库已确认\n\n桌面财报文件夹：\n\n`/Users/apple/Desktop/财报数据库`\n\n当前已看到 3 个核心 parquet 文件：\n\n- `wind-ashare-income(1).parq`\n- `wind-ashare-balancesheet.parq`\n- `wind-ahsare-cashflow.parq`\n\n### 年份覆盖（按 REPORT_PERIOD 实测）\n\n#### 利润表 `wind-ashare-income(1).parq`\n- `REPORT_PERIOD` 覆盖：**1990 - 2025**\n- 共 **36 年**\n- 当前数据最晚报告期：`20251231`\n\n#### 资产负债表 `wind-ashare-balancesheet.parq`\n- `REPORT_PERIOD` 覆盖：**2008 - 2025**\n- 共 **18 年**\n- 当前数据最晚报告期：`20251231`\n\n#### 现金流量表 `wind-ahsare-cashflow.parq`\n- `REPORT_PERIOD` 覆盖：**2008 - 2025**\n- 共 **18 年**\n- 当前数据最晚报告期：`20251231`\n\n### 结论\n- “5 年财报”不是上限，当前底座实际已经明显多于 5 年\n- 至少从三大表看，已经足够支持：\n  - 持续恶化判断\n  - 多期趋势判断\n  - 后续镜像到持续改善框架\n\n但当前第一优先级仍然不是直接做正向评分，而是：\n\n> **先把原来剔除项这一侧的坏财报逻辑补齐**\n\n---\n\n## 五、下一步执行顺序（已与 Roni 对齐）\n\n### Step 1\n先基于桌面财报数据库，检查并补齐原来“剔除项 / 不好的财报”这一侧\n\n### Step 2\n确认负向逻辑补齐后，再开始搭“行业机会地图”框架\n\n### Step 3\n正向部分先做：\n- 行业主矛盾\n- 改善逻辑链\n- 候选池\n\n暂不急着做：\n- 命中验证\n- 精确权重公式\n- 组合层加减权细节\n\n---\n\n## 六、一句话总结\n\n这套系统当前最准确的定位是：\n\n> **先把“行业风险地图”的负向财务剔除逻辑补齐，再在其镜像上搭建“行业机会地图”的正向框架。**\n\n重点先后顺序不能搞反。\n"}, {"name": "三端对齐操作手册", "path": "notes/2026-04-17_三端对齐操作手册.md", "category": "notes", "content": "# 三端对齐操作手册\n\n> 适用场景：本地 Mac、GitHub、腾讯云三端 git 状态不一致时的标准修复流程\n\n## 三端角色\n\n| 端 | 角色 | 说明 |\n|---|---|---|\n| 本地 Mac | 研发机 + pm cron | 晚间全量更新，产出新数据和代码 |\n| GitHub | 中心仓库 | 单一事实来源，所有端以它为准 |\n| 腾讯云 | 部署机 + am cron | 只做 `git reset --hard origin/main`，不产生本地 commit |\n\n## 分叉常见原因\n\n- 本地 pm cron 跑完 push 时网络不通（GitHub 443 超时）\n- 腾讯云 am cron 先 push 了新数据，本地再 push 被 reject\n- 本地改了代码但忘了 push，腾讯云又跑了一轮\n\n## 标准对齐流程\n\n### 第一步：开代理\n- 本机开 Clash（端口 7897）\n- 目的：确保能连 GitHub\n\n### 第二步：本地 fetch + rebase + push\n```bash\ncd ~/Desktop/gamt-dashboard\n\n# 1. 拉远端最新状态\ngit fetch origin\n\n# 2. rebase：把本地新 commit 接到远端最新后面\ngit pull --rebase origin main\n\n# 3. 如果有冲突：解决冲突 → git add → git rebase --continue\n# 如果没冲突：直接下一步\n\n# 4. 推到 GitHub\ngit push origin main\n```\n\n> 为什么用 rebase 不用 merge：保持线性历史，避免无意义的 merge commit\n\n### 第三步：关代理\n- 关掉 Clash\n- 目的：SSH 到腾讯云需要直连（代理开着时 SSH 不通）\n\n### 第四步：腾讯云同步\n```bash\nssh ubuntu@111.229.129.146\n\ncd /home/ubuntu/gamt-dashboard\ngit fetch origin && git reset --hard origin/main\n\n# 验证\ngit log --oneline -3\n```\n\n> 腾讯云始终用 `reset --hard`，不做本地 commit，保持为 GitHub 的纯镜像\n\n### 第五步：验证三端一致\n```bash\n# 本地\ngit -C ~/Desktop/gamt-dashboard rev-parse HEAD\n\n# 腾讯云（SSH）\ngit -C /home/ubuntu/gamt-dashboard rev-parse HEAD\n\n# GitHub（API）\ncurl -s https://api.github.com/repos/byihuang-max/spread-dashboard/commits/main | grep sha | head -1\n```\n\n三个 hash 一致 = 对齐完成。\n\n## 注意事项\n\n- **代理与 SSH 互斥**：开代理时 SSH 到腾讯云不通，关代理才能 SSH\n- **腾讯云不要产生本地 commit**：如果服务器上有未提交的改动，先 `git stash` 或 `git checkout .` 再 reset\n- **GitHub token 有效期**：当前 token 约 2026-04-26 到期，过期后 push 会报 Authentication failed\n- **如果 rebase 冲突太多**：可以 `git rebase --abort`，改用 `git push --force-with-lease`（谨慎，会覆盖远端）\n\n## 什么时候需要 push，什么时候不需要\n\n| 变更类型 | 是否需要 push 到 GitHub | 原因 |\n|---|---|---|\n| 日常数据更新（CSV/JSON） | 不需要（腾讯云自己跑 cron 就够） | `dashboard.gamtfof.com` 走腾讯云后端，数据由腾讯云本地 `update_all.py` 产出，不依赖 GitHub |\n| 代码/页面结构改动（.py / .html） | 需要 | 腾讯云是 GitHub 的镜像，代码改动必须 push → 腾讯云 pull 才能生效 |\n| 新增模块/注册表改动 | 需要 | `module_registry.py` 等核心配置改了，腾讯云不 pull 就跑不到新逻辑 |\n| GitHub Pages / Cloudflare Pages 展示 | 需要 | 纯静态托管，内容直接来自 GitHub 仓库 |\n\n简单记：**数据自动刷，代码要手推。**\n\n## 自动化建议\n\n理想状态下不需要手动对齐。保持以下纪律即可：\n1. 本地 pm cron push 失败时，下次 am 前手动补推\n2. 腾讯云 `deploy_sync.sh` 只做 `fetch + reset --hard`，永远不 commit\n3. 同一时间只有一端在 push（本地和腾讯云的 cron 时间错开）\n"}, {"name": "GAMT模块产品化路径", "path": "notes/2026-04-25_GAMT模块产品化路径.md", "category": "notes", "content": "---\ntype: 决策\ndate: 2026-04-25\ntags: [产品化, 架构, 长期规划]\n---\n\n# GAMT 模块产品化路径\n\n## Roni 的核心想法\n\nGAMT 看板上有很多模块，精细程度参差不齐。当一个模块被精修到：\n1. Roni 足够满意\n2. 逻辑自洽、挑不出大毛病\n\n就可以把它**独立出来**，变成：\n- 一个独立的 Skill（供 AI agent 调用）\n- 一个独立的 Agent\n- 一个小程序 / 独立产品\n\n## 本质\n\nGAMT 看板 = 模块孵化器。每个模块都是一个潜在的独立产品。看板是研发和验证的场所，不是终态。\n\n## 当前模块成熟度（待评估）\n\n需要逐个模块评估：逻辑完整度、数据稳定性、可独立运行程度。\n"}, {"name": "腾讯云服务器git配置丢失导致定时任务无法推送", "path": "notes/decisions/004_腾讯云服务器git配置丢失导致定时任务无法推送.md", "category": "decisions", "content": "# 腾讯云服务器git配置丢失导致定时任务无法推送\n\n**日期：** 2026-03-16  \n**类型：** 故障排查  \n**关键词：** git配置、定时任务、数据更新、腾讯云\n\n---\n\n## 问题现象\n\n2026-03-16发现前端数据停留在3月13日，虽然定时任务日志显示每天08:20和17:00都在运行且\"✅ 完成\"，但数据没有更新到前端。\n\n## 根本原因\n\n**腾讯云服务器上的.git目录丢失了**\n\n从日志可以看到错误：\n```\nfatal: not a git repository (or any of the parent directories): .git\n❌ Git 失败: Command '['git', 'add', '-A']' returned non-zero exit status 128.\n```\n\n## 为什么.git目录会丢失\n\n**最可能的原因：初始部署方式问题**\n\n腾讯云服务器最初部署时，可能是：\n- 直接从本地复制文件到服务器\n- 或者用rsync同步，但没有包含.git目录\n- 所以从一开始腾讯云服务器上就没有.git\n\n## 为什么之前没发现\n\n1. 之前都是在本地Mac上开发和push\n2. 腾讯云服务器只是运行后端API服务\n3. 定时任务虽然会尝试git push，但失败了也不影响服务运行\n4. 只是前端数据没有更新，但可能没注意到\n\n## 完整的数据流\n\n**正常流程：**\n```\n定时任务运行 → 更新数据文件 → git add/commit → git push → GitHub → Cloudflare Pages部署 → 前端显示\n```\n\n**出问题时的流程：**\n```\n定时任务运行 → 更新数据文件 → git push失败 ❌ → GitHub没更新 → 前端显示旧数据\n```\n\n**关键发现：**\n- 定时任务一直在正常运行\n- 数据也在服务器上更新了（文件修改时间是最新的）\n- 只是因为git配置丢失，没有推送到GitHub\n- Cloudflare Pages从GitHub部署，所以前端看不到更新\n\n## 解决方案\n\n**2026-03-16 19:53 修复步骤：**\n\n1. 用rsync把本地的.git目录同步到腾讯云服务器：\n```bash\ncd ~/Desktop/gamt-dashboard\nrsync -avz --exclude='venv' --exclude='__pycache__' .git/ ubuntu@111.229.129.146:/home/ubuntu/gamt-dashboard/.git/\n```\n\n2. 配置git用户信息：\n```bash\nssh ubuntu@111.229.129.146 \"cd /home/ubuntu/gamt-dashboard && \\\n  git config user.name 'GAMT Server' && \\\n  git config user.email 'server@gamtfof.com'\"\n```\n\n3. 测试git push：\n```bash\n# 创建测试文件并push\necho 'test' > .git-test\ngit add .git-test\ngit commit -m 'test: verify git push'\ngit push  # ✅ 成功\n```\n\n4. 手动运行完整更新：\n```bash\ncd ~/Desktop/gamt-dashboard\npython3 server/update_all.py --no-push\ngit add -A\ngit commit -m \"auto: 全量更新所有模块数据 (20260316 20:41)\"\ngit push  # ✅ 成功\n```\n\n## 验证结果\n\n- ✅ 腾讯云服务器的git已修复\n- ✅ 所有18个模块的数据都已更新到3月16日\n- ✅ 成功push到GitHub\n- ✅ Cloudflare Pages自动部署\n- ✅ 前端显示最新数据\n\n## 经验教训\n\n1. **初始部署时要用git clone，不要直接复制文件**\n2. **定时任务的错误日志要仔细检查**，不能只看\"✅ 完成\"\n3. **数据更新流程要端到端验证**，不能只看服务器上的文件\n4. **关键配置（如.git）要定期检查**\n\n## 预防措施\n\n1. 在定时任务脚本中增加git状态检查\n2. 如果git push失败，发送告警通知\n3. 定期检查前端数据是否是最新的\n4. 考虑在服务器上设置git hook，push失败时自动告警\n\n## 相关文件\n\n- 定时任务脚本：`server/update_all.py`\n- 定时任务日志：`/tmp/gamt.log`\n- git配置：`/home/ubuntu/gamt-dashboard/.git/config`\n- 腾讯云服务器：111.229.129.146\n\n---\n\n**记录人：** Musk  \n**确认人：** Roni\n"}, {"name": "盘后复盘引擎设计决策", "path": "notes/decisions/2026-03-28_盘后复盘引擎设计决策.md", "category": "decisions", "content": "# 盘后复盘引擎——盘中涨停因子的解释层\n\n## 一句话\n盘后复盘不是一个独立模块，它是**盘中涨停因子**的 explainability 页面：先把今天发生了什么说清楚，再考虑量化。\n\n## 核心设计原则\n\n1. **先描述事实，不先打分** —— 在逻辑没自洽之前，所有打分都是浪费时间\n2. **不绑定指数收益** —— 情绪是情绪，指数是指数，不能混在一起\n3. **规则引擎，不用黑盒 ML** —— 保证可读、可调、可解释\n\n## 四个事实模块\n\n| 模块 | 回答什么问题 | 数据源 |\n|------|------------|--------|\n| 板位结构变化 | 今天涨停多了还是少了？首板/二板/三板怎么分布？晋级率？ | `_cache/{date}.json` |\n| 高位票跟踪 | 昨天 ≥3 板的高位票今天继续封住了吗？ | `_cache` 交叉比对 |\n| 昨日龙头今日表现 | 吐池里的龙头今天怎么走？谁进谁出？ | `leader_pool_history` |\n| 核心方向变化 | 今天前五方向和昨天比，延续/分化/切换？ | `_cache` 行业统计 |\n\n## 页首一句话摘要\n规则引擎自动生成，示例：\n- `涨停大幅扩张，化学制药、电力方向延续。`\n- `涨停大幅缩量，高度断崖回落，高位全部断板，方向切换。`\n\n## 文件架构\n\n```\n研发主文件（quant-backtest 侧）\n├── timing_model/narrative/narrative_engine.py  ← 计算引擎\n├── timing_model/narrative/generate_replay_page.py  ← HTML 生成\n└── timing_model/export_leader_pool_history.py  ← 吐池历史导出\n\n展示层（gamt-dashboard 侧）\n├── timing-research/intraday_limit_replay.html  ← 前端展示页\n├── timing-research/index.html  ← 入口按钮（盘中发现层原型卡片）\n├── timing-research/generate_replay_page.py  ← 桥接脚本\n├── timing-research/export_leader_pool_history.py  ← 桥接脚本\n└── server/module_registry.py  ← momentum_stock.post_inject\n```\n\n## 自动更新链路\n挂在 `momentum_stock` 的 `post_inject`，不需要单独 cron：\n1. `generate_leader_pool.py` → 龙头观察池最新页\n2. `export_leader_pool_history.py` → 吐池历史导出\n3. `generate_replay_page.py` → 盘后复盘 HTML\n\n## 关键教训\n- **云端路径不带 `Desktop`**：本地 Mac 是 `~/Desktop/xxx`，腾讯云是 `~/xxx`\n- 所有跨机器脚本必须做双路径兼容（`resolve_gamt_root()` 或 `CANDIDATES` 列表）\n- `sync-to-cloud.sh` 排除 `*.html/*.json`，产物由云端 cron 自己生成\n"}, {"name": "Smart_Notes架构改造_动态加载方案", "path": "notes/decisions/Smart_Notes架构改造_动态加载方案.md", "category": "decisions", "content": "# Smart Notes架构改造：动态加载方案\n\n## 问题\nSmart Notes的笔记内容被硬编码在前端HTML的JS变量（BUILTIN_NOTES）里，导致：\n- 添加新笔记需要手动更新 `index.html`\n- 容易忘记更新前端\n- 维护成本高\n\n## 解决方案\n\n### 架构改造\n从**静态硬编码**改为**动态API加载**\n\n```\n旧架构：\n笔记.md → 手动复制到 index.html BUILTIN_NOTES → 前端读取\n\n新架构：\n笔记.md → 后端API扫描 → 前端异步加载\n```\n\n### 技术实现\n\n#### 1. 后端API（refresh_server.py）\n新增 `/api/notes` 接口：\n```python\ndef _serve_notes_list(self):\n    \"\"\"返回Smart Notes所有笔记的元数据列表\"\"\"\n    from pathlib import Path\n    notes_dir = Path(BASE_DIR) / 'smart-notes' / 'notes'\n    notes = []\n    \n    # 递归扫描 notes/ 目录\n    for md_file in notes_dir.rglob(\"*.md\"):\n        rel_path = md_file.relative_to(notes_dir.parent)\n        \n        # 推断分类（根据目录结构）\n        parts = md_file.relative_to(notes_dir).parts\n        category = parts[0] if len(parts) > 1 else \"uncategorized\"\n        \n        # 读取内容\n        with open(md_file, 'r', encoding='utf-8') as f:\n            content = f.read()\n        \n        notes.append({\n            \"name\": md_file.stem,\n            \"path\": str(rel_path),\n            \"category\": category,\n            \"content\": content\n        })\n    \n    self._json(200, notes)\n```\n\n#### 2. 前端加载（index.html）\n修改 `loadNotes()` 为异步函数：\n```javascript\nasync function loadNotes() {\n  const userData = loadUserData();\n  \n  // 从API加载笔记\n  try {\n    const response = await fetch('/api/notes');\n    const notes = await response.json();\n    \n    for (const entry of notes) {\n      const id = entry.path.replace(/\\.md$/, '');\n      const content = userData[id]?.content || entry.content;\n      parseNote(id, entry.path, entry.category, entry.name, content);\n    }\n  } catch (error) {\n    console.error('Failed to load notes from API:', error);\n    // 降级：使用BUILTIN_NOTES\n    for (const entry of BUILTIN_NOTES) {\n      const id = entry.path.replace(/\\.md$/, '');\n      const content = userData[id]?.content || entry.content;\n      parseNote(id, entry.path, entry.category, entry.name, content);\n    }\n  }\n  \n  renderNav();\n  showWelcome();\n}\n```\n\n### 优势\n\n1. **自动发现**：新增笔记文件后自动出现在列表\n2. **分类自动识别**：根据目录结构自动分类\n3. **降级保护**：API失败时仍用BUILTIN_NOTES\n4. **维护简单**：只需创建.md文件，无需手动更新HTML\n\n### 使用方式\n\n**添加新笔记（新流程）：**\n```bash\n# 1. 创建笔记文件\necho \"# 新笔记内容\" > ~/Desktop/gamt-dashboard/smart-notes/notes/新笔记.md\n\n# 2. 提交推送\ngit add smart-notes/notes/新笔记.md\ngit commit -m \"添加新笔记\"\ngit push\n\n# 3. 完成！刷新页面即可看到\n```\n\n**旧流程（不再需要）：**\n```bash\n# ❌ 不再需要手动更新 index.html\n# ❌ 不再需要运行 add_smart_note.py\n# ❌ 不再需要编辑 BUILTIN_NOTES 数组\n```\n\n### 分类规则\n\n笔记分类根据目录结构自动识别：\n```\nnotes/\n  ├── concepts/        → category: \"concepts\"\n  ├── decisions/       → category: \"decisions\"\n  ├── sessions/        → category: \"sessions\"\n  └── 新笔记.md        → category: \"uncategorized\"\n```\n\n### 降级机制\n\n如果API加载失败（网络问题、服务器未启动等），前端会：\n1. 捕获错误并记录到console\n2. 降级使用 BUILTIN_NOTES（保持向后兼容）\n3. 用户仍能看到笔记（虽然可能不是最新）\n\n### 技术细节\n\n**API端点：** `GET /api/notes`\n\n**返回格式：**\n```json\n[\n  {\n    \"name\": \"笔记名称\",\n    \"path\": \"notes/分类/笔记名称.md\",\n    \"category\": \"分类\",\n    \"content\": \"# 笔记内容\\n...\"\n  }\n]\n```\n\n**前端兼容性：**\n- 保留 BUILTIN_NOTES 作为降级方案\n- 异步加载不阻塞页面渲染\n- 支持用户自定义笔记（localStorage）\n\n### 部署状态\n\n- ✅ 后端API已集成到 `refresh_server.py`\n- ✅ 前端已改为异步加载\n- ✅ 已推送到GitHub\n- ✅ 云端已同步并重启\n- ⏳ 等待Cloudflare Pages部署（1-2分钟）\n\n### 相关文件\n\n- 后端API：`~/Desktop/gamt-dashboard/server/refresh_server.py`\n- 前端加载：`~/Desktop/gamt-dashboard/smart-notes/index.html`\n- 独立API脚本：`~/Desktop/gamt-dashboard/smart-notes/notes_api.py`（备用）\n\n### 未来优化\n\n1. **增量更新**：只加载修改过的笔记\n2. **缓存机制**：前端缓存笔记列表，减少API调用\n3. **搜索优化**：后端提供全文搜索API\n4. **版本控制**：记录笔记修改历史\n\n---\n\n**实施时间：** 2026-03-15  \n**对话来源：** 与Roni讨论Smart Notes维护问题  \n**标签：** #架构改造 #动态加载 #API #维护优化\n"}, {"name": "腾讯云部署看板迁移指南", "path": "notes/sessions/2026-03-11_腾讯云部署看板迁移指南.md", "category": "sessions", "content": "# 腾讯云部署 - GAMT 看板迁移指南\n\n**定义:** 将 GAMT 投研看板从本地 Mac mini 迁移到腾讯云轻量应用服务器，实现 24/7 稳定在线，不再依赖本地网络。\n\n**相关讨论:**\n- 解决酒店 WiFi/VPN 不稳定导致看板频繁掉线的问题\n- 原架构：Mac mini → Cloudflare Tunnel → 用户访问\n- 新架构：腾讯云（公网 IP 直连）→ 用户访问\n\n## 服务器信息\n\n| 项目 | 详情 |\n|---|---|\n| 云服务商 | 腾讯云轻量应用服务器（Lighthouse） |\n| IP | 111.229.129.146 |\n| 系统 | Ubuntu 24.04 LTS |\n| 配置 | 2核 2G 内存 + 2G Swap + 50G SSD |\n| 用户名 | ubuntu |\n| SSH | 密钥登录（Mac mini ed25519 密钥已配置） |\n\n## 架构变化\n\n### 之前（本地）\n```\nMac mini（跑看板 + 数据刷新）\n    ↓\nCloudflare Tunnel（穿透内网）\n    ↓\ndashboard.gamtfof.com\n    ↓\n用户访问\n```\n**问题：** WiFi 断 / VPN 掉 / Mac 关机 → 看板全挂\n\n### 现在（云端）\n```\n腾讯云服务器（24/7 运行）\n    ↓\nNginx 反代 + Let's Encrypt HTTPS\n    ↓\ndashboard.gamtfof.com（A 记录直指云 IP）\n    ↓\n用户访问\n```\n**优势：** 不依赖任何人的网络，服务器重启后自动恢复\n\n## 技术栈\n\n- **Web 服务器:** Nginx（静态文件 + API 反代）\n- **后端:** Python 3.12 + venv（refresh_server.py 监听 9876 端口）\n- **进程管理:** systemd `gamt.service`（开机自启 + 崩溃自动重启）\n- **HTTPS:** Let's Encrypt 证书（到期 2026-06-09，certbot 自动续期）\n- **数据刷新:** cron 定时任务\n\n## 定时刷新计划\n\n| 时间 | 频率 | 说明 |\n|---|---|---|\n| 08:20 | 周一至周五 | 盘前刷新，开盘前准备好数据 |\n| 17:00 | 周一至周五 | 盘后刷新，收盘后等数据源更新完毕再拉取 |\n\n## 域名 DNS 配置\n\n- **域名:** dashboard.gamtfof.com\n- **DNS 托管:** Cloudflare\n- **记录类型:** A 记录\n- **值:** 111.229.129.146\n- **代理状态:** DNS only（灰色云朵，不走 Cloudflare CDN）\n- **原因:** HTTPS 由服务器自己的 Let's Encrypt 证书提供\n\n## 运维指南\n\n### 常用命令（SSH 登录后）\n```bash\n# 查看服务状态\nsudo systemctl status gamt\n\n# 重启服务\nsudo systemctl restart gamt\n\n# 查看服务日志\nsudo journalctl -u gamt -n 50 --no-pager\n\n# 查看 cron 刷新日志\ntail -100 /tmp/gamt.log\n\n# 手动触发全量刷新\ncd ~/gamt-dashboard && venv/bin/python3 server/update_all.py\n```\n\n### 代码更新流程\n从 Mac mini 同步最新代码到云端：\n```bash\nrsync -az --exclude='.git' --exclude='__pycache__' \\\n  ~/Desktop/gamt-dashboard/ ubuntu@111.229.129.146:~/gamt-dashboard/\n```\n\n### 安全注意事项\n1. 腾讯云账号建议开启 MFA 二次验证\n2. 服务器只开放 22/80/443 三个端口\n3. 看板数据均为公开市场数据，无核心机密\n4. 用户密码加盐哈希存储（与本地版一致）\n\n## 对比总结\n\n| 维度 | 本地 Mac | 腾讯云 |\n|---|---|---|\n| 稳定性 | 取决于酒店网络 | 99.9% SLA |\n| Mac 关机 | 看板挂 | 不影响 |\n| 数据刷新 | 手动/本地脚本 | 自动 cron |\n| 访问速度 | 经 Tunnel 绕路 | 直连 |\n| 域名 | 不变 | 不变 |\n| 用户体验 | 不变 | 不变 |\n\n## 决策记录\n\n- **为什么选轻量服务器而不是 CVM？** 便宜，够用，自带公网 IP\n- **为什么不继续用 Cloudflare Tunnel？** 根本问题是本地网络不稳定，Tunnel 只是中间层\n- **为什么关掉 Cloudflare 代理？** 用自己的 Let's Encrypt 证书更简单，不需要 Cloudflare 的 CDN\n- **为什么盘后改到 17:00？** 15:35 太早，很多数据源还没刷新完\n"}, {"name": "腾讯云部署踩坑实录", "path": "notes/sessions/2026-03-11_腾讯云部署踩坑实录.md", "category": "sessions", "content": "# 腾讯云部署 — 踩坑实录与最终方案\n\n**定义:** GAMT 看板从本地 Mac 迁移到腾讯云的完整过程记录，包括所有踩过的坑和最终解决方案。\n\n**相关讨论:**\n- 起因：酒店 WiFi/VPN 不稳定，本地 Mac 跑看板频繁掉线\n- 目标：24/7 稳定在线，不依赖任何人的本地网络\n\n## 最终架构\n\n```\n用户浏览器\n    ↓ https://dashboard.gam
