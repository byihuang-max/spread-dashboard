tfof.com\nCloudflare CDN（全球加速 + HTTPS证书）\n    ↓ Cloudflare Tunnel（加密通道）\n腾讯云服务器（111.229.129.146）\n    ↓ localhost:9876\nPython 后端（数据API）+ Nginx（静态文件）\n```\n\n**关键点：** Tunnel 是出站连接，不走 80/443 端口，绕过 ICP 备案检测。\n\n## 服务器配置\n\n| 项目 | 详情 |\n|---|---|\n| 云服务商 | 腾讯云轻量应用服务器 |\n| IP | 111.229.129.146 |\n| 系统 | Ubuntu 24.04 LTS |\n| 配置 | 2核 2G + 2G Swap + 50G SSD |\n| Python | 3.12 |\n\n## 三层服务保障\n\n| 服务 | systemd 名称 | 作用 |\n|------|-------------|------|\n| Python 后端 | `gamt.service` | 看板API，端口9876 |\n| Cloudflare Tunnel | `cloudflared.service` | 域名穿透 |\n| Nginx | `nginx` | 静态文件服务 |\n\n全部开机自启 + 崩溃自动重启。\n\n## 定时数据刷新\n\n| 时间 | 频率 | 说明 |\n|---|---|---|\n| 08:20 | 周一至周五 | 盘前刷新 |\n| 17:00 | 周一至周五 | 盘后刷新（等数据源更新完） |\n\nCron 日志：`/tmp/gamt.log`\n\n## 代码同步机制\n\n本地 Mac 开发 → git commit → post-commit hook 自动 rsync 到云端 → 后端自动重启\n\n开发体验不变，看板稳定性大幅提升。\n\n## 踩坑记录（重要！）\n\n### 坑1：SSH 频繁断连\n- **现象：** 连续 SSH 几次就被断，Connection closed\n- **原因：** 腾讯云平台层面的 SSH 防护（不是 fail2ban）\n- **解决：** 安装 fail2ban + 白名单整个 IP 段（160.16.0.0/16）\n- **教训：** 腾讯云轻量服务器有隐形防护，不要频繁连接\n\n### 坑2：ICP 备案拦截\n- **现象：** 域名访问被重定向到腾讯云备案提示页\n- **原因：** 中国大陆服务器 + 未备案域名 = 必须备案\n- **尝试过的方案：**\n  - A 记录 DNS only（灰色云朵）→ 被拦\n  - A 记录 Proxied（橙色云朵）→ 被拦（腾讯云检测 Host 头）\n  - Cloudflare SSL Full → 525 错误\n  - Cloudflare SSL Flexible → 还是被备案页拦截\n  - IP 直连 → 能用但没 HTTPS\n- **最终方案：** Cloudflare Tunnel（不走 80/443，从内部出站）\n\n### 坑3：index.html 被覆盖\n- **现象：** 看板显示 301 Moved Permanently\n- **原因：** 在网站根目录执行 `curl -sO` 下载文件，覆盖了 index.html\n- **教训：** 永远不要在网站根目录执行 curl -sO\n\n### 坑4：Cloudflare SSL 模式\n- **Full 模式：** CF 用 HTTPS 连源站，源站证书必须有效 → 腾讯云拦了 443 端口\n- **Flexible 模式：** CF 用 HTTP 连源站 → 如果 Nginx 有 HTTP→HTTPS 重定向会死循环\n- **Tunnel 模式：** 不需要关心 SSL 模式，Tunnel 自带加密\n\n### 坑5：出口 IP 会变\n- **现象：** Mac 的公网 IP 从 160.16.148.207 变成 160.16.56.12\n- **影响：** fail2ban 白名单失效\n- **解决：** 白名单用 CIDR 网段（160.16.0.0/16）而不是单个 IP\n\n## 备案待办（非紧急）\n\n如果要正式备案：\n1. 域名从 Cloudflare 转入腾讯云（国内备案要求国内注册商）\n2. 提交身份证 + 域名证书\n3. 等审批 7-20 天\n\n当前 Tunnel 方案完全可用，备案不急。\n\n## 运维命令速查\n\n```bash\n# SSH 登录\nssh ubuntu@111.229.129.146\n\n# 查看服务状态\nsudo systemctl status gamt\nsudo systemctl status cloudflared\n\n# 查看刷新日志\ntail -100 /tmp/gamt.log\n\n# 手动刷新数据\ncd ~/gamt-dashboard && venv/bin/python3 server/update_all.py\n\n# 从 Mac 手动同步代码\nbash ~/Desktop/gamt-dashboard/scripts/sync-to-cloud.sh\n```\n\n## 决策记录\n\n- **为什么选腾讯云而不是阿里云？** Roni 已有腾讯云账号\n- **为什么不做备案？** 当前 Tunnel 方案完全可用，备案周期长且需要转域名\n- **为什么盘后改到17:00？** 15:35太早，数据源还没刷新完\n- **为什么用 Tunnel 而不是 Nginx 直连？** ICP 备案问题，Tunnel 绕过检测\n- **为什么 SSL 用 Flexible？** Tunnel 模式下实际不经过 SSL 层，Flexible 避免冲突\n"}, {"name": "信息流式交易看板vs策略看板", "path": "notes/信息流式交易看板vs策略看板.md", "category": "notes", "content": "# 信息流式交易看板 vs FOF 策略看板\n\n## 背景\n\nRoni 朋友用 OpenClaw 做了个时间流式的交易决策看板，跟 GAMT 看板思路不同但可以互补。\n\n## 两种看板对比\n\n| 维度 | GAMT FOF 看板 | 时间流交易看板 |\n|------|--------------|---------------|\n| **信息组织** | 模块化（宏观/中观/微观分层） | 时间流（事件驱动） |\n| **更新频率** | 每日定时（08:20/17:00） | 实时推送 |\n| **数据来源** | 结构化数据（Tushare/iFind） | 新闻+数据混合 |\n| **展现形式** | 图表+指标 | 文字+emoji 标注 |\n| **使用场景** | 盘前研判 + 策略环境诊断 | 盘中决策 + 事件响应 |\n| **决策层级** | 战略层（FOF 配置指引） | 战术层（个股/ETF 操作） |\n\n## 时间流看板的特点\n\n**优点：**\n1. **时间轴组织** — 按时间顺序推送关键事件（04:00 油价暴跌 → 09:30 开盘 → 夜盘数据），符合交易员思维\n2. **emoji 标注** — ⚠️📊🔥 让重要信息一眼可见\n3. **多维度融合** — 宏观事件 + ETF 操作建议 + 商品库存 + 各国数据\n4. **可操作性强** — 直接给出\"159666 交运ETF ⚠️ 高开不追\"这种明确指令\n\n**定位：**\n- 个股/ETF 层面的交易指引\n- 事件驱动的战术决策\n- 适合日内交易员\n\n## GAMT 看板的定位\n\n**特点：**\n- FOF 基金的策略配置指引\n- 策略环境适配度诊断\n- 宏观→中观→微观全链路监控\n- 适合 FOF 经理做策略配置\n\n**核心价值：**\n- 告诉你\"现在是什么市场环境\"\n- 哪些策略适合（量化股票/强势股/商品CTA/转债/套利）\n- 风险在哪里（红灯预警）\n\n## 融合思路\n\n### 方向1：轻量级 — 每日简报推送\n\n**实现：**\n- 08:30 GAMT 刷新后自动生成\"今日市场环境速览\"\n- 推送到 Telegram\n\n**格式示例：**\n```\n📊 2026-03-12 市场环境\n\n🟢 量化股票环境：适宜\n   拥挤度45%，期权IV 30%分位\n\n🟡 强势股：观望\n   涨停家数偏低，封单额轧差-2.1pp\n\n🔴 商品CTA：回避\n   趋势强度0.3，低于阈值\n\n⚠️ 红灯：沪深300低于20日均线占比 82%\n   （极度超卖）\n\n💡 建议：关注冰点信号，准备左侧布局\n```\n\n**技术：**\n- Python 读 GAMT 各模块 JSON\n- 模板生成文本\n- Telegram bot 推送\n\n### 方向2：中量级 — 实时预警\n\n**监控指标：**\n- 拥挤度突破 50% → \"⚠️ 市场过热\"\n- 冰点信号双因子共振 → \"🧊 极端恐慌，考虑加仓\"\n- 北向资金单日流入 > 100亿 → \"💰 外资大举流入\"\n\n**特点：**\n- 盘中 15 分钟轮询\n- 只推状态变化，不是所有数据\n- 避免信息过载\n\n### 方向3：重量级 — 事件+环境融合看板\n\n**布局：**\n- 左侧：时间流（新闻事件）\n- 右侧：GAMT 环境仪表盘\n\n**智能标注：**\n- 每条新闻自动标注\"对哪些策略有影响\"\n- 例如：\"油价暴跌 -5% → 🔴 商品CTA 不利 / 🟢 航空板块利好\"\n\n## 结论\n\n两种看板是**互补**的：\n- **GAMT** = 战略层，告诉你市场环境和策略配置\n- **时间流** = 战术层，告诉你今天发生了什么和怎么操作\n\n可以在某些层面融合，但核心定位不同：\n- FOF 经理需要的是策略配置指引（GAMT）\n- 交易员需要的是个股/ETF 操作指引（时间流）\n\n**建议：**\n先做轻量级的每日简报推送，验证有用后再考虑实时监控和深度融合。\n"}, {"name": "腾讯云自动部署机制", "path": "notes/腾讯云自动部署机制.md", "category": "notes", "content": "# 腾讯云自动部署机制\n\n## 问题\n推送到GitHub后，云端如何更新？本地修改的模块如何显示在云端？\n\n## 架构\n\n```\n本地Mac (开发)\n  ↓ git commit\npost-commit hook 自动触发\n  ↓\nsync-to-cloud.sh 执行\n  ├─ rsync 同步代码到腾讯云\n  └─ 重启 gamt.service 后端服务\n  ↓ git push\nGitHub 仓库\n  ↓ 自动触发\nCloudflare Pages (前端部署)\n```\n\n## 两条部署路径\n\n### 1. 前端（HTML/JS/CSS）\n- **触发**：git push到GitHub\n- **部署**：Cloudflare Pages自动拉取并部署\n- **生效**：1-2分钟\n- **域名**：dashboard.gamtfof.com\n\n### 2. 后端（Python脚本/数据）\n- **触发**：git commit（不是push！）\n- **机制**：`.git/hooks/post-commit` 自动调用 `scripts/sync-to-cloud.sh`\n- **同步**：rsync到腾讯云 `/home/ubuntu/gamt-dashboard/`\n- **重启**：`sudo systemctl restart gamt`\n- **生效**：立即\n\n## 关键文件\n\n### post-commit hook\n```bash\n# .git/hooks/post-commit\n#!/bin/bash\nSCRIPT_DIR=\"$(cd \"$(dirname \"$0\")/../..\" && pwd)\"\nbash \"$SCRIPT_DIR/scripts/sync-to-cloud.sh\" &\n```\n\n### sync-to-cloud.sh\n- 位置：`scripts/sync-to-cloud.sh`\n- 功能：rsync同步 + 重启服务\n- 排除：`.git`, `__pycache__`, `venv/`, `_cache/`\n- 端口：先试22，失败则试2222\n\n## 腾讯云服务器\n\n- **IP**：111.229.129.146\n- **用户**：ubuntu / 密码：121211Hby\n- **服务**：gamt.service (systemd)\n- **端口**：9876\n- **进程**：`python3 server/refresh_server.py`\n- **代码路径**：`/home/ubuntu/gamt-dashboard/`\n\n## 常见场景\n\n### 场景1：修改Python脚本（如添加模块）\n```bash\n# 本地修改 update_all.py\ngit add server/update_all.py\ngit commit -m \"添加中观景气度模块\"\n# ↑ commit时自动同步到云端并重启\ngit push\n# ↑ push到GitHub（前端也会更新）\n```\n\n### 场景2：只修改前端HTML\n```bash\ngit add index.html\ngit commit -m \"更新前端\"\n# ↑ 云端后端也会同步（虽然没必要）\ngit push\n# ↑ Cloudflare Pages部署前端\n```\n\n### 场景3：手动同步（如果hook失败）\n```bash\ncd ~/Desktop/gamt-dashboard\nbash scripts/sync-to-cloud.sh\n```\n\n## 验证同步成功\n\ncommit后看到这个输出就是成功了：\n```\n[22:23:46] 同步到云端...\n[22:23:46] ✅ 同步完成\n[22:23:46] ✅ 后端已重启\n```\n\n## 注意事项\n\n1. **commit触发同步，不是push**\n   - 即使不push，云端也会更新\n   - push只影响GitHub和Cloudflare Pages\n\n2. **云端不是git仓库**\n   - `/home/ubuntu/gamt-dashboard/` 没有 `.git/`\n   - 纯粹是rsync同步过去的文件\n\n3. **定时任务用最新代码**\n   - 云端cron跑的是同步后的最新代码\n   - 不用担心代码版本不一致\n\n4. **前端更新需要等Cloudflare**\n   - 后端立即生效\n   - 前端需要1-2分钟部署\n\n## 相关文件\n\n- `.git/hooks/post-commit` - Git钩子\n- `scripts/sync-to-cloud.sh` - 同步脚本\n- `/etc/systemd/system/gamt.service` - 云端服务配置\n- `server/refresh_server.py` - 云端运行的API服务\n\n---\n\n**记录时间**：2026-03-15  \n**对话来源**：与Musk讨论云端部署机制\n"}, {"name": "宏观Meme叙事生命周期框架", "path": "sessions/2026-03-05_宏观Meme叙事生命周期框架.md", "category": "sessions", "content": "# 宏观 Meme 叙事生命周期框架\n\n**日期：** 2026-03-05  \n**来源：** Roni × Eva 对话\n\n---\n\n## 核心定义厘清\n\n### 这个系统实际在做什么\n\n**本质：舆情频次 → 事件热度时序表**\n\n```\n每天拉财经新闻\n    ↓\n统计每个主题词出现频次\n    ↓\n频次高 = 热度高 = 打分高\n    ↓\n每天记录一次 → 形成时序热度表\n```\n\n\"叙事得分7/10\" 的真实含义：**今天这个主题在财经信息里出现密度很高**。\n\n---\n\n## 题材交易 vs 宏观 Meme 交易\n\n| 维度 | 题材交易 | 宏观 Meme 交易 |\n|------|---------|--------------|\n| 时间尺度 | 1–5天 | 数周到数月 |\n| 信号特征 | 短促尖峰，快速衰减 | 缓慢积累，持续高位 |\n| 核心问题 | 今天爆了什么？ | 这个叙事是否正在成为共识？ |\n| 机会判断 | 抢在新闻消化前进入 | 抢在市场完全定价前配置 |\n| 事件波适用性 | ✅ 完全适用 | ❌ 时间尺度太短 |\n\n> Roni 原话：\"事件波不是不能做，事件波更短线了，不适合宏观Meme交易，更偏向题材交易。\"\n\n---\n\n## 宏观 Meme 生命周期四阶段\n\n每个阶段的判断维度：\n1. **历史分位** — 当前热度在自身历史中的位置（高=成熟，低=新兴）\n2. **动量** — MA7斜率（上升=早期/积累，下降=消退）\n3. **持续时长** — 连续活跃天数（短=新兴，长=成熟/共识）\n4. **价格确认** — 叙事热但价格未动=机会窗口；价格已动=共识化\n\n```\n🌱 新兴  → 热度从低位升起，市场尚未定价，最大配置窗口\n🔥 积累  → 持续升温，价格开始跟随，窗口收窄中  \n⚡ 共识  → 高位稳定，已成市场共识，慎追\n📉 消退  → 热度下行，叙事衰退，关注反向机会\n```\n\n**关键判断：新兴叙事 vs 共识叙事**  \n一旦成为共识 → 对应资产已充分定价 → 宏观 Meme 交易窗口关闭\n\n---\n\n## 资产映射逻辑\n\n因为都是财经信息，每个叙事天然对应一套资产涨跌预期：\n\n| 叙事主题 | 对应资产 | 方向 |\n|--------|---------|------|\n| 地缘风险↑ | 黄金、原油、国防股 | 涨 |\n| 中国刺激↑ | A股、港股、铜、铁矿 | 涨 |\n| 去美元化↑ | 黄金、BTC | 涨 |\n| 美国衰退↑ | 美债、黄金 | 涨；美股 跌 |\n| AI CapEx↑ | 纳指、半导体ETF、铜 | 涨 |\n| 全球再武装↑ | 军工ETF、稀有金属 | 涨 |\n\n---\n\n## 完整系统架构（三层）\n\n```\nLayer 1: 舆情热度层\n  narrative_monitor.py → 每日得分 + narrative_history.json\n\nLayer 2: 价格背离检测层  \n  get_divergence_signal() → 叙事热但价格未动 = 机会信号\n\nLayer 3: 宏观生命周期层（本次新增）\n  macro_lifecycle.py → 多周趋势 → 阶段判断 → 配置建议\n```\n\n---\n\n## 实现\n\n**文件路径：** `~/Desktop/gamt-dashboard/meme/macro_lifecycle.py`  \n**数据来源：** `daily_report/meme交易/cache/narrative_history.json`  \n**输出：** `meme/lifecycle_output.json` + 控制台报告  \n**注意：** 数据积累 ≥ 14 天后判断才有参考价值（目前仅2天历史）\n"}, {"name": "大摩宏观框架与GAMT看板结合方案", "path": "sessions/2026-03-15_大摩宏观框架与GAMT看板结合方案.md", "category": "sessions", "content": "# 大摩宏观框架与GAMT看板结合方案\n\n**日期：** 2026-03-15  \n**类型：** 对话记录 - 框架设计  \n**关键词：** 大摩四象限、宏观逻辑链、资产配置、利润周期、内需接棒\n\n---\n\n## 一、背景\n\nRoni 提供了大摩李圣尧的宏观交易框架PDF，核心理念：\n- **经济范式变更：** 旧范式（货币紧缩+全球化）→ 新范式（财政主导+通胀回归）\n- **四象限驱动：** 增长/通胀/货币/信用 → 标准化映射 → 资产配置（股/债/商品）\n- **风险预算控制：** 通过组合波动率预算控制风险，而非单纯看资产波动率\n- **多资产组合：** 股/债/商品底层现金流结构不同，提供离散收益\n\n**GAMT现状：**\n- ✅ 宏观数据丰富（PMI/CPI/PPI/流动性/利率汇率）\n- ✅ 策略环境适配（量化股票/强势股/CTA/转债/套利）\n- ❌ **缺少决策逻辑：** 数据 → 象限定位 → 资产配置建议\n\n---\n\n## 二、核心逻辑链（优先级排序）\n\n### 逻辑链1：增长-通胀四象限 → 资产配置决策（最高优先级）\n\n**框架：**\n```\n宏观四维度（增长/通胀/货币/信用）\n    ↓ 标准化打分（Z-score）\n四象限定位（增长↑↓ × 通胀↑↓）\n    ↓ 映射规则\n资产配置权重（股/债/商品/现金）\n    ↓ 细化到策略\n策略环境适配（量化股票/强势股/CTA/转债/套利）\n```\n\n**数据需求（P0）：**\n- 增长：PMI（已有）、社融结构（需补充）\n- 通胀：CPI/PPI（已有）、PPI环比（需补充）\n- 货币：Shibor/DR007（已有）、R007-DR007利差（需补充）\n- 信用：企业债利差（需补充）、社融信贷占比（需补充）\n\n**和GAMT结合：**\n- 新增**四象限仪表盘**（宏观层顶部）\n- 输出：当前象限 + 资产配置建议 + 策略权重建议\n- 美林时钟作为验证（四象限 vs 美林时钟一致性）\n\n---\n\n### 逻辑链2：中国利润周期 → 股票策略择时（第二优先级）\n\n**框架：**\n```\nPPI环比转正（价格止跌）\n    ↓\n出厂价-购进价剪刀差为正（企业可以转嫁成本）\n    ↓\nPMI新订单/出货改善（需求回暖）\n    ↓\n规上工业企业利润同比转正（利润上行段开始）\n    ↓\n股票策略环境改善（量化股票/强势股适配度↑）\n```\n\n**数据需求（P0）：**\n- PPI环比（Tushare已有）\n- 出厂价-购进价剪刀差（Tushare已有）\n- 规上工业企业利润（Tushare已有）\n- PMI新订单（已有）\n\n**和GAMT结合：**\n- 新增**利润周期监控模块**（中观层）\n- 输出：利润周期阶段（筑底/上行/见顶/下行）+ 股票策略适配度\n- 作为策略环境适配的输入信号\n\n---\n\n### 逻辑链3：中国内需接棒验证 → 风格切换信号（第三优先级）\n\n**框架：**\n```\n社融结构：政府债占比↓ + 居民/企业信贷占比↑（内生需求接棒）\n    ↓\n居民中长期贷款回升（购房/消费意愿↑）\n    ↓\n核心CPI抬升（需求驱动通胀）\n    ↓\n进口资本品走强（企业扩产）\n    ↓\n内需接棒确认 → 大盘价值风格受益（银行/地产/消费）\n```\n\n**数据需求（P0）：**\n- 社融结构（Tushare `cn_m`表）\n- 居民中长期贷款（Tushare已有）\n- 核心CPI（Tushare已有）\n- 进口资本品（海关/iFind，需补充）\n\n**和GAMT结合：**\n- 新增**内需接棒验证模块**（宏观层）\n- 输出：内需接棒进度（0-100%）+ 风格建议（大盘价值 vs 小盘成长）\n- 作为风格轧差的输入信号\n\n---\n\n### 逻辑链4：美国软着陆 vs 硬着陆 → 全球风险开关（第四优先级）\n\n**框架：**\n```\n【软着陆路径】\n服务业PMI不塌（>50）+ 红皮书零售正增长 + 工资温和回落\n    ↓\n核心PCE接近2%（通胀可控）\n    ↓\n美联储降息 → 全球风险偏好改善 → A股受益\n\n【硬着陆路径】\nFCI持续收紧 + 信用利差扩张 + 消费断崖\n    ↓\n美国衰退 → 全球风险厌恶 → A股避险（转债/套利策略受益）\n```\n\n**数据需求（P1）：**\n- 服务业PMI（需爬虫）\n- 红皮书零售（需爬虫）\n- 核心PCE（FRED免费）\n- 信用利差（FRED免费）\n- 金融条件指数（高盛FCI或自建）\n\n**和GAMT结合：**\n- 新增**美国软硬着陆监控模块**（全球层）\n- 输出：软着陆概率（0-100%）+ 全球风险开关（risk-on/off）\n- 作为红灯预警的全球风险维度\n\n---\n\n### 逻辑链5：经济范式转换 → 战略资产配置调整（长期战略）\n\n**框架：**\n```\n【旧范式（1990-2020）】\n货币紧缩 + 全球化 + 通胀目标制\n    ↓\n股债60/40组合有效 + 债券是避险资产\n\n【新范式（2020-现在）】\n财政主导 + 逆全球化 + 通胀回归\n    ↓\n股债相关性上升（同时下跌）\n    ↓\n商品/黄金成为避险资产 + 多资产组合必要性提升\n```\n\n**数据需求（P2）：**\n- 财政赤字率（Tushare/财政部）\n- 全球化指数（贸易依存度，需自建）\n- 通胀预期锚定程度（5y5y TIPS breakeven，FRED）\n\n**和GAMT结合：**\n- 新增**经济范式监控模块**（战略层）\n- 输出：当前范式（旧/新/转换中）+ 战略资产配置建议\n- 结合宏观Meme叙事（地缘风险/去美元化/财政主导）\n\n---\n\n## 三、大摩指标体系与逻辑演绎\n\n### 美国宏观\n\n#### 增长维度\n1. **服务业PMI（整体+新订单+就业）**  \n   逻辑：美国70%是服务业 → 新订单↑+就业↑ = 服务业自我强化（软着陆）\n\n2. **红皮书商业零售销售（周同比）**  \n   逻辑：消费占GDP 68% → 周度高频领先指标 → 断崖式下滑 = 硬着陆第一预警\n\n3. **ISM制造业PMI**  \n   逻辑：vs S&P500 EPS → 判断盈利驱动来源\n\n#### 通胀维度\n4. **核心CPI/核心PCE**  \n   逻辑：剔除食品能源 → 反映需求驱动通胀 → 核心PCE>2.5% = 美联储不敢降息\n\n5. **CPI住房分项（OER/租金）**  \n   逻辑：占核心CPI权重40% → 通胀\"最后一公里\" → OER滞后实际租金12-18个月\n\n6. **Realtor.com新签租金**  \n   逻辑：领先实际租金6-12个月 → 新签租金↓ → 实际租金↓ → OER↓ → 核心CPI↓\n\n7. **ISM服务业物价指数**  \n   逻辑：服务通胀扩散指标 → >60 = 通胀扩散，<50 = 通胀收敛\n\n8. **核心服务通胀（住房外服务）**  \n   逻辑：核心CPI - 住房 - 商品 → 核心服务>4% = 美联储不敢降息（工资粘性）\n\n#### 工资与成本\n9. **私营部门名义工资增速（尤其服务业）**  \n   逻辑：工资↑ → 企业成本↑ → 服务价格↑ → 核心CPI↑ → 工资>4% = 通胀粘性强\n\n10. **单位劳动力成本（ULC）**  \n    逻辑：ULC = 工资增速 - 生产率增速 → ULC>0 = 通胀压力，ULC<0 = 通胀可控\n\n#### 金融条件与资金流\n11. **金融条件指数（FCI）**  \n    逻辑：利率+信用利差+股市+汇率 → FCI宽松 = 增长加速，FCI收紧 = 增长放缓\n\n12. **信用利差**  \n    逻辑：企业债收益率 - 国债收益率 → 利差扩张 = 经济衰退预警\n\n13. **美国财政部TIC数据**  \n    逻辑：海外买入美债 → 长端利率下行 → 美元走强\n\n14. **经济意外指数**  \n    逻辑：实际数据 - 市场预期 → 指数>0 = 数据超预期 → 股市上涨/美联储鹰派\n\n#### 利率与政策\n15. **联邦基金利率/政策利率路径**  \n    逻辑：降息 → 融资成本下降 → 股市上涨/美元走弱\n\n16. **10Y美债收益率**  \n    逻辑：无风险利率基准 → 10Y上行 = 股市估值压缩\n\n17. **期限溢价（Term Premium）**  \n    逻辑：10Y美债 - 预期短期利率 → 期限溢价>0 = 投资者要求补偿（通胀/财政风险）\n\n18. **收益率曲线形态（2-5Y vs 10Y）**  \n    逻辑：熊陡 = 通胀预期上升，牛陡 = 降息预期，倒挂 = 衰退预警\n\n19. **财政供给节奏（国债发行）**  \n    逻辑：发债增加 → 供给压力 → 长端利率上行\n\n20. **实际利率（TIPS）**  \n    逻辑：名义利率 - 通胀预期 → 实际利率上行 = 黄金下跌/久期资产下跌\n\n#### 大宗与避险\n21. **5y5y通胀预期（TIPS breakeven）**  \n    逻辑：5年后的5年通胀预期 → 5y5y>2.5% = 通胀预期脱锚\n\n22. **汽油/原油价格**  \n    逻辑：供给扰动 = 油价上涨 → CPI上行，需求冲击 = 油价下跌 → CPI下行\n\n23. **Brent原油+裂解价差+库存节奏**  \n    逻辑：库存下降+裂解价差扩大 = 需求强劲 → 油价上涨\n\n24. **黄金**  \n    逻辑：地缘风险溢价 + 实际利率 + 央行买盘 → 实际利率下行 = 黄金上涨\n\n25. **工业金属库存+近月升水**  \n    逻辑：库存下降+近月升水 = 供给紧张 → 价格弹性大\n\n---\n\n### 中国宏观\n\n#### 信用与内需\n26. **社融总量+结构拆分**  \n    逻辑：政府债占比高 = 财政发力但内生需求弱，居民/企业信贷占比高 = 内需接棒\n\n27. **居民中长期贷款**  \n    逻辑：中长贷↑ = 购房/消费意愿强 → 内需扩张\n\n28. **金融机构存贷款增速差**  \n    逻辑：增速差扩大 = \"钱多但不敢花\" → 流动性陷阱\n\n29. **社零（服务vs商品、必选vs可选）**  \n    逻辑：服务消费↑ = 消费升级，可选消费↑ = 消费信心强\n\n30. **固定资产投资（制造业/基建/地产）**  \n    逻辑：制造业投资↑ = 企业扩产 → 经济内生动力强\n\n31. **GDP需求侧拆分**  \n    逻辑：消费贡献↑ = 内需接棒，净出口贡献↓ = 外需走弱\n\n#### 通胀与利润链条\n32. **CPI（整体+食品vs核心服务）**  \n    逻辑：食品CPI↑ = 猪周期/供给冲击，核心服务CPI↑ = 就业收入预期改善\n\n33. **核心CPI**  \n    逻辑：CPI - 食品 - 能源 → 核心CPI↑ = 需求驱动通胀\n\n34. **PPI（整体+分行业）**  \n    逻辑：PPI环比转正 = 利润上行段开始\n\n35. **PPI环比**  \n    逻辑：月度变化 → 环比转正 = 价格止跌 → 利润改善关键信号\n\n36. **出厂价-购进价剪刀差**  \n    逻辑：剪刀差>0 = 企业可以转嫁成本 → 利润改善\n\n37. **规上工业企业利润**  \n    逻辑：利润同比转正 = 盈利止跌\n\n38. **主营业务收入利润率+资产负债率**  \n    逻辑：利润率↑+资产负债率↓ = 企业健康度改善\n\n#### 外需与汇率\n39. **出口数量指数vs出口价格指数**  \n    逻辑：数量↑价格↓ = \"以价换量\"，数量↑价格↑ = 外需强劲\n\n40. **PMI新出口订单**  \n    逻辑：领先指标 → 新出口订单>50 = 外需扩张\n\n41. **进出口金额分项**  \n    逻辑：资本品进口↑ = 企业扩产 → 内需扩张\n\n42. **银行代客结售汇/净结汇**  \n    逻辑：净结汇↑ = 人民币升值压力\n\n43. **USDCNY即期+中间价Fixing Bias**  \n    逻辑：Bias>0 = 央行引导贬值，Bias<0 = 央行引导升值\n\n44. **USDCNY FX Swap Points/CIP Basis**  \n    逻辑：CIP Basis>0 = 离岸人民币流动性紧张 → 人民币升值压力\n\n45. **美元指数**  \n    逻辑：美元指数↑ = 人民币被动贬值压力\n\n#### 市场与资金流\n46. **金融条件指数（中国）**  \n    逻辑：FCI宽松 = 风险偏好改善 → 股市上涨\n\n47. **沪深300**  \n    逻辑：A股基准指数\n\n48. **南向资金净流入**  \n    逻辑：南向资金↑ = 港股边际定价者 → 港股上涨\n\n49. **收益率曲线（中国国债）**  \n    逻辑：陡峭化 = 经济复苏预期 → 长端利率上行\n\n---\n\n## 四、关键联合验证信号（共振逻辑）\n\n| 验证目标 | 联合信号组合 | 逻辑链 |\n|---------|------------|--------|\n| **美国软着陆延续** | 服务业PMI不塌 + 红皮书零售正增长 + 工资温和回落 | 服务业需求稳定 + 消费流量端不崩 + 成本压力缓解 = 增长+通胀双降 |\n| **美国通胀\"最后一公里\"** | 前瞻租金下行 + 核心服务通胀收敛 + ULC回落 | 住房通胀领先指标见顶 + 服务通胀粘性消退 + 工资成本下降 = 核心PCE接近2% |\n| **美国硬着陆预警** | FCI持续收紧 + 信用利差扩张共振 + 消费断崖 | 金融条件收紧 + 企业融资成本飙升 + 消费崩溃 = 衰退 |\n| **中国利润进入上行段** | PPI环比转正 + 剪刀差为正 + 订单/出货改善 | 价格止跌 + 企业可以转嫁成本 + 需求回暖 = 利润改善 |\n| **中国内需真正接棒** | 社融信贷占比提升 + 居民中长贷回升 + 核心CPI抬升 + 进口资本品走强 | 内生信贷需求↑ + 购房/消费意愿↑ + 需求驱动通胀↑ + 企业扩产↑ = 内需接棒 |\n| **人民币行情可持续性** | 结汇趋势 + 资金利率 + 中间价Fixing Bias | 企业结汇意愿↑ + 离岸流动性宽松 + 央行不引导贬值 = 人民币升值 |\n\n---\n\n## 五、实施方案\n\n### Roni的决策：\n- **先做宏观逻辑：** 所有指标先放在**宏观与流动性看板**里，增加对应的小模块\n- **策略环境呼应：** 如何让宏观指标呼应策略环境，需要进一步思考\n- **不急于打通：** 先把宏观逻辑链做扎实，策略映射逻辑后续再完善\n\n### 实施优先级：\n\n**Phase 1：本周（Tushare已有数据）**\n1. **利润周期监控模块**\n   - PPI环比 + 剪刀差 + 企业利润 + PMI新订单\n   - 输出：利润周期阶段（筑底/上行/见顶/下行）\n\n2. **内需接棒验证模块**\n   - 社融结构 + 居民中长贷 + 核心CPI\n   - 输出：内需接棒进度（0-100%）\n\n**Phase 2：下周（测试iFind权限）**\n3. **四象限仪表盘（部分）**\n   - 增长/通胀/货币/信用四维度标准化\n   - 输出：当前象限位置 + 历史轨迹\n\n4. **信用利差监控**\n   - 企业债利差（中美）\n   - R007-DR007利差\n\n**Phase 3：2周后（外部API）**\n5. **美国软硬着陆监控**\n   - 服务业PMI + 红皮书零售 + 核心PCE + 信用利差 + FCI\n   - 输出：软着陆概率（0-100%）\n\n---\n\n## 六、关键洞察\n\n1. **大摩框架的核心价值：** 把宏观数据标准化为四象限 → 映射到资产配置决策，填补了\"数据丰富但缺少决策逻辑\"的空白\n\n2. **共振信号的重要性：** 不依赖单一指标，而是看多指标共振（例如：PPI环比转正 + 剪刀差为正 + 订单改善 = 利润上行段确认）\n\n3. **经济范式转换：** 旧范式（货币紧缩+全球化）→ 新范式（财政主导+通胀回归），多资产组合（股/债/商品）必要性提升\n\n4. **逻辑链的层次：**\n   - 战略层：经济范式监控（长期）\n   - 战术层：四象限定位 → 资产配置（中期）\n   - 交易层：利润周期/内需接棒 → 策略择时（短期）\n\n5. **GAMT看板的演进方向：**\n   - 从\"数据展示\"升级为\"决策支持\"\n   - 从\"单一指标\"升级为\"共振信号\"\n   - 从\"静态配置\"升级为\"动态调整\"\n\n---\n\n## 七、待补充数据清单\n\n| 优先级 | 数据类别 | 具体指标 | 数据源 | 实现难度 |\n|-------|---------|---------|--------|---------|\n| **P0** | 信用利差 | 企业债利差（中美） | iFind | 低 |\n| **P0** | 社融结构 | 居民/企业短贷中长贷 | Tushare | 低 |\n| **P0** | PPI环比 | PPI环比 + 剪刀差 | Tushare | 低 |\n| **P1** | 美联储路径 | FF期货隐含降息路径 | CME/FRED | 中 |\n| **P1** | 前瞻租金 | Realtor.com新签租金 | Realtor.com | 中 |\n| **P1** | 工资成本 | 私营部门工资 + ULC | BLS | 中 |\n| **P2** | 金融条件 | 高盛FCI（中美） | 高盛/自建 | 高 |\n| **P2** | 商品供需 | 原油库存/铜库存/BDI | EIA/iFind | 中 |\n| **P3** | 经济意外 | 花旗经济意外指数 | 花旗 | 高 |\n\n---\n\n## 八、下一步行动\n\n1. ✅ 保存本次对话逻辑到smart-notes\n2. ⏳ 从Tushare已有数据开始：利润周期监控 + 内需接棒验证\n3. ⏳ 测试iFind权限：企业债利差 + R007-DR007利差\n4. ⏳ Roni思考：宏观指标如何呼应策略环境\n\n---\n\n**备注：** 本文档作为后续丰满逻辑链的基础框架，随着实施进展持续更新。\n"}, {"name": "择时因子测试框架V2上线", "path": "sessions/2026-03-15_择时因子测试框架V2上线.md", "category": "sessions", "content": "# 2026-03-15 择时因子测试框架V2上线\n\n> Roni × Musk\n\n## 背景\n\nRoni 提出冰点策略的核心问题：**极致冰点触发太少，实用性不够**。需要一个标准化的因子测试框架，快速验证不同因子的效果。\n\n同时，Roni 认为现有的因子报告\"太复杂、字太多\"，希望参考聚宽（JoinQuant）的极简交互设计。\n\n## 完成内容\n\n### 1. Framework V2 - 标准化因子测试框架\n\n**位置：** `~/Desktop/quant-backtest/timing_model/framework_v2/`\n\n**核心特点：**\n- 标准化参数空间：2阈值 × 3持有期 × 3指数 = 18种组合\n- 极简报告：1页因子卡片，核心信息一目了然\n- 深色主题：与GAMT看板择时模块风格统一\n- 可扩展：添加新因子只需实现 `generate_signal()` 方法\n\n### 2. 聚宽式因子卡片\n\n**设计原则：**\n- 极简：1行参数 + 1行指标 + 2张图\n- 图表为主：净值曲线 + 交易收益柱状图\n- 信息密度高：一屏看完核心内容\n\n**净值曲线：**\n- 策略净值 vs 多个宽基指数对比\n- 开仓标记点（绿色）\n- 持仓期间：净值跟随指数波动\n- 空仓期间：净值保持不变\n\n**交易柱状图：**\n- 横轴：交易时间（月-日格式）\n- 柱子高度：收益率（%）\n- 鼠标悬停：显示触发条件（跌停X家 涨停Y家）\n\n### 3. 整合到GAMT看板\n\n**整合方式：**\n- 在\"冰点研究迭代版本\"部分添加新的subtab：\"📊 因子回测\"\n- 通过iframe嵌入ice_point_card_v2.html\n- 保持V1/V2/V3等原有内容不变\n\n**访问路径：**\nhttps://dashboard.gamtfof.com/timing-research/ → \"冰点研究迭代版本\" → \"📊 因子回测\"\n\n## 冰点因子测试结果\n\n**最优参数：**\n- 阈值：5%分位\n- 持有期：15天\n- 标的：中证500\n\n**核心指标（7年全样本）：**\n- 胜率：87.5%\n- 平均收益：+4.71%\n- Calmar：3.21\n- 最大回撤：2.23%\n- 年化收益：7.1%\n- 交易次数：8次（年均1.1次）\n\n**关键发现：**\n- ✅ 效果极好（Calmar 3.21）\n- ❌ 触发太少（年均1.1次）\n- 验证了 Roni 的判断：**极致冰点实用性不够**\n\n## 核心洞察\n\n### 1. 高回测 vs 高触发的矛盾\n\n| 阈值 | Calmar | 年均触发 | 评价 |\n|------|--------|----------|------|\n| 5%   | 3.21   | 1.1次    | 效果极好，但太少 |\n| 10%  | 0.89   | 3.7次    | 效果下降，仍偏低 |\n\n**矛盾的本质：**\n- 极端阈值 → 高回测效果，但触发太少\n- 放宽阈值 → 触发增加，但效果下降\n- 需要找到\"高回测+高触发\"的平衡点\n\n**可能方向：**\n- 10-15%分位可能是甜蜜点\n- 单因子替代双因子（提高触发频率）\n- 分批建仓（提高资金利用率）\n- 动态持有期（根据市场修复速度调整）\n\n### 2. 中证2000不是最优\n\n**Roni 的判断：** \"中证2000效果应该是最好的\"\n\n**实际结果：**\n- 2000排名第3（Calmar 1.17）\n- 500排名第1（Calmar 3.21）\n- 原因：2000年化收益高（14.9%），但回撤也大\n\n### 3. 聚宽式交互的价值\n\n**Roni 的诉求：**\n> \"我觉得我们的冰点模板做的还是太复杂了，字多但是看完就那么个意思。未来会加很多因子，需要一个简洁、标准化的交互方式。\"\n\n**解决方案：**\n- 参考聚宽的极简设计\n- 1页因子卡片，核心信息一目了然\n- 标准化格式，易于对比\n- 未来可扩展为本地化的聚宽式回测平台\n\n## Roni 的关键观点\n\n1. **\"极致冰点触发太少，实用性不够。\"**\n   - 5%分位年均1.1次，FOF仓位管理无法用\n   - 需要找到平衡点\n\n2. **\"中证2000效果应该是最好的。\"**\n   - 实际测试发现不是\n   - 说明直觉需要数据验证\n\n3. **\"参考聚宽的交互设计方式来构建因子的回测。\"**\n   - 聚宽的很多小策略也就是一些非常简单的小因子\n   - 我们本地也能做到差不多的效果\n\n4. **\"我觉得我们的冰点模板做的还是太复杂了。\"**\n   - 字多但是看完就那么个意思\n   - 未来会加很多因子，需要标准化\n\n## 下一步\n\n### 短期（本周）\n- [ ] 测试10-15%分位：找到平衡点\n- [ ] 单因子测试：封单轧差、跌停家数\n- [ ] 添加2-3个新因子\n\n### 中期（本月）\n- [ ] 分批建仓策略\n- [ ] 动态持有期\n- [ ] 因子组合策略\n- [ ] 分牛熊检验\n\n### 长期（季度）\n- [ ] 完整的因子库（10+因子）\n- [ ] Web界面：本地化的聚宽式回测平台\n- [ ] RD-Agent 接入（AI自动挖因子）\n\n## 技术细节\n\n**净值计算逻辑：**\n- 持仓期间：净值跟随指数波动\n- 空仓期间：净值保持不变（水平线）\n- 不能是直线！\n\n**触发条件记录：**\n- 每笔交易记录：跌停X家、涨停Y家\n- 柱状图鼠标悬停显示\n\n**色调统一（择时模块风格）：**\n- 背景：#0d1117（深黑）\n- 卡片：#161b22（深灰）\n- 强调色：蓝#58a6ff、绿#7ee787、橙#f0883e\n\n## 重要提醒\n\n**飞书接口默认 Roni 不在电脑旁边：**\n- 不要让他去打开本地文件\n- 不要让他去运行命令\n- 直接把结果推送到他能远程访问的地方（比如FOF看板）\n\n**标签:** #择时 #因子测试 #框架 #聚宽 #冰点 #回测 #对话记录\n"}, {"name": "择时模块阶段共识与工作流", "path": "sessions/2026-03-22_择时模块阶段共识与工作流.md", "category": "sessions", "content": "# 2026-03-22 择时模块阶段共识与工作流\n\n- 日期：2026-03-22\n- 类型：阶段共识 / 工作流\n- 标签：择时模块, 情绪因子, Smart Notes, PM沟通, 工作流\n\n## 一、当前模块目标\n\n当前这条研究线只服务一个核心目标：\n\n> 输出股票仓位/股票敞口判断。\n\n不是先做 FOF 多策略映射，也不是先做大而全的策略适配总控台。\n\n当前重点是把“情绪”这件事本身讲清楚，并组织成一个可持续扩展的择时模块。\n\n---\n\n## 二、当前共识：这个模块的本质\n\nRoni 的 PDF 不是一张普通因子表，而是一套市场理解。\n\n里面同时包含：\n1. **日频原始因子**（如涨跌家数比、涨跌停家数比、晋级率等）\n2. **盘中状态条件**（如龙头封板时间、后排跟随、竞价强度等）\n3. **结构过滤条件**（如题材独立性、题材成交额占比等）\n\n因此，这套模块未来不是把所有变量都简单做成同一种日频回测因子，\n而是先把它们翻译成一个 Roni 和 PM 都能对话的择时条件系统。\n\n---\n\n## 三、页面/认知结构的最新共识\n\n### 第一页：原始因子页\n放强逻辑原始因子。\n\n包括：\n- 日频因子\n- 盘中条件（后续可单列）\n- 结构过滤条件（后续可单列）\n\n这页看的是：\n> 原料 / 底层材料\n\n### 第二页：合成因子 / 阶段输出页\n放加工后的结果。\n\n包括：\n- 综合情绪\n- 周期标签\n- 后续的阶段判断/状态机输出\n\n这页看的是：\n> 结论 / 加工结果\n\n一句话：\n- **第一页看原料**\n- **第二页看结论**\n\n---\n\n## 四、当前阶段：先补原始强逻辑因子，不急着回测\n\n当前不是优先做：\n- 每个因子的 300/500/1000 回测\n- 每个因子的 5日/10日/15日 IC\n- 参数最优搜索\n\n而是优先做：\n1. 把原有择时模块中的因子解释清楚\n2. 把 PDF 里新增的强逻辑因子逐步补进来\n3. 明确每个因子在情绪链条中的角色\n4. 再决定哪些值得进入回测候选池\n\n当前原则：\n\n> 强逻辑优先，回测后置。\n\n---\n\n## 五、当前工作流（以后新增因子统一按这个走）\n\n### Step 1：提出因子\nRoni 提一个新因子。\n\n### Step 2：记录到 dashboard 侧 Smart Notes\n路径：\n`~/Desktop/gamt-dashboard/smart-notes/`\n\n先记录：\n- 因子名称\n- 频率（日频/盘中）\n- 类别（广度/极值/接力/龙头/结构）\n- 因子定义\n- 逻辑说明\n- 极端含义\n- 在情绪链条中的角色\n- 与原有因子的关系\n\n### Step 3：判断是否进入 quant-backtest 候选池\n路径：\n`~/Desktop/quant-backtest/timing_model/memory/`\n\n不是所有因子都立刻回测。\n先判断它属于：\n- 日频因子\n- 盘中条件\n- 结构过滤器\n\n再决定是否进入候选池。\n\n### Step 4：后续再决定怎么测\n等第一层因子清单和第二层结构关系更完整后，再决定：\n- 是否回测\n- 测什么命题\n- 用什么方式测\n\n---\n\n## 六、当前已确认的两个记录文件\n\n### 1. dashboard 侧：强逻辑因子清单\n`~/Desktop/gamt-dashboard/smart-notes/concepts/情绪择时强逻辑因子清单.md`\n\n作用：\n- 记录原始因子\n- 先讲逻辑，不急着回测\n\n### 2. quant-backtest 侧：回测候选池\n`~/Desktop/quant-backtest/timing_model/memory/FACTOR_CANDIDATES.md`\n\n作用：\n- 记录哪些因子未来值得测\n- 但当前不急着展开正式回测\n\n---\n\n## 七、当前已补入的第一个新增因子\n\n### 涨跌家数比\n定位：\n- 日频\n- 广度类\n- 强逻辑因子\n- 底层先导因子\n\n它补足的是原有情绪体系缺失的“广度底板”，\n作用不是确认高潮，而是判断市场是否已经从普跌转向普修复。\n\n---\n\n## 八、原有择时模块 10 项的最新理解\n\n原来看板中明确使用的 10 项包括：\n1. 综合情绪 sentiment\n2. 涨停家数 up_count\n3. 跌停家数 down_count\n4. 连板高度 max_height\n5. 晋级率 promotion_rate\n6. 炸板率 zha_rate\n7. 涨跌停比 ud_ratio\n8. 封板质量 seal_quality\n9. 一进二率 rate_1to2\n10. 周期标签 cycle_label\n\n其中应重新分类为：\n\n### 原始因子\n- 涨停家数\n- 跌停家数\n- 连板高度\n- 晋级率\n- 炸板率\n- 涨跌停比\n- 封板质量\n- 一进二率\n\n### 合成因子\n- 综合情绪 sentiment\n\n### 阶段输出\n- 周期标签 cycle_label\n\n---\n\n## 九、综合情绪的最新定位\n\n综合情绪保留，但其性质已明确：\n\n> 它不是原始强逻辑因子，而是合成因子。\n\n原始算法：\n- 晋级率 25%\n- 封板质量 25%\n- 连板高度 20%\n- 反炸板率 20%\n- 涨跌停比 10%\n\n因此它适合放在第二页：\n- 合成因子 / 阶段输出页\n\n而不应再与原始强逻辑因子混在第一页。\n\n---\n\n## 十、下一阶段的实际推进顺序\n\n### 当前先做\n1. 补齐原始强逻辑因子页\n2. 同步修正原有 10 项的解释和分类\n3. 把新增因子持续纳入 Smart Notes\n\n### 暂不急做\n1. 每个因子立刻做 IC\n2. 每个因子立刻进正式回测\n3. 过早做复杂总分模型\n\n### 之后再做\n1. 递进关系整理\n2. 第二页合成因子 / 阶段输出页\n3. 回测方式与必要性讨论\n\n---\n\n## 十一、沟通风格提醒\n\nRoni 明确要求：\n- 聊天尽可能简约\n- 逻辑清晰\n- 先结论，再分层表达\n- 只有在明确需要展开时，再详细解释\n\n另外：\n- 当前对话中，Roni 提醒称呼为“雷军”\n\n---\n\n## 十二、一句话总结\n\n当前阶段不是“把所有因子拉去回测”，而是：\n\n> 先把原始强逻辑因子体系搭起来，\n> 再把合成因子和阶段输出单列，\n> 最后再决定哪些值得进入量化验证。\n"}, {"name": "盘中发现层角色事件叙事框架", "path": "sessions/2026-03-22_盘中发现层角色事件叙事框架.md", "category": "sessions", "content": "# 2026-03-22 盘中发现层角色事件叙事框架\n\n- 日期：2026-03-22\n- 类型：阶段共识 / 盘中发现层母框架\n- 标签：择时模块, 盘中发现层, 龙头, PM沟通, 人工交易语言\n\n## 一、为什么这一段讨论重要\n\n今晚这段讨论把一个关键问题讲透了：\n\n> 盘中发现层不是普通因子表，而是把人工盘面语言翻译成 PM 可理解、可计算状态框架的“翻译器”。\n\n人工交易看盘，看的不是一个静态量价点，\n而是一条不断演绎的盘面链条：\n- 龙头是否在变\n- 龙一龙二龙三是否联动\n- 是否打出了市场新高度\n- 跌停是否被翘起\n- 高位是否集体松动\n- 10cm 到 20cm 是否出现板块共振\n- 盘面是否从单核走向多核\n\n这类信息对人工交易极其重要，\n但如果不先做结构翻译，PM 很难理解，量化也很难直接写条件。\n\n---\n\n## 二、正式母框架\n\n盘中发现层正式定义为：\n\n```text\n角色层 → 事件层 → 叙事层\n```\n\n### 1）角色层：盘中到底在看谁\n\n角色层解决的是：\n\n> 盘中到底在观察哪些对象。\n\n当前确认的核心角色包括：\n- 龙头观察池\n- 辨识度龙头\n- 成交额龙头\n- 龙一 / 龙二 / 龙三\n- 高位核心\n- 首板试错\n- 跟风扩散\n- 跌停翘板修复\n\n### 2）事件层：盘中到底发生了什么\n\n事件层解决的是：\n\n> 这些角色身上发生了哪些关键事件。\n\n当前确认的关键事件包括：\n- 首次封板\n- 炸板\n- 回封\n- 翘板\n- 尾盘回落\n- 10cm → 20cm 扩散\n- 单核 → 多核扩散\n- 高位股集体松动\n- 梯队同步加强\n- 午后分歧后修复\n\n### 3）叙事层：这些事件意味着什么\n\n叙事层解决的是：\n\n> 这些事件组合起来，对市场状态意味着什么。\n\n当前确认的核心叙事包括：\n- 龙头确认\n- 试错启动\n- 梯队加强\n- 高度突破\n- 板块共振扩散\n- 分歧转修复\n- 高位退潮\n- 风险偏好抬升 / 回落\n\n---\n\n## 三、龙头的最新正式定义\n\n今晚最关键的推进，是把“龙头”从静态标签改成动态结构。\n\n### 1）龙头不是静态单票\n\n龙头不是简单等于“最高板那只股票”。\n\n更准确的定义是：\n\n> 龙头是由 T 日收盘后的日频强信号筛出来的“龙头观察池”，\n> 到 T+1 盘中继续动态确认的角色体系。\n\n也就是说：\n- T 日的日频强信号，提供先验\n- T+1 的盘中表现，完成确认或证伪\n\n这就把“日频因子 → 盘中发现层”真正接上了。\n\n### 2）龙头观察池\n\n龙头观察池不是一只股票，\n而是一组由日频强信号筛出来的候选序列。\n\n进入观察池的优先条件包括：\n- 高板 / 最高板\n- 打板成交额高\n- 高度高\n- 在日频强信号中排名靠前\n\n也就是：\n\n> T 日的日频信号，到 T+1 就转化为龙头观察池。\n\n### 3）辨识度龙头\n\n辨识度龙头指：\n- 市场最认\n- 最有高度\n- 最有位置感\n- 最有带动性的核心票\n\n它更贴近人工交易语言。\n\n### 4）成交额龙头\n\n成交额龙头指：\n- 当日成交额最高的核心票\n\n它更贴近量价资金语言。\n\n### 5）为什么要拆成两类龙头\n\n因为 A 股里：\n- 龙头会变\n- 龙一龙二龙三会变\n- 辨识度龙头和成交额龙头有时重合，有时不重合\n\n而人工交易恰恰会观察：\n- 两类龙头是否重合\n- 是否切换\n- 是否联动\n- 是否共同推动高度与共振\n\n所以龙头不能只写成一个静态字段。\n\n---\n\n## 四、PM 为什么难理解人工交易过程\n\nRoni 明确指出，\nPM 经常难理解人工交易，不是因为他们不懂量价，\n而是因为人工交易真正处理的是：\n\n- 动态角色\n- 连续事件\n- 叙事演绎\n\n而不是单一时点的指标。\n\n人工交易盘中会关心：\n- 龙头和龙一龙二龙三是否联动\n- 有没有打出市场新高度\n- 是否出现高位股集体走弱\n- 跌停是否被翘板修复\n- 10cm 到 20cm 是否出现共振\n- 是否从单点变成群体行为\n\n这些都在改变交易员对盘面的处理，\n但如果不先翻译成结构化框架，\n量化系统很难写条件，PM 也难以形成共同语言。\n\n---\n\n## 五、对后续盘中因子设计的直接影响\n\n由这段讨论确认：\n\n> 后续盘中因子不能硬压成“一个名字 + 一个静态公式”。\n\n更合理的做法是：\n1. 先挂到角色层\n2. 再定义它记录的事件\n3. 最后说明它对应的叙事含义\n4. 再抽出 v1 可计算定义\n\n也就是说，未来盘中因子的标准记录方式应该包含：\n- 挂靠角色\n- 事件定义\n- 叙事含义\n- v1 可计算口径\n- 后续升级方向\n\n---\n\n## 六、落地顺序：哪些先做，哪些后做\n\n今晚进一步确认：盘中演绎样板页最终一定需要独立 Python 文件，但**第一性原理应是事件流，不是固定 15 分钟切片**。\n\n### 先不建议现在就做\n- 不先做 15 分钟一个 bar 的大表\n- 不先做纯日评数据硬凑盘中演绎\n- 不先把所有盘中语义都压成统一 ratio / score\n\n原因：人工交易真正重视的是事件顺序和状态转移，固定切片很容易把“先炸再回封、先分歧再修复”这类最重要的信息抹平。\n\n### 当前最先做的 3 个文件\n\n#### 1）`intraday_event_engine.py`\n作用：\n- 从当前能稳定拿到的数据里抽取盘中事件流\n- 保留角色归属、时间顺序、事件类型、叙事标签\n- 输出事件流 JSON，而不是直接输出因子表\n\n当前 v1 输入数据先限定为：\n- `limit_list_d` / `_cache/{date}.json`\n- `first_time`\n- `last_time`\n- `open_times`\n- `limit_times`\n- `amount`\n- 最终 `U / Z / D` 状态\n\n#### 2）`intraday_story_builder.py`\n作用：\n- 从事件流里聚合出“盘中演绎”结构\n- 输出：龙头观察池、时间轴、状态切换、叙事结论、仓位动作建议\n- 为前端样板页服务\n\n#### 3）前端样板数据（如 `intraday_story.json`）\n作用：\n- 给 PM 看结论和证据链\n- 给 Roni 看时间轴和角色切换\n- 支持“日频先验 → 盘中演绎 → 阶段判断 → 仓位动作”的页面结构\n\n### v1 先支持的 5 类事件\n- 龙头首次封板\n- 龙头炸板后回封\n- 首板批量启动\n- 高位股集体炸板\n- 尾盘高位回落\n\n原因：\n- 当前已有数据就能勉强支持\n- 事件语义清晰\n- 足以搭出第一版事件流和样板页\n\n### 暂缓到下一阶段的内容\n- 10cm → 20cm 共振传导\n- 午后修复全过程\n- 单核 → 多核扩散\n- 龙一龙二龙三切换路径\n- 更细的分钟级跟随与带动顺序\n\n原因：\n- 当前日终/摘要类数据无法完整表达\n- 需要更细分时数据源才能做准\n\n### 当前正式结论\n\n> 先做事件流，再做状态聚合，最后视需要再做切片。\n\n也就是：\n- 不是纯日评硬拉\n- 也不是一上来就 15 分钟切片\n- 而是先保住盘面演绎最关键的“事件顺序”和“状态变化”\n\n## 七、当前结论\n\n今晚这段讨论的核心产出，不只是“补了几个盘中因子定义”，\n而是把整个盘中发现层抬升成一个更稳定的顶层框架：\n\n> 人工盘面语言 → PM 可理解框架 → 可计算状态定义\n\n这是后面继续做：\n- 龙头定义\n- 盘中状态记录\n- 阶段输出\n- 仓位判断\n- 盘中事件引擎\n- 盘中演绎样板页\n\n的真正基础。\n"}, {"name": "iFinD_MCP金融数据接入", "path": "sessions/2026-03-26_iFinD_MCP金融数据接入.md", "category": "sessions", "content": "# iFinD MCP 金融数据接入\n\n- 日期：2026-03-26\n- 类型：工具接入\n- 标签：iFinD, MCP, 数据源, 同花顺, API\n\n## 背景\n同花顺于 2026-03-12 正式上线 iFinD MCP 金融数据服务，专为 AI 智能体设计，支持自然语言查询金融数据。\n\n## 接入的4个服务\n\n### 1. 股票服务 (stock)\n- 智能选股（自然语言条件筛选）\n- 股票摘要、基本资料、行情与技术指标\n- 财务数据、股东结构、风险指标、ESG、重大事件\n- 示例：`\"电子行业市值大于100亿的股票\"`\n\n### 2. 基金服务 (fund)\n- 基金搜索、基本资料、行情业绩\n- 持仓明细、持有人结构、财务指标、基金公司信息\n- 对 FOF 工作直接有用\n- 示例：`\"南方基金新能源ETF\"`\n\n### 3. 宏观经济服务 (edb)\n- GDP、CPI、PPI、行业经济指标、大宗商品\n- 支持\"先搜再查\"：先 search_edb 模糊搜索，再 get_edb_data 精确取数\n- 示例：`\"光伏电池产量202301-202506\"`\n\n### 4. 新闻公告服务 (news)\n- 财经新闻语义检索、上市公司公告搜索、热点事件\n- 示例：`\"脑机接口技术最新进展\"`\n\n## 技术细节\n- 协议：MCP (Model Context Protocol) over Streamable HTTP\n- 端点：`https://api-mcp.51ifind.com:8643/ds-mcp-servers/`\n- 认证：JWE Authorization token\n- 直连可用，不需要代理\n- Skill 位置：`~/.openclaw/extensions/ifind-finance-data/`\n- 调用方式：Node.js（推荐，无依赖）或 Python\n\n## 与现有 iFinD HTTP API 的区别\n- HTTP API：需要知道具体指标代码和字段名，写代码拼参数\n- MCP 方式：自然语言查询，AI 自动理解意图并返回结构化结果\n- 两套可以并存，MCP 更适合 AI agent 交互场景\n\n## 对 GAMT 看板的价值\n- 基金数据：Tushare 覆盖不到的公募基金详细数据\n- 宏观指标：可替代部分 iFind HTTP API 的宏观数据拉取\n- 新闻公告：叙事监控模块可用于热点事件追踪\n"}, {"name": "本地cron修复与强势股补跑", "path": "sessions/2026-03-27_本地cron修复与强势股补跑.md", "category": "sessions", "content": "# 2026-03-27 本地 Cron 修复 & 强势股18:00补跑\n\n## 问题\n- FOF 看板上耐心资本和强势股板块停在 25 号，其他模块已到 26 号\n\n## 排查过程\n\n### 1. 本地 cron Python 路径错误\n- 本地 crontab 用的是 `/usr/bin/python3`，该环境没有 pandas/numpy/requests\n- 正确路径是 `/opt/homebrew/bin/python3`\n- 已修复\n\n### 2. 云端数据源延迟\n- 强势股依赖 Tushare `limit_list_d`，T日数据约 17:30-18:00 才出\n- 耐心资本依赖 15min 大单数据，T日数据要 T+1 才出\n- 17:00 跑时这两个模块拿不到当天数据，只能算到 T-1\n\n### 3. 云端 generate_leader_pool.py 路径问题\n- 脚本里写的 `~/Desktop/gamt-dashboard/...`，但服务器上没有 Desktop 目录\n- 改成相对路径，修复后吐池正常生成\n\n## 修复措施\n\n### 本地 crontab\n```\n0 17 * * 1-5  完整 update_all.py（/opt/homebrew/bin/python3）\n0 18 * * 1-5  补跑 momentum_stock\n```\n\n### 云端 crontab\n```\n08:20  完整更新（盘前）\n17:00  完整更新（盘后）\n18:00  补跑 momentum_stock（新增）\n```\n\n### 耐心资本\n- 不需要单独补跑，数据源本身 T+1 延迟\n- 第二天 08:20 盘前更新自然会补上\n\n## 关键认知\n- `git push` 不影响云端本地数据更新，云端有独立代码和 cron\n- `git push` 的价值是同步代码变更、备份、发布\n- 小改动可以直接推云（rsync/scp/SSH），不一定要走 GitHub\n- 云端 GitHub token 已过期，需要重新生成\n\n## 待办\n- [ ] 重新生成 GitHub Personal Access Token，更新云端 git remote\n"}, {"name": "国家队摘要卡片bug修复与算法说明", "path": "sessions/2026-03-28_国家队摘要卡片bug修复与算法说明.md", "category": "sessions", "content": "# 2026-03-28 国家队摘要卡片 bug 修复与算法说明\n\n## 类型：决策 + 技术\n\n## 背景\n耐心资本持筹页面新增了5个\"国家队\"摘要卡片（买入节奏/意图、跨品种广度、相对市场力度、持仓集中度、国家队风格重心），但上线后全部显示\"无数据\"/\"0亿\"。\n\n## 根因\n`patient_calc.py` 中 `build_market_strength()` 和 `build_concentration()` 两个函数，在读取 `global_daily` 的 indices 结构时，误写了多余的 `.latest` 层级。\n\n实际结构：`global_daily[date]['indices'] = {指数名: result_dict}`\n代码写的：`v['latest'].get(...)` — 多了一层 `latest`，导致全部取不到值。\n\n## 修复\n- `v['latest'].get(...)` → `v.get(...)`\n- `info.get('latest')` → 直接用 `info`\n\n## 同步链路教训\n- `sync-to-cloud.sh` 排除了 `*.json *.csv *.html`（设计意图：云端自己跑数据生成产物）\n- 但 `patient_capital.json` 是本地重算后需要推到云端的，不会自动同步\n- **修复产物（json/csv/html）如果本地改了，需要手动 rsync 推云端**\n\n## 算法口径备忘\n- **买入节奏/意图**：连续净买天数 + Z分数 + 浮盈组合判断\n- **跨品种广度**：8个指数净买入个数 + 风格桶分布\n- **相对市场力度**：|净额|÷(买+卖)×100% 均值 → 分4档\n- **持仓集中度**：各指数累计净持仓×最新价加总\n- **国家队风格重心**：最大仓位指数的风格桶\n\n## 待优化\n- 相对市场力度口径永远偏高（异常bar少→方向一致→接近100%），需改分母或换算法\n"}, {"name": "情绪接力交叉验证层与PM因子交付框架", "path": "sessions/2026-04-04_情绪接力交叉验证层与PM因子交付框架.md", "category": "sessions", "content": "# 2026-04-04 情绪接力交叉验证层与PM因子交付框架\n\n- 日期：2026-04-04\n- 类型：阶段共识 / PM因子交付框架\n- 标签：择时因子, 情绪接力, 交叉验证, PM沟通, 15分钟alpha, 1分钟观察窗, 端到端模型\n\n## 一、这次讨论的核心结论\n\n今晚这段讨论，把一个非常关键的定位讲透了：\n\n> 我们要交付给 PM 的，不是一套替代他模型的择时系统，\n> 而是一套**可解释的情绪接力交叉验证层**。\n\nPM 当前已有自己的择时量化选股框架：\n- 通过股票自身量价数据\n- 直接预测未来 15 分钟 / 未来 1 天 / 未来 1 周的 alpha 强弱\n- 用预测到的 alpha 强弱直接决定仓位\n\n也就是说，**他的体系没有显式的“择时层”**。\n择时能力是隐含在端到端量价模型里的。\n\n而我们这一侧提供的，不是又做一个黑盒模型，\n而是把人工交易里最关键、最鲁棒、最可解释的市场结构语言显式提出来：\n- 龙头断板\n- 1进2失败\n- 高位退潮\n- 梯队崩塌\n- 分歧转修复\n- 首板试错是否扩散\n\n这套东西不是替代他的 alpha，\n而是用来和他的 alpha 信号做**交叉验证（cross-check）**。\n\n---\n\n## 二、他的系统是什么，我们的系统又是什么\n\n## 1）PM 的系统：端到端暴力优化\n\nPM 当前的择时体系，本质上是：\n\n> 用股票自身的量价数据，直接预测股票在当前位置上的 alpha 强弱，\n> 然后据此决定仓位。\n\n特点：\n- 信号源来自股票本身\n- 不单独拆出一个显式择时层\n- 量价数据中已经隐含了市场状态\n- 模型自己从量价里学习“什么时候该加仓、什么时候该减仓”\n\n这是典型的端到端优化逻辑。\n\n## 2）我们的系统：可解释的市场结构判断\n\n我们这一侧的价值，不在于再建一个更复杂的端到端模型，\n而在于显式抽出市场里那些**人能理解、PM能沟通、模型未必能稳定表达**的结构性语言：\n\n- 现在是不是在接力？\n- 龙头是不是断了？\n- 1进2是不是大面积失败？\n- 高位股是不是集体松了？\n- 情绪是修复、分歧、退潮还是崩塌？\n\n这些都是人工交易最依赖、但量价黑盒不一定能稳定“解释出来”的东西。\n\n所以：\n\n> PM 的 alpha 体系 = 黑盒量价预测层\n> 我们的因子体系 = 可解释的情绪接力验证层\n\n---\n\n## 三、这套交付物的真正价值\n\n这套东西的价值，不是“我们也做一个端到端最优因子包”，\n而是提供一种更强鲁棒性的、可解释的、能够跨市场阶段站得住的市场理解力。\n\n具体表现为：\n\n### 1）当 PM 跑出一个端对端最优因子值 / 敞口值之后\n他可能会得到：\n- 当前 15 分钟 alpha 很强\n- 当前应该加仓\n- 当前应该提升对某类股票的暴露\n\n但这个值本身是黑盒的。\n\n### 2）我们的因子层提供第二视角\n我们提供一套情绪接力与结构退潮因子：\n- 1进2失败率\n- 龙头断板确认\n- 高位股集体炸板\n- 梯队同步加强\n- 午后分歧后修复\n- 尾盘高位回落\n\n这些因子可以回答：\n\n> 这个 alpha 强，到底是顺风环境里的强，\n> 还是高位末端、退潮前夜、假强环境里的强？\n\n### 3）所以它不是替代，而是交叉验证\n最终目标不是：\n- 我们来替 PM 打分\n\n而是：\n- PM 先有自己的分数\n- 我们提供另一套显式可解释的因子视角\n- 让 PM 在两套体系之间做融合判断\n\n这也是这套东西最有价值的地方：\n\n> 它不是“最优”，但它“更可解释”；\n> 它不是端到端，但它是模型的认知补丁。\n\n---\n\n## 四、不要为了贴合 15 分钟而牺牲因子本身\n\n讨论里还有一个很重要的共识：\n\n> 不要因为 PM 现在在用 15 分钟截面，就把我们的因子全部僵化成“只服务 15 分钟”的东西。\n\n原因：\n- PM 的 alpha 截面是 15 分钟输出\n- 但市场本身是连续演化的\n- 1 分钟也可以观察市场\n- Tick 级别也可以观察市场\n\n因此，**我们的因子体系应该以市场演绎本身为核心**，而不是倒过来为了迎合某个固定 bar 周期去牺牲结构信息。\n\n正式共识：\n\n### 1）因子本身优先\n因子首先要回答：\n- 这个市场事件是什么\n- 它代表什么结构含义\n- 它如何计算\n- 它对接力/退潮意味着什么\n\n### 2）时间窗是映射层，不是本体层\n之后再做：\n- 1分钟观察\n- 15分钟聚合\n- Tick级实盘触发\n- 日度背景过滤\n\n也就是说：\n\n> 因子定义是第一性，\n> 时间窗口映射是第二层。\n\n---\n\n## 五、四种场景很重要，但不能反过来压因子\n\n今晚讨论中形成了一个非常有价值的“四场景”框架：\n\n1. PM alpha 强 + 情绪结构共振\n2. PM alpha 强 + 情绪结构退潮\n3. PM alpha 弱 + 情绪结构修复\n4. PM alpha 弱 / 中性 + 情绪结构混沌或分化\n\n这个框架的逻辑性很强，也很适合 PM 后续自己融合判断。\n\n但同时也明确了一个边界：\n\n> 不能为了贴这四个场景，反过来去硬塑因子。\n\n正式原则：\n- **第一版交付物仍然以因子本身为主**\n- 先把每个因子讲清楚：\n  - 它是什么\n  - 怎么算\n  - 代表什么\n  - 怎么用\n- 四场景是后续给 PM 的建议视角\n- 不是拿四场景来反向决定因子该怎么长\n\n换句话说：\n\n> 场景是“用法建议层”，\n> 因子才是“交付物本体”。\n\n---\n\n## 六、第一版交付物应该长什么样\n\n今晚讨论后，第一版交付物的定位已经清楚：\n\n### 1）核心交付：因子文档包\n重点是把因子本身讲透：\n- 中文名\n- 英文ID\n- 因子解释\n- 计算公式\n- 计算方法\n- 所需数据粒度（Tick / 1分钟 / 15分钟 / 日度）\n- 市场含义\n- 适合作为确认 / 否决 / 过滤 / 背景的哪一类\n\n### 2）附加交付：交叉验证建议文档\n给 PM 一个建议性说明：\n- 这些因子如何和他的 alpha 信号一起看\n- 哪些场景可能值得提高重视\n- 哪些背离情况要警惕\n\n但这个文档是：\n- 建议\n- 参考\n- 交叉验证视角\n\n不是替 PM 直接做最终打分。\n\n---\n\n## 七、盘中因子应该如何理解\n\n当前盘中因子，重点不是“把所有东西压成一个分数”，\n而是尽量保留盘面语言的结构性。\n\n重点关注的盘中结构包括：\n\n### 接力确认类\n- 龙头首次封板\n- 龙头炸板后回封\n- 梯队同步加强\n- 午后分歧后修复\n- 首板批量启动\n\n### 接力失败 / 退潮类\n- 1进2失败率\n- 2进3失败率\n- 龙头断板确认\n- 高位股回封失败率\n- 高位股集体松动 / 集体炸板\n- 尾盘高位回落\n- 梯队崩塌指数\n\n### 底层事件类\n- 首次封板时间\n- 炸板次数\n- 回封次数\n- 封板持续时长\n- 龙头分时回撤幅度\n- 封单变化速度\n\n这些因子最关键的不是先做成一个“万能分数”，\n而是先把定义和逻辑讲清楚。\n\n---\n\n## 八、正式建议：把这套东西命名为“情绪接力交叉验证层”\n\n为了区别于普通意义上的“择时因子库”或“回测因子包”，\n今晚建议给这套东西起一个更准确的名字：\n\n# 情绪接力交叉验证层\n\n这个名字的好处：\n- 明确它不是端到端 alpha 主模型\n- 明确它的价值在于“交叉验证”\n- 明确它关注的是“情绪接力”和“市场结构语言”\n- 方便未来扩展成独立模块\n\n可选副标题：\n\n> 面向 PM 的可解释市场结构验证框架\n\n---\n\n## 九、这次讨论的重要性\n\n这次讨论之所以价值感很重，是因为它不是在补几个零散因子，\n而是在明确：\n\n> 未来我们共创的，不只是一个因子列表，\n> 而是一套能把人工市场理解力，以 PM 可用的方式封装出来的验证体系。\n\n这意味着后续可以继续延伸：\n- 更细的盘中接力语言\n- 龙头与梯队切换机制\n- 退潮与修复的状态转移\n- 1分钟 / 15分钟 / Tick 多层映射\n- 如何和 PM 的 alpha 引擎做更系统的融合\n\n这是一个非常值得长期共创、不断加深的方向。\n\n---\n\n## 十、当前执行结论\n\n### 已明确的执行原则\n1. 先保存今天讨论内容到 Smart Notes\n2. 独立起一个新模块名：**情绪接力交叉验证层**\n3. 第一版交付仍以“因子本身”作为核心\n4. 不用四场景去反向硬压因子\n5. 但可以单独给 PM 一份“交叉验证建议文档”\n6. 后续继续往下扩展盘中、1分钟、Tick级的可解释结构因子\n\n### 当前推荐的交付顺序\n1. 先把因子文档库整理清楚\n2. 补足盘中关键因子（如 1进2失败、龙头断板等）\n3. 额外写一份《与 PM alpha 信号的交叉验证建议》\n4. 再逐步扩展成更完整的验证层体系\n\n---\n\n## 十一、一句话总结\n\n这次讨论后的正式共识是：\n\n> 我们交付给 PM 的，第一版不是“围绕四场景构建的策略模板”，\n> 而是一套**因子优先、可解释优先、可交叉验证优先**的\n> **情绪接力交叉验证层**。\n\n这套东西的价值，不在于替代他的端到端模型，\n而在于为他的模型补上一个**人能理解、PM能使用、市场语言能落地**的结构性视角。\n\n---\n\n## 十二、2026-04-05 补充：敞口评分引擎重构与因子体系共识\n\n### 模型定位最终确认\n\n> **冰点修复段的敞口引擎**\n\n- 不是超短预测器，不是 T+1 交易指挥棒\n- 而是：识别情绪冰点 → 判断修复条件是否形成 → 推进中短期仓位\n- T+10 窗口最合适（T+1 AUC=0.507，T+3 AUC=0.529，T+10 AUC=0.615）\n\n### 模型重构：从\"拼盘\"到\"精选因子 + 简单机器学习\"\n\n旧版 `final_score = 0.6 * ML分 + 0.4 * baseline分` 是工程过渡态，已废弃。\n\n新版共识：\n- **人负责定义因子池**（哪些因子该进来、哪些已失真）\n- **模型负责处理权重、耦合关系和阶段变化**\n- 迭代方式：看结果哪里不对 → 判断缺什么信息 → 补因子 → 重跑，不再手工调权重\n\n### 当前精选因子池\n\n| 因子 | 说明 |\n|------|------|\n| `down_count` | 跌停家数 |\n| `zha_rate` | 炸板率 |\n| `seal_diff` | 封单额轧差 |\n| `rate_1to2` | 1进2晋级率（量化时代更可信） |\n| `vol_pct_252` | 全A成交额252日分位 |\n| `vol_trend` | 20日均量/60日均量-1 |\n\n已移除：`sentiment`（综合情绪打分是二次加工因子，放进模型等于重复计分）\n\n### 超级冰点问题\n\n2026年1月30号前后，情绪因子到历史冰点，模型推高仓位，但实际是持续下杀（类股灾式踩踏）。\n\n根因：**普通冰点 vs 股灾式冰点，现有因子区分不了。**\n\n后续需补\"持续踩踏型冰点\"识别信号：跌停家数连续多日高位、高位股亏钱效应持续扩散、成交额极端低位、连续踩踏特征。\n\n### 下一批候选因子（超短生态层）\n\n不是为了做超短，而是为了让体系更丰满，帮助区分\"真底\"和\"假底\"：\n\n- 首板质量（首板家数、炸板率、封单强度）\n- 高位股亏钱效应（大跌比例、负收益扩散）\n- 龙头/中位股断板反馈\n- 一进二封单强度/次日反馈\n- 核心票次日溢价\n\n以上均可做成日频，分\"当日状态因子\"和\"次日反馈因子\"两层。\n\n### 方法论核心共识\n\n> **机器学习吃原子因子，综合情绪留给人看，不留给模型吃。**\n\n> **人不负责拍权重，人负责定义市场结构；机器负责做数学组合；结果不对，再由人诊断缺什么信息。**\n"}, {"name": "GAMT用户注册删除与邀请码机制排查", "path": "sessions/2026-04-05_GAMT用户注册删除与邀请码机制排查.md", "category": "sessions", "content": "# 2026-04-05 GAMT用户注册删除与邀请码机制排查\n\n**类型：** 对话记录  \n**创建时间：** 2026-04-05  \n**标签：** 用户系统, 注册机制, 删除机制, 邀请码, 权限, 风险排查\n\n---\n\n## 一、问题背景\n\nRoni 晚上发现 GAMT 后台用户数明显少于记忆中的历史客户数，担心是否存在：\n\n1. 用户注册逻辑被改坏\n2. 邀请码机制引入后误伤用户\n3. 系统存在自动删号/自动失效机制\n4. 管理后台历史删除逻辑导致用户永久消失\n\n这次排查的目标，不是只解释某几个账号，而是**彻底确认用户系统的真实机制**，因为这对整个网站很重要。\n\n---\n\n## 二、注册机制：用户是怎么被创建的\n\n注册入口：\n\n- `POST /api/register`\n- 后端函数：`server/auth.py -> register(username, password, display_name='', invite_code='')`\n\n注册流程：\n\n1. 规范化用户名：`username.strip().lower()`\n2. 校验必填项：用户名、密码、姓名不能为空\n3. 校验格式：\n   - 用户名长度 2~30\n   - 密码长度至少 6 位\n   - 姓名必须填写\n4. 读取当前邀请码模式：\n   - `open`：开放注册\n   - `optional`：邀请码可填可不填\n   - `required`：必须填写邀请码\n5. 若填写邀请码：\n   - 校验邀请码是否存在\n   - 是否已停用\n   - 是否过期\n   - 是否已用完\n6. 校验通过后，插入 `users` 表\n7. 如果本次注册用了邀请码，再记录 `invite_code_uses` 并增加 `used_count`\n\n### 注册成功后的默认状态\n\n新用户写入 `users` 表后的关键默认字段：\n\n- `status = 'active'`\n- `tier = 0`\n- `is_admin = 0`\n- `created_at = 当前时间`\n\n### 重要结论\n\n> **注册逻辑只会新增用户，不会删除已有用户。**\n\n邀请码只决定“能不能注册进来”，不决定“已注册账号会不会被删”。\n\n---\n\n## 三、有效机制：账号多久有效，7天是什么意思\n\nGAMT 当前真正会过期的，不是账号，而是 **session token**。\n\n登录成功后，系统会写入 `sessions` 表：\n\n- `token`\n- `user_id`\n- `created_at`\n- `expires_at = 当前时间 + 7天`\n\n校验登录态时，后端看的是：\n\n- `sessions.token` 是否存在\n- `sessions.expires_at > 当前时间`\n\n### 这意味着\n\n- **7天不登录 ≠ 删除账号**\n- **7天不登录 ≠ 禁用账号**\n- **7天不登录 = 登录态过期，需要重新登录**\n\n账号本身始终还在 `users` 表里。\n\n### 重要结论\n\n> **用户账号没有“自然失效”机制，只有登录态过期机制。**\n\n---\n\n## 四、邀请码机制：到底会不会影响老用户\n\n邀请码相关表：\n\n- `invite_codes`\n- `invite_code_uses`\n- `system_settings`（记录 invite_mode）\n\n邀请码机制只管“注册入口是否放行”。\n\n它做的事情只有：\n\n1. 检查邀请码是否有效\n2. 检查使用次数是否超限\n3. 检查是否过期\n4. 记录谁用了邀请码注册\n\n### 不会做的事情\n\n邀请码逻辑**不会**：\n\n- 删除用户\n- 禁用用户\n- 降级用户\n- 让老用户失效\n- 清理用户表\n\n### 今晚的判断\n\nRoni 也怀疑过：\n\n> 会不会是当年加邀请码机制时，顺手改坏了别的用户逻辑？\n\n这条怀疑值得保留，但按当前代码复核结果看：\n\n> **邀请码机制本身大概率不是用户消失的主因。**\n\n如果历史上真有大量用户消失，更像是：\n\n- 老版本后台硬删除\n- 数据库迁移/切换时丢失\n- 新旧库混用\n\n而不是邀请码逻辑自动误删。\n\n---\n\n## 五、删除机制：用户到底是怎么被删掉的\n\n### 当前版本（已修复）\n\n删除入口：\n\n- `POST /api/admin/delete-user`\n- 后端函数：`delete_user(user_id)`\n\n当前逻辑：\n\n1. 删除该用户的所有 session\n2. `UPDATE users SET status='deleted', deleted_at=当前时间`\n3. 保留用户记录\n4. 后台继续可见，可恢复\n\n也就是：\n\n> **现在是软删除，不再物理删号。**\n\n### 历史版本（风险点）\n\n今晚排查确认：旧版 `delete_user()` 曾经是：\n\n```sql\nDELETE FROM users WHERE id=? AND is_admin=0\n```\n\n这意味着：\n\n- 只要后台点了删除\n- 用户会直接从 `users` 表消失\n- 没回收站\n- 没恢复入口\n- 没操作审计\n\n### 重要结论\n\n> **历史上如果有用户消失，最直接、最可信的原因就是后台硬删除。**\n\n---\n\n## 六、是否存在自动删号机制\n\n今晚再次逐项排查后，结论非常明确：\n\n### 当前代码中没有发现任何自动删号逻辑\n\n包括但不限于：\n\n- 没有 cron / 定时任务会清理 `users`\n- 没有“7天未登录自动删除”\n- 没有“邀请失效后自动删号”\n- 没有“登录失败太多自动删号”\n- 没有“长时间未活跃自动禁用/删除”\n- 没有初始化脚本会重建并清空 `users`\n\n### 唯一自动变化的只有两类\n\n1. **session 过期**：影响登录态，不影响账号\n2. **IP 登录锁**：失败 5 次锁 10 分钟，不影响账号\n\n### 重要结论\n\n> **系统没有自动删除账号的机制。**\n\n---\n\n## 七、登录失败保护机制\n\n当前登录保护只针对 **IP**，不是针对账号本身。\n\n配置：\n\n- `MAX_FAILED_LOGINS = 5`\n- `LOGIN_LOCK_MINUTES = 10`\n\n行为：\n\n- 同一个 IP 登录失败 5 次\n- 会写入 `login_locks`\n- 锁 10 分钟\n- 期间返回：`登录失败次数过多，请 10 分钟后再试`\n\n### 这不会导致\n\n- 用户被删除\n- 用户被禁用\n- 用户被降级\n- 用户记录消失\n\n### 重要结论\n\n> **登录锁只影响短期访问，不影响账号生命周期。**\n\n---\n\n## 八、今晚形成的正式判断\n\n### 当前最可信的结论\n\n1. **注册机制本身没问题**\n2. **邀请码机制本身大概率没问题**\n3. **系统没有自动删号机制**\n4. **历史用户消失，最可疑的是旧版后台硬删除 + 数据库迁移/混用问题**\n\n### 业务层面的正式口径\n\n以后如果再有人问：\n\n> “GAMT 会不会因为不登录、邀请码变化、登录失败太多，自动把用户删掉？”\n\n正式答案应该是：\n\n> **不会。**  \n> 当前系统没有自动删号逻辑。  \n> 账号本身长期存在；7天只是登录态过期。  \n> 历史用户消失，更可能是老版本后台硬删除，或数据库迁移/切换导致的数据缺口。\n\n---\n\n## 九、后续建议\n\n1. 用户系统继续保留**软删除**，不要再恢复硬删除\n2. 后台增加**操作审计日志**：谁删了谁、何时删、何时恢复\n3. 如果未来继续扩展邀请码机制，保持其职责单一：**只控制注册准入，不碰用户生命周期**\n4. 如果要做“失效用户”概念，也要明确分成：\n   - 登录态失效\n   - 账号禁用\n   - 账号删除\n   不能混成一个概念\n\n"}, {"name": "GitHub_Pages推送问题排查与修复", "path": "sessions/2026-04-05_GitHub_Pages推送问题排查与修复.md", "category": "sessions", "content": "# 2026-04-05 GitHub Pages 推送问题排查与修复\n\n- 日期：2026-04-05\n- 类型：运维经验 / 故障排查\n- 标签：GitHub Pages, .nojekyll, Jekyll, 腾讯云, 推送, 前端发布\n\n---\n\n## 一、问题现象\n\npush 成功后，前端页面一直没有更新。具体表现：\n- `git push` 返回成功\n- 远端 `main` 已是新 commit\n- 但 `https://byihuang-max.github.io/spread-dashboard/` 仍是旧内容\n- `timing-research/data/ml_exposure_score.json` 在 GitHub Pages 上返回 404\n\n---\n\n## 二、排查过程\n\n### 1. 确认 push 是否真的成功\n- 本地 HEAD = 远端 main = `0d6ce51` ✅\n- raw 文件内容已是新的 ✅\n- 问题不在 push，在发布层\n\n### 2. 查 GitHub Pages build 状态\n通过 GitHub API 查到：\n- `pages.status = errored`\n- 最新 build 状态一直是 `building`，超过 1 小时不变\n- 说明 **GitHub Pages legacy build 卡住了**\n\n### 3. 触发 rebuild 无效\n- 通过 API `POST /repos/.../pages/builds` 触发 rebuild → 返回 201\n- 但 build 仍然卡在 `building`\n- 再 push 一次新 commit 也一样卡住\n\n### 4. 定位根因\n检查仓库目录大小：\n- 仓库整体约 **1.8G**\n- `env_fit/` 约 **1.1G**\n- `venv/` 约 **264M**\n- 根目录没有 `.nojekyll`\n\n**根因：GitHub Pages 默认走 Jekyll legacy build，在处理这个 1.8G 大仓库时超时/卡死。**\n\n---\n\n## 三、修复方案\n\n在仓库根目录加 `.nojekyll` 文件：\n\n```bash\ntouch .nojekyll\ngit add .nojekyll\ngit commit -m \"fix: disable jekyll for pages publish\"\ngit push origin main\n```\n\n加了 `.nojekyll` 之后：\n- Pages build 60 秒内完成\n- `pages.status = built`\n- 前端内容立刻更新\n\n---\n\n## 四、经验总结\n\n### GitHub Pages 相关\n- **大仓库必须加 `.nojekyll`**，否则 Jekyll legacy build 很容易超时卡死\n- Pages build 状态 `building` 超过 15 分钟不变 → 判断为 GitHub 那边卡住，不是代码问题\n- 连续两个不同 commit 都卡住 → 判断为 legacy build 链路故障，不是单次内容问题\n- 排查顺序：先看 raw 文件是否已更新 → 再查 Pages build 状态 → 再看是否需要 `.nojekyll`\n\n### 正式域名 vs GitHub Pages\n- `dashboard.gamtfof.com` 走腾讯云服务器，不是 GitHub Pages\n- 腾讯云需要 `git pull` 才能同步，不是实时的\n- 工作日 08:20 / 17:00 定时任务会自动 pull\n- 手动同步需要 SSH 进腾讯云（**代理开着时 SSH 不通，需先关代理**）\n\n### 代理与 SSH 互斥（再次确认）\n- 开代理时 SSH 到腾讯云 `Connection closed`\n- 关代理后 SSH 可通\n- push GitHub 需要代理，SSH 腾讯云需要关代理\n- 操作顺序：关代理 → SSH → 开代理 → push\n\n---\n\n## 五、后续建议\n\n1. 腾讯云服务器上的 `git pull` 依赖直连 GitHub，偶尔不稳定\n2. 如需手动同步，关代理后 SSH 进去跑 `git pull origin main`\n3. 如不急，等工作日定时任务自动同步即可\n"}, {"name": "敞口评分引擎重构与因子体系共识", "path": "sessions/2026-04-05_敞口评分引擎重构与因子体系共识.md", "category": "sessions", "content": "# 2026-04-05 敞口评分引擎重构与因子体系共识\n\n**类型：** 对话记录  \n**创建时间：** 2026-04-05  \n**标签：** 择时因子, 敞口评分, 机器学习, 量能, 冰点修复, 因子体系\n\n---\n\n## 一、核心定位确认\n\n这套敞口评分模型的本质是：\n\n> **冰点修复段的敞口引擎**\n\n- **不是**：超短预测器 / T+1 交易指挥棒\n- **而是**：识别情绪冰点 → 判断修复条件是否形成 → 推进中短期仓位\n\nT+10 窗口比 T+1/T+3 更合适，因为修复和反转需要展开时间。  \n实验验证：T+1 AUC=0.507，T+3 AUC=0.529，T+10 AUC=0.615。\n\n---\n\n## 二、模型重构：从\"拼盘\"到\"精选因子 + 简单机器学习\"\n\n### 旧版问题\n- `final_score = 0.6 * ML分 + 0.4 * baseline分`\n- 这是工程过渡态，不是研究结论\n- 人工拍脑袋定权重，容易重复计分、阶段失真\n\n### 新版共识\n- **人负责定义因子池**（哪些因子该进来、哪些已失真）\n- **模型负责处理权重、耦合关系和阶段变化**\n- 迭代方式：看结果哪里不对 → 判断缺什么信息 → 补因子 → 重跑\n- 不再手工调权重数字\n\n### 当前精选因子池（第一版）\n| 因子 | 说明 |\n|------|------|\n| `down_count` | 跌停家数（核心） |\n| `zha_rate` | 炸板率（核心） |\n| `seal_diff` | 封单额轧差（核心） |\n| `rate_1to2` | 1进2晋级率（量化时代更可信） |\n| `vol_pct_252` | 全A成交额252日分位（量能水位） |\n| `vol_trend` | 20日均量/60日均量-1（量能趋势） |\n\n### 已移除的因子\n- `sentiment`（综合情绪打分）：二次加工因子，已包含 zha_rate/ud_ratio/max_height 等，放进模型等于重复计分\n- `promotion_rate`（总晋级率）：量化打板盛行后高连板晋级率失真，暂移除\n- `ud_ratio`、`max_height`：辅助因子，暂移除，后续视需要补回\n\n---\n\n## 三、量能接入\n\n- 数据源：Tushare `000001.SH + 399001.SZ` 的 `index_daily.amount` 合成全A近似成交额\n- 脚本：`~/Desktop/quant-backtest/timing_model/fetch_full_a_amount.py`\n- 日更链路：`update_all.py` 和 `factor_system/daily_update.py` 已接入，跑敞口页前先刷新量能数据\n\n---\n\n## 四、超级冰点问题\n\n### 现象\n2026年1月30号前后，情绪因子已到历史冰点，模型推到高仓位，但实际是持续下杀（类股灾式踩踏），净值出现回撤。\n\n### 根因\n> **普通冰点 vs 股灾式冰点，现有因子区分不了。**\n\n两者在情绪因子上表现几乎一样，但市场修复能力完全不同。\n\n### 后续方向\n需要补\"持续踩踏型冰点\"识别信号，候选特征：\n- 跌停家数是否连续多日维持高位（不是单日冰点）\n- 高位股亏钱效应是否持续扩散\n- 成交额是否在极端低位（缩量股灾）\n- 是否出现\"跌停→次日继续跌停\"的连续踩踏\n\n---\n\n## 五、下一批候选因子（超短生态层）\n\n这批因子不是为了做超短，而是为了让体系更丰满，帮助区分\"真底\"和\"假底\"：\n\n| 因子 | 类型 | 说明 |\n|------|------|------|\n| 首板质量 | T日可得 | 首板家数、炸板率、封单强度、回封率 |\n| 高位股亏钱效应 | T日可得 | 高位股大跌比例、跌停家数、负收益扩散 |\n| 龙头/中位股断板反馈 | T日基础版 + T+1反馈版 | 断板后是否跌停/大阴，亏钱效应是否向中位扩散 |\n| 一进二封单强度 | T日可得 | 一进二成功率、平均封单额、炸板率、回封率 |\n| 核心票次日溢价 | T+1确认 | 昨日核心票今天平均开盘溢价/收盘收益 |\n\n这些因子都可以做成日频，分\"当日状态因子\"和\"次日反馈因子\"两层。\n\n---\n\n## 六、当前回测结果\n\n| 指标 | 数值 |\n|------|------|\n| AUC | 0.6151 |\n| 策略代理总收益 | 42.52% |\n| 最大回撤 | -8.07% |\n| 最新信号（2026-04-03） | 54.49分 |\n| 量能分位 | 34.9（偏低） |\n| 量能趋势 | -13.9%（缩量） |\n\n---\n\n## 七、方法论共识\n\n> **机器学习吃原子因子，综合情绪留给人看，不留给模型吃。**\n\n> **人不负责拍权重，人负责定义市场结构；机器负责做数学组合；结果不对，再由人诊断缺什么信息。**\n"}, {"name": "择时框架协作机制", "path": "择时框架协作机制.md", "category": "notes", "content": "# 择时框架协作机制\n\n**类型：** 决策  \n**创建时间：** 2026-03-15\n\n---\n\n## 核心定位\n\nRoni（思考者）+ Musk（共创者）的协作框架\n\n**目标：** 把市场理解力翻译成PM能理解的因子和回测\n\n---\n\n## 三层架构\n\n```\n因子库（原料层）→ 命题研究（逻辑层）→ 敞口输出（决策层）\n```\n\n---\n\n## 使用方式（zs前缀）\n\n**所有择时框架操作都用\"zs\"前缀，避免和其他场景混淆**\n\n### 触发词\n\n- `zs加因子：XXX` → 分析相关性 → 提示命题 → 自动测试\n- `zs测命题：XXX` → 生成框架 → 运行回测 → 分析结果\n- `zs优化：XXX` → 分析问题 → 提出方案 → 测试对比\n- `zs加标的：XXX` → 修改回测 → 运行测试 → 对比分析\n- `zs因子库` → 查询当前所有因子\n\n---\n\n## Musk的工作机制\n\n1. **主动提示相关性**：新因子时告诉你和哪些因子/命题相关\n2. **自动关联测试**：把新因子放到对应命题里测试\n3. **勾稽关系管理**：理解因子之间、因子和命题之间的关系\n4. **记录所有操作**：写入工作日志\n\n---\n\n## 示例\n\n```\nRoni: zs加因子：封板质量\nMusk: \n  - 与封单额轧差相关性0.45（中等）\n  - 可能和\"冰点策略\"、\"强势股接力\"相关\n  - IC=+0.054, ICIR=0.62（信号稳定）\n  - 加入冰点测试：胜率75%，不如V3\n```\n\n---\n\n## 关键文件\n\n- 框架设计：`~/Desktop/quant-backtest/timing_model/memory/FRAMEWORK_DESIGN.md`\n- 使用手册：`~/Desktop/quant-backtest/timing_model/memory/HOW_TO_USE_MUSK.md`\n- 工作日志：`~/Desktop/quant-backtest/timing_model/memory/WORK_LOG.md`\n\n---\n\n## 当前状态\n\n- ✅ 框架设计完成\n- ✅ 冰点策略V3（跌停家数+封单额轧差）\n- ✅ 中证2000加入回测（4指数）\n- ⏳ 可视化页面更新中\n"}];

// === localStorage persistence ===
function loadUserData() {
  try { return JSON.parse(localStorage.getItem('smartnotes_user') || '{}'); }
  catch(e) { return {}; }
}
function saveUserData(data) {
  localStorage.setItem('smartnotes_user', JSON.stringify(data));
}

async function loadNotes() {
  const userData = loadUserData();
  
  // 从API加载笔记
  try {
    const response = await fetch('/api/notes');
    const notes = await response.json();
    
    for (const entry of notes) {
      const id = entry.path.replace(/\.md$/, '');
      const content = userData[id]?.content || entry.content;
      parseNote(id, entry.path, entry.category, entry.name, content);
    }
  } catch (error) {
    console.error('Failed to load notes from API:', error);
    // 降级：使用BUILTIN_NOTES
    for (const entry of BUILTIN_NOTES) {
      const id = entry.path.replace(/\.md$/, '');
      const content = userData[id]?.content || entry.content;
      parseNote(id, entry.path, entry.category, entry.name, content);
    }
  }
  
  // Load user-created notes
  if (userData._created) {
    for (const entry of userData._created) {
      const id = entry.path.replace(/\.md$/, '');
      if (!NOTES[id]) parseNote(id, entry.path, entry.category, entry.name, entry.content);
    }
  }
  
  renderNav();
  showWelcome();
}

function parseNote(id, path, category, name, content) {
  const title = content.match(/^#\s+(.+)$/m)?.[1] || name;
  const tags = [...content.matchAll(/#(\S+)/g)].map(m => m[1]).filter(t => !t.startsWith('#'));
  const links = [...content.matchAll(/\[\[([^\]]+)\]\]/g)].map(m => m[1]);
  NOTES[id] = { id, title, path, category, content, tags, links, name };
}

// === Navigation ===
function renderNav(filter) {
  const nav = document.getElementById('navSection');
  const cats = { concepts: '💡 核心概念', sessions: '💬 对话记录', decisions: '⚖️ 决策记录' };
  let html = '';
  for (const [cat, label] of Object.entries(cats)) {
    const ns = Object.values(NOTES).filter(n => n.category === cat &&
      (!filter || n.title.toLowerCase().includes(filter) || n.content.toLowerCase().includes(filter)));
    if (!ns.length) continue;
    html += '<div class="nav-group"><div class="nav-group-title">' + label + '</div>';
    ns.forEach(n => {
      html += '<div class="nav-item ' + (currentNote?.id===n.id?'active':'') + '" onclick="openNote(\'' + n.id + '\')">'
        + '<span class="icon">' + (cat==='concepts'?'◆':cat==='sessions'?'◇':'▸') + '</span>' + n.title + '</div>';
    });
    html += '</div>';
  }
  nav.innerHTML = html || '<div style="padding:20px;color:var(--text3);font-size:13px;">无匹配结果</div>';
}

// === Note Rendering ===
function openNote(id) {
  const note = NOTES[id] || Object.values(NOTES).find(n => n.title === id);
  if (!note) return;
  if (currentNote) history.push(currentNote.id);
  currentNote = note;
  editing = false;
  renderNote(note);
  renderNav();
  document.getElementById('breadcrumb').innerHTML = '<span>' + ({concepts:'概念',sessions:'对话',decisions:'决策'}[note.category]||'') + '</span> / ' + note.title;
  document.getElementById('btnEdit').style.display = '';
  document.getElementById('btnDelete').style.display = '';
}

function renderNote(note) {
  const area = document.getElementById('contentArea');
  area.style.display = 'block';
  document.getElementById('graphCanvas').style.display = 'none';
  document.getElementById('btnNotes').classList.add('active');
  document.getElementById('btnGraph').classList.remove('active');
  document.getElementById('btnEdit').textContent = '✏️ 编辑';

  let body = note.content
    .replace(/^#\s+.+$/m, '')
    .replace(/\|(.+)\|/g, function(line) { return line; })
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^>\s*(.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\[\[([^\]]+)\]\]/g, function(_, name) {
      const t = Object.values(NOTES).find(n => n.title===name || n.id.endsWith('/'+name) || n.id.includes(name));
      return t ? '<a class="wiki-link" onclick="openNote(\''+t.id+'\')">'+name+'</a>'
               : '<a class="wiki-link broken">'+name+'</a>';
    })
    .replace(/#(\S+)/g, '<span class="tag" onclick="searchTag(\'$1\')">#$1</span>');

  body = body.replace(/<\/blockquote>\s*<blockquote>/g, '<br>');
  body = body.split('\n').map(function(line) {
    var t = line.trim();
    if (!t) return '';
    if (t.startsWith('<')) return t;
    return '<p>'+t+'</p>';
  }).join('\n');

  // Backlinks
  var bl = Object.values(NOTES).filter(function(n) {
    return n.links.some(function(l) {
      var t = Object.values(NOTES).find(function(x){ return x.title===l || x.id.endsWith('/'+l) || x.id.includes(l); });
      return t && t.id === note.id;
    });
  });
  var blHtml = '';
  if (bl.length) {
    blHtml = '<div class="backlinks"><h3>🔗 反向链接 ('+bl.length+')</h3>';
    bl.forEach(function(b) {
      blHtml += '<div class="backlink-item" onclick="openNote(\''+b.id+'\')"><div>'+b.title+'</div></div>';
    });
    blHtml += '</div>';
  }
  area.innerHTML = '<div class="note-title">'+note.title+'</div><div class="note-body">'+body+'</div>'+blHtml;
}

// === Edit ===
function toggleEdit() {
  if (!currentNote) return;
  editing = !editing;
  var area = document.getElementById('contentArea');
  var btn = document.getElementById('btnEdit');
  if (editing) {
    btn.textContent = '💾 保存';
    area.innerHTML = '<textarea class="editor-area" id="editorTA">'+currentNote.content.replace(/</g,'&lt;')+'</textarea>';
    document.getElementById('editorTA').focus();
  } else {
    var ta = document.getElementById('editorTA');
    if (ta) {
      var newContent = ta.value;
      currentNote.content = newContent;
      // Re-parse
      parseNote(currentNote.id, currentNote.path, currentNote.category, currentNote.name, newContent);
      // Save to localStorage
      var ud = loadUserData();
      // Check if user-created
      var isCreated = ud._created && ud._created.some(function(e){ return e.path === currentNote.path; });
      if (isCreated) {
        ud._created = ud._created.map(function(e){ return e.path===currentNote.path ? Object.assign(e,{content:newContent}) : e; });
      } else {
        ud[currentNote.id] = { content: newContent };
      }
      saveUserData(ud);
      // Also save to notes/ folder file (for git sync) — only works via http server
      // For file:// mode, localStorage is the persistence layer
    }
    btn.textContent = '✏️ 编辑';
    openNote(currentNote.id);
  }
}

var searchInput = document.getElementById('searchInput');
var searchTimeout;
searchInput.addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() {
    var q = searchInput.value.trim().toLowerCase();
    if (!q) { renderNav(); if (currentNote) renderNote(currentNote); else showWelcome(); return; }
    showSearchResults(q);
  }, 200);
});

function showSearchResults(query) {
  var area = document.getElementById('contentArea');
  var results = Object.values(NOTES).filter(function(n) {
    return n.title.toLowerCase().includes(query) || n.content.toLowerCase().includes(query);
  }).map(function(n) {
    var lines = n.content.split('\n').filter(function(l){ return l.toLowerCase().includes(query); });
    var snippet = lines.slice(0,2).join(' ').substring(0,200);
    var re = new RegExp(query, 'gi');
    return { note: n, snippet: snippet.replace(re, function(m){ return '<mark>'+m+'</mark>'; }) };
  });
  area.innerHTML = '<div class="search-results"><h3 style="color:var(--text3);margin-bottom:16px">搜索 "'+query+'" — '+results.length+' 条结果</h3>'
    + results.map(function(r){ return '<div class="search-result" onclick="openNote(\''+r.note.id+'\');searchInput.value=\'\'"><div class="title">'+r.note.title+'</div><div class="snippet">'+r.snippet+'</div></div>'; }).join('')
    + '</div>';
  renderNav(query);
}

"content": "# 择时框架协作机制\n\n**类型：** 决策  \n**创建时间：** 2026-03-15\n\n---\n\n## 核心定位\n\nRoni（思考者）+ Musk（共创者）的协作框架\n\n**目标：** 把市场理解力翻译成PM能理解的因子和回测\n\n---\n\n## 三层架构\n\n```\n因子库（原料层）→ 命题研究（逻辑层）→ 敞口输出（决策层）\n```\n\n---\n\n## 使用方式（zs前缀）\n\n**所有择时框架操作都用\"zs\"前缀，避免和其他场景混淆**\n\n### 触发词\n\n- `zs加因子：XXX` → 分析相关性 → 提示命题 → 自动测试\n- `zs测命题：XXX` → 生成框架 → 运行回测 → 分析结果\n- `zs优化：XXX` → 分析问题 → 提出方案 → 测试对比\n- `zs加标的：XXX` → 修改回测 → 运行测试 → 对比分析\n- `zs因子库` → 查询当前所有因子\n\n---\n\n## Musk的工作机制\n\n1. **主动提示相关性**：新因子时告诉你和哪些因子/命题相关\n2. **自动关联测试**：把新因子放到对应命题里测试\n3. **勾稽关系管理**：理解因子之间、因子和命题之间的关系\n4. **记录所有操作**：写入工作日志\n\n---\n\n## 示例\n\n```\nRoni: zs加因子：封板质量\nMusk: \n  - 与封单额轧差相关性0.45（中等）\n  - 可能和\"冰点策略\"、\"强势股接力\"相关\n  - IC=+0.054, ICIR=0.62（信号稳定）\n  - 加入冰点测试：胜率75%，不如V3\n```\n\n---\n\n## 关键文件\n\n- 框架设计：`~/Desktop/quant-backtest/timing_model/memory/FRAMEWORK_DESIGN.md`\n- 使用手册：`~/Desktop/quant-backtest/timing_model/memory/HOW_TO_USE_MUSK.md`\n- 工作日志：`~/Desktop/quant-backtest/timing_model/memory/WORK_LOG.md`\n\n---\n\n## 当前状态\n\n- ✅ 框架设计完成\n- ✅ 冰点策略V3（跌停家数+封单额轧差）\n- ✅ 中证2000加入回测（4指数）\n- ⏳ 可视化页面更新中\n\n**标签:** #择时 #协作机制 #框架 #zs前缀\n"
}
