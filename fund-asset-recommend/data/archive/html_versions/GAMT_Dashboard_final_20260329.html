<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMT核心资产看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #121a29;
            --bg-card: #1e293b;
            --bg-group: rgba(255, 255, 255, 0.02);
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent-primary: #2563eb;
            --accent-primary-light: #3b82f6;
            --accent-green: #059669;
            --accent-green-light: #10b981;
            --accent-red: #dc2626;
            --accent-red-light: #ef4444;
            --accent-gold: #d4af37;
            --accent-yellow: #f59e0b;
            --accent-purple: #7c3aed;
            --accent-cyan: #0891b2;
            --accent-orange: #ea580c;
            --menu-hover: rgba(37, 99, 235, 0.1);
            --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.5);
        }
        @media print {
            body {
                background: white;
            }
            .app-container {
                grid-template-columns: 1fr !important;
                padding: 0 !important;
            }
            .sidebar, .right-panel {
                display: none !important;
            }
            .export-btn {
                display: none !important;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .app-container {
            display: grid;
            grid-template-columns: 220px 1fr 260px;
            min-height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        @media (max-width: 1400px) {
            .app-container {
                grid-template-columns: 200px 1fr 240px;
            }
        }
        @media (max-width: 1200px) {
            .app-container {
                grid-template-columns: 200px 1fr;
                grid-template-areas: 
                    "sidebar main"
                    "sidebar right";
            }
        }
        .sidebar {
            grid-column: 1;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px 0;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .logo-area {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .logo-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-primary-light);
            letter-spacing: 0.5px;
        }
        .logo-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 400;
        }
        .menu-item {
            display: block;
            padding: 14px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            cursor: pointer;
        }
        .menu-item:hover {
            background: var(--menu-hover);
            color: var(--accent-primary-light);
        }
        .menu-item.active {
            background: var(--menu-hover);
            color: var(--accent-primary-light);
            border-left-color: var(--accent-primary-light);
        }
        .menu-item-icon {
            margin-right: 10px;
            opacity: 0.8;
        }
        .main-content {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .content-module {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .module-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .period-selector {
            display: inline-flex;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 4px;
        }
        .period-btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .period-btn.active {
            background: var(--accent-primary);
            color: white;
        }
        .filter-area {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            align-items: end;
        }
        @media (max-width: 900px) {
            .filter-row {
                grid-template-columns: 1fr;
            }
        }
        .filter-item {
            display: flex;
            flex-direction: column;
        }
        .filter-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }
        .radio-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .radio-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 18px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-primary-light);
        }
        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        .stat-change.up { color: var(--accent-green-light); }
        .stat-change.down { color: var(--accent-red-light); }
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .overview-charts-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .chart-container {
            position: relative;
            height: 200px;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        .product-table-container {
            overflow-x: auto;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .product-table th {
            background: var(--bg-card);
            text-align: left;
            padding: 14px 12px;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
            letter-spacing: 0.5px;
        }
        .product-table th:hover {
            background: rgba(255,255,255,0.05);
        }
        .product-table th:after {
            content: " ↕";
            opacity: 0.5;
        }
        .product-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .product-table tr:hover {
            background: var(--bg-group);
        }
        .strategy-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        .strategy-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .return-positive { color: var(--accent-green-light); font-weight: 600; }
        .return-negative { color: var(--accent-red-light); font-weight: 600; }
        .rank-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .rank-top { background: rgba(5, 150, 105, 0.15); color: var(--accent-green-light); border: 1px solid rgba(5, 150, 105, 0.3); }
        .rank-middle { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); border: 1px solid rgba(245, 158, 11, 0.3); }
        .rank-bottom { background: rgba(220, 38, 38, 0.15); color: var(--accent-red-light); border: 1px solid rgba(220, 38, 38, 0.3); }
        .detail-btn {
            padding: 6px 14px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .detail-btn:hover {
            background: var(--accent-primary-light);
        }
        .right-panel {
            grid-column: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        @media (max-width: 1200px) {
            .right-panel {
                grid-column: 2;
            }
        }
        .panel-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .panel-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 15px;
        }
        .announce-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .announce-item {
            padding: 12px;
            background: var(--bg-card);
            border-radius: 6px;
            border-left: 3px solid var(--accent-primary);
            transition: transform 0.2s;
        }
        .announce-item:hover {
            transform: translateX(2px);
        }
        .announce-date {
            font-size: 12px;
            color: var(--text-muted);
        }
        .announce-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .gauge-container {
            margin-bottom: 20px;
        }
        .gauge-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .gauge-level {
            font-weight: 600;
        }
        .gauge-bar {
            height: 10px;
            background: var(--bg-card);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
        }
        .gauge-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s;
        }
        .comment-box {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            min-height: 140px;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .export-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .export-btn:hover {
            background-color: var(--accent-green-light);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: var(--bg-secondary);
            margin: 5% auto;
