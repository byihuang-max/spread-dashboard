<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GAMT 管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f6f8;color:#2d3142;font-size:14px}
.container{max-width:1100px;margin:0 auto;padding:24px}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.subtitle{font-size:13px;color:#8b92a5;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #e8eaef}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8eaef;border-left:3px solid #2563eb}
.stat .label{font-size:11px;color:#8b92a5}.stat .value{font-size:24px;font-weight:700;color:#2d3142}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:#f8f9fb;color:#8b92a5;font-weight:600;font-size:11px;border-bottom:1px solid #e8eaef}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#fafbfc}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-green{background:#dcfce7;color:#16a34a}.tag-red{background:#fee2e2;color:#ef4444}.tag-blue{background:#dbeafe;color:#2563eb}.tag-gray{background:#f1f5f9;color:#64748b}
.btn{padding:5px 12px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:11px;cursor:pointer;transition:all .15s}
.btn:hover{background:#f8fafc}
.btn-danger{color:#ef4444;border-color:#fca5a5}.btn-danger:hover{background:#fee2e2}
.btn-back{margin-bottom:20px;display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:#2563eb;font-size:13px;font-weight:500}
.btn-back:hover{text-decoration:underline}
.empty{text-align:center;padding:40px;color:#94a3b8;font-size:13px}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #e8eaef}
.tab{padding:10px 20px;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
.tab-content{display:none}.tab-content.active{display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:28px;width:380px;max-width:90vw}
.modal h3{font-size:16px;margin-bottom:16px}
.modal input{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:12px}
.modal .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <a class="btn-back" href="index.html">← 返回看板</a>
  <h1>🛡️ GAMT 管理后台</h1>
  <p class="subtitle">用户管理 · 登录日志 · 系统概况</p>

  <div class="stats" id="statsRow"></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')">👤 用户列表</div>
    <div class="tab" onclick="switchTab('invites')">🎟️ 邀请码</div>
    <div class="tab" onclick="switchTab('logs')">📋 登录日志</div>
  </div>

  <div class="tab-content active" id="tab-users">
    <div class="card"><table><thead><tr>
      <th>ID</th><th>用户名</th><th>显示名</th><th>角色</th><th>等级</th><th>注册时间</th><th>最后登录</th><th>登录次数</th><th>状态</th><th>操作</th>
    </tr></thead><tbody id="usersBody"></tbody></table></div>
  </div>

  <div class="tab-content" id="tab-invites">
    <div class="card">
      <h2>🎟️ 邀请码系统</h2>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        <label style="font-size:12px;color:#64748b">注册模式</label>
        <select id="inviteMode" onchange="saveInviteMode()" style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff">
          <option value="open">open：完全开放注册</option>
          <option value="optional">optional：开放注册，但支持邀请码</option>
          <option value="required">required：必须邀请码注册</option>
        </select>
        <span style="font-size:12px;color:#94a3b8">你现在可以先保持 open，后面随时切到 required。</span>
      </div>
      <div style="display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:18px;padding:14px;border:1px dashed #dbe2ea;border-radius:10px;background:#fafbfc">
        <div>
          <div style="font-size:12px;color:#64748b;margin-bottom:6px">备注</div>
          <input id="inviteNote" placeholder="比如：4月路演客户 / 老朋友渠道" style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:220px">
        </div>
        <div>
          <div style="font-size:12px;color:#64748b;margin-bottom:6px">可用次数</div>
          <input id="inviteMaxUses" type="number" min="1" value="1" style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:100px">
        </div>
        <div>
          <div style="font-size:12px;color:#64748b;margin-bottom:6px">过期时间（可空）</div>
          <input id="inviteExpiresAt" placeholder="2026-04-30 23:59:59" style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:180px">
        </div>
        <div>
          <div style="font-size:12px;color:#64748b;margin-bottom:6px">自定义邀请码（可空）</div>
          <input id="inviteCode" placeholder="留空自动生成" style="padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:180px;text-transform:uppercase">
        </div>
        <button class="btn" style="background:#2563eb;color:#fff;border-color:#2563eb;height:38px" onclick="createInvite()">生成邀请码</button>
      </div>
      <table><thead><tr>
        <th>ID</th><th>邀请码</th><th>备注</th><th>使用情况</th><th>过期时间</th><th>状态</th><th>创建时间</th><th>操作</th>
      </tr></thead><tbody id="invitesBody"></tbody></table>
    </div>
  </div>

  <div class="tab-content" id="tab-logs">
    <div class="card"><table><thead><tr>
      <th>时间</th><th>用户名</th><th>IP</th><th>操作</th><th>结果</th>
    </tr></thead><tbody id="logsBody"></tbody></table></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modalContent"></div>
</div>

<script>
var AUTH_API=null;

function discoverAPI(cb){
  // 优先同源（通过 tunnel 访问时，API 就在同域）
  fetch('/api/status').then(function(r){
    if(r.ok){AUTH_API='';cb();return;}
    throw new Error('not ok');
  }).catch(function(){
    fetch('http://localhost:9876/api/status',{mode:'cors'}).then(function(r){
      if(r.ok){AUTH_API='http://localhost:9876';cb();}else{throw new Error('not ok');}
    }).catch(function(){
      fetch('tunnel_url.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){
        if(d&&d.url){AUTH_API=d.url;cb();}else{document.body.innerHTML='<div class="empty">服务未连接</div>';}
      }).catch(function(){document.body.innerHTML='<div class="empty">服务未连接</div>';});
    });
  });
}

function apiCall(method,path,body){
  var opts={method:method,headers:{'Content-Type':'application/json'}};
  var token=localStorage.getItem('gamt_token');
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);
  return fetch(AUTH_API+path,opts).then(function(r){return r.json()});
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t){
    var active=(name==='users' && t.textContent.includes('用户')) || (name==='invites' && t.textContent.includes('邀请码')) || (name==='logs' && t.textContent.includes('日志'));
    t.className=active?'tab active':'tab';
  });
  document.querySelectorAll('.tab-content').forEach(function(c){c.className=c.id==='tab-'+name?'tab-content active':'tab-content'});
}

function loadUsers(){
  apiCall('GET','/api/admin/users').then(function(d){
    if(d.error){location.href='index.html';return;}
    var users=d.users||[];
    // Stats
    var total=users.length;
    var active=users.filter(function(u){return u.status==='active'}).length;
    var premium=users.filter(function(u){return (u.tier||0)>=1 && !u.is_admin}).length;
    var today=new Date().toISOString().slice(0,10);
    var todayNew=users.filter(function(u){return (u.created_at||'').slice(0,10)===today}).length;
    document.getElementById('statsRow').innerHTML=
      '<div class="stat"><div class="label">总用户数</div><div class="value">'+total+'</div></div>'+
      '<div class="stat"><div class="label">活跃用户</div><div class="value">'+active+'</div></div>'+
      '<div class="stat"><div class="label">高级客户</div><div class="value">'+premium+'</div></div>'+
      '<div class="stat"><div class="label">今日新注册</div><div class="value">'+todayNew+'</div></div>';
    // Table
    var html='';
    users.forEach(function(u){
      var role=u.is_admin?'<span class="tag tag-blue">管理员</span>':'<span class="tag tag-gray">用户</span>';
      var tierVal=u.tier||0;
      var tierTag=u.is_admin?'<span class="tag tag-blue">全部</span>':(tierVal>=1?'<span class="tag tag-green">高级</span>':'<span class="tag tag-gray">普通</span>');
      var status=u.status==='active'?'<span class="tag tag-green">正常</span>':'<span class="tag tag-red">已禁用</span>';
      var actions='';
      if(!u.is_admin){
        var toggleBtn=u.status==='active'
          ?'<button class="btn btn-danger" onclick="toggleUser('+u.id+',\'disabled\')">禁用</button>'
          :'<button class="btn" onclick="toggleUser('+u.id+',\'active\')">启用</button>';
        var tierBtn=tierVal>=1
          ?'<button class="btn" onclick="setTier('+u.id+',0)">降为普通</button>'
          :'<button class="btn" style="color:#16a34a;border-color:#86efac" onclick="setTier('+u.id+',1)">升为高级</button>';
        actions=tierBtn+' '+toggleBtn+' <button class="btn" onclick="showResetPw('+u.id+',\''+u.username+'\')">重置密码</button> <button class="btn btn-danger" onclick="delUser('+u.id+',\''+u.username+'\')">删除</button>';
      }
      html+='<tr><td>'+u.id+'</td><td>'+u.username+'</td><td>'+(u.display_name||'-')+'</td><td>'+role+'</td><td>'+tierTag+'</td><td>'+(u.created_at||'-')+'</td><td>'+(u.last_login||'从未')+'</td><td>'+u.login_count+'</td><td>'+status+'</td><td>'+actions+'</td></tr>';
    });
    document.getElementById('usersBody').innerHTML=html||'<tr><td colspan="10" class="empty">暂无用户</td></tr>';
  });
}

function loadLogs(){
  apiCall('GET','/api/admin/logs').then(function(d){
    var logs=d.logs||[];
    var html='';
    logs.forEach(function(l){
      var result=l.success?'<span class="tag tag-green">成功</span>':'<span class="tag tag-red">失败</span>';
      html+='<tr><td>'+(l.created_at||'-')+'</td><td>'+(l.username||'-')+'</td><td>'+(l.ip||'-')+'</td><td>'+(l.action||'-')+'</td><td>'+result+'</td></tr>';
    });
    document.getElementById('logsBody').innerHTML=html||'<tr><td colspan="5" class="empty">暂无日志</td></tr>';
  });
}

function loadInvites(){
  apiCall('GET','/api/admin/invites').then(function(d){
    var invites=d.invites||[];
    document.getElementById('inviteMode').value=d.invite_mode||'open';
    var html='';
    invites.forEach(function(v){
      var status=v.status==='active'?'<span class="tag tag-green">启用中</span>':'<span class="tag tag-red">已停用</span>';
      var useInfo=(v.used_count||0)+' / '+(v.max_uses||1);
      var toggleBtn=v.status==='active'
        ?'<button class="btn btn-danger" onclick="toggleInvite('+v.id+',\'disabled\')">停用</button>'
        :'<button class="btn" onclick="toggleInvite('+v.id+',\'active\')">启用</button>';
      html+='<tr>'+ 
        '<td>'+v.id+'</td>'+
        '<td><code style="font-size:12px;background:#f8fafc;padding:3px 6px;border-radius:6px">'+v.code+'</code></td>'+
        '<td>'+(v.note||'-')+'</td>'+
        '<td>'+useInfo+'</td>'+
        '<td>'+(v.expires_at||'不过期')+'</td>'+
        '<td>'+status+'</td>'+
        '<td>'+(v.created_at||'-')+'</td>'+
        '<td><button class="btn" onclick="copyInvite(\''+v.code+'\')">复制</button> '+toggleBtn+' <button class="btn btn-danger" onclick="deleteInvite('+v.id+',\''+v.code+'\')">删除</button></td>'+
      '</tr>';
    });
    document.getElementById('invitesBody').innerHTML=html||'<tr><td colspan="8" class="empty">还没有邀请码</td></tr>';
  });
}

function saveInviteMode(){
  var mode=document.getElementById('inviteMode').value;
  apiCall('POST','/api/admin/invite-mode',{mode:mode}).then(function(d){
    if(d.error){alert(d.error);return;}
  });
}

function createInvite(){
  var note=document.getElementById('inviteNote').value;
  var maxUses=parseInt(document.getElementById('inviteMaxUses').value||'1',10);
  var expiresAt=document.getElementById('inviteExpiresAt').value.trim();
  var code=document.getElementById('inviteCode').value.trim();
  apiCall('POST','/api/admin/create-invite',{
    note:note,
    max_uses:maxUses,
    expires_at:expiresAt||null,
    code:code||''
  }).then(function(d){
    if(d.error){alert(d.error);return;}
    document.getElementById('inviteNote').value='';
    document.getElementById('inviteMaxUses').value='1';
    document.getElementById('inviteExpiresAt').value='';
    document.getElementById('inviteCode').value='';
    loadInvites();
    if(d.invite&&d.invite.code){
      copyInvite(d.invite.code, true);
    }
  });
}

function toggleInvite(id,status){
  apiCall('POST','/api/admin/toggle-invite',{invite_id:id,status:status}).then(function(){loadInvites()});
}

function deleteInvite(id,code){
  if(!confirm('确定删除邀请码 "'+code+'" ？'))return;
  apiCall('POST','/api/admin/delete-invite',{invite_id:id}).then(function(){loadInvites()});
}

function copyInvite(code,silent){
  navigator.clipboard.writeText(code).then(function(){
    if(!silent)alert('已复制邀请码：'+code);
    if(silent)alert('邀请码已生成并复制：'+code);
  }).catch(function(){
    prompt('复制这个邀请码：',code);
  });
}

function toggleUser(id,status){
  apiCall('POST','/api/admin/toggle-user',{user_id:id,status:status}).then(function(){loadUsers()});
}

function setTier(id,tier){
  apiCall('POST','/api/admin/set-tier',{user_id:id,tier:tier}).then(function(){loadUsers()});
}

function delUser(id,name){
  if(!confirm('确定删除用户 "'+name+'" ？此操作不可恢复。'))return;
  apiCall('POST','/api/admin/delete-user',{user_id:id}).then(function(){loadUsers()});
}

function showResetPw(id,name){
  document.getElementById('modalOverlay').style.display='';
  document.getElementById('modalContent').innerHTML=
    '<h3>重置密码 — '+name+'</h3>'+
    '<input type="password" id="newPw" placeholder="新密码（至少6位）">'+
    '<div class="btn-row"><button class="btn" onclick="closeModal()">取消</button> <button class="btn" style="background:#2563eb;color:#fff;border-color:#2563eb" onclick="doResetPw('+id+')">确认重置</button></div>';
}
function doResetPw(id){
  var pw=document.getElementById('newPw').value;
  if(!pw||pw.length<6){alert('密码至少6位');return;}
  apiCall('POST','/api/admin/reset-password',{user_id:id,password:pw}).then(function(){closeModal();loadUsers();});
}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}

// Init
discoverAPI(function(){
  // Verify admin access
  apiCall('GET','/api/auth/me').then(function(d){
    if(!d.is_admin){
      document.body.innerHTML='<div class="container"><div class="empty">⛔ 无管理员权限<br><br><a href="index.html">返回看板</a></div></div>';
      return;
    }
    loadUsers();
    loadInvites();
    loadLogs();
  }).catch(function(){
    location.href='index.html';
  });
});
</script>
</body></html>
