<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALO 交易仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f5f6f8;
            color: #2d3142;
            padding: 20px;
            font-size: 14px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2d3142;
        }
        
        .subtitle {
            color: #8b92a5;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .scenario-card {
            background: linear-gradient(135deg, #1e2433, #2a3350);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .scenario-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e2e6ed;
        }
        
        .scenario-content {
            font-size: 16px;
            line-height: 1.6;
            color: #e2e6ed;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e8eaef;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #374151;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 8px;
        }
        
        .chart {
            width: 100%;
            height: 300px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th {
            background: #f9fafb;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e8eaef;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid #e8eaef;
            color: #2d3142;
        }
        
        tr:hover {
            background: #f9fafb;
        }
        
        .positive {
            color: #10b981;
        }
        
        .negative {
            color: #ef4444;
        }
        
        .theme-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .theme-ai { background: #dbeafe; color: #1e40af; }
        .theme-defense { background: #fee2e2; color: #991b1b; }
        .theme-value { background: #d1fae5; color: #065f46; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b92a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 HALO 交易仪表盘</h1>
        <div class="subtitle">重资产范式转移 · 全球标的追踪</div>
        
        <div id="loading" class="loading">加载中...</div>
        <div id="content" style="display: none;">
            <!-- 场景判断卡片 -->
            <div class="scenario-card">
                <div class="scenario-title">📊 当前场景</div>
                <div class="scenario-content">
                    <strong id="scenario-name"></strong><br>
                    <span id="scenario-action"></span>
                </div>
            </div>
            
            <!-- 核心指标卡片 -->
            <div class="grid">
                <div class="card">
                    <div class="card-title">🚀 CapEx 二阶导（最核心）</div>
                    <div id="capex-indicators" style="font-size:14px;line-height:2"></div>
                </div>
                <div class="card">
                    <div class="card-title">⚖️ PE 剪刀差（估值对比）</div>
                    <div id="pe-scissors" style="font-size:14px;line-height:2"></div>
                </div>
            </div>
            
            <!-- 图表区 -->
            <div class="grid">
                <div class="card">
                    <div class="card-title">主线强弱对比（20日相对收益）</div>
                    <div id="theme-chart" class="chart"></div>
                </div>
                
                <div class="card">
                    <div class="card-title">叙事热度雷达</div>
                    <div id="narrative-chart" class="chart"></div>
                </div>
            </div>
            
            <!-- 标的表格 -->
            <div class="card">
                <div class="card-title">标的相对强弱 TOP 10</div>
                <table id="stocks-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>标的</th>
                            <th>主线</th>
                            <th>20日相对强弱</th>
                            <th>最新价格</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // 加载数据
        Promise.all([
            fetch('data/halo_analysis.json').then(res => {
                if (!res.ok) throw new Error(`分析数据加载失败: ${res.status}`);
                return res.json();
            }),
            fetch('data/halo_financials.json').then(res => {
                if (!res.ok) throw new Error(`财务数据加载失败: ${res.status}`);
                return res.json();
            })
        ])
            .then(([analysisData, financialData]) => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                renderDashboard(analysisData, financialData);
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = `❌ 数据加载失败<br><small style="color:#888">${err.message}</small>`;
                console.error('HALO数据加载错误:', err);
            });
        
        function renderDashboard(data, financial) {
            // 场景判断
            document.getElementById('scenario-name').textContent = data.scenario;
            document.getElementById('scenario-action').textContent = data.action;
            
            // CapEx 二阶导
            renderCapexIndicators(financial.capex_second_derivative);
            
            // PE 剪刀差
            renderPEScissors(financial.eps_scissors);
            
            // 主线强弱图表
            renderThemeChart(data.theme_strength);
            
            // 叙事热度雷达图
            renderNarrativeChart(data.narrative_scores);
            
            // 标的表格
            renderStocksTable(data.stocks);
        }
        
        function renderCapexIndicators(capexData) {
            const container = document.getElementById('capex-indicators');
            if (!capexData || capexData.length === 0) {
                container.innerHTML = '<span style="color:#888">数据加载中...</span>';
                return;
            }
            
            let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
            capexData.forEach(c => {
                html += `
                    <div style="background:#f8fafc;border-radius:8px;padding:12px;border-left:3px solid ${c.signal === '🟢' ? '#10b981' : '#ca8a04'}">
                        <div style="font-size:11px;color:#64748b;margin-bottom:4px">${c.signal} ${c.name}</div>
                        <div style="font-size:18px;font-weight:700;color:#1e293b">${c.yoy_growth}%</div>
                        <div style="font-size:11px;color:#94a3b8;margin-top:2px">二阶导 ${c.second_derivative} (${c.trend})</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        function renderPEScissors(scissors) {
            const container = document.getElementById('pe-scissors');
            if (!scissors) {
                container.innerHTML = '<span style="color:#888">数据加载中...</span>';
                return;
            }
            
            const isHeavyCheaper = scissors.pe_gap < 0;
            container.innerHTML = `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
                    <div style="background:#f8fafc;border-radius:8px;padding:12px;border-left:3px solid #ef4444">
                        <div style="font-size:11px;color:#64748b;margin-bottom:4px">重资产 PE</div>
                        <div style="font-size:18px;font-weight:700;color:#1e293b">${scissors.heavy_asset_pe}</div>
                    </div>
                    <div style="background:#f8fafc;border-radius:8px;padding:12px;border-left:3px solid #3b82f6">
                        <div style="font-size:11px;color:#64748b;margin-bottom:4px">轻资产 PE</div>
                        <div style="font-size:18px;font-weight:700;color:#1e293b">${scissors.light_asset_pe}</div>
                    </div>
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:12px">
                    <div style="font-size:11px;color:#64748b;margin-bottom:4px">估值差距</div>
                    <div style="font-size:16px;font-weight:700;color:${isHeavyCheaper ? '#10b981' : '#ef4444'}">${scissors.pe_gap} PE点 (${isHeavyCheaper ? '重资产更便宜' : '轻资产更便宜'})</div>
                    <div style="font-size:11px;color:#94a3b8;margin-top:4px">Earnings Yield 差距: ${scissors.yield_gap} 百分点</div>
                </div>
            `;
        }
        
        function renderThemeChart(themeStrength) {
            const chart = echarts.init(document.getElementById('theme-chart'), null, {
                devicePixelRatio: window.devicePixelRatio || 2
            });
            const option = {
                backgroundColor: 'transparent',
                grid: { left: '20%', right: '15%', top: '10%', bottom: '15%', containLabel: true },
                xAxis: {
                    type: 'value',
                    axisLabel: { color: '#64748b', formatter: '{value}%' },
                    axisLine: { lineStyle: { color: '#e8eaef' } },
                    splitLine: { lineStyle: { color: '#e8eaef' } }
                },
                yAxis: {
                    type: 'category',
                    data: ['价值兑现', 'AI能耗', '地缘重装'],
                    axisLabel: { color: '#374151', fontSize: 13 },
                    axisLine: { lineStyle: { color: '#e8eaef' } }
                },
                series: [{
                    type: 'bar',
                    data: [
                        { value: themeStrength['价值兑现'], itemStyle: { color: '#10b981' } },
                        { value: themeStrength['AI能耗'], itemStyle: { color: '#3b82f6' } },
                        { value: themeStrength['地缘重装'], itemStyle: { color: '#ef4444' } }
                    ],
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{c}%',
                        color: '#374151',
                        fontSize: 12
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function renderNarrativeChart(scores) {
            const chart = echarts.init(document.getElementById('narrative-chart'), null, {
                devicePixelRatio: window.devicePixelRatio || 2
            });
            const option = {
                backgroundColor: 'transparent',
                radar: {
                    indicator: [
                        { name: 'AI CapEx', max: 10 },
                        { name: '全球再武装', max: 10 },
                        { name: '地缘风险', max: 10 },
                        { name: '通胀通缩', max: 10 }
                    ],
                    center: ['50%', '50%'],
                    radius: '65%',
                    splitArea: { areaStyle: { color: ['#f9fafb', '#fff'] } },
                    axisLine: { lineStyle: { color: '#e8eaef' } },
                    splitLine: { lineStyle: { color: '#e8eaef' } },
                    name: { textStyle: { color: '#374151', fontSize: 12 } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: [
                            scores['AI_CapEx'],
                            scores['全球再武装'],
                            scores['地缘风险'],
                            scores['通胀通缩']
                        ],
                        areaStyle: { color: 'rgba(59, 130, 246, 0.3)' },
                        lineStyle: { color: '#3b82f6', width: 2 },
                        itemStyle: { color: '#3b82f6' }
                    }]
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function renderStocksTable(stocks) {
            const sorted = stocks.sort((a, b) => b.rel_strength_20d - a.rel_strength_20d);
            const tbody = document.querySelector('#stocks-table tbody');
            
            sorted.slice(0, 10).forEach((stock, i) => {
                const row = tbody.insertRow();
                const themeClass = stock.theme === 'AI能耗' ? 'theme-ai' : 
                                  stock.theme === '地缘重装' ? 'theme-defense' : 'theme-value';
                const strengthClass = stock.rel_strength_20d >= 0 ? 'positive' : 'negative';
                
                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${stock.name}</td>
                    <td><span class="theme-badge ${themeClass}">${stock.theme}</span></td>
                    <td class="${strengthClass}">${stock.rel_strength_20d > 0 ? '+' : ''}${stock.rel_strength_20d}%</td>
                    <td>${stock.latest_price}</td>
                `;
            });
        }
    </script>
</body>
</html>
