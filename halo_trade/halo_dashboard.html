<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALO 交易仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f5f6f8;
            color: #2d3142;
            padding: 20px;
            font-size: 14px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2d3142;
        }
        
        .subtitle {
            color: #8b92a5;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .scenario-card {
            background: linear-gradient(135deg, #1e2433, #2a3350);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .scenario-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e2e6ed;
        }
        
        .scenario-content {
            font-size: 16px;
            line-height: 1.6;
            color: #e2e6ed;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e8eaef;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #374151;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 8px;
        }
        
        .chart {
            width: 100%;
            height: 300px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th {
            background: #f9fafb;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e8eaef;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid #e8eaef;
            color: #2d3142;
        }
        
        tr:hover {
            background: #f9fafb;
        }
        
        .positive {
            color: #10b981;
        }
        
        .negative {
            color: #ef4444;
        }
        
        .theme-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .theme-ai { background: #dbeafe; color: #1e40af; }
        .theme-defense { background: #fee2e2; color: #991b1b; }
        .theme-value { background: #d1fae5; color: #065f46; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b92a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 HALO 交易仪表盘</h1>
        <div class="subtitle">重资产范式转移 · 全球标的追踪</div>
        
        <div id="loading" class="loading">加载中...</div>
        <div id="content" style="display: none;">
            <!-- 场景判断卡片 -->
            <div class="scenario-card">
                <div class="scenario-title">📊 当前场景</div>
                <div class="scenario-content">
                    <strong id="scenario-name"></strong><br>
                    <span id="scenario-action"></span>
                </div>
            </div>
            
            <!-- 核心指标卡片 -->
            <div class="grid">
                <div class="card">
                    <div class="card-title">🚀 CapEx 二阶导趋势（季度）</div>
                    <div id="capex-chart" class="chart"></div>
                </div>
                <div class="card">
                    <div class="card-title">⚖️ PE 剪刀差趋势（每日）</div>
                    <div id="pe-chart" class="chart"></div>
                </div>
            </div>
            
            <!-- 图表区 -->
            <div class="grid">
                <div class="card">
                    <div class="card-title">主线强弱对比（20日相对收益）</div>
                    <div id="theme-chart" class="chart"></div>
                </div>
                
                <div class="card">
                    <div class="card-title">叙事热度雷达</div>
                    <div id="narrative-chart" class="chart"></div>
                </div>
            </div>
            
            <!-- 标的表格 -->
            <div class="card">
                <div class="card-title">标的相对强弱 TOP 10</div>
                <table id="stocks-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>标的</th>
                            <th>主线</th>
                            <th>20日相对强弱</th>
                            <th>最新价格</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // 加载数据
        Promise.all([
            fetch('data/halo_analysis.json').then(res => {
                if (!res.ok) throw new Error(`分析数据加载失败: ${res.status}`);
                return res.json();
            }),
            fetch('data/halo_financials.json').then(res => {
                if (!res.ok) throw new Error(`财务数据加载失败: ${res.status}`);
                return res.json();
            })
        ])
            .then(([analysisData, financialData]) => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                renderDashboard(analysisData, financialData);
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = `❌ 数据加载失败<br><small style="color:#888">${err.message}</small>`;
                console.error('HALO数据加载错误:', err);
            });
        
        function renderDashboard(data, financial) {
            // 场景判断
            document.getElementById('scenario-name').textContent = data.scenario;
            document.getElementById('scenario-action').textContent = data.action;
            
            // CapEx 二阶导
            renderCapexIndicators(financial.capex_second_derivative);
            
            // PE 剪刀差
            renderPEScissors(financial.eps_scissors);
            
            // 主线强弱图表
            renderThemeChart(data.theme_strength);
            
            // 叙事热度雷达图
            renderNarrativeChart(data.narrative_scores);
            
            // 标的表格
            renderStocksTable(data.stocks);
        }
        
        function renderCapexIndicators(capexData) {
            const chart = echarts.init(document.getElementById('capex-chart'), null, {
                devicePixelRatio: window.devicePixelRatio || 2
            });
            
            if (!capexData || Object.keys(capexData).length === 0) {
                document.getElementById('capex-chart').innerHTML = '<div style="text-align:center;padding:40px;color:#888">数据加载中...</div>';
                return;
            }
            
            // 准备数据
            const companies = {
                'MSFT': { name: '微软', color: '#3b82f6' },
                'GOOGL': { name: '谷歌', color: '#10b981' },
                'AMZN': { name: '亚马逊', color: '#f59e0b' },
                'META': { name: 'Meta', color: '#8b5cf6' }
            };
            
            const series = [];
            let allQuarters = new Set();
            
            for (const [ticker, data] of Object.entries(capexData)) {
                const history = data.history || [];
                const quarters = history.map(h => h.quarter);
                const values = history.map(h => h.second_derivative);
                
                quarters.forEach(q => allQuarters.add(q));
                
                series.push({
                    name: companies[ticker]?.name || ticker,
                    type: 'line',
                    data: values,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { width: 2, color: companies[ticker]?.color },
                    itemStyle: { color: companies[ticker]?.color }
                });
            }
            
            const xAxisData = Array.from(allQuarters).sort();
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    formatter: params => {
                        let html = `<strong>${params[0].axisValue}</strong><br/>`;
                        params.forEach(p => {
                            html += `${p.marker} ${p.seriesName}: ${p.value !== null ? p.value.toFixed(2) : 'N/A'}<br/>`;
                        });
                        return html;
                    }
                },
                legend: {
                    data: series.map(s => s.name),
                    top: 10,
                    textStyle: { color: '#374151' }
                },
                grid: { left: '10%', right: '10%', top: '20%', bottom: '15%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: xAxisData,
                    axisLabel: { color: '#64748b', fontSize: 11, rotate: 30 },
                    axisLine: { lineStyle: { color: '#e8eaef' } }
                },
                yAxis: {
                    type: 'value',
                    name: '二阶导',
                    axisLabel: { color: '#64748b' },
                    axisLine: { lineStyle: { color: '#e8eaef' } },
                    splitLine: { lineStyle: { color: '#e8eaef' } }
                },
                series: series
            };
            
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function renderPEScissors(scissors) {
            const chart = echarts.init(document.getElementById('pe-chart'), null, {
                devicePixelRatio: window.devicePixelRatio || 2
            });
            
            if (!scissors || !scissors.history || scissors.history.length === 0) {
                document.getElementById('pe-chart').innerHTML = '<div style="text-align:center;padding:40px;color:#888">数据积累中...（每日运行后显示趋势）</div>';
                return;
            }
            
            const history = scissors.history;
            const dates = history.map(h => h.date);
            const heavyPE = history.map(h => h.heavy_pe);
            const lightPE = history.map(h => h.light_pe);
            const peGap = history.map(h => h.pe_gap);
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    formatter: params => {
                        let html = `<strong>${params[0].axisValue}</strong><br/>`;
                        params.forEach(p => {
                            html += `${p.marker} ${p.seriesName}: ${p.value !== null ? p.value.toFixed(2) : 'N/A'}<br/>`;
                        });
                        return html;
                    }
                },
                legend: {
                    data: ['重资产 PE', '轻资产 PE', 'PE 差距'],
                    top: 10,
                    textStyle: { color: '#374151' }
                },
                grid: { left: '10%', right: '10%', top: '20%', bottom: '15%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLabel: { color: '#64748b', fontSize: 11, rotate: 30 },
                    axisLine: { lineStyle: { color: '#e8eaef' } }
                },
                yAxis: {
                    type: 'value',
                    name: 'PE',
                    axisLabel: { color: '#64748b' },
                    axisLine: { lineStyle: { color: '#e8eaef' } },
                    splitLine: { lineStyle: { color: '#e8eaef' } }
                },
                series: [
                    {
                        name: '重资产 PE',
                        type: 'line',
                        data: heavyPE,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 6,
                        lineStyle: { width: 2, color: '#ef4444' },
                        itemStyle: { color: '#ef4444' }
                    },
                    {
                        name: '轻资产 PE',
                        type: 'line',
                        data: lightPE,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 6,
                        lineStyle: { width: 2, color: '#3b82f6' },
                        itemStyle: { color: '#3b82f6' }
                    },
                    {
                        name: 'PE 差距',
                        type: 'line',
                        data: peGap,
                        smooth: true,
                        symbol: 'diamond',
                        symbolSize: 6,
                        lineStyle: { width: 2, color: '#10b981', type: 'dashed' },
                        itemStyle: { color: '#10b981' }
                    }
                ]
            };
            
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function renderThemeChart(themeStrength) {
            const chart = echarts.init(document.getElementById('theme-chart'), null, {
                devicePixelRatio: window.devicePixelRatio || 2
            });
            const option = {
                backgroundColor: 'transparent',
                grid: { left: '20%', right: '15%', top: '10%', bottom: '15%', containLabel: true },
                xAxis: {
                    type: 'value',
                    axisLabel: { color: '#64748b', formatter: '{value}%' },
                    axisLine: { lineStyle: { color: '#e8eaef' } },
                    splitLine: { lineStyle: { color: '#e8eaef' } }
                },
                yAxis: {
                    type: 'category',
                    data: ['价值兑现', 'AI能耗', '地缘重装'],
                    axisLabel: { color: '#374151', fontSize: 13 },
                    axisLine: { lineStyle: { color: '#e8eaef' } }
                },
                series: [{
                    type: 'bar',
                    data: [
                        { value: themeStrength['价值兑现'], itemStyle: { color: '#10b981' } },
                        { value: themeStrength['AI能耗'], itemStyle: { color: '#3b82f6' } },
                        { value: themeStrength['地缘重装'], itemStyle: { color: '#ef4444' } }
                    ],
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{c}%',
                        color: '#374151',
                        fontSize: 12
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function renderNarrativeChart(scores) {
            const chart = echarts.init(document.getElementById('narrative-chart'), null, {
                devicePixelRatio: window.devicePixelRatio || 2
            });
            const option = {
                backgroundColor: 'transparent',
                radar: {
                    indicator: [
                        { name: 'AI CapEx', max: 10 },
                        { name: '全球再武装', max: 10 },
                        { name: '地缘风险', max: 10 },
                        { name: '通胀通缩', max: 10 }
                    ],
                    center: ['50%', '50%'],
                    radius: '65%',
                    splitArea: { areaStyle: { color: ['#f9fafb', '#fff'] } },
                    axisLine: { lineStyle: { color: '#e8eaef' } },
                    splitLine: { lineStyle: { color: '#e8eaef' } },
                    name: { textStyle: { color: '#374151', fontSize: 12 } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: [
                            scores['AI_CapEx'],
                            scores['全球再武装'],
                            scores['地缘风险'],
                            scores['通胀通缩']
                        ],
                        areaStyle: { color: 'rgba(59, 130, 246, 0.3)' },
                        lineStyle: { color: '#3b82f6', width: 2 },
                        itemStyle: { color: '#3b82f6' }
                    }]
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }
        
        function renderStocksTable(stocks) {
            const sorted = stocks.sort((a, b) => b.rel_strength_20d - a.rel_strength_20d);
            const tbody = document.querySelector('#stocks-table tbody');
            
            sorted.slice(0, 10).forEach((stock, i) => {
                const row = tbody.insertRow();
                const themeClass = stock.theme === 'AI能耗' ? 'theme-ai' : 
                                  stock.theme === '地缘重装' ? 'theme-defense' : 'theme-value';
                const strengthClass = stock.rel_strength_20d >= 0 ? 'positive' : 'negative';
                
                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${stock.name}</td>
                    <td><span class="theme-badge ${themeClass}">${stock.theme}</span></td>
                    <td class="${strengthClass}">${stock.rel_strength_20d > 0 ? '+' : ''}${stock.rel_strength_20d}%</td>
                    <td>${stock.latest_price}</td>
                `;
            });
        }
    </script>
</body>
</html>
