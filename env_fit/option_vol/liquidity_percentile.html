<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>流动性历史分位</title>
  <style>
    body{font-family:-apple-system,sans-serif;background:#f8fafc;margin:0;padding:18px;color:#0f172a}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px 18px;margin-bottom:14px}
    .title{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
    .sub{font-size:12px;color:#64748b;margin-top:4px}
    .hero{text-align:center;padding:24px;background:linear-gradient(135deg,#06b6d4 0%,#3b82f6 100%);border-radius:16px;color:#fff;margin-bottom:16px}
    .hero .big{font-size:56px;font-weight:900;margin:8px 0}
    .hero .label{font-size:14px;opacity:0.9}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
    th,td{padding:10px 8px;border-bottom:1px solid #f3f4f6;text-align:left}
    th{font-size:12px;color:#64748b;background:#f8fafc;position:sticky;top:0}
    .pct{font-weight:700;font-size:16px}
    .pct.high{color:#059669}
    .pct.mid{color:#f59e0b}
    .pct.low{color:#dc2626}
    .chart-box{position:relative;height:300px;margin-top:12px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="hero">
    <div class="label">全市场流动性分位</div>
    <div class="big" id="marketPct">--</div>
    <div class="sub" id="marketDesc">--</div>
  </div>

  <div class="card">
    <div class="title">💧 各品种流动性历史分位</div>
    <div class="sub">成交量+持仓量在过去1年的分位数 · 流动性高=赌徒多=有人买保险</div>
    <table>
      <thead>
        <tr>
          <th>品种</th>
          <th>当日成交量</th>
          <th>当日持仓量</th>
          <th>成交量分位</th>
          <th>持仓量分位</th>
          <th>综合流动性</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="title">📈 流动性历史走势</div>
    <div class="sub">选择品种查看过去1年的成交量和持仓量变化</div>
    <select id="symbolSelect" style="padding:8px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;margin-top:8px">
      <option value="">-- 选择品种 --</option>
    </select>
    <div class="chart-box"><canvas id="liqChart"></canvas></div>
  </div>

<script>
let liqChart = null;

fetch('liquidity_percentile.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  const marketPct = d.market_liquidity_percentile || 0;
  document.getElementById('marketPct').textContent = marketPct.toFixed(1) + '%';
  
  let desc = '';
  if(marketPct >= 70) desc = '🟢 流动性充足 · 赌徒活跃';
  else if(marketPct >= 40) desc = '🟡 流动性一般 · 需精选品种';
  else desc = '🔴 流动性不足 · 卖方难找对手';
  document.getElementById('marketDesc').textContent = desc;
  
  const symbols = d.symbols || [];
  document.getElementById('tbody').innerHTML = symbols.map(s=>{
    let cls = 'mid';
    if(s.liquidity_percentile >= 70) cls = 'high';
    else if(s.liquidity_percentile < 40) cls = 'low';
    return `<tr>
      <td><b>${s.symbol}</b>（${s.cn_name}）</td>
      <td>${s.current_vol.toLocaleString()}</td>
      <td>${s.current_oi.toLocaleString()}</td>
      <td>${s.vol_percentile}%</td>
      <td>${s.oi_percentile}%</td>
      <td><span class="pct ${cls}">${s.liquidity_percentile}%</span></td>
    </tr>`;
  }).join('');
  
  const sel = document.getElementById('symbolSelect');
  symbols.forEach(s=>{
    const opt = document.createElement('option');
    opt.value = s.symbol;
    opt.textContent = `${s.symbol}（${s.cn_name}）`;
    sel.appendChild(opt);
  });
  
  sel.addEventListener('change', function(){
    const sym = this.value;
    if(!sym) return;
    const data = symbols.find(s=>s.symbol===sym);
    if(!data || !data.vol_history) return;
    
    const labels = data.vol_history.map(h=>h.date.slice(4,6)+'/'+h.date.slice(6,8));
    const vols = data.vol_history.map(h=>h.vol);
    const ois = data.vol_history.map(h=>h.oi);
    
    if(liqChart) liqChart.destroy();
    
    const ctx = document.getElementById('liqChart').getContext('2d');
    liqChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {label: '成交量', data: vols, borderColor: '#06b6d4', borderWidth: 2, yAxisID: 'y'},
          {label: '持仓量', data: ois, borderColor: '#f59e0b', borderWidth: 2, yAxisID: 'y1'},
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {mode: 'index', intersect: false},
        scales: {
          y: {type: 'linear', position: 'left', title: {display: true, text: '成交量'}},
          y1: {type: 'linear', position: 'right', title: {display: true, text: '持仓量'},
               grid: {drawOnChartArea: false}},
        }
      }
    });
  });
}).catch(err=>{
  document.body.innerHTML = '<div style="padding:20px;color:#dc2626">加载失败: '+err+'</div>';
});
</script>
</body>
</html>
